body:
  text: 均輸今有均輸粟甲縣一萬戶行道八日乙縣九千五百戶行道十日丙縣一萬二千三百五十戶行道十三日丁縣一萬二千二百戶行道二十日各到輸所凡四縣賦當輸二十五萬斛用車一萬乘欲以道里遠近戶數多少衰出之問粟車各幾何答曰甲縣粟八萬三千一百斛車三千三百二十四乘乙縣粟六萬三千一百七十五斛車二千五百二十七乘丙縣粟六萬三千一百七十五斛車二千五百二十七乘丁縣粟四萬五百五十斛車一千六百二十二乘均輸術曰令縣戶數各如其本行道日數而一以為衰甲衰一百二十五乙丙衰各九十五丁衰六十一副并為法以賦粟車數乘未并者各自為實實如法得一車有分者上下輩之以二十五斛乘車數即粟數今有均輸卒甲縣一千二百人薄塞乙縣一千五百五十人行道一日丙縣一千二百八十人行道二日丁縣九百九十人行道三日戊縣一千七百五十人行道五日凡五縣賦輸卒一月一千二百人欲以遠近戶率多少衰出之問縣各幾何答曰甲縣二百二十九人乙縣二百八十六人丙縣二百二十八人丁縣一百七十一人戊縣二百八十六人術曰令縣卒各如其居所及行道日數而一以為衰甲衰四乙衰五丙衰四丁衰三戊衰五副并為法以人數乘未并者各自為實實如法而一有分者上下輩之今有均賦粟甲縣二萬五百二十戶粟一斛二十錢自輸其縣乙縣一萬二千三百一十二戶粟一斛一十錢至輸所二百里丙縣七千一百八十二戶粟一斛一十二錢至輸所一百五十里丁縣一萬三千三百三十八戶粟一斛一十七錢至輸所二百五十里戊縣五千一百三十戶粟一斛一十三錢至輸所一百五十里凡五縣賦輸粟一萬斛一車載二十五斛與僦一里一錢欲以縣戶賦粟令費勞等問縣各粟幾何答曰甲縣三千五百七十一斛二千八百七十三分斛之五百一十七乙縣二千三百八十斛二千八百七十三分斛之二千二百六十丙縣一千三百八十八斛二千八百七十三分斛之二千二百七十六丁縣一千七百一十九斛二千八百七十三分斛之一千三百一十三戊縣九百三十九斛二千八百七十三分斛之二千二百五十三術曰以一里僦價乘至輸所里以一車二十五斛除之加一斛粟價則致一斛之費各以約其戶數為衰甲衰一千二十六乙衰六百八十四丙衰三百九十九丁衰四百九十四戊衰二百七十副并為法所賦粟乘未并者各自為實實如法而一今有均賦粟甲縣四萬二千算粟一斛二十自輸其縣乙縣三萬四千二百七十二算粟一斛一十八傭價一日一十錢到輸所七十里丙縣一萬九千三百二十八算粟一斛一十六傭價一日五錢到輸所一百四十里丁縣一萬七千七百算粟一斛一十四傭價一日五錢到輸所一百七十五里戊縣二萬三千四十算粟一斛一十二傭價一日五錢到輸所二百一十里己縣一萬九千一百三十六算粟一斛一十傭價一日五錢到輸所二百八十里凡六縣賦粟六萬斛皆輸甲縣六人共車車載二十五斛重車日行五十里空車日行七十里載輸之間各一日粟有貴賤傭各別價以算出錢令費勞等問縣各粟幾何答曰甲縣一萬八千九百四十七斛一百三十三分斛之四十九乙縣一萬八百二十七斛一百三十三分斛之九丙縣七千二百一十八斛一百三十三分斛之六丁縣六千七百六十六斛一百三十三分斛之一百二十二戊縣九千二十二斛一百三十三分斛之七十四己縣七千二百一十八斛一百三十三分斛之六術曰以車程行空重相乘為法并空重以乘道里各自為實實如法得一日加載輸各一日而以六人乘之又以傭價乘之以二十五斛除之加一斛粟價即致一斛之費各以約其算數為衰副并為法以所賦粟乘未并者各自為實實如法得一斛今有粟七斗三人分舂之一人為糲米一人為稗米一人為𥽿米令米數等問取粟為米各幾何答曰糲米取粟二斗一百二十一分斗之一十稗米取粟二斗一百二十一分斗之三十八𥽿米取粟二斗一百二十一分斗之七十三為米各一斗六百五分斗之一百五十一術曰列置糲米三十稗米二十七𥽿米二十四而返衰之副并為法以七斗乘未并者各自為取粟實實如法得一斗若求米等者以本率各乘定所取粟為實以粟率五十為法實如法得一斗今有人當稟粟二斛倉無粟欲與米一菽二以當所稟粟問各幾何答曰米五斗一升七分升之三菽一斛二升七分升之六術曰置米一菽二求為粟之數并之得三九分之八以為法亦置米一菽二而以粟二斛乘之各自為實實如法得一斛今有取傭負鹽二斛行一百里與錢四十今負鹽一斛七斗三升少半升行八十里問與錢幾何答曰二十七錢一十五分錢之一十一術曰置鹽二斛升數以一百里乘之為法以四十錢乘今負鹽升數又以八十里乘之為實實如法得一錢今有負籠重一石一十七斤行七十六步五十返今負籠重一石行百步問返幾何答曰五十七返二千六百三分返之一千六百二十九術曰以故所行步數乘故籠重斤數為法今籠重斤數乘今步又以返數乘之為實實如法得一返今有程傳委輸空車日行七十里重車日行五十里今載太倉粟輸上林五日三返問太倉去上林幾何答曰四十八里一十八分里之一十一術曰并空重里數以三返乘之為法令空重相乘又以五日乘之為實實如法得一里今有絡絲一斤為練絲一十二兩練絲一斤為青絲一斤一十二銖今有青絲一斤問本絡絲幾何答曰一斤四兩一十六銖三十三分銖之一十六術曰以練絲十二兩乘青絲一斤一十二銖為法以青絲一斤銖數乘練絲一斤兩數又以絡絲一斤乘之為實實如法得一斤今有惡粟二十斗舂之得糲米九斗今欲求稗米一十斗問惡粟幾何答曰二十四斗六升八十一分升之七十四術曰置糲米九斗以九乘之為法亦置稗米十斗以十乘之又以惡粟二十斗乘之為實實如法得一斗今有善行者行一百步不善行者行六十步今不善行者先行一百步善行者追之問幾何步及之答曰二百五十步術曰置善行者一百步減不善行者六十步餘四十步以為法以善行者之一百步乘不善行者先行一百步為實實如法得一步今有不善行者先行一十里善行者追之一百里先至不善行者二十里問善行者幾何里及之答曰三十三里少半里術曰置不善行者先行一十里以善行者先至二十里增之以為法以不善行者先行一十里乘善行者一百里為實實如法得一里今有兔先走一百步犬追之二百五十步不及三十步而止問犬不止復行幾何步及之答曰一百七步七分步之一術曰置兔先走一百步以犬走不及三十步減之餘為法以不及三十步乘犬追步數為實實如法得一步今有人持金十二斤出關關稅之十分而取一今關取金二斤償錢五千問金一斤值錢幾何答曰六千二百五十術曰以一十乘二斤以十二斤減之餘為法以一十乘五千為實實如法得一今有客馬日行三百里客去忘持衣日已三分之一主人乃覺持衣追及與之而還至家視日四分之三問主人馬不休日行幾何答曰七百八十里術曰置四分日之三除三分日之一半其餘以為法副置法增三分日之一以三百里乘之為實實如法得主人馬一日行今有金箠長五尺斬本一尺重四斤斬末一尺重二斤問次一尺各重幾何答曰末一尺重二斤次一尺重二斤八兩次一尺重三斤次一尺重三斤八兩次一尺重四斤術曰令末重減本重餘即差率也又置本重以四間乘之為下第一衰副置以差率減之每尺各自為衰副置下第一衰以為法以本重四斤遍乘列衰各自為實實如法得一斤今有五人分五錢令上二人所得與下三人等問各得幾何答曰甲得一錢六分錢之二乙得一錢六分錢之一丙得一錢丁得六分錢之五戊得六分錢之四術曰置錢錐行衰并上二人為九并下三人為六六少於九三以三均加焉副并為法以所分錢乘未并者各自為實實如法得一錢今有竹九節下三節容四升上四節容三升問中間二節欲均容各多少答曰下初一升六十六分升之二十九次一升六十六分升之二十二次一升六十六分升之一十五次一升六十六分升之八次一升六十六分升之一次六十六分升之六十次六十六分升之五十三次六十六分升之四十六次六十六分升之三十九術曰以下三節分四升為下率以上四節分三升為上率上下率以少減多餘為實置四節三節各半之以減九節餘為法實如法得一升即衰相去也下率一升少半升者下第二節容也今有鳧起南海七日至北海鴈起北海九日至南海今鳧鴈俱起問何日相逢答曰三日十六分日之十五術曰并日數為法日數相乘為實實如法得一日今有甲發長安五日至齊乙發齊七日至長安今乙發已先二日甲乃發長安問幾何日相逢答曰二日十二分日之一術曰并五日七日以為法以乙先發二日減七日餘以乘甲日數為實實如法得一日今有一人一日為牡瓦三十八枚一人一日為牝瓦七十六枚今令一人一日作瓦牝牡相半問成瓦幾何答曰二十五枚少半枚術曰并牝牡為法牝牡相乘為實實如法得一枚今有一人一日矯矢五十一人一日羽矢三十一人一日筈矢十五今令一人一日自矯羽筈問成矢幾何答曰八矢少半矢術曰矯矢五十用徒一人羽矢五十用徒一人太半人筈矢五十用徒三人少半人并之得六人以為法以五十矢為實實如法得一矢今有假田初假之歲三畝一錢明年四畝一錢後年五畝一錢凡三歲得一百問田幾何答曰一頃二十七畝四十七分畝之三十一術曰置畝數及錢數令畝數互乘錢數并以為法畝數相乘又以百錢乘之為實實如法得一畝今有程耕一人一日發七畝一人一日耕三畝一人一日耰種五畝今令一人一日自發耕耰種之問治田幾何答曰一畝一百一十四步七十一分步之六十六術曰置發耕耰畝數令互乘人數并以為法畝數相乘為實實如法得一畝今有池五渠注之其一渠開之少半日一滿次一日一滿次二日半一滿次三日一滿次五日一滿今皆決之問幾何日滿池答曰七十四分日之十五術曰各置渠一日滿池之數并以為法以一日為實實如法得一日其一術列置日數及滿數令日互相乘滿并以為法日數相乘為實實如法得一日今有人持米出三關外關三而取一中關五而取一內關七而取一餘米五斗問本持米幾何答曰十斗九升八分升之三術曰置米五斗以所稅者三之五之七之為實以餘不稅者二四六互相乘為法實如法得一斗今有人持金出五關前關二而稅一次關三而稅一次關四而稅一次關五而稅一次關六而稅一并五關所稅適重一斤問本持金幾何答曰一斤三兩四銖五分銖之四術曰置一斤通所稅者以乘之為實亦通其不稅者以減所通餘為法實如法得一斤

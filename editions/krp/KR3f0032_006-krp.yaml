  text: 九章算術卷第六算經十書之二
  hash: sha256:e10c8d39120d93c495c4184eb53b55a0bf94edeefa4b921202dce438d8cad7be
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0032_SBCK_006-1a}
body:
  text: 魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勅注釋均輸以御遠近勞費今有均輸粟甲縣一萬戸行道八日乙縣九千五百戸行道十日丙縣一萬二千三百五十戸行道十三日丁縣一萬二千二百戸行道二十日各到輸所凡四縣賦當輸二十五萬斛用車一萬乘欲以道里遠近戸數多少衰出之問粟車各幾何荅曰甲縣粟八萬三千一百斛車三千三百二十四乘乙縣粟六萬三千一百七十五斛車二千五百二十七乘丙縣粟六萬三千一百七十五斛車二千五百二十七乘丁縣粟四萬五百五十斛車一千六百二十二乘均輸按此均輸猶均運也令戸率出車以行道日數爲均發粟爲輸術曰令縣戸數各如其本行道日數而一以爲衰據甲行道八日因使八戸共出一車乙行道十日因使十戸共出一車計其在道則皆戸一日出一車故可爲均平之率也甲衰一百二十五乙丙衰各九十五丁衰六十一副并爲法以賦粟車數乘未并者各自爲實衰分科率實如法得一車各置所當出車以其行道日數乘之如戸數而一得率戸用車二百四十七分日之三十一故謂之均求此率以戸當各計車之衰分也臣淳風等謹按縣戸有多少之差行道有遠近之異欲其均等故各令行道日數約戸爲衰行道多者少其戸行道少者多其戸故各令約戸爲衰以八日約除甲縣得一百二十五乙丙各九十五丁六十一於今有術副并爲所有率未并者各爲所求率以賦粟車數爲所有數而今有之各得車數一旬除乙十三除丙各得九十五二旬除丁得六十一也有分者上下軰之軰配也車牛人之數不可分裂推少就多均賦之宜今按甲分旣少宜從於乙滿法除之有餘從丙丁分又少亦宜就丙除之適盡加乙丙各一上下軰益以少從多也以二十五斛乘車數卽粟數今有均輸卒甲縣一千二百人薄塞乙縣一千五百五十人行道一日丙縣一千二百八十人行道二日丁縣九百九十人行道三日戊縣一千七百五十人行道五日凡五縣賦輸卒一月一千二百人欲以遠近戸率多少衰出之問縣各幾何荅曰甲縣二百二十九人乙縣二百八十六人丙縣二百二十八人丁縣一百七十一人戊縣二百八十六人術曰令縣卒各如其居所及行道日數而一以爲衰按此亦以日數爲均居所爲輸甲無行道日但以居所三十日爲率言欲爲均平之率者當使甲三十人而出一人乙三十一人而出一人出一人者計役則皆一人一日是以可爲均平之率甲衰四乙衰五丙衰四丁衰三戊衰五副并爲法以人數乘未并者各自爲實實如法而一各置所當出人數以其居所及行道日數乘之如縣人數而一得戸率人役五日七分日之五臣淳風等謹按爲衰於今有術副并爲所有率未并者各爲所求率以賦卒人數爲所有數此術以别考則意同以廣異聞故存之也有分者上下軰之軰配也今按丁分最少宜就戊除不從乙者丁近戊故也滿法除之有餘從乙丙分又少亦就乙除有餘從甲除之適盡從甲丙二分其數正等二者於乙遠近皆同不以甲從乙者方以下從上也今有均賦粟甲縣二萬五百二十戸粟一斛二十錢自輸其縣乙縣一萬二千三百一十二戸粟一斛十錢至輸所二百里丙縣七千一百八十二戸粟一斛十二錢至輸所一百五十里丁縣一萬三千三百三十八戸粟一斛十七錢至輸所二百五十里戊縣五千一百三十戸粟一斛十三錢至輸所一百五十里凡五縣賦輸粟一萬斛一車載二十五斛與僦一里一錢欲以縣戸賦粟令費勞等問縣各粟幾何荅曰甲縣三千五百七十一斛二千八百七十三分斛之五百一十七乙縣二千三百八十斛二千八百七十三分斛之二千二百六十丙縣一千三百八十八斛二千八百七十三分斛之二千二百七十六丁縣一千七百一十九斛二千八百七十三分斛之一千三百一十三戊縣九百三十九斛二千八百七十三分斛之二千二百五十三術曰以一里僦價乘至輸所里此以出錢爲均也問者曰一車載二十五斛與僦一里一錢一錢卽一里僦價也以乘里數者欲知僦一車到輸所所用錢也甲自輸其縣則無取僦價也以一車二十五斛除之欲知僦一斛所用錢加一斛粟價則致一斛之費加一斛之價於一斛僦直卽凡餘粟取僦錢也甲一斛之費二十乙丙各十八丁二十七戊十九也各以約其戸數爲衰言使甲二十戸共出一斛乙丙十八戸共出一斛計其所費則皆戸一錢故可爲均賦之率也甲衰一千二十六乙衰六百八十四丙衰三百九十九丁衰四百九十四戊衰二百七十副并爲法所賦粟乘未并者各自爲實實如法而一各置所當出粟以其十斛之費乘之如戸數而一得率戸出三錢二千八百七十三分錢之一千三百八十一臣淳風等謹按此以出錢爲均問者曰一車載二十五斛與僦一里一錢一錢卽一里僦價也以乘里數者欲知僦一車到輸所用錢甲自出其縣則無取僦之價以一車二十五斛除之者欲知僦一斛所用錢加一斛之價於一斛僦直卽凡餘粟取僦錢甲一斛之費二十乙丙各十八丁二十七戊十九各以約其戸爲衰甲衰一千二十六乙衰六百八十四丙衰三百九十九丁衰四百九十四戊衰二百七十言使甲二十戸共出一斛乙丙十八戸共出一斛計其所費則皆戸一錢故可爲均賦之率也於今有術副并爲所有率未并者各爲所求率賦粟一萬斛爲所有數此今有衰分之義也計經賦之率旣有戸算之率亦有遠近貴賤之率此二率者各自相與通通則甲二十乙十二丙七丁十三戊五一斛之費爲之錢率錢率約戸率者則錢爲母戸爲子子不齊令母互乘爲齊卽衰也若其不然以一斛之費約戸數取衰竝有分當通分内子約之於算甚䌓此一章皆相與通功共率畧相依似以上二率下一率亦可放此從其簡易而已又以分言之使甲一戸出二十分斛之一乙一戸出十八分斛之一各以戸數乘之亦可得一縣凡所當輸俱爲衰也乘之者乘其子母報除之以此觀之則以一斛之費約戸數者其意不異矣然則可置一斛之費而反衰之約戸以乘戸率爲衰也合分注曰母除爲率率乘子爲齊反衰注曰先同其母各以分母約其子爲反衰以施其率爲算旣約且不妨處下也今有均賦粟甲縣四萬二千算粟一斛二十傭價一日一錢自輸其縣乙縣三萬四千二百七十二算粟一斛十八傭價一日十錢到輸所七十里丙縣一萬九千三百二十八算粟一斛十六傭價一日五錢到輸所一百四十里丁縣一萬七千七百算粟一斛十四傭價一日五錢到輸所一百七十五里戊縣二萬三千四十算粟一斛十二傭價一日五錢到輸所二百一十里已縣一萬九千一百三十六算粟一斛一十傭價一日五錢到輸所二百八十里凡六縣賦粟六萬斛皆輸甲縣六人共車車載二十五斛重車日行五十里空車日行七十里載輸之間各一日粟有貴賤傭各别價以算出錢令費勞等問縣各粟幾何荅曰甲縣一萬八千九百四十七斛一百三十三分斛之四十九乙縣一萬八百二十七斛一百三十三分斛之九丙縣七千二百一十八斛一百三十三分斛之六丁縣六千七百六十六斛一百三十三分斛之一百二十二戊縣九千二十二斛一百三十三分斛之七十四己縣七千二百一十八斛一百三十三分斛之六術曰以車程行空重相乘爲法并空重以乘道里各自爲實實如法得一日臣淳風等謹按此術重往空還一輸再行道也置空行一里用七十分日之一重行一里用五十分日之一齊而同之空重行一里之路往返用一百七十五分日之六定言之者一百七十五里之路往返用六日也故并空重者齊其子也空重相乘者同其母也於今有術至輸所里爲所有數六爲所求率齊一百七十五爲所有率而今有之卽各得輸所用日也加載輸各一日欲得幾日也而以六人乘之欲知致一車用人也又以傭價乘之欲知致車人傭直幾錢以二十五斛除之欲知致一斛之傭直也加一斛粟價卽致一斛之費加一斛之價於致一斛之傭直卽凡輸一斛餘粟取傭所用錢各以約其算數爲衰今按甲衰四十二乙衰二十四丙衰十六丁衰十五戊衰二十已衰十六於今有術副并爲所有率未并者各自爲所求率所賦粟爲所有數此今有衰分之義也副并爲法以所賦粟乘未并者各自爲實實如法得一斛各置所當出粟以其一斛之費乘之如算數而一得率算出九錢一百三十三分錢之三又載輸之間各一日者卽二日也今有粟七斗三人分春之一人爲糲米一人爲粺米一人爲糳米令米數等問取粟爲米各幾何荅曰糲米取粟二斗一百二十一分斗之一十粺米取粟二斗一百二十一分斗之三十八糳米取粟二斗一百二十一分斗之七十三爲米各一斗六百五分斗之一百五十一術曰列置糲米三十粺米二十七糳米二十四而反衰之此先約三率糲爲十粺爲九糳爲八欲令米等者其取粟糲率十分之一粺率九分之一糳率八分之一當齊其子故曰反衰也臣淳風等謹按米有精麤之異有多少之差據率粺糳少而糲多用粟則粺糳多而糲少米若依本率之分粟當倍率故今反衰之使精取多而麤得少副并爲法以七斗乘未并者各自爲取粟實實如法得一斗於今有術副并爲所有率未并者各爲所求率粟七斗爲所有數而今有之故各得取粟也若求米等者以本率各乘定所取粟爲實以粟率五十爲法實如法得一斗若徑求爲米等數者置糲米三用粟五粺米二十七用粟五十糳米十二用粟二十五齊其粟同其米并齊爲法以七斗乘同爲實所得卽爲米斗數今有人當稟粟二斛倉無粟欲與米一菽二以當所稟粟問各幾何荅曰米五斗一升七分升之三菽一斛二升七分升之六術曰置米一菽二求爲粟之數并之得三九分之八以爲法亦置米一菽二而以粟二斛乘之各自爲實實如法得一斛臣淳風等謹按置粟率五乘米一米率三除之得一三分之二卽是米一之粟也粟率十以乘菽二菽率九除之得二九分之二卽是菽二之粟也并全得三齊子并之得二十四同母得二十七約之得九分之八故云并之得三九分之八米一菽二當粟三九分之八此其粟率也於今有術米一菽二皆爲所求率當粟三九分之八爲所有率粟二斛爲所有數凡言率者當相與通之則爲米九菽十八當粟三十五也亦有置米一菽二求其爲粟之率以爲列衰副并爲法以粟乘列衰爲實所得卽米一菽二所求粟也以米菽本率而今有之卽合所問今有取傭負鹽二斛行一百里與錢四十今負鹽一斛七斗三升少半升行八十里問與錢幾何荅曰二十七錢十五分錢之十一術曰置鹽二斛升數以一百里乘之爲法按此術以負鹽二斛升數乘所行一百里得二萬里是爲負鹽一升行二萬里得錢四十於今有術爲所有率升數乘所行里爲法於今有術爲所有數也以四十錢乘今負鹽升數又以八十里乘之爲實實如法得一錢以今負鹽升數乘所行里今負鹽一升凡所行里也於今有術以所有四十錢爲所求率也衰分章貸人千錢與此同今有負籠重一石一十七斤行七十六步五十返今負籠重一石行百步問返幾何荅曰五十七返二千六百三分返之一千六百二十九術曰以故所行步數乘故籠重斤數爲法此法謂負一斤一返所行之積步也今籠重斤數乘今步又以返數乘之爲實實如法得一返按此法負一斤一返所行之積步此實者一斤一日所行之積步故以一返之課除終日之程卽是返數也臣淳風等謹按此術所行步多者得返少所行步少者得返多然則所行者今返率也故令所得返乘今返之率爲實而以故返之率爲法今有術也按此負籠又有輕重於是爲術者因令重者得返少輕者得返多故又因其率以乘法實者重今有之義也然此意非也按此籠雖輕而行有限籠過重則人力遺力有遺而術無窮人行有限而籠輕重不等使其有限之力隨彼無窮之變故知此術率乖理也若故所行有空行返數設以問者當因其所負以爲返率則今返之數可得而知也假令空行一日六十里負重一斛行四十里減重一斗進二里半負重三斗以下與空行同今負籠重六斗往還行一百步問返幾何荅曰一百五十返術曰置重行率加十里以里法通之爲實以一返之步爲法實如法而一卽得也今有程傳委輸空車日行七十里重車日行五十里今載太倉粟輸上林五日三返問太倉去上林幾何荅曰四十八里十八分里之十一術曰并空重里數以三返乘之爲法令空重相乘又以五日乘之爲實實如法得一里此亦如上術率一百七十五里之路往返用六日也於今有術則五日爲所有數一百七十五里爲所求率六日爲所有率以此所得則三返之路今求一返當以三約之因令乘法而并除也爲術亦可各置空重行一里用日之率以爲列衰副并爲法以五日乘列衰爲實實如法所得卽各空重行日數也各以一日所行以乘爲凡日所行三返約之爲上林去太倉之數臣淳風等謹按此術重往空還一輸再還道置空行一里用七十分日之一重行一里用五十分日之一齊而同之空重行一里之路往返用一百七十五分日之六定言之者一百七十五里之路往返用六日故并空重者并齊也空重相乘者同其母也於今有術五日爲所有數一百七十五爲所求率六爲所有率以此所得則三返之路今求一返者當以三約之故令乘法而并除亦當約之也今有絡絲一斤爲練絲十二兩練絲一斤爲靑絲一斤十二銖今有靑絲一斤問本絡絲幾何荅曰一斤四兩十六銖三十三分銖之十六術曰以練絲十二兩乘靑絲一斤十二銖爲法以靑絲一斤銖數乘練絲一斤兩數又以絡絲一斤乘之爲實實如法得一斤按練絲一斤爲靑絲一斤十二銖此練率三百八十四靑率三百九十六也又絡絲一斤爲練絲十二兩此絡率十六練率十二也置今有靑絲一斤以練率三百八十四乘之爲實實如靑絲率三百九十六而一所得靑絲一斤練絲之數也又以絡率十六乘之所得爲實以練率十二爲法所得卽練絲用絡絲之數也是謂重今有也雖各有率不用中間故令後實乘前實後法乘前法而并除也故以練絲兩數爲實靑絲銖數爲法一曰又置絡絲一斤兩數與練絲十二兩約之絡得四練得三此其相與之率又置練絲一斤銖數與靑絲一斤十二銖約之練得三十二靑得三十三亦其相與之率齊其靑絲絡絲同其二練絡得一百二十八靑得九十九練得九十六卽三率悉通矣今有練絲一斤爲所有數絡絲一百二十八爲所求率靑絲九十九爲所有率爲率之意猶此但不先約諸率耳凡率錯互不通者皆積齊同用之放此雖四五轉不異也言同其二練者以明三率之相與通耳於術無以異也又一術今有靑絲一斤銖數乘練絲一斤兩數爲實以靑絲一斤十二銖爲法所得卽用練絲兩數以絡絲一斤乘所得爲實以練絲十二兩爲法所得卽用絡絲斤數也今有惡粟二十斗春之得糲米九斗今欲求粺米十斗問惡粟幾何荅曰二十四斗六升八十一分升之七十四術曰置糲米九斗以九乘之爲法亦置粺米十斗以十乘之又以惡粟二十斗乘之爲實實如法得一斗按此術置今有求粺米十斗以糲米率十乘之如糲率九而一卽糲亦化爲惡粟矣此亦重今有之義爲術之意猶絡絲也雖各有率不問中間故令後實乘前實後法乘前法而并除之也今有善行者行一百步不善行者行六十步今不善行者先行一百步善行者追之問幾何步及之荅曰二百五十步術曰置善行者一百步減不善行者六十步餘四十步以爲法以善行者之一百步乘不善行者先行一百步爲實實如法得一步按此術以六十步減一百步餘四十步卽不善行者先行率也善行者行一百步追及率約之追及率得五先行率得二於今有術不善行者先行一百步爲所有數五爲所求率二爲所有率而今有之得追及步也今有不善行者先行十里善行者追之一百里先至不善行者二十里問善行者幾何里及之荅曰三十三里少半里術曰置不善行者先行十里以善行者先至二十里增之以爲法以不善行者先行十里乘善行者一百里爲實實如法得一里按此術不善行者旣先行十里後不及二十里并之得三十里也謂之先行率善行者一百里爲追及率約之先行率得三三爲所有率而今有之卽得也其意如上術今有兔先走一百步犬追之二百五十步不及三十步而止問犬不止復行幾何步及之荅曰一百七步七分步之一術曰置兔先走一百步以犬走不及三十步減之餘爲法以不及三十步乘犬追步數爲實實如法得一步按此術以不及三十步減先走一百步餘七十步爲兔先走率犬行二百五十步爲追及率約之先走率得七追及率得二十五於今有術不及三十步爲所有數二十五爲所求率七爲所有率而今有之卽得也今有人持金十二斤出關關稅之十分而取一今關取金二斤償錢五千問金一斤値錢幾何荅曰六千二百五十術曰以十乘二斤以十二斤減之餘爲法以十乘五千爲實實如法得一按此術置十二斤以一乘之十而一得一斤五分斤之一卽所當稅者也減二斤餘卽關取盈金以盈除所償錢卽金値也今術旣以十二斤爲所稅則是以十爲母故以十乘二斤及所償錢通其率於今有術五千錢爲所有數十爲所求率八爲所有率而今有之卽得也今有客馬日行三百里客去忘持衣日已三分之一主人乃覺持衣追及與之而還至家視日四分之三問主人馬不休日行幾何荅曰七百八十里術曰置四分日之三除三分日之一按此術置四分日之三除三分日之一者除卽減也減之餘有十二分之五卽是主人追客還用日率也半其餘以爲法去其還存其往率之者子不可半故倍母二十四分之五是爲主人與客均行用日之率也副置法增三分日之一法二十四分之五者主人往追用日之分也三分之一者客去主人未覺之前獨行用日之分也并連此數得二十四分日之十三則主人追及前用日之分也是爲客用日率也然則主人用日率者客馬行率也客用日率者主人馬行率也母同則子齊是爲客馬行率五主人馬行率十三於今有術三百里爲所有數十三爲所求率五爲所有率而今有之卽得也以三百里乘之爲實實如法得主人馬一日行欲知主人追客所行里者以三百里乘主人均行日分子十三以母二十四而一得一百六十二里半以此乘主人均行日分母二十四如客馬與主人均行用日分子五而一亦得主人馬一日行七百八十里也今有金箠長五尺斬本一尺重四斤斬末一尺重二斤問次一尺各重幾何荅曰末一尺重二斤次一尺重二斤八兩次一尺重三斤次一尺重三斤八兩次一尺重四斤術曰令末重減本重餘卽差率也又置本重以四間乘之爲下第一衰副置以差率減之每尺各自爲衰按此術五尺有四間者有四差也令本末相減餘卽四差之凡數也以四約之卽得每尺之差以差數減本重餘卽次尺之重也爲術所置如是而已今此率以四爲母故令母乘本爲衰通其率也亦可置末重以四問乘之爲上第一衰以差重率加之爲次下衰也副置下第一衰以爲法以本重四斤徧乘列衰各自爲實實如法得一斤以下第一衰爲法以本重乘其分母之數而又反此率乘本重爲實一乘一除勢無損益故惟本存焉衆衰相推爲率則其餘可知也亦可副置末衰爲法而以末重二斤乘列衰爲實此雖迂廽然是其舊故就新而言之也今有五人分五錢令上二人所得與下三人等問各得幾何荅曰甲得一錢六分錢之二乙得一錢六分錢之一丙得一錢丁得六分錢之五戊得六分錢之四術曰置錢錐行衰按此術錐行者謂如立錐初一次二次三次四次五各均爲一例者也并上二人爲九并下三人爲六六少於九三數不得等但以五四三二一爲率也以三均加焉副并爲法以所分錢乘未并者各自爲實實如法得一錢此問者令上二人與下三人等上下部差一人其差三均加上部則得二三均加下部則得三三下部猶差一人差得一以通於本率卽上下部等也於今有術副并爲所有率未并者各爲所求率五錢爲所有數而今有之卽得等耳假令七人分七錢欲令上二人與下五人等則上下部差三人并上部爲十三下部爲十五下多上少下不足減上當似上下部列差而後均減乃合所問耳此可倣下術令上二人分二錢半爲上率令下三人分二錢半爲下率上下二率以少減多餘爲實置二人三人各半之減五人餘爲法實如法得一錢卽衰相去也下衰率六分之五者丁所得錢數也今有竹九節下三節容四升上四節容三升問中間二節欲均容各多少荅曰下初一升六十六分升之二十九次一升六十六分升之二十二次一升六十六分升之一十五次一升六十六分升之八次一升六十六分升之一次六十六分升之六十次六十六分升之五十三次六十六分升之四十六次六十六分升之三十九術曰以下三節分四升爲下率以上四節分三升爲上率此二率者各其平率也上下率以少減多餘爲實按此上下節各分所容爲率者各其平率上下以少減多者餘爲中間五節半之凡差故以爲實也置四節三節各半之以減九節餘爲法實如法得一升卽衰相去也按此術上下節所容已定之節中間相去節數也實者中間五節半之凡差也故實如法而一則每節之差也下率一升少半升者下第二節容也一升少半升者下三節通分四升之平率平率卽爲中分節之容也今有鳬起南海七日至北海鴈起北海九日至南海今鳬鴈俱起問何日相逢荅曰三日十六分日之十五術曰并日數爲法日數相乘爲實實如法得一日按此術置鳬七日一至鴈九日一至齊其至同其日定六十三日鳬九至鴈七至令鳬鴈俱起而問相逢者是爲共至并齊以除同卽得相逢日故并日數爲法者并齊之意日數相乘爲實者猶以同爲實也一日鳬飛七分至之一鴈飛九分至之一齊而同之鳬飛定日行六十三分至之九鴈飛定日行六十三分至之七是爲南北海相去六十三分鳬日行九分鴈日行七分也并鳬鴈一日所行以除南北相去而得相逢日也今有甲發長安五日至齊乙發齊七日至長安今乙發已先二日甲乃發長安問幾何日相逢荅曰二日十二分日之一術曰并五日七日以爲法按此術并五日七日爲法者猶并齊爲法置甲五日一至乙七日一至齊而同之定三十五日甲七至乙五至并之爲十二至者用三十五日也謂甲乙與發之率耳然則日化爲至當除日故以爲法也以乙先發二日減七日減七日者言甲乙俱發今以發爲始發之端於本道里則餘分也餘以乘甲日數爲實七者長安去齊之率也五者後發相去之率也今問後發故舍七用五以乘甲五日爲二十五日言甲七至乙五至更相去用此二十五日也實如法得一日一日甲行五分至之一乙行七分至之一齊而同之甲定日行三十五分至之七乙定日行三十五分至之五是爲齊去長安三十五分甲日行七分乙日行五分也今乙先行發二日巳行十分餘相去二十五分故減乙二日餘令相乘爲二十五分今有一人三日爲牡瓦三十八枚一人二日爲牝瓦七十六枚今令一人一日作瓦牝牡相半問成瓦幾何荅曰二十五枚少半枚術曰并牝牡爲法牝牡相乘爲實實如法得一枚此術亦與鳬鴈術同牝牡瓦相并猶如鳬鴈日飛相并也臣淳風等謹按此術并牝牡爲法者并齊之意牝牡相乘爲實者猶以同爲實也故實如法卽得也今有一人一日矯矢五十一人一日羽矢三十一人一日筈矢十五今令一人一日自矯羽筈問成矢幾何荅曰八矢少半矢術曰矯矢五十用徒一人羽矢五十用徒一人太半人筈矢五十用徒三人少半人并之得六人以爲法以五十矢爲實實如法得一矢按此術言成矢五十用徒六人一日工也此同功共作猶鳬鴈共至之類亦以同爲實并齊爲法可令矢互乘一人爲齊矢相乘爲同今先令同於五十矢矢同則徒齊其歸一也以此術爲鳬鴈者當鴈飛九日而一至鳬飛七日而一至七分至之二并之得二至七分至之二以爲法以九日爲實實如法而一得一人日矯矢之數也今有假田初假之歲三畝一錢明年四畝一錢後年五畝一錢凡三歲得一百問田幾何荅曰一頃二十七畝四十七分畝之三十一術曰置畝數及錢數令畝數互乘錢數并以爲法畝數相乘又以百錢乘之爲實實如法得一畝按此術令畝互乘錢者齊其錢畝數相乘者同其畝同於六十則初假之歲得錢二十明年得錢十五後年得錢十二也凡三歲得錢一百爲所有數同畝爲所求率四十七錢爲所有率今有之卽得也齊其錢同其畝亦如鳬鴈術於今有術百錢爲所有數同畝爲所求率并齊爲所有率臣淳風等謹按假田六十畝初歲得錢二十明年得錢十五後年得錢十二并之得錢四十七是爲得田六十畝三歲所治於今有術百錢爲所有數六十畝爲所求率四十七爲所有率而今有之卽合問也今有程耕一人一日發七畝一人一日耕三畝一人一日耰種五畝今令一人一日自發耕耰種之問治田幾何荅曰一畝一百一十四步七十一分步之六十六術曰置發耕耰畝數令互乘人數并以爲法畝數相乘爲實實如法得一畝此猶鳬鴈術也臣淳風等謹按此術亦發耕耰種畝數互乘人者齊其人畝數相乘者同其畝故并齊爲法以同爲實計田一百五畝發用十五人耕用三十五人種用二十一人并之得七十一工治得一百五畝故以爲實而一人一日所治故以人數爲法除之卽得也今有池五渠注之其一渠開之少半日一滿次一日一满次二日半一滿次三日一满次五日一滿今皆決之問幾何日滿池荅曰七十四分日之十五術曰各置渠一日滿池之數并以爲法按此術其一渠少半日滿者是一日三滿也次一日一滿次二日半滿者是一日五分滿之二也次三日滿者是一日三分滿之一也次五日滿者是一日五分滿之一也并之得四滿十五分滿之十四也以一日爲實實如法得一日此猶矯矢之術也先令同於一日日同則滿齊自鳬鴈至此其爲同齊有二術焉可隨率宜也其一術列置日數及滿數其一渠少半日滿者是一日三滿也次一日一滿次二日半滿者是五日二滿次三日一滿次五日一滿此謂之列置日數及滿數也令日互相乘滿并以爲法日數相乘爲實實如法得一日亦如鳬鴈術也臣淳風等謹按此其一渠少半日滿池者是一日三滿池也次一日一滿次二日半滿者是五日再滿次三日一滿次五日一滿此謂列置日數於右行及滿數於左行以日互乘滿者齊其滿日數相乘者同其日滿齊而日同故并齊以除同卽得也今有人持米出三關外關三而取一中關五而取一内關七而取一餘米五斗問本持米幾何荅曰十斗九升八分升之三術曰置米五斗以所稅者三之五之七之爲實以餘不稅者二四六互相乘爲法實如法得一斗此亦重今有術也所稅者謂今所當稅之定三五七皆爲所求率二四六皆爲所有率置今有餘米五斗以七乘之六而一卽内關未稅之本米也又以三乘之二而一卽外關未稅之本米也今從末求本不問中間故令中率轉相乘而同之亦如絡絲術又一術外關三而取一則其餘本米三分之二也求外關所稅之餘則當置三分乘之二而一欲知中關以四乘之五而一欲知内關以六乘之七而一凡餘分者乘其母而以三五七相乘得一百五爲分母二四六相乘得四十八爲分子約而言之則是餘米於本所持三十五分之十六也於今有術餘米五斗爲所有數分母三十五爲所求率分子十六爲所有率也今有人持金出五關前關二而稅一次關三而稅一次關四而稅一次關五而稅一次關六而稅一并五關所稅適重一斤問本持金幾何荅曰一斤三兩四銖五分銖之四術曰置一斤通所稅者以乘之爲實亦通其不稅者以減所通餘爲法實如法得一斤此意猶上術也置一斤通所稅者謂令二三四五六相乘爲分母七百二十也通其所不稅者謂令所稅之餘一二三四五相乘爲分子一百二十也約而言之是爲餘金於本所持六分之一也以子減母凡五關所稅六分之五也於今有術所稅一斤爲所有數分母六爲所求率分子五爲所有率此亦重今有之義又雖各有率不問中間故令中率轉相乘而連除之卽得也置一以爲持金之本率以稅率乘之除之則其率亦成積分也九章算術卷第六終九章算術卷六訂訛算經十書之二休寧戴震東原臣淳風等謹按爲衰於今有術副并爲所有率未并者各爲所求率以賦卒人數爲所有數此術以别考則意同以廣異聞故存之也爲衰二字上有脫文當云各令居所及行道曰數約縣卒爲衰計經賦之率旣有戸算之率亦有遠近貴賤之率此二率者各自相與通通則甲二十乙十二丙七丁十三戊五一斛之費謂之錢率錢率約戸率者則錢爲母戸爲子子不齊令母互乘爲齊卽衰也若其不然以一斛之費約戸數取衰並有分當通分内子約之於算甚繁此一章皆相與通功共率畧相依似以上二率下一率亦可放此從其簡易而巳又以分言之使甲一戸出二十分斛之一乙一戸出十八分斛之一各以戸數乘之亦可得一縣凡所當輸俱未衰也乘之者乘其子母報除之以此觀之則以一斛之費約戸數者其意不異矣然則可置一斛之費而反衰之約戸以乘戸數爲衰也合分注曰母除爲率率乘子爲齊反衰法曰先同其母各以分母約其子爲反衰施其率爲算旣約且不妨處下也計經賦之率至此多舛誤不可通術曰以下三節分四升爲下率以上四節分三升爲上率謂之率者以四節三節爲分母三升四升爲分子母互乘子得上率九下率十六母相乘得十二上下率以少減多餘爲實十六減九餘七置四節三節各半之以減九節餘爲法實如法得一升卽衰相去也以十二通五節半得六十六爲一升之率

front:
  text: 九章算術音義算經十書之二
  hash: sha256:94f36cdf36bc1053763ee1b74655096ec87c2187f65060b8d87d3a93914ddb0e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0032_SBCK_010-1a}
body:
  text: 假承務郎祕書省鉤考算經文字臣李籍撰序九九之術食律切術者有所述也前漢梅福傳臣聞齊桓之時有以九九見者桓公不逆欲以致大也師古曰九九算術若今九章五曹之軰隋書經籍志九九算術二卷楊淑撰隸首郎計切世本曰黃帝時隸首作數九數色具切卽九章是也以算言之故曰九數以篇言之故曰九章周官保氏教國子以六藝一曰禮二曰樂三曰射四曰馭五曰書六曰數鄭康成注云九數方田粟米差分少廣商功均輸方程贏不足旁要今有重差夕桀句股隋書律歷志云一曰方田以御田疇界域二曰粟米以御交質變易三曰衰分以御貴賤稟稅四曰少廣以御積幂方圓五曰商功以御功程積實六曰均輸以御遠近勞費七曰盈朒以御隠雜互見八曰方程以御錯糅正負九曰句股以御高深廣遠探賾上吐南切下士革切賾者含蓄含蓄者探之可及故易曰探賾索隱上色白切下於謹切隱者隱匿隱匿者索之可得故易曰索隱重差上直容切下楚佳切重復也差不齊也句股名也率所律切數相與也又音律約數也可度徒各切揆也考論盧敦切孤離呂支切九章第一方田徒年切田者圍周之以爲疆横從之以爲理平夷著見興作利養之地也方田者田之正也諸田不等以方爲正故曰方田以御牛倨切理也田疇直留切耕治之田也界域雨逼切疆也廣如字闊也從卽容切長也幾何上起居切下如字幾何數之疑也相乘食陵切登也登之使其數多隋書曰乘以散之淳風並如字李淳風岐州雍人㓜爽秀通羣書明步天歷算貞觀初與傅仁均爭歷法議者多附淳風故以將仕郎直太史局制渾天議詆摭前世得失著法象書七篇上之擢承務郎遷太常博士改太史丞與諸儒脩書遷爲令於占候吉凶若節契然當世術家意有鬼神相之非學習可致終不能測也以勞封昌樂縣男奉詔與算博士梁述助教王真儒等是正五曹孫子等書刋定注解立於學官九章卽其一也畝法莫厚切司馬法六尺爲步步百爲畝秦孝公之制二百四十步爲一畝除之直魚切去也去之使其少隋書曰除以聚之一頃去穎切百畝也約分於畧切約者欲其不煩分之爲數煩則難用設有言四分之二者煩而言之則可爲八分之四約而言之則二分之一也雖則異辭至於爲數亦同歸耳副置上敷救切别也下陟吏切設也别設算位有所分也合分古沓切合分者欲其不離數非一端分無定凖分子雜互羣母參差麤細旣殊理難從一故齊其衆分同其羣母分可相并故曰合分參差上楚金切下楚宜切不齊也三相參爲參兩相差爲差觿音觿所以解結詩曰童子佩觿減分古斬切減損也減分者欲知其餘諸分子母數各不同以少減多欲知餘幾以餘爲實故曰減分課分苦卧切校也欲知其相多分各異名理不齊一校其相多之數故曰課分平分符兵切均也平分者欲減多增少而至於均諸分參差欲令齊等減彼之多増此之少故曰平分副并卑政切兼也别兼算位有所合也經分如字釋名曰經者徑也經分者欲徑求一人而至於徑自合分已下皆於諸分相齊此乃徑求一人之分以人數分所分故曰經分下經率同乘分如字乘分者欲知其所積分母相乘爲法子相乘爲積故曰乘分自合分已下獨乘言田而皆列於方田者欲其學數者不可後也故說算者以謂爲術者先治諸分能治諸分則數學之能事盡矣大廣田竝如字初術有全步而無餘分次術有餘分而無全步此術先見全步復有餘分可以廣兼三術故曰大廣田圭田古攜切圭田者其形上銳有如圭然白虎通曰圭者上銳象物皆生見於上也箕田居之切箕田者有舌有踵其形哆侈有如箕然詩曰哆兮侈兮成是南箕圓田王權切圓田之率有三一曰古率周三徑一是也二曰徽率周一百五十七徑五十是也三曰密率周二十二徑七是也爲算之術有四一曰半周半徑相乘得積步二曰周徑相乘四而一三曰徑自相乘三之四而一四曰周自相乘十二而一徽術許歸切徽術以五十乘周一百五十七而一卽徑以一百五十七乘徑五十而一卽周此率本於劉徽故曰徽術密率美畢切密率以七乘周二十二而一卽徑以二十二乘徑七而一卽周此率本於宋南徐州從事史祖沖之沖之以圓徑一億爲一丈圓周盈數三丈一尺四寸一分五釐九豪二秒七忽朒數三丈一尺四寸一分五釐九豪二秒六忽正數在盈朒二限之間密率圓徑一百一十三圓周三百五十五約率圓徑七周二十二此乃率之最密也秒忽上亡沼切下呼骨切忽者數之始也一蠶所吐謂之忽孫子算術云蠶所生吐絲爲忽十忽爲秒十秒爲豪十豪爲釐十釐爲分億於力切十萬曰億萬者物數也以人之意數爲足以勝物數故也或曰萬萬曰億黃帝爲法數有十等及其用也乃有三焉十等者謂億兆京垓秭壤溝澗正載也三等者謂上中下之數也下數者十十變之若言十萬曰億十億曰兆十兆曰京中數者萬萬變之若言萬萬曰億萬萬億曰兆萬萬兆曰京上數者數窮則變若言萬萬曰億億億曰兆兆兆曰京詩云不稼不穡胡取禾三百億兮毛氏曰萬萬曰億鄭氏曰十萬曰億據如此言則鄭用不數毛用中數也嘉量音亮周禮考工記㮚氏爲量鬴深尺内方尺而圓其外其實一鬴其臋一寸其實一豆其耳三寸其實一升重一鈞其聲中黃鍾之宮槩而不稅其銘曰時文思索允臻其極嘉量旣成以觀四國永啟厥後兹器維則春秋左氏傳曰齊舊四量豆區鬴鍾四升曰豆各自其四以登於鬴六斗四升也鬴十則鍾六十四斗也鄭康成以爲方尺積千寸比九章粟米法少二升八十一分升之二十二祖沖之以算術考之積凡一千五百六十二寸半方尺而圓其外減旁一釐八豪其徑一尺四寸一分四釐七秒二忽有奇而深尺卽古斛之制也王莽作銅斛名曰律嘉量其意蓋本於此銅斛之法方尺而圓其外旁有庣焉其上爲斛其下爲斗左耳爲升右耳爲合龠其狀似爵以縻爵祿上三下二參天兩地圓而函方左一右二陰陽之象也圓象規其重二鈞備氣物之數各萬有一千五百二十也聲平黃鍾始於黃鍾而反覆焉其斛銘曰律嘉量斛方尺而圓外庣旁九釐五毫幂百六十二寸深一尺積一千六百二十寸容十斗祖沖之以圓率考之此斛當徑一尺四寸三分六釐一毫九秒二忽庣旁一分九毫有奇劉歆庣旁少一釐四毫有奇㰴數術不精之所致也魏陳留王景元四年劉徽注九章商功曰當今大司農斛圓徑一尺三寸五分五釐深一尺積一千四百四十一寸十分寸之三王莽銅斛於今尺爲深九寸五分五釐徑一尺三寸六分八釐七毫以術計之於今斛爲容九斗七升四合有奇此魏斛大而尺長王莽斛小而尺短也庣吐雕切不滿之貌也奇居宜切餘數也攈摭上居運切下之石切攈摭取拾也攈或作捃當作宛字之誤也宛田者中央隆高爾雅曰宛中宛邱又曰邱上有邱爲宛邱皆中央隆高之義也弧田戸吳切弧田者有弧有矢如弧之形環田戸關切環田者有肉有好如環之形爾雅曰肉好若一謂之環或作鐶九章第二粟米上相玉切下莫禮切粟者禾之米之未春米者穀實之無殼粟者米之率也諸米不等以粟爲率故曰粟米交質陟利切又如字變易羊益切糲米盧達切麤也凡粟五斗得糲米三斗故粟率五十而糲率三十粺米傍卦切精於糲也凡粟五斗得粺米二斗七升故粟率五十而粺率二十七詩曰彼疏斯粺鄭康成注云米之率糲十粺九糳八侍御七糳米音作精於粺也凡粟五斗得糳米二斗四升故粟率二十四春秋左氏傳曰粢食不糳俗作鑿御米牛倨切精於糳也供王膳之米也蔡邕獨斷曰所進曰御御者進也凡衣服加於身飮食入於口皆曰御小䵂大䵂音敵麥屑也細曰小䵂麤曰大䵂菽音叔大豆也荅都合切小豆也豉是義切鹽豉也廣雅云苦李作豉飱音孫說文曰餔也糱魚列切麯糱也說文曰米牙瓴甓上音靈下扶歷切甎也箇古賀切數也數竹曰箇縑古甜切說文曰并絲繒也鈞居勻切三十斤也銖音殊八銖爲錙二十四銖爲兩翭音侯說文曰羽本也數羽稱其本猶數草木稱其根株也榦古按切榦莖也一本作簳九章第三衰分楚宜切衰差也以差而平分故曰衰分稟筆錦切供穀曰稟或作廩非是大夫上如字下甫無切爵名也夫以智率人者也大夫則以智率人之大者也不更古衡切爵名也次大夫取其不與戌更簪褭上側吟切下奴了切爵名次不更取其纓冠乘馬上造音皂爵名也次簪褭取其爲造士而居上公士並如字爵名也次上造取其爲士而在公爵數色具切爵數者謂大夫五不更四簪褭三上造二公士一也墨子號令篇以爵級爲賜然則戰國之初有此名也償之市羊切還也北鄉算蘇貫切算者計口出錢漢律人出一算一算百二十錢賈人與奴婢倍算傜音遙役也匹譬吉切說文四丈也耗呼到切減也乾古寒切燥也保音寶傭也如所謂酒家保貸吐代切以物假人也九章第四少廣上書沼切不多也下古莽切闊也廣少從多截從之多益廣之少故曰少廣積幂上資昔切下莫狄切積者聚也衆數聚居之稱幂者覆也方而單布之名積幂之義不同如此半博漫切物中分也凡言半者以二爲分母言太半少半者以三爲分母約省所景切折法旨熱切折者屈而有降意折法卽退位也内子如字入也旣以分母通之必入其分子故曰内子所謂齊同以通之也又音納中行戸剛切列也下行同丸徑故官切丸卽立圓也牟合上莫浮切下胡閤切㮚氏力質切㮚氏鑄量之官也一本作栗爲渾胡昆切祖暅之古鄧切暅之字景鑠沖之之子也少傳家業究極精微亦有巧思入神之妙般倕無以過也當其詣微之時電霆不能入嘗行遇僕射徐勉以頭觸之勉呼乃悟父所改何承天歷時尚未行梁天監初暅之更脩之於是始行焉位至大舟卿昭晰音晳明也咍哂上呼開切下式忍切笑也九章第五商功式羊切商度也以度其功庸故曰商功穿地昌緣切掘地也凡穿地四尺爲壤五尺爲堅三尺堅古賢切堅謂築土詩曰築之登登壤如兩切壤謂息土書曰厥土惟白壤墟苦虛切墟謂穿坑垣音園墉也隄都奚切防也俗作堤溝古侯切釋名曰田間之水曰溝溝構也縱横相交構壍七豔切長於溝也水之遶城者冬程人功程課程也唐六典凡役有輕重功有短長以四五六七月爲長功二三月八九月爲中功以十十一十二正月爲短功中功以十分爲率長功加一分短功減一分渠强如切長於壍也水之通運者袤莫侯切袤長也礫郎擊切釋名日小石曰礫堢壔上音寶小城也下音島以土擁木也方亭特丁切釋名曰亭停也人所停集也方亭者其積之形如亭之方者圓亭亦然方錐職誰切方錐者其積之形如錐之方者圓錐亦然壍堵當古切壍堵壍上疊也以立方一邪解得二壍堵其積居立方二分之一將一壍堵邪解得一陽馬一鼈臑求壍堵之積以廣長相乘又以高乘之二而一陽馬莫下切陽馬之形方錐一隅也今以四柱屋隅爲陽馬以立方一邪解得三陽馬其積居立方三分之一將一陽馬邪解得二鼈臑求陽馬之積以廣長相乘又以高乘之三而一鼈臑那到切臂節也鼈臑之積半陽馬其形有似鼈肘故以名云以立方一邪解得六鼈臑其積居立方六分之一求鼈臑之積以廣長相乘又以高乘之六而一臑或作腝非是羨除上以淺切下直魚切羨延也除道也羨除乃隧道也其所穿地上平下邪似鼈臑夾一壍堵卽羨除之形求其積并三廣以深乘之又以長乘之六而一芻甍上測隅切刈草也俗作蒭下莫耕切屈棟也芻甍之形似屋蓋上苫也求其積倍下長上長從之又以廣乘之又以高乘之六而一正解方亭兩邊合之卽其形也芻童徒紅切如倒置砑石求其積倍上長并入下長以上廣乘之又倍下長并入上長以下廣乘之并二位以高乘之六而一曲池盤池冥谷皆同術曲池邱玉切盤池薄官切冥谷莫經切冥谷之形如正置砑石棚除上薄耕切張挹廣雅棲載棚閣㮖碊攱也下遲據切詩曰何福不除傳云開也棚者下有物揚之使高除者旁有物開之使避踟蹰上直離切下直誅切行不進也載輸上作代切下式朱切一籠力董切委粟於詭切積也程粟直誠切課也程粟一斛積二千七百寸米一斛積一千六百二十寸菽荅麻麥一斛積二千四百三十寸此據精麤爲率使價齊而不等其器之積寸也以米斛爲正則同於漢志孫子算術曰六粟爲圭寸圭爲抄十抄爲撮十撮爲勺十勺爲合應劭曰圭者自然之形陰陽之始四圭爲撮孟康曰六十四黍爲圭漢志曰量者龠合升斗斛也所以量多少也本起於黃鍾之龠用度數審其容以子穀秬中者千有二百實其龠以井水凖其槩十龠爲合十合爲升十升爲斗十斗爲斛而五量嘉矣圓囷去倫切倉圓曰囷九章第六均輸式朱切均平也輸委也以均平其輸委故曰均輸勞費芳未切耗也乘繩證切數車曰乘一本作量衰出楚危切次也不齊等也管子曰相地衰征薄塞上補各切廹也下先代切邊也薄或作博非是輩之補妹切配也俗作軰僦卽就切賃也傭餘封切賃也重車直隴切輕對也春書容切世本曰雍父作春呂氏春秋曰赤冀作春程傳張戀切傳郵絡盧各切惡烏各切不善也金箠之累切策也四間古閑切中間也錐行戸剛切錐行衰者下多上少如立錐之形鳧防無切野鴨也牝瓦毗忍切牡瓦莫厚切矯矢居天切說文曰揉箭箝也俗作撟筈括同箭足受弦處假田古雅切借也史記北假中裴駰云北假北方田官主以田假與貧人故云北假發方伐切伐也詩曰駿發爾私耕古莖切犁也詩曰亦服爾耕耰種音憂覆種也孟子曰播種而耰之九章第七盈不足以成切盈者滿也不足者虚也滿虛相推以求其適故曰盈不足朒女六切不足也或作朏非是璡將鄰切美石次玉曰璡一本作準適足施隻切恰也桶他孔切瓠胡誤切瓜屬也蔓無販也瓜蔓也莞九完切白蒲也詩曰下莞上簟箋小蒲之席也醇酒常倫切厚酒也行酒胡剛切市酒也和漆如字又胡卧切易油羊益切交易也惡田鳥各切不善也駑馬音奴字林曰駘也之蜀賈音古商賈一本作價返府遠切還也九章第八方程直成切方者左右也程者課率也左右課率總統羣物故曰方程錯糅女救切雜也正負上之盛切下房乆切本數爲正非本數爲負正與正同名負與負同名同名相除則異名者相益異名相除則同名者相益一正一負相反而相爲用術之至也秉兵永切刈禾盈手爲秉稱昌孕切正斤兩也俗作秤課苦卧切程也衡戸庚切權衡也武馬莫下切武馬戎馬也戎馬言武馬者猶曲禮謂戎車爲武車也取其健猛而善行阪府遠切不平也詩曰瞻彼阪田箋阪田崎嶇墝埆之處俗作坂借資者切從人假物也引余忍切引重也易曰引重致遠綆古杏切汲木索令力正切官名也從者疾用切隨也庖薄交切恢演上苦回切大也下以淺切廣也九章第九句股上苦侯切下公戸切句短面也股長面也短長相推以求其弦故曰句股圍之雨非切周也纏持碾切纏繞物也俗作纏葛長直良切葭古牙切說文曰葦之未秀者閫苦本切門限也鐻求於切亦作鋸横戸肓切從横也折常列切斷也抵都禮切磨邑莫禾切言切近過之摩靡通春秋左氏傳曰靡壘而還戰國䇿摩燕烏集闕參倉含切謂三相參列也俗作叅九章算術音義終

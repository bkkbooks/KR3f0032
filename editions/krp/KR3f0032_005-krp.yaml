body:
  text: 魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勅注釋商功以御功程積實今有穿地積一萬尺問爲堅壤各幾何荅曰爲堅七千五百尺爲壤一萬二千五百尺術曰穿地四爲壤五壤謂息土爲堅三堅爲築土爲墟四墟謂穿坑此皆其常率以穿地求壤五之求堅三之皆四而一今有術也以壤求穿四之求堅三之皆五而一以堅求穿四之求壤五之皆三而一臣淳風等謹按此術竝今有之義也重張穿地積一萬尺爲所有數堅率三壤率五各爲所求率墟率四爲所有率而今有之卽得城垣隄溝壍渠皆同術術曰并上下廣而半之損廣補狹以高若深乘之又以袤乘之卽積尺按此術并上下廣而半之者以盈補虚得中平之廣以高若深乘之堅率三壤率五各爲所求率墟率四爲所有率而今有之得一頭之立羃又以袤乘之者得立實之積故爲積尺今有城下廣四丈上廣二丈高五丈袤一百二十六丈五尺問積幾何荅曰一百八十九萬七千五百尺今有垣下廣三尺上廣二尺高一丈二尺袤二十二丈五尺八寸問積幾何荅曰六千七百七十四尺今有隄下廣二丈上廣八尺高四尺袤一十二丈七尺問積幾何荅曰七千一百一十二尺冬程人功四百四十四尺問用徒幾何荅曰一十六人一百一十一分人之二術曰以積尺爲實程功尺數爲法實如法而一卽用徒人數今有溝上廣一丈五尺下廣一丈深五尺袤七丈問積幾何荅曰四千三百七十五尺春程人功七百六十六尺并出土功五分之四定功六百一十二尺五分尺之四問用徒幾何荅曰七人三千六十四分人之四百二十七術曰置本人功去其五分之一餘爲法去其五分之一者謂以四乘五除也以溝積尺爲實實如法而一得用徒人數按此術本置人功去其五分之一者謂以四乘之五而一除去出土之功取其定功乃通分内子以爲法以分母乘溝積尺爲實者法裏有分實裏通之實如法而一卽用徒人數此以一人之積尺除其衆尺故用徒人數不盡者等數約之而命分也今有壍上廣一丈六尺三寸下廣一丈深六尺三寸袤一十三丈二尺一寸問積幾何荅曰一萬九百四十三尺八寸八寸者謂穿地方尺深八寸此積餘有方寸中二分四釐五毫乘之貴欲從易非其常定也夏程人功八百七十一尺并出土功五分之一沙礫水石之功作太半定功二百三十二尺一十五分尺之四問用徒幾何荅曰四十七人三千四百八十四分人之四百九術曰置本人功去其出土功五分之一又去沙礫水石之功太半餘爲法以壍積尺爲實實如法而一卽用徒人數按此術置本人功去其出土功五分之一者謂以四乘五除又去沙礫水石作太半者一乘三除存其少半取其定功乃通分内子以爲法以分母乘壍積尺爲實法裏有分實裏通之實如法而一卽用徒人數不盡者等數約之而命分也今有穿渠上廣一丈八尺下廣三尺六寸深一丈八尺袤五萬一千八百二十四尺問積幾何荅曰一千七萬四千五百八十五尺六寸秋程人功三百尺問用徒幾何荅曰三萬三千五百八十一一人功内少一十四尺四寸一千人先到問當受袤幾何荅曰一百五十四丈三尺二寸八十一分寸之八術曰以一人功尺數乘先到人數爲實以一千人一日功爲實立幂爲功并渠上下廣而半之以深乘之爲法以渠廣深之立幂爲法實如法得袤尺今有方堢壔堢者堢城也壔音丁老切又音纛謂以土擁木也方一丈六尺高一丈五尺問積幾何荅曰三千八百四十尺術曰方自乘以高乘之卽積尺今有圓堢壔周四丈八尺高一丈一尺問積幾何荅曰二千一百一十二尺於徽術當積二千一十七尺一百五十七分尺之一百三十一臣淳風等謹按依密率積二千一十六尺術曰周自相乘以高乘之十二而一此章諸術亦以周三徑一爲率皆非也於徽術當以周自乘以高乘之又以二十五乘之三百一十四而一此之圓羃亦如圓田之羃也求羃亦如圓田而以高乘羃也臣淳風等謹按依密率以七乘之八十八而一今有方亭下方五丈上方四丈高五丈問積幾何荅曰一十萬一千六百六十六尺太半尺術曰上下方相乘又各自乘并之以高乘之三而一此章有壍堵陽馬皆合而成立方蓋說算者乃立棊三品以效高深之積假令方亭上方一尺下方三尺高一尺其用棊也中央立方一四面壍堵四四角陽馬四上下方相乘爲三尺以高乘之約積三尺是爲得中央立方一四面壍堵各一上方自乘亦得中央立方一下方自乘爲九以高乘之得積九尺是爲中央立方一四面壍堵各二四角陽馬各三也上方自乘以高乘之得積一尺又爲中央立方一凡三品棊皆一而爲三故三而一得積尺用棊之數立方三壍堵陽馬各十二凡二十七棊十二與三更差次之而成方亭者三驗矣爲術又可令方差自乘以高乘之三而一卽四陽馬也上下方相乘以高乘之卽中央立方及四面壍堵也并之以爲方亭積數也今有圓亭下周三丈上周二丈高一丈問積幾何荅曰五百二十七尺九分尺之七於徽術當積五百四尺四百七十一分尺之一百一十六也按密率爲積五百三尺三十三分尺之二十六術曰上下周相乘又各自乘并之以高乘之三十六而一此術周三徑一之義合以三除上下周各爲上下徑以相乘又各自乘并以高乘之三而一爲方亭之積假令三約上下周俱不盡還通之卽各爲上下徑令上下徑分母相乘又各自乘并以高乘之爲三方亭之積此合分母三相乘得九分母各自乘亦得九爲法除之又三而一得方亭之積從方亭求圓亭之積亦猶方羃中求圓羃乃令圓率三乘之方率四而一得圓亭之積前求方亭之積乃以三而一今求圓亭之積亦各三乘之二母旣同故相凖折惟以方羃四乘分母九得三十六而連除之於徽術當上下周相乘又各自乘并以高乘之又二十五乘之九百四十二而一此方亭四角圓殺比於方亭二百分之一百五十七爲術之意先作方亭三而一則此據上下徑爲之者當又以一百五十七乘之六百而一也今據周爲之若於圓堢壔又以二十五乘之三百一十四而一則先得三圓亭矣故以三百一十四爲九百四十二而一并除之臣淳風等謹按依密率以七乘之二百六十四而一今有方錐下方二丈七尺高二丈九尺問積幾何荅曰七千四十七尺術曰下方自乘以高乘之三而一按此術假令方錐下方二尺高一尺卽四陽馬如術爲之用十二陽馬成三方錐故三而一得陽馬也今有圓錐下周三丈五尺高五丈一尺問積幾何荅曰一千七百三十五尺一十二分尺之五於徽術當積一千六百五十八尺三百一十四分尺之十三依密率爲積一千六百五十六尺八十八分尺之四十七術曰下周自乘以高乘之三十六而一按此術圓錐下周以爲方錐下方方錐下方令自乘以高乘之合三而一得大錐方之積大錐方之積合十二圓矣今求一圓復合十二除之故令三乘十二得三十六而連除於徽術當下周自乘以高乘之又以二十五乘之九百四十二而一圓錐比於方錐亦二百分之一百五十七令徑自乘者亦當以一百五十七乘之六百而一其說如圓亭也臣淳風等謹按依密率以七乘之二百六十四而一今有壍堵下廣二丈袤一十八丈六尺高二丈五尺問積幾何荅曰四萬六千五百尺術曰廣袤相乘以高乘之二而一邪解立方得兩壍堵雖復橢方亦爲壍堵故二而一此則合所規羃推其物體蓋爲壍上疊也其形如城而無上廣與所規棊形異而同實未聞所以名之爲壍堵之說也今有陽馬廣五尺袤七尺高八尺問積幾何荅曰九十三尺少半尺術曰廣袤相乘以高乘之三而一按此術陽馬之形方錐一隅也今謂四柱屋隅爲陽馬假令廣袤各一尺高一尺相乘之得立方積一尺邪解立方得兩壍堵邪解壍堵其一爲陽馬一爲鼈臑陽馬居二鼈臑居一不易之率也合兩鼈臑成一陽馬合三陽馬而成一立方故三而一驗之以棊其形露矣悉割陽馬凡爲六鼈臑觀其割分則體勢互通蓋易了也其棊或脩短或廣狹立方不等者亦割分以爲六鼈臑其形不悉相似然見數同積實均也鼈臑殊形然陽馬異體則不純合不純合則難爲之矣何則按邪解方棊以爲壍堵者必當以半爲分邪解壍堵以爲陽馬者亦必當以半爲分一從一横耳設陽馬爲分内鼈臑爲分外棊雖或隨脩短廣狹猶有此分常率如殊形異體亦同也者以此而已其使鼈臑廣袤各高二尺用壍堵鼈臑之棊各二皆用赤棊又使陽馬之廣袤高各二尺用立方之棊一壍堵陽馬之棊各二皆用黑棊棊之赤黑接爲壍堵廣袤高各二尺於是中效其廣又中分其高令赤黑壍堵各自適當一方高二尺方二尺每二分鼈臑則一陽馬也其餘兩端各積本體合成一方焉是爲别種而方者率居三通其體而方者率居一雖方隨棊改而固有常然之勢也按餘數具而可知者有一二分之别卽一二之爲率定矣其於理也豈虛矣若爲數而窮之置餘廣袤高之數各半之則四分之三又可知也半之彌少其餘彌細至細曰微微則無形由是言之安取餘哉數而求窮之者謂以情推不用籌算鼈臑之物不同器用陽馬之形或隨脩短廣狹然不有鼈臑無以審陽馬之數不有陽馬無以知錐亭之數功實之主也今有鼈臑下廣五尺無袤上袤四尺無廣高七尺問積幾何荅曰二十三尺少半尺術曰廣袤相乘以高乘之六而一按此術臑者臂骨也或曰半陽馬其形有似鼈肘故以名云中破陽馬得兩鼈臑鼈臑之見數卽陽馬之半數數同而實據半故云六而一卽得今有羡除下廣六尺上廣一丈深三尺末廣八尺無深袤七尺問積幾何荅曰八十四尺術曰并三廣以深乘之又以袤乘之六而一按此術羨除實隧道也其所穿地上平下邪似兩鼈臑夾一壍堵卽羨除之形假令用此棊上廣三尺深一尺下廣一尺末廣一尺無深袤一尺下廣皆壍堵之廣上廣者兩鼈臑與一壍堵相連之廣也以深袤乘得積五尺鼈臑居二壍堵居三其於本棊皆以爲六故六而一合四陽馬以爲方錐邪畫方錐之底亦令爲中方就中方削而上合全爲中方錐之半於是陽馬之棊悉中解矣中錐離而爲四鼈臑焉故外錐之半亦爲四鼈臑雖背正異形與常所謂鼈臑參不相似實則同也所云夾壍堵者中錐之鼈臑也凡壍堵上袤短者連陽馬也下袤短者與鼈臑連也下兩袤相等者亦與鼈臑連也并三廣以高袤乘六而一皆其積也今此羨除之廣卽壍堵之袤也按此本是三廣不等卽與鼈臑連者别而言之中央壍堵廣六尺高三尺袤七尺末廣之兩旁各一小鼈臑皆與壍堵等令小鼈臑居裏大鼈臑居表則大鼈臑出橢皆方錐下廣三尺袤六尺高七尺分取其半則爲袤三尺以高廣乘之三而一卽半錐之積也邪解半錐得此兩大鼈臑求其積亦當六而一合與常率矣按陽馬之棊兩邪棊底方當其方也不問旁角而割之相半可知也推此上連無成不方故方錐與陽馬同實角而割之者相半之勢此大小鼈臑可知更相表裏但體有背正也今有芻甍下廣三丈袤四丈上袤二丈無廣高一丈問積幾何荅曰五千尺術曰倍下袤上袤從之以廣乘之又以高乘之六而一推明義理者舊說云凡積芻甍有上下廣曰童甍謂其屋蓋之茨也是故甍之下廣袤與童之上廣袤等正斬方亭兩邊合之卽芻甍之形也假令下廣二尺袤三尺上袤一尺無廣高一尺其用棊也中央壍堵二兩端陽馬各二倍下袤上袤從之爲七尺以高廣乘之得羃十四尺陽馬之羃各居一壍堵之羃各居三以高乘之得積十四尺其於本棊也皆一而爲六故六而一卽得亦可令上下袤差乘廣以高乘之三而一卽四陽馬也下廣乘上袤而半之高乘之卽二壍堵并之以爲甍積也芻童曲池盤池冥谷皆同術術曰倍上袤下袤從之亦倍下袤上袤從之各以其廣乘之并以高若深乘之皆六而一按此術假令芻童上廣一尺袤二尺下廣三尺袤四尺高一尺其用棊也中央立方二四面壍堵六四角陽馬四倍下袤爲八上袤從之爲十以下廣乘之得積三十尺是爲得中央立方各三兩邊壍堵各四兩旁壍堵各六四角陽馬亦各六復倍上袤下袤從之爲八以高廣乘之得積八尺是爲得中央立方亦各三兩端壍堵各二并兩旁三品棊皆一而爲六故六而一卽得爲術又可令上下廣袤差相乘以高乘之三而一亦四陽馬上下廣袤互相乘并而半之以高乘之卽四面六壍堵與二立方并之爲芻童積又可令上下廣袤互相乘而半之上下廣袤又各自乘并以高乘之三而一卽得也其曲池者并上中外周而半之以爲上袤亦并下中外周而半之以爲下袤此池環而不通匝形如盤虵而曲之亦云周者謂如委榖依垣之周耳引而伸之周爲袤求袤之意環田也今有芻童下廣二丈袤三丈上廣三丈袤四丈高三丈問積幾何荅曰一萬六千五百尺今有曲池上中周二丈外周四丈廣一丈下中周一丈四尺外周二丈四尺廣五尺深一丈問積幾何荅曰一千八百八十三尺三寸少半寸今有盤池上廣六丈袤八丈下廣四丈袤六丈深二丈問積幾何荅曰七萬六百六十六尺太半尺負土往來七十步其二十步上下棚除棚除二當平道五踟蹰之間十加一載輸之間三十步定一返一百四十步土籠積一尺六寸秋程人功行五十九里半問人到積尺及用徒各幾何荅曰人到二百四尺用徒三百四十六人一百五十三分人之六十二術曰以一籠積尺乘程行步數爲實往來上下棚除二當平道五棚閣除邪道有上下之難故使二當五也置定往來步數十加一及載輸之間三十步以爲法除之所得卽一人所到尺按此術棚閣除邪道有上下之難故使二當五置定往來步數十加一及載輸之間三十步是爲往來求一返凡用一百四十步於今有術爲所有行率籠積一尺六寸爲所求到土率程行五十九里半爲所有數而今有之卽人到尺數以所到約積尺卽用徒人數者此一人之積除其衆積尺故得用徒人數爲術又可令往來一返所用之步約程行爲返數乘籠積爲一人所到以此術與今有術相反覆則乘除之或先後意各有所在而同歸耳以所到約積尺卽用徒人數今有冥谷上廣二丈袤七丈下廣八尺袤四丈深六丈五尺問積幾何荅曰五萬二千尺載土往來二百步載輸之間一里程行五十八里六人共車車載三十四尺七寸問人到積尺及用徒各幾何荅曰人到二百一尺五十分尺之十三用徒二百五十八人一萬六十三分人之三千七百四十六術曰以一車積尺乘程行步數爲實置今往來步數加載輸之間一里以車六人乘之爲法除之所得卽一人所到尺按此術今有之義以載輸及往來并得五百步爲所有行率車載三十四尺七寸爲所求到土率程行五十八里通之爲步爲所有數而今有之所得則一車所到欲得人到者當以六人除之卽得術有分故亦更令乘法而并除者亦用以半尺數以爲一人到土率六人乘五百步爲行率也又可以五百步爲行率令六人約半積尺數爲一人到土率以載土術入之入之者亦可求返數也要取其會通而已術恐有分故令乘法而并除以所到約積尺卽用徒人數者以一人所積尺除其衆積故得射徒人數也以所到約積尺卽用徒人數今有委粟平地下周一十二丈高二丈問積及爲粟幾何荅曰積八千尺於徽術當積七千六百四十三尺一百五十七分尺之四十九臣淳風等謹按依密率爲積七千六百三十六尺十一分尺之四爲粟二千九百六十二斛二十七分斛之二十六於徽術當粟二千八百三十斛一千四百一十三分斛之一千二百一十臣淳風等謹按依密率爲粟二千八百二十八斛九十九分斛之二十八今有委菽依垣下周三丈高七尺問積及爲菽各幾何荅曰積三百五十尺依徽術當積三百三十四尺四百七十一分尺之一百八十六也臣淳風等謹按依密率爲積三百三十四尺十一分尺之一爲菽一百四十四斛二百四十三分斛之八依徽術當菽一百三十七斛一萬二千七百一十七分斛之十千七百七十一臣淳風等謹按依密率爲菽一百三十七斛八百九十一分斛之四百三十三今有委米依垣内角下周八尺高五尺問積及爲米幾何荅曰積三十五尺九分尺之五於徽術當積三十二尺四百七十一分尺之四百五十七臣淳風等謹按依密率當積三十三尺三十三分尺之三十一爲米二十一斛七百二十九分斛之六百九十一於徽術當米二十斛三萬八千一百五十一分斛之三萬六千九百八十臣淳風等謹按依密率爲米二十斛二千六百七十三分斛之二千五百四十委粟術曰下周自乘以高乘之三十六而一此猶圓錐也於徽術亦當下周自乘以高乘之又以二十五乘之九百四十二而一也其依垣者居圓錐之半也十八而一於徽術當令此下周自乘以高乘之又以二十五乘之四百七十一而一依垣之周半於全周其自乘之羃居全周自乘之羃四分之一故半全周之法以爲法也其依垣内角者角隅也居圓錐四分之一也九而一於徽術當令此下周自乘而倍之以高乘之又以二十五乘之四百七十一而一依隅之周半於依垣其自乘之羃居依垣自乘之羃四分之一當半依垣之法以爲法法不可半故倍其實又此術亦用周三徑一之率假令以三除周得徑若不盡通分内子卽爲徑之積分令自乘以高乘之爲三方錐之積分母自相乘得九爲法又當三而一約方錐之積從方錐中求圓錐之積亦猶方羃求圓羃乃當三乘之四而一得圓羃之積前求方積乃合三而一今求圓錐之積復合三乘之二母旣同故相凖折惟以四乘分母九得三十六而連除圓錐之積其圓錐之積與平地聚粟同故三十六而一臣淳風等謹依密率以七乘之其平地者二百六十四而一依垣者一百三十二而一依隅者六十六而一也程粟一斛積二尺七寸二尺七寸者謂方一尺深二尺七寸凡積二千七百寸其米一斛積一尺六寸五分寸之一謂積一千六百二十寸其菽荅麻麥一斛皆二尺四寸十分寸之三謂積二千四百三十寸此爲以精麤爲率而不等其槩也粟率五米率三故米一斛於粟一斛五分斛之三菽荅麻麥亦如本率云故謂此三量器爲槩而皆不合於今斛當今大司農斛圓徑一尺三寸五分五釐正深一尺於徽術爲積一千四百四十一寸排成餘分又有十分寸之三王莽銅斛於今尺爲深九寸五分五釐徑一尺三寸六分八釐二毫以徽術計之於今斛爲容九斗七升四合有奇周官考工記㮚氏爲量深一尺内方一尺而圓外其實一鬴於徽術此圓積一千五百七十六寸左氏傳曰齊舊四量豆區釜鍾四升曰豆各自其四以登於釜釜十則鍾鍾六斛四斗釜六斗四升方一尺深一尺其積一千寸若此方積容四斗二升則通外圓積成旁容十斗四合一龠五分龠之三也以數相乘之則斛之制方一尺而圓其外庣旁一釐七毫羃一百五十六寸四分寸之一深一尺積一千五百六十二寸半容十斗王莽銅斛與漢書律歷志所論斛同今有穿地袤一丈六尺深一丈上廣六尺爲垣積五百七十六尺問穿地下廣幾何荅曰三尺五分尺之三術曰置垣積尺四之爲實實穿地四爲堅三垣堅也以堅求穿地當四之三而一也以深袤相乘爲深袤之立實也又以三之爲法以深袤乘之立實除垣積則阬廣又三之者與堅率并除之所得倍之阬有兩廣先并而半之卽爲廣狹之中平今先得其中平故又倍之知兩廣全也減上廣餘卽下廣按此術穿地四爲堅三垣卽堅也今以堅求穿地當四乘之三而一深袤相乘者爲深袤立羃以深袤立羃除積卽阬廣又三之爲法與堅率并除所得倍之者爲阬有兩廣先并而半之爲中平之廣今此得中平之廣故倍之還爲兩廣并故減上廣餘卽下廣也今有倉廣三丈袤四丈五尺容粟一萬斛問高幾何荅曰二丈術曰置粟一萬斛積尺爲實廣袤相乘爲法實如法而一得高尺以廣袤之羃除積故得高按此術本以廣袤相乘以高乘之得此積今還原置此廣袤相乘爲法除之故得高也今有圓囷圓囷廩也亦云圓囤也高一丈三尺三寸少半寸容米二千斛問周幾何荅曰五丈四尺於徽術當周五丈五尺二寸二十分寸之九臣淳風等謹依密率爲周五丈五尺一百分尺之二十七術曰置米積尺此卽猶圓堢壔之積以十二乘之令高而一所得開方除之卽周於徽術當置米積尺以三百一十四乘之爲實二十五乘囷高爲法所得開方除之卽周也此亦據見羃以求周失之於微少也晉武庫中有漢時王莽所作銅斛其篆書字題斛旁云律嘉量斛方一尺而圓其外庣旁九釐五毫羃一百六十二寸深一尺積一千六百二十寸容十斗及斛底云律嘉量斗方尺而圜其外庣旁九釐五毫羃一尺六寸二分深一寸積一百六十二寸容一斗合龠皆有文字升居斛旁合龠在斛耳上後有讃文與今律歷志同亦魏晉所常用今祖疏王莽銅斛文字尺寸分數然不盡得升合勺之文字按此術本周自相乘以高乘之十二而一得此積今還元置此積以十二乘之令高而一卽復本周自乘之數凡物自乘開方除之復其本周自乘之數故開方除之卽得也臣淳風等謹依密率以八十八乘之爲實七乘囷高爲法實如法而一開方除之卽周也九章算術卷五九章算術卷五訂訛算經十書之二休寧戴震東原今有壍上廣一丈六尺三寸下廣一丈深六尺三寸袤十三丈二尺一寸問積幾何荅曰一萬九百四十三尺八寸此積以立方一尺者計之餘有方尺而深八寸二分四釐五毫實八十二萬四千五百分也今有穿渠上廣一丈八尺下廣三尺六寸深一丈八尺袤五萬一千八百二十四尺問積幾何荅曰一千七萬四千五百八十五尺六寸此六寸亦方尺而深六寸實積六百寸也

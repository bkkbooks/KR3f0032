  text: 九章算術卷八算經十書之二
  hash: sha256:33b86727ee2d2a19fd40b91c14d8b18e0e84731f69aa30cbc1e4e4c4367744d8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0032_SBCK_008-1a}
body:
  text: 魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勅注釋方程以御錯糅正負今有上禾三秉中禾二秉下禾一秉實三十九斗上禾二秉中禾三秉下禾一秉實三十四斗上禾一秉中禾二秉下禾三秉實二十六斗問上中下禾實一秉各幾何荅曰上禾一秉九斗四分斗之一中禾一秉四斗四分斗之一下禾一秉二斗四分斗之三方程程課程也羣物總雜各列有數總言其實令每行爲率二物者再程三物者三程皆如物數程之並列爲行故謂之方程行之左右無所同存且爲有所據而言耳此都術也以空言難曉故特繫之禾以決之又列中行如右行也術曰置上禾三秉中禾二秉下禾一秉實三十九斗於右方中左禾列如右方以右行上禾徧乘中行而以直除爲術之意令少行減多行反覆相減則頭位必先盡上無一位則此行亦闕一物矣然而舉率以相減不害餘數之課也若消去頭位則下去一物之實如是叠令左右行相減審其正負則可得而知先令右行上禾乘中行爲齊同之意爲齊同者謂中行上禾亦乘右行也從簡易雖不言齊同以齊同之意觀之其義然矣又乘其次亦以直除復去左行首然以中行中禾不盡者徧乘左行而以直除亦令兩行相乘去行之中禾也左方下禾不盡者上爲法下爲實實卽下禾之實上中禾皆去故餘數是下禾實非但一秉欲約衆秉之實當以禾秉數爲法列此下禾之秉實乘兩行以直除則下禾之位自決矣各以其餘一位之秉除其下實卽斗數矣用算繁而不省實合中下禾之實其數並見以中下禾先見之實令乘右行中下禾秉數以減之故亦如前各求列實以減下實也餘如上禾秉數而一卽上禾之實實皆如法各得一斗三實同用不滿法者以法命之母實皆當除之今有上禾七秉損實一斗益之下禾二秉而實十斗下禾八秉益實一斗與上禾二秉而實十斗問上下禾實一秉各幾何荅曰上禾一秉實一斗五十二分斗之十八下禾一秉實五十二分斗之四十一術曰如方程損之曰益益之曰損問者之辭雖以損益爲說今按實云上禾七秉下禾二秉實十一斗上禾二秉下禾八秉實九斗也損之日益言損一斗餘當十斗今欲全其實當加所損也益之曰損言益實一斗乃滿十斗今欲加本實當減所加卽得也損實一斗者其實過十斗也益實一斗者其實不滿十斗也重諭損益數者各以損益之數損益之也今有上禾二秉中禾三秉下禾四秉實皆不滿斗上取中中取下下取上各一秉而實滿斗問上中下禾實一秉各幾何荅曰上禾一秉實二十五分斗之九中禾一秉實二十五分斗之七下禾一秉實二十五分斗之四術曰如方程各置所取置上禾二秉爲右行之上中禾三秉爲中行之中下禾四秉爲左行之下所取一秉及實一斗各從其位諸行相借取之物皆依此例以正負術入之正負術曰今兩算得失相反要令正負以名之正算赤負算黑否則以邪正爲異方程自有赤黑相取左右數相推求之術而其并減之勢不得交通故使赤黑相消奪之於算或減或益同行異位殊爲二品各有并減之差見於下焉著此二條特繫之禾以成此二條之意故赤黑相雜足以定上下之程減益雖殊足以通左右之數差實雖分足以應同異之率然則其正無入負之負無入正之其率不妄也同名相除此爲以赤除赤以黑除黑行求相減者爲法頭位也然則頭位同名者當用此條頭位異名者當用下條異名相益益行減行當各以其類矣其異名者非其類也非其類者猶無對也非所得減也故赤用黑對則除黑無對則除赤赤黑并於本數此爲相益之皆所以爲消奪消奪之與減益成一實也術本取要必除行首至於他位不嫌多少故或令相減或令相并理無同異一也正無入負之負無入正之無入爲無對也無所得減則使消奪者居位也其當以列實或減下實而中行正負雜者亦用此條此條者同名減實異名益實正無入負之負無入正之也其異名相除同名相益正無入正之負無入負之此條異名相除爲例故亦與上條互取凡正負所以記其同異使二品互相取而已矣言負者未必負於少言正者未必正於多故毎一行之中雖復赤黑異算無傷然則可得使頭位常相與異名此條之實兼通矣遂以二條反覆一率觀其毎與上下互相取位則隨算而言耳猶一術也又本設諸行欲因減數以相去耳故其多少無限令上下相命而已若以正負相減如數有舊増法者每行可均之不但數物左右之也今有上禾五秉損實一斗一升當下禾七秉上禾七秉損實二斗五升當下禾五秉問上下禾實一秉各幾何荅曰上禾一秉五升下禾一秉二升術曰如方程置上禾五秉正下禾七秉負損實一斗一升正言上禾五秉之實多減其一斗一升餘是與下禾七秉相當數也故互其算令相折除以一斗一升爲差爲差者上禾之餘實也次置上禾七秉正下禾五秉負損實二斗五升正以正負術八之按正負之術本設列行物程之數不限多少必令與實上下相次而以每行各自爲率然而或減或益同行異位殊爲二品并減之差見於下也今有上禾六秉損實一斗八升當下禾十秉下禾十五秉損實五升當上禾五秉問上下禾實一秉各幾何荅曰上禾一秉實八升下禾一秉實三升術曰如方程置上禾六秉正下禾十秉負損實一斗八升正次置上禾五秉負下禾十五秉正損實五升正以正負術入之言上禾六秉之實多減損其一斗八升餘是與下禾十秉相當之數故亦互其算而以一斗八升爲差實差實者下禾之餘實今有上禾三秉益實六斗當下禾十秉下禾五秉益實一斗當上禾二秉問上下禾實一秉各幾何荅曰上禾一秉實八斗下禾一秉實三斗術曰如方程置上禾三秉正下禾十秉負益實六斗正次置上禾二秉負下禾五秉正益實一斗正以正負術入之言上禾三秉之實少益其六斗然後於下禾十秉相當也故亦互其算而以六斗爲差實差實者下禾之餘實今有牛五羊二直金十兩牛二羊五直金八兩問牛羊各直金幾何荅曰牛一直金一兩二十一分兩之十三羊一直金二十一分兩之二十術曰如方程假令爲同齊頭位爲牛左右行相乘定更置牛十羊四直金二十兩左行牛十羊二十五直金四十兩牛數等同金多二十兩者羊差二十一使之然也以少行減多行則牛數盡惟羊與直金之數見可得而知也以小推大雖四五行不異也今有賣牛二羊五以買十三豕有餘錢一千賣牛三豕三以買九羊錢適足賣羊六豕八以買五牛錢不足六百問牛羊豕價各幾何荅曰牛價一千二百羊價五百豕價三百術曰如方程置牛二羊五正豕十三負餘錢數正次置牛三正羊九負豕三正次置牛五負羊六正豕八正不足錢負以正負術入之此中行買賣相折錢適足但互買賣算而已故下無錢直也設欲以此行如方程法先令牛二徧乘左行而以右行直除之是終於下實虚缺矣故注日正無實負負無實正方爲類也方將以别實加不足之數與實物作實盈不足章黃金白銀與此相當假令黃金九白銀十一稱之重適等交易其一金輕十三兩問金銀一枚各重幾何與此同今有五雀六燕集稱之衡雀俱重燕俱輕一雀一燕交而處衡適平并燕雀重一斤問燕雀一枚各重幾何荅曰雀重一兩十九分兩之十三燕重一兩十九分兩之五術曰如方程交易質之各重八兩此四雀一燕與一雀五燕衡適平并重一斤故各八兩列兩行程數左行頭位其數是一可省乘令右行徧乘左行而取其法實於左左行數多以右行取其數左頭位減盡中法下實卽每枚當重宜可知也按此四雀一燕與一雀五燕其重等是三雀四燕重相當雀率重四燕率重三也諸再程之率皆可異術求之卽其數也今有甲乙二人持錢不知其數甲得乙半而錢五十乙得甲太半而亦錢五十問甲乙持錢各幾何荅曰甲持三十七錢半乙持二十五錢術曰如方程損妓之此問者言一甲半乙而五十太半甲一乙亦五十也各以分母乘其全内子行定二甲一乙而錢一百二甲三乙而錢一百五十於是乃如方程諸物有分者倣此今有二馬一牛價過一萬如半馬之價一馬二牛價不滿一萬如半牛之價問牛馬價各幾何荅曰馬價五千四百五十四錢十一分錢之六牛價一千八百一十八錢十一分錢之二術曰如方程損益之此一馬半與一牛價直一萬也二牛半與一馬亦直一萬也一馬半與一牛通分内子右行爲三馬二牛直錢二萬二牛半於一馬通分内子左行爲二馬五牛直錢二萬也今有武馬一匹中馬二匹下馬三匹皆載四十石至阪皆不能上武馬借中馬一匹中馬借下馬一匹下馬借武馬一匹乃皆上問武中下馬一匹各力引幾何荅曰武馬一匹力引二十二石七分石之六中馬一匹力引十七石七分石之一下馬一匹力引五石七分石之五術曰如方程各置所借以正負術入之今有五家共井甲二綆不足如乙一綆乙三綆不足如丙一綆丙四綆不足如丁一綆丁五綆不足如戊一綆戊六綆不足如甲一綆各得所不足一綆皆逮問井深綆長各幾何荅曰井深七丈二尺一寸甲綆長二丈六尺五寸乙綆長一丈九尺一寸丙綆長一丈四尺八寸丁綆長一丈二尺九寸戊綆長七尺六寸術曰如方程以正負術入之此率初如方程爲之名各一逮井其後法得七百二十一實七十六是爲七百二十一綆而七十六逮井而戊一綆逮之數定逮七百二十一分之七十六是故七百二十一爲井深七十六爲戊綆之長舉率以言之今有白禾二步靑禾三步黃禾四步黑禾五步實各不滿斗白取靑黃靑取黃黑黃取黑白黑取白靑各一步而實滿斗問白靑黃黑禾實一步各幾何荅曰白禾一步實一百一十一分斗之三十三靑禾一步實一百一十一分斗之二十八黃禾一步實一百一十一分斗之十七黑禾一步實一百一十一分斗之十術曰如方程各置所取以正負術入之今有甲禾二秉乙禾三秉丙禾四秉重皆過於石甲二重如乙一乙三重如丙一丙四重如甲一問甲乙丙禾一秉各重幾何荅曰甲禾一秉重二十三分石之十七乙禾一秉重二十三分石之十一丙禾一秉重二十三分石之十術曰如方程置重過於石之物爲負此問者言甲禾二秉之重過於一石也其過者幾何如乙一秉重矣互其算令相折除以石爲之差實差實者如甲禾餘實故置算相與同也以正負術入之此入頭位異名相除者正無入正之負無入負之也今有令一人吏五人從者十人食雞十令十人吏一人從者五人食雞八令五人吏十人從者一人食雞六問令吏從者食雞各幾何荅曰令一人食一百二十二分雞之四十五吏一人食一百二十二分雞之四十一從者一人食一百二十二分雞之九十七術曰如方程以正負術入之今有五羊四犬三雞二兔直錢一千四百九十六四羊二犬六雞三兔直錢一千一百七十五三羊一犬七雞五兔直錢九百五十八二羊三犬五雞一兔直錢八百六十一問羊犬雞兔價各幾何荅曰羊價一百七十七犬價一百二十一雞價二十三兔價二十九術曰如方程以正負術入之今有麻九斗麥七斗菽三斗荅二斗黍五斗直錢一百四十麻七斗麥六斗菽四斗荅五斗黍三斗直錢一百二十八麻三斗麥五斗菽七斗荅六斗黍四斗直錢一百一十六麻二斗麥五斗菽三斗答九斗黍四斗直錢一百一十二麻一斗麥三斗菽二斗荅八斗黍五斗直錢九十五問一斗直幾何荅曰麻一斗七錢麥一斗四錢菽一斗三錢荅一斗五錢黍一斗六錢術曰如方程以正負術入之此麻麥與均輸少廣章之重衰積分皆爲大事其拙於精理徒按本術者或用算而布氊方好煩而喜誤曾不知其非反欲以多爲貴故其算也莫不闇於設通而專於一端至於此類苟務其成然或失之不可謂要約更有異術者庖丁解牛游刅理間故能歷久其刅如新夫數猶刅也易簡用之則動中庖丁之理故能和神愛刅速而寡尤凡九章爲大事按法皆不盡一百算也雖布算不多然足以算多世人多以方程爲難或盡布算之象在綴正負而已未暇以論其設動無方斯膠柱調瑟之類聊復恢演爲作新術著之於此將亦啓導疑意網羅道精豈傳之空言記其施用之例著䇿之數每舉一隅焉方程新術曰以正負術入之令左右相減先去下實又轉去物位求其一行二物正負相借者易其相當之率又令二物與他行互相去取轉其二物相借之數卽皆相當之率也各據二物相當之率對易其數卽各當之率也更置減行及其下實各以其物本率今有之求其所同并以爲法其當相并而行中正負雜者同名相從異名相消餘以爲法以下實爲實實如法卽合所問也一物各以本率今有之卽皆合所問也率不通者齊之其一術曰置羣物通率爲列衰更置減行羣物之數各以其率乘之并以爲法其當相并而行中正負雜者同名相從異名相消餘爲法以減行下實乘列衰各自爲實實如法而一卽得以舊術爲之凡應置五行今欲要約先置第三行以減第四行及減第三行次置第二行以第二行減第三行去其頭位次置右行去其頭位次以第四行減左行頭位次以左行去第四行及第二行頭位次以第五行減第二行頭位餘可半次以第二行去第四行頭位餘約之爲法實如法而一得空卽有黍價以法減第二行得荅價左行得麥價第三行麻價右行得菽價如此凡用七十七算以新術爲此先以第四行減第三行次以第三行去右行及第二行第四行下位又以減右行下位不足減乃止次以左行減第三行下位次以第三行去左行下位訖廢去第三行次以第四行去左行下位右行當左行下位次以右行去第二行及第四行下位次以第二行減第四行及左行願位次以第四行減右行菽位不足減乃止次以左行減第二行頭位餘可再半次以第四行去右行及第二行頭位次以第二行去右行頭位餘約之上得五下得三是菽五當荅三次以左行去第三行菽位又以減第四行及右行菽位不足減乃止次以右行減第二行頭位不足減乃止次以第三行去左行頭位次以左行去右行頭位餘上得六下得五是爲荅六當黍五次以右行去左行荅位餘約之上爲二下爲三次以左行去第二行下位以第二行去第四行下位又以減左行下位次右行去第二行下位餘上得三下得四是爲麥三當菽四次以第二行減第四行下位次以第四行去第二行下位餘上得四下得七是爲麻四當麥七是爲相當之率舉矣據麻四當麥七卽爲麻價率七而麥價率四又麥三當菽四卽爲麥價率四而菽價率三又荅六當黍五卽爲荅價率五而黍價率六而率通矣更置第三行以第四行減之餘有麻一斗菽四斗荅三斗負下實四正求其同爲麻之數以菽率三荅率五各乘菽荅斗數如麻率七而一菽得一斗七分斗之五正荅得二斗七分斗之一負則菽荅化爲麻以并之令同名相從異名相消餘爲定麻七分斗之四以爲法置下實四爲實以分母乘之實得二十八而分子化爲法矣以法除得七卽麻一斗之價置麥率四菽率三荅率五黍率六皆以其斗數乘之各自爲實以麻率七爲法所得卽同爲麻之數亦可使置本行實與物同通之各以本率今有之求其本率所得并以爲法如此則無正負之異矣擇異同而已又可以一術爲之置五行通率爲麻七麥四菽三荅五黍六以爲列衰減行麻一斗菽四斗正荅三斗負各以其率乘之訖令同名相從異名相消餘爲法又置下實乘列衰所得各爲實此可以實約法則不復乘列衰各以列衰如九章算術卷八訂訛休寧載震東原術曰置上禾三秉中禾二秉下禾一秉實三十九斗於右方中左禾列如右方以右行上禾徧乘中行而以直除古字直値通用直除猶言對減也以右行上禾徧乘中行復以中行上禾徧乘右行然後可相對減古人文省故但舉一以該之又乘其次亦以直除此謂右行上禾徧乘左行復以左行上禾徧乘右行亦相對減古人文多省畧然以中行中禾不盡者古人單用然字不曰然後者然猶乃也徧乘左行此以中行左行所減之餘如前徧乘文亦從省用算繁而不省所以别爲法約也然猶不如自用其舊廣異法也用法繁而不省以下訛舛衍文益行減行當各以其類矣其異名者非其類也非其類者猶無對也非所得減也故赤用黑對則除黑無對則除赤赤黑并於本數此爲相益之皆所以爲消奪消奪之與減益成一實也此注多訛舛據方程術無論物有幾品遞減至一物乃止又以赤黑别正負首位赤減赤黑減黑者同名伯除也次位以下遇赤用黑對則相益此條是也首位赤減黑黑減赤者異名相除也次位以下遇皆赤皆黑則相益後條是也由此言之注之謬顯然葢傳寫失真後人復妄加改竄遂不可通正無入負之入字原本訛作人下文及注並同據注云無入爲無對也無對之說亦未分曉釋方程者專爲遇空位起例而左右兩行相對減或正宜變爲負或負宜變爲正往往不得其義例今考同名相除異名相益者如下實左右俱正所減之餘屬左行則去右行屬右行則去左行其物品以正減正餘在所去之行爲正無入以負減負餘在所去之行爲負無入以正從負爲正無入以負從正爲負無入負對空位而負數在所去之行與以負減負同例正對空位而正數在所去之行與以正從負同例此皆所謂正無入負之負無入正之也異名相除同名相益者如下實左右俱正并爲一數則無分於左右其物品以負減正餘或左或右爲正無入以正減負餘或左或右爲負無入以正從正爲正無入以負從負爲負無入正對空位與以負減正同例負對空位與以負從負同例此皆所謂正無入正之負無入負之也由是言之在所去之行則其數無入而或左或右以與無分於左右合爲一行因亦謂之無入人字乃傳寫之誤明矣今悉改正無入爲無對也無所得減則使消奪者居位也其當以列實或減下實此句訛舛據後注内方程新術以列衰乘下實又以列衰乘羣物之數并爲法其當相并而行中正負雜者同名相從異名相消似卽此所舉此條異名相除爲例故亦與上條互取凡正負所以記其同異使二品互相取而已矣言負者未必負於少言正者未必正於多故每一行之中雖復赤黑異算無傷然則可得使頭位常相與異名此條之實兼通矣遂以二條反覆一率觀其每與上下互相取位則隨算而言耳猶一術也又本設諸行欲因減數以相去耳故其多少無限令上下相命而已若以正負相減如數有舊增法者每行可均之不但數物左右之也此注皆不分曉當由傳寫失真後人又妄加改竄遂不可通此中行買賣相折錢適足但互買賣算而已故下無錢直也設欲以此行如方程法先令牛二徧乘左行而以右行直除之是終於下實虚缺矣故注曰正無實負負無實正方爲類也方將以别實加不足之數與實物作實此注訛脫不分曉據術意應列三行先令右行牛二徧乘中行復令中行牛三徧乘右行而以直除得羊三十三正豕四十五負餘錢三千正此同名相除異名相益正無入負之負無入正之也次令右行牛二徧乘左行復令左行牛五徧乘右行而以直除得羊三十七正豕四十九負餘錢三千八百正此異名相除同名相益正無入正之負無入負之也重列爲左右兩行先令右行羊三十三徧乘左行復令左行羊三十七徧乘右行而以直除得豕四十八正以爲法錢一萬四千四百正爲實實如法而一得豕價三百轉減而上得羊價五百牛價一千二百此亦同名相除異名相益正無入負之負無入正之也中行下實虛缺本無庸論葢注文傳寫失眞後人又妄加改竄遂不可通此四雀一燕與一雀五燕衡適平并重一斤故各八兩列兩行程數左行頭位其數是一可省乘令右行徧乘左行而取其法實於左左行數多以右行取其數左頭位減盡中法下實卽每枚當重宜可知也按此四雀一燕與一雀五燕其重等是三雀四燕重相當雀率重四燕率重三也諸再程之率皆可異術求之卽其數也此卽末條所言新術以下實俱重八兩徧乘上雀燕以左雀八減右雀三十二餘二十四以右燕八減左燕四十餘三十二是爲二物正負相借因而約之雀得三燕得四乃三雀當四燕也對易其數卽雀率重四而燕率重三注於此突入異術幾不解其所謂今有五家共井甲二綆不足如乙一綆乙三綆不足如丙一綆丙四綆不足如丁一綆丁五綆不足如戊一綆戊六綆不足如甲一綆各得所不足一綆皆逮問井深綆長各幾何荅曰井深七丈二尺一寸甲綆長二丈六尺五寸乙綆長一丈九尺一寸丙綆長一丈四尺八寸丁綆長一丈二尺九寸戊綆長七尺六寸此問不言丈尺無由知井深綆長於丈尺幾何使井深半之爲三丈六尺有半寸則甲綆一丈三尺二寸半乙綆九尺五寸半丙綆七尺四寸丁綆六尺四寸半戊綆三尺八寸使井深倍之爲十四丈四尺二寸則甲綆五丈三尺乙綆三丈八尺二寸丙綆二丈九尺六寸丁綆二丈五尺八寸戊綆一丈五尺二寸皆合所問由是言之問旣不定以丈尺依術推求先得七百二十一無以定百爲丈十爲尺也問井深綆長之率各幾何荅以井深之率七百二十一甲綆長率二百六十五乙綆長率一百九十一丙綆長率一百四十八丁綆長率一百二十九戊綆長率七十六於義乃通此率初如方程爲之名各一逮井其後法得七百二十一實七十六此上訛舛不可通據術先得七百二十一爲所列五行之通率卽井深率也以此率列各行下爲各行之下實重求之法得七百二十一實得五萬四千七百九十六以法除實得用逮之數七十六此麻麥與均輸少廣章之重衰積分皆爲大事其拙於精理徒按本術者或用算而布氊方好煩而喜誤曾不知其非反欲以多爲貴故其算也莫不闇於設通而專於一端至於此類苟務其成然或失之不可謂要約更有異術者庖丁解牛游刃理閒故能歷久其刃如新夫數猶刃也易簡用之則動中庖丁之理故能和神愛刃速而寡尤凡九章爲大事按法皆不盡一百算也雖布算不多然足以算多世人多以方程爲難或盡布算之象在綴正負而已未暇以論其設動無方斯膠柱調瑟之類聊復恢演爲作新術著之於此將亦啓導疑意網羅道精豈傳之空言記其施用之例著䇿之數每舉一隅焉以上字句多誤又皆屬虛辭非有實義可考無從訂正姑仍之其一術曰置羣物通率爲列衰更置減行羣物之數各以其率乘之并以爲法其當相并而行中正負雜者同名相從異名相消餘爲法以減行下實乘列衰各自爲實實如法而一卽得以舊術爲之凡應置五行今欲要約先置第三行以減第四行及減第三行次置第二行以第二行減第三行去其頭位次置右行去其頭位次以第四行減左行頭位次以左行去第四行及第二行頭位次以第五行減第二行頭位餘可半次以第二行去第四行頭位餘約之爲法實如法而一得空卽有黍價以法減第二行得荅價左行得麥價第三行麻價右行得菽價如此凡用七十七算以上所言舊術訛舛不可通據方程術凡五物及總價求其各物之價者應列五行行五位及價直以上一位互乘因徧乘次位以下及價直兩兩相對減去其頭位所減之餘重列之減至一物一價乃止物爲法價爲實實如法而一得一物之價轉減而上以知各價先化五爲四次化四爲三次化三爲二次化二爲一凡用十算兼乘減除言之則一百四十五算凡上一位互乘其數必同可省乘若遇上一位數同則省徧乘或上一位遇一則省其與對行徧乘考問意左行上一位是一先以左行減右行次減第二行次減第三行次減第四行所減之餘重列爲四行其左行上一位又是一以左行減右行次減第二行次減第三行所減之餘重列爲三行其上一位數皆同卽以本數減之餘列爲兩行依術得荅價轉而上求得菽價及麥價麻價凡用九十九算以新術爲此先以第四行減第三行次以第三行去右行及第二行第四行下位又以減右行下位不足減乃止次以左行減第三行下位次以第三行去左行下位訖廢去第三行次以第四行去左行下位右行當左行下位次以右行去第二行及第四行下位次以第二行減第四行及左行頭位次以第四行減右行菽位不足減乃止次以左行減第二行頭位餘可再半次以第四行去右行及第二行頭位次以第二行去右行頭位餘約之上得五下得三是菽五當荅三次以左行去第三行菽位又以減第四行及右行菽位不足減乃止次以右行減第二行頭位不足減乃止次以第三行去左行頭位次以左行去右行頭位餘上得六下得五是爲荅六當黍五次以右行去左行荅位餘約之上爲二下爲三次以左行去第二行下位以第二行去第四行下位又以減左行下位次右行去第二行下位餘上得三下得四是爲麥三當菽四次以第二行減第四行下位次以第四行去第二行下位餘上得四下得七是爲麻四當麥七是爲相當之率舉矣以上所言新術亦訛舛不可通據其術求之先以左行減第三行去其次位次并右行左行亦并第三行第四行以減之去其次位次倍左行以第二行減之去其次位所減之餘重列之爲三行次以第四行減第二行去次位及下位次以重列之中行減右行去其下位次以重列之左行減右行去其下位所減之餘又重列之爲三行次以此右行減中行去其頭位次以此右行減左行去其頭位所減之餘兩行兩物減去下實餘約之上得五下得三是菽五當荅三前云令左右相減先去下實又轉去物位求其一行二物正負相借者易其相當之率謂菽五當荅三卽菽價率三荅價率五也或先減下實乃減物位或先減物位乃減下實各從省便本無一定之先後其先求菽與荅相當之率次求荅與黍相當之率次求麥與菽相當之率次求麻與麥相當之率亦無一定之先後然非遇正負相借者則二物相當之率不可得往往窮而復推輾轉滋繁遠不若舊術之究歸易簡也九章算術卷八終

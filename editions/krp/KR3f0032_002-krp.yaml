  text: 九章算術卷第二算經十書之二
  hash: sha256:24b661fc04c516ae70ed2e73d6641623ff4bbee15699dcb7a179da2ad7f7383b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0032_SBCK_002-1a}
body:
  text: 魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勅注釋粟米以御交質變易粟米之法凡此諸率相與大通其特相求各如本率可約者約之别術然也粟率五十糲米三十粺米二十七糳米二十四御米二十一小䵂十三半大䵂五十四糲飯七十五粺飯五十四糳飯四十八御飯四十二菽荅麻麥各四十五稻六十䜴六十三飱九十熟菽一百三半糵一百七十五今有此都術也凡九數以爲篇名可以廣施諸率所謂告往而知來舉一隅而三隅反者也誠能分詭數之紛雜通彼此之否塞因物成率審辨名分平其偏頗齊其參差則終無不歸於此術也術曰以所有數乘所求率爲實以所有率爲法少者多之始一者數之母故爲率者必等之於一據粟率五糲率三是粟五而爲一糲米三而爲一也欲化粟爲米者糲當先本是一一者謂以五約之令五而爲一也訖乃以三乘之令一而爲三如是則率等於一以五爲三矣然先除後乘或有餘分故術反之又究言之知粟五升爲糲米三升分言之知粟一斗爲糲米五分斗之三以五爲母三爲子以粟求糲米者以子乘其母報除也然則所求之率常爲母也臣淳風等謹按宜云所求之率常爲子所有之率常爲母今乃云所求之率常爲母知脫錯也實如法而一今有粟一斗欲爲糲米問得幾何荅曰爲糲米六升術曰以粟求糲米三之五而一臣淳風等謹按都術以所求率乘有所數以所有率爲法此術以粟求米故粟爲所有數三是米率故三爲所求率五是粟率故五爲所有率粟率五十米率三十退位求之故唯云三五也今有粟二斗一升欲爲粺米問得幾何荅曰爲粺米一斗一升五十分升之十七術曰以粟求粺米二十七之五十而一臣淳風等謹按粺米之率二十有七故直以二十七之五十而一也今有粟四斗五升欲爲糳米問得幾何荅曰爲糳米二斗一升五分升之三術曰以粟求糳米十二之二十五而一臣淳風等謹按糳米之率二十有四以爲率太䌓故因而半之半所求之率以乘所有之數所求之率旣減半所有之率亦減半是故十二乘之二十五而一也今有粟七斗九升欲爲御米問得幾何荅曰爲御米三斗三升五十分升之九術曰以粟求御米二十一之五十而一今有粟一斗欲爲小䵂問得幾何荅曰爲小䵂二升一十分升之七術曰以粟求小䵂二十七之百而一臣淳風等謹按小䵂之率十三有半半者二爲母以二通之得二十七爲所求率又以母二通其粟率得一百爲所有率凡本率有分者須卽乘除也他皆倣此今有粟九斗八升欲爲大䵂問得幾何荅曰爲大䵂一十斗五升二十五分升之二十一術曰以粟求大䵂二十七之二十五而一臣淳風等謹按大䵂之率五十有四因其可半故二十七之亦如粟求糳米半其二率今有粟二斗三升欲爲糲飯問得幾何荅曰爲糲飯三斗四升半術曰以粟求糲飯三之二而一臣淳風等謹按糲飯之率七十有五粟求糲飯合以此數乘之今以等數二十有五約其二率所求之率得三所有之率得二故以三乘二除今有粟三斗六升欲爲粺飯問得幾何荅曰爲粺飯三斗八升二十五分升之二十二術曰以粟求粺飯二十七之二十五而一臣淳風等謹按此術與大䵂多同今有粟八斗六升欲爲糳飯問得幾何荅曰爲糳飯八斗二升二十五分升之一十四術曰以粟求糳飯二十四之二十五而一臣淳風等謹按糳飯率四十八此亦半二率而乘除今有粟九斗八升欲爲御飯問得幾何荅曰爲御飯八斗二升二十五分升之八術曰以粟求御飯二十一之二十五而一臣淳風等謹按此術半率亦與糳飯多同今有粟三斗少半升欲爲菽問得幾何荅曰爲菽二斗七升一十分升之三今有粟四斗一升太半升欲爲荅問得幾何荅曰爲荅三斗七升半今有粟五斗太半升欲爲麻問得幾何荅曰爲麻四斗五升五分升之三今有粟一十斗八升五分升之二欲爲麥問得幾何荅曰爲麥九斗七升二十五分升之一十四術曰以粟求菽荅麻麥皆九之十而一臣淳風等謹按四術率並四十五皆是爲粟所求俱合以此率乘其本粟術欲從省先以等數五約之所求之率得九所有之率得十故九乘十除義由於此今有粟七斗五升七分升之四欲爲稻問得幾何荅曰爲稻九斗三十五分升之二十四術曰以粟求稻六之五而一臣淳風等謹按稻率六十亦約二率而乘除今有粟七斗八升欲爲䜴問得幾何荅曰爲䜴九斗八升二十五分升之七術曰以粟求䜴六十三之五十而一今有粟五斗五升欲爲飱問得幾何荅曰爲飱九斗九升術曰以粟求飱九之五而一臣淳風等謹按飱率九十退位與求稻多同今有粟四斗欲爲熟菽問得幾何荅曰爲熟菽八斗二升五分升之四術曰以粟求熟菽二百七之百而一臣淳風等謹按熟菽之率一百三半半者其母二故以母二通之所求之率旣被二乘所有之率隨而俱長故以二百七之百而一今有粟二斗欲爲糵問得幾何荅曰爲糵七斗術曰以粟求糵七之二而一臣淳風等謹按糵率一百七十有五合以此數乘其本粟術欲從省先以等數二十五約之所求之率得七所有之率得二故七乘二除今有糲米十五斗五升五分升之二欲爲粟問得幾何荅曰爲粟二十五斗九升術曰以糲米求粟五之三而一臣淳風等謹按上術以粟求米故粟爲所有數三爲所求率五爲所有率今此以米求粟故米爲所有數五爲所求率三爲所有率准都術求之各合其數以下所有反求多同皆准此今有粺米二斗欲爲粟問得幾何荅曰爲粟三斗七升二十七分升之一術曰以粺米求粟五十之二十七而一今有糳米三斗少半升欲爲粟問得幾何荅曰爲粟六斗三升三十六分升之七術日以糳米求粟二十五之十三而一今有御米十四斗欲爲粟問得幾何荅曰爲粟三十三斗三升少半升術曰以御米求粟五十之二十一而一今有稻一十二斗六升一十五分升之一十四欲爲粟問得幾何荅曰爲粟一十斗五升九分升之七術曰以稻求粟五之六而一今有糲米一十九斗二升七分升之一欲爲粺米問得幾何荅曰爲粺米一十七斗二升一十四分升之一十三術曰以糲米求粺米九之十而一臣淳風等謹按粺率二十七合以此數乘糲米術欲從省先以等數三約之所求之率得九所有之率得十故九乘而十除今有糲米六斗四升五分升之三欲爲糲飯問得幾何荅曰爲糲飯一十六斗一升半術曰以糲米求糲飯五之二而一臣淳風等謹按糲飯之率七十有五宜以本糲米乘此率術欲從省先以等數十五約之所求之率得五所有之率得二故五乘二除義由於此今有糲飯七斗六升七分升之四欲爲飱問得幾何荅曰爲飱九斗一升三十五分升之三十一術曰以糲飯求飱六之五而一臣淳風等謹按飱率九十爲糲飯所求宜以糲飯乘此率術欲從省先以等數十五約之所求之率得六所有之率得五以此故六乘五除也今有菽一斗欲爲熟菽問得幾何荅曰爲熟菽二斗三升術曰以菽求熟菽二十三之十而一臣淳風等謹按熟菽之率一百三半因其有半各以母二通之宜以熟菽數乘此率術欲從者先以等數九約之所求之率得一十一半所有之率得五也今有菽二斗欲爲䜴問得幾何荅曰爲䜴二斗八升術曰以菽求䜴七之五而一臣淳風等謹按䜴率六十三爲菽所求宜以菽乘此率術欲從省先以等數九約之所求之率得七而所有之率得五也今有麥八斗六升七分升之三欲爲小䵂問得幾何荅曰爲小䵂二斗五升一十四分升之一十三術曰以麥求小䵂三之十而一臣淳風等謹按小䵂之率十三半宜以母二通之以乘本麥之數術欲從省先以等數九約之所求之率得三所有之率得十也今有麥一斗欲爲大䵂問得幾何荅曰爲大䵂一斗二升術曰以麥求大䵂六之五而一臣淳風等謹按大䵂之率五十有四合以大䵂數乘此率術欲從省先以等數九約之所求之率得六所有之率得五也今有出錢一百六十買瓴甓十八枚瓴甓甎也問枚幾何荅曰一枚八錢九分錢之八今有出錢一萬三千五百買竹二千三百五十箇問箇幾何荅曰一箇五錢四十七分錢之三十五經率臣淳風等謹按今有之義以所求率乘所有數合以瓴甓一枚乘錢一百六十爲實但以一乘不長故不復乘是以徑將所買之率與所出之錢爲法實也又按此今有之義出錢爲所有數一枚爲所求率所買爲所有率而今有之卽得所求數一乘不長故不復乘是以徑將所買之率爲法以所出之錢爲實實如法得一枚錢不盡者等數而命分術曰以所買率爲法所出錢數爲實實如法得一今有出錢五千七百八十五買漆一斛六斗七升太半升欲斗率之問斗幾何荅曰一斗三百四十五錢五百三分錢之一十五今有出錢七百二十買縑一匹二丈一尺欲丈率之問丈幾何荅曰一丈一百一十八錢六十一分錢之二今有出錢二千三百七十買布九匹二丈七尺欲匹率之問匹幾何荅曰一匹二百四十四錢一百二十九分錢之一百二十四今有出錢一萬三千六百七十買絲一石二鈞一十七斤欲石率之問石幾何荅曰一石八千三百二十六錢一百九十七分錢之一百七十八經率此術猶經分臣淳風等謹按今有之義一斗爲所求率出錢爲所有數故以一斗乘錢數有分者通之又以分母乘之爲實所買通分內子爲所有率故以爲法實如法而一得錢數不盡而命分者因法爲母實餘爲子實見不滿故以命之術曰以所求率乘錢數爲實以所買率爲法實如法得一今有出錢五百七十六買竹七十八箇欲其大小率之問各幾何荅曰其四十八箇箇七錢其三十箇箇八錢今有出錢一千一百二十買絲一石二鈞十八斤欲其貴賤斤率之問各幾何荅曰其二鈞八斤斤五錢其一石一十斤斤六錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤石率之問各幾何荅曰其一鈞九兩一十二銖石八千五十一錢其一石一鈞二十七斤九兩一十七銖石八千五十二錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤鈞率之問各幾何荅曰其七斤一十兩九銖鈞二千一十二錢其一石二鈞二十斤八兩二十銖鈞二千一十三錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤斤率之問各幾何荅曰其一石二鈞七斤十兩四銖斤六十七錢其二十斤九兩一銖斤六十八錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤兩率之問各幾何荅曰其一石一鈞一十七斤一十四兩一銖兩四錢其一鈞一十斤五兩四銖兩五錢其率如欲令差分按出錢五百七十六買竹七十八箇以除錢得七實餘三十是爲三十箇復可増一錢然則實餘之數卽是貴者之數故曰實貴也本以七十八箇爲法今以貴者減之則其餘悉是賤者之數故曰法賤也其求石鈞斤兩以積銖各除法實各得其積數餘各爲銖者謂石鈞斤兩積銖除實又以石鈞斤兩積銖除法餘各爲銖卽合所問術曰各置所買石鈞斤兩以爲法以所率乘錢數爲實實如法而一不滿法者反以實減法法賤實貴今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤銖率之問各幾何荅曰其一鈞二十斤六兩十一銖五銖一錢其一石一鈞七斤一十二兩一十八銖六銖一錢今有出錢六百二十買羽二千一百翭翭羽本也數羽稱其本猶數草木稱其根株欲其貴賤率之問各幾何荅曰其一千一百四十翭三翭一錢其九百六十翭四翭一錢今有出錢九百八十買矢簳五千八百二十枚欲其貴賤率之問各幾何荅曰其三百枚五枚一錢其五千五百二十枚六枚一錢反其率臣淳風等謹按其率者錢多物少反其率者錢少物多多少相反故曰反其率也其率者以物數爲法錢數爲實反之者以錢數爲法物數爲實不滿法知實餘也當以餘物化爲錢矣法爲凡錢而今以化錢減之故以實減法法少知經分之所得故曰法少實多者餘分之所益故曰實多乘實宜以多乘法宜以少故曰各以其所得多少之數乘法實卽物數其求石鈞斤兩以積銖各除法實各得其數餘各爲銖者謂之石鈞斤兩積銖除實石鈞斤兩積銖除法餘各爲銖卽合所問術曰以錢數爲法所率爲實實如法而一不滿法者反以實減法法少實多二物各以所得多少之數乘法實卽物數按其率出錢六百二十買羽二千一百翭反之當二百四十錢一錢四翭其三百八十錢一錢三翭是錢有二價物有貴賤故以羽乘錢反二率也臣淳風等謹按其率者以物數爲法錢爲實反之者以錢數爲法物爲實不滿法者實餘也當以餘物化爲錢矣法爲凡錢而今以化錢減之故曰反以實減法也法少者知經分之所得故曰法少實多者知餘分之所益故曰實多宜以多乘法少乘實故曰各以所得多少數乘法實卽物數也九章算術卷二終

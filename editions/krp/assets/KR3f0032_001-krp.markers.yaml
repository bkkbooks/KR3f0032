  - {type: variant, offset: 7956, length: 0, content: '', WYG: 即九十六觚之外弧田所謂以弦乘矢之凡幂也案弧田下原本衍九千六字今刪加此幂于九十六觚之幂得三百一十四寸六百二十五分寸之一百六十九則出圎之表矣故還就一百九十二觚之全幂三百一十四寸以為圎幂之定率而棄其餘分以半徑一尺除圎幂倍之得六尺二寸分分即周數令徑自乘為方幂四百寸與圎幂相折圎幂得一百五十七為率方幂得二百為率方幂二百其中容圎幂一百五十七也圎率猶為㣲少按弧田圗令方中容圎圎中容方内方合外之半半然則圎幂一百五十七其中容方幂一百也案一百原本訛作二百今改正又令徑二尺與周六尺二寸八分相約周得一百五十七徑得五十則其相與之率也周率猶為㣲少也晉武庫中漢時王莽作銅斛其銘曰律嘉量斛内方尺而圎其外庣旁九釐五毫幂一百六十二寸深一尺積一千六百二十寸容十斗}

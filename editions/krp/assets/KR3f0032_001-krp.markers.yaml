  - {type: variant, offset: 7892, length: 2, content: 圓內, WYG: 今並改正與圎徑之半其數均等合徑率一而外周率三也案劉徽以周三徑一乃六觚之率圎内}
  - {type: variant, offset: 7897, length: 0, content: '', WYG: 其觚面適為六弧}
  - {type: variant, offset: 7898, length: 1, content: 圖, WYG: 弦圎周大于六觚之周為六弧背與六弧弦之差其説非圗莫顯今補圗附于後又按為圎以六觚之一面乘一弧半徑案一弧二字衍當刪二因而六之案此句有訛舛當改云三之上衍二因而三字得十二觚之幂若又割之次以十二觚之一面乘一弧之半面案一弧之三字亦衍當刪四因而六之案此句亦有訛舛當云六之上衍四因而三字則得二十四觚之幂割之彌細所失彌少割之又割以至于不可割則與圎周合體而無所失矣觚面之外又有餘徑以面乘徑則幂出觚矣若夫觚之細者與圎合體則表無餘徑表無餘徑則幂不外出矣以一面乘半徑觚而裁之每輒自倍故以半周乘半徑而為圎幂此一周徑謂至然之數非周三徑之一率也周三者從其六觚之環耳以推圎規多少之較案較原本訛作覺今改正乃弓之與弦也然世傳此法莫肯精覈學者踵古習其謬失不有明據辯之斯難凡物類形象不圎則方方圎之率誠著于近則雖逺可知也由此言之其用博矣謹按圎驗更造密率恐空設法數昧而難譬故置諸檢括謹詳其記注焉割六觚以為十二觚術曰置圎徑二尺半之為一尺即圎裏觚之面也案觚之而原本訛作弦之面後觚之半面訛作弧之半面今改正令半徑一尺為弦案原本訛作為弧今改正半面五寸為句為之求股以句幂二十五寸減弦幂餘七十五寸開方除之下至秒忽又一退法求其㣲數㣲數無各知以為分子以下為分母約作五分忽之二故得股八寸六分六釐二秒五忽五分忽之二案二秒原本訛作二絲今改正以減半徑餘一寸三分三釐九毫七秒四忽五分忽之三謂之小句案此下原本衍小句知半面五寸之句九字觚之半面又謂之小股為之求弦其幂二千六百七十九億四千九百一十九萬三千四百四十五忽餘分棄之案此句原本訛作全分并之攷弦幂五忽之下尚有一六餘分無所謂全分也當是傳寫舛誤遂不可通後數條皆云餘分棄之令據以改正開方除之即十二觚之一面也割十二觚以為二十四觚術曰亦令半徑為弦半面為句為之求股置上下弦幂四而一得六百六十九億八千七百二十九萬八千三百六十一忽餘分棄之即句幂也以減弦幂其餘開方除之得股六寸六分五釐九毫二秒五忽五分忽之四以減半徑餘三分四釐七秒四忽五分忽之一謂之小句觚之半面又謂之小股為之求小弦其幂六百八十一億四千八百三十四萬九千四百六十六忽餘分棄之開方除之即二十四觚之一面也割二十四觚以為四十八觚術曰亦令半徑為弦半面為句為之求股置上下弦幂四而一得一百七十億三千七百八萬七千三百六十六忽餘分棄之即句幂也以減弦幂其餘開方除之得股九寸九分一釐四毫四秒四忽五分忽之四以減半徑餘八釐五毫五秒五忽五分忽之一謂之小句觚之半面又謂之小股為之求小弦其幂七百七十一億一千二十七萬八千八百一十三忽餘分棄之開方除之得小弦一寸三分八毫六忽餘分棄之即四十八觚之一面以半徑一尺乘之又以二十四乘之得幂三萬一千三百九十三億四千四百萬忽以百億除之得幂三百一十三寸六百二十五分寸之五百八十四即九十六觚之幂也割四十八觚以為六十六觚術曰亦令半徑為弦半面為句為之求股置次上弦幂四而一得四十二億七千七百五十六萬九千七百三忽餘分棄之即句幂也以減弦幂其餘開方除之得股九寸九分七釐八毫五秒八忽十分忽之九以減半徑餘二釐一毫四秒一忽十分忽之一謂之小句觚之半面又謂之小股為之求小弦其幂四十二億八千二百一十五萬四千一十二忽餘分棄之開方除之得小弦六分五釐四毫三秒八忽餘分棄之即九十六觚之一面以半徑一尺乘之又以四十八乘之得幂三萬一千四百一十億二千四百萬忽以百億除之得幂三百一十四寸六百二十五分寸之六十四即一百九十二觚之幂也}

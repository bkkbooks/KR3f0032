  - {type: variant, offset: 1738, length: 5750, content: 分故反以列數乘同齊臣淳風等謹按問云所平之分多少不定或三或二列位無常平三知置位三重平二知置位二重凡此之例一凖平分不可預定多少故直云列數而已以平實減列實餘約之爲所減并所減以益於少以法命平實各得其平今有七人分八錢三分錢之一問人得幾何荅曰人得一錢二十一分錢之四又有三人三分人之一分六錢三分錢之一四分錢之三問人得幾何荅曰人得二錢八分錢之一經分臣淳風等謹按經分者自合分已下皆與諸分相齊此乃直求一人之分以人數分所分故曰經分也術曰以人數爲法錢數爲實實如法而一有分者通之母互乘子者齊其子母相乘者同其母以母通之者分母乘全內子乘散全則爲積分積分則與分子相通故可令相從凡數相與者謂之率率者自相與通有分則可散分重疊則約也等除法實相與率也故散分者必令兩分母相乘法實也重有分者同而通之又以法分母乘實實分母乘法此謂法實俱有分故令分母各乘全分內子又令分母互乘上下今有田廣七分步之四從五分步之三問爲田幾何荅曰三十五分步之十二又有田廣九分步之七從十一分步之九問爲田幾何荅曰十一分步之七又有田廣五分步之四從九分步之五問爲田幾何荅曰九分步之四乘分臣淳風等謹按乘分者分母相乘爲法子相乘爲實故曰乘分術曰母相乘爲法子相乘爲實實如法而一凡實不滿法者乃有母子之名若有分以乘其實而長之則亦滿法乃爲全耳又以子有所乘故母當報除報除者實如法而一也今子相乘則母各當報除因令分母相乘而連除也此田有廣從難以廣諭設有問者曰馬二十匹直金十二斤今賣馬二十匹三十五人分之人得幾何荅曰三十五分斤之十二其爲之也當如經分術以十二斤金爲實三十五人爲法設更言馬五匹直金三斤今賣四匹七人分之人得幾何荅曰人得三十五分斤之十二其爲之也當齊其金人之數皆合初問入於經分矣然則分子相乘爲實者猶齊其金也母相乘爲法者猶齊其人也同其母爲二十馬無事於同但欲求齊而已又馬五匹直金三斤完全之率分而言之則爲一匹直金五分斤之三七人賣四馬一人賣七分馬之四分子與人交互相生所從言之異而計數則三術同歸也今有田廣三步三分步之一從五步五分步之二問爲田幾何荅曰十八步又有田廣七步四分步之三從十五步九分步之五問爲田幾何荅曰一百二十步九分步之五又有田廣十八步七分步之五從二十三步十一分步之六問爲田幾何荅曰一畝二百步十一分步之七大廣田臣淳風等謹按大廣田者初術直有全步而無餘分次術空有餘分而無全步此術先見全步復有餘分可以廣兼三術故曰大廣術曰分母各乘其全分子從之分母各乘其全分子從之者通全步內分子如此則母子皆爲實矣相乘爲實分母相乘爲法猶乘分也實如法而一今爲術廣從俱有分當各自通其分命母入者還須出之故令分母相乘爲法而連除之今有圭田廣十二步正從二十一步問爲田幾何荅曰一百二十六步又有圭田廣五步二分步之一從八步三分步之二問爲田幾何荅曰二十三步六分步之五術曰半廣以乘正從半廣者以盈補虚爲直田也亦可半正從以乘廣按半廣乘從以取中平之數故廣從相乘爲積步畝法除之卽得也今有邪田一頭廣三十步一頭廣四十二步正從六十四步問爲田幾何荅曰九畝一百四十四步又有邪田正廣六十五步一畔從一百步一畔從七十二步問爲田幾何荅曰二十三畝七十步術曰并兩邪而半之以乘正從若廣又可半正從若廣以乘并畝法而一并而半之者以盈補虚也今有箕田舌廣二十步踵廣五步正從三十步問爲田幾何荅曰一畝一百三十五步又有箕田舌廣一百一十七步踵廣五十步正從一百三十五步問爲田幾何荅曰四十六畝二百三十二步半術曰并踵舌而半之以乘正從畝法而一中分箕田則爲兩邪田故其術相似又可并踵舌半正從以乘之今有圓田周三十步徑十步臣淳風等謹按術意以周三徑一爲率周三十步合徑十步今依密率合徑九步十一分步之六問爲田幾何荅曰七十五步此於徽術當爲田七十一步一百五十七分步之一百三臣淳風等謹依密率爲田七十一步二十二分步之一十三又有圓田周一百八十一步徑六十步三分步之一臣淳風等謹按周三徑一周一百八十一步徑六十步三分步之一依密率徑五十七步二十二分步之一十三問爲田幾何荅曰十一畝九十步十二分步之一此於徽術當爲田十畝二百八步三百一十四分步之一百一十三臣淳風等謹依密率當爲田十畝二百五步八十八分步之八十七術曰半周半徑相乘得積步按半周爲從半徑爲廣故廣從相乘爲積步也假令圓徑二尺圓中容六觚之一面與圓徑之半其數均等合徑率一而外周率三也又按爲圖以六觚之一面乘半徑二因而六之得十二觚之羃若又割之次以十二觚之一面乘一觚之半徑四因而六之則得二十四觚之羃割之彌細所失彌少割之又割以至於不可割則與圓周合體而無所失矣觚面之外又有餘徑以面乘徑則羃出觚表若夫觚之細者與圓合體則表無餘徑表無餘徑則羃不外出矣以一面乘半徑觚而裁之每輒自倍故以半周乘半徑而爲圓羃此以周徑謂至然之數非周三徑一之率也周三者從其六觚之環耳以推圓規多少之較乃弓之與弦也然世傳此法莫肯精覈學者踵古習其謬失不有明據辯之斯難凡物類形象不圓則方方圓之率誠著於近則雖遠可知也由此言之其用博矣謹按圓驗更造密率恐空設法數昧而難譬故置諸撿括謹詳其記注焉割六觚以爲十二觚術曰置圓徑二尺半之爲一尺卽圓裏六觚之面也令半徑一尺爲弦半面五寸爲句爲之求股以句羃二十五寸減弦羃餘七十五寸開方除之下至秒忽又一退法求其微數微數無名者以爲分子以下爲分母約作五分忽之二故得股八寸六分六釐二秒五忽五分忽之二以減半徑餘一寸三分三釐九毫九秒四忽五分忽之三謂之小句觚之半面又謂之小股爲之求弦其羃二千六百七十九億四千九百一十九萬三千四百四十五忽餘分弃之開方除之卽十二觚之一面也割十二觚以爲二十四觚術曰亦令半徑爲弦半面爲句爲之求股置上小弦羃四而一得六百六十九億八千七百二十九萬八千三百六十一忽餘分棄之卽句羃也以減弦羃其餘開方除之得股九寸六分五釐九毫二秒五忽五分忽之四以減半徑餘三分四釐七秒四忽五分忽之一謂之小句觚之半面又謂之小股爲之求小弦其羃六百八十一億四千八百三十四萬九千四百六十六忽餘分棄之開方除之卽二十四觚之一面也割二十四觚以爲四十八觚術曰亦令半徑爲弦半面爲句爲之求股置上小弦羃四而一得一百七十億三千七百八萬七千三百六十六忽餘分棄之卽句羃也以減弦羃其餘開方除之得股九寸九分一釐四毫四秒四忽五分忽之四以減半徑餘八釐五毫五秒五忽五分忽之一謂之小句觚之半面又謂之小股爲之求小弦其羃一百七十一億一十二十七萬八千八百一十三忽餘分棄之開方除之得小弦一寸三分八毫六忽餘分棄之卽四十八觚之一面以半徑一尺乘之又以二十四乘之得羃三萬一千三百九十三億四千四百萬忽以百億除之得羃三百一十三寸六百二十五分寸之五百八十四卽九十六觚之羃也割四十八觚以爲九十六觚術曰亦令半徑爲弦半面爲句爲之求股置次上弦羃四而一得四十二億七千七百五十六萬九千七百三忽餘分棄之則句羃也以減弦羃其餘開方除之得股九寸九分七釐八毫五秒八忽十分忽之九以減半徑餘二釐一毫四秒一忽十分忽之一謂之小句觚之半面又謂之小股爲之求小弦其羃四十二億八千二百一十五萬四千一十二忽餘分棄之開方除之得小弦六分五釐四毫三秒八忽餘分棄之卽九十六觚之一面以半徑一尺乘之又以四十八乗之得羃三萬一千四百一十億二千四百萬忽以百億除之得羃三百一十四寸六百二十五分寸之六十四卽一百九十二觚之羃也以九十六觚之羃減之餘六百二十五分寸之一百五謂之差羃倍之爲分寸之二百一十卽九十六觚之外弧田九十六所謂以弦乘矢之凡羃也加此羃於九十六觚之羃得三百一十四寸六百二十五分寸之一百六十九則出於圓之表矣故還就一百九十二觚之全羃三百一十四寸以爲圓羃之定率而棄其餘分以半徑一尺除圓羃倍之得六尺二寸八分卽周數令徑自乘爲方羃四百寸與圓羃相折圓羃得一百五十七爲率方羃得二百爲率方羃二百其中容圓羃一百五十七也圓率猶爲微少按弧田圖令方中容圓圓中容方内方合外方之半然則圓羃一百五十七其中容方羃一百也又令徑二尺與周六尺二寸八分相約周得一百五十七徑得五十則其相與之率也周率猶爲微少也晉武庫中漢時王莽作銅斛其銘曰律嘉量斛內方尺而圓其外庣旁九釐五毫羃一百六十二寸深一尺積一千六百二十寸容十斗以此術求之得羃一百六十一寸有奇其數相近矣此術微少而斛差羃六百二十五分寸之一百五以十二觚之羃爲率消息當取此分寸之三十六以增於一百九十二觚之羃以爲圓羃三百一十四寸二十五分寸之四置徑自乘之方羃四百寸令與圓羃通相約圓羃三千九百二十七方羃得五千是爲率方羃五千中容圓羃三千九百二十七圓羃三千九百二十七中容方羃二千五百也以半徑一尺除圓羃三百一十四寸二十五分寸之四倍之得六尺二寸八分二十五分寸之八卽周數也全徑二尺與周數通相約徑得一千二百五十周得三千九百二十七卽其相與之率若此者蓋盡其纖微矣舉而用之上法仍約耳當求一千五百三十六觚之一面得三千七十二觚之羃而裁其微分數亦宜然重其驗耳臣淳風等謹按舊術求圓皆以周三徑一爲率若用之求圓周之數則周少徑多用之求其六觚之田乃與此率合會耳何則假令六觚之田觚閒各一尺爲面自然從角至角其徑二尺可知此則周六徑二與周三徑一已合恐此猶以難曉今更引物爲喻設令刻物作圭形者六枚枚别三面皆長一尺攢此六物悉使鋭頭向裏則成六觚之周角徑亦皆一尺更從觚角外畔圍繞爲規則六觚之徑盡達規矣當面徑短不至外規若以六觚言之則爲周六尺徑二尺面皆一尺面徑股不至外畔定無二尺可知故周三徑一之率於圓周乃是徑多周少徑一周三理非精密蓋術從簡要舉大綱略而言之劉徽特以爲疎遂乃改張其率但周徑相乘數難契合徽雖出斯一法終不能究其纖毫也祖沖之以其不精就中更推其數今者修撰攈摭諸家考其是非冲之爲密故顯之於徽術之下冀學者之所裁焉又術曰周徑相乘四而一此周與上觚同耳周徑相乘各當以半而今周徑兩全故兩母相乘爲四以報除之於徽術以五十乘周一百五十七而一卽徑也以一百五十七乘徑五十而一卽周也新術徑率猶當微少據周以求徑則失之長據徑以求周則失之短諸據見徑以求羃者皆失之於微少據周以求羃者皆失之於微多臣淳風等謹依密率以七乘周二十二而一卽徑以二十二乘徑七而一卽周依術求之卽得又術曰徑自相乘三之四而一按圓徑自乘爲外方三之四而一者是爲圓居外方四分之三也若令六觚之一面乘半徑其羃卽外方四分之一也因而三之卽亦居外方四分之三也是爲圓裏十二觚之羃耳取以爲圓失之於微少於徽新術當徑自乘又以一百五十七乘之二百而一臣淳風等謹按密率令徑自乘以十一乘之十四而一卽圓羃也又術曰周自相乘十二而一六觚之周其於圓徑三與一也故六觚之周自相乘爲羃若圓徑自乘者九方九方凡爲十二觚者十有二故曰十二而一卽十二觚之羃也今此令周自乘非但若爲圓徑自乘者九方而已然則十二而一所得又非十二觚之類也若欲以爲圓羃失之於多矣以六觚之周十二而一可也於徽新術直令圓周自乘又以二十五乘之三百一十四而一得圓羃其率三百一十四者周自乘之羃也置周數六尺二寸八分令自乘得羃三十九萬四千三百八十四分又置圓羃三萬一千四百分皆以一千二百五十六約之得此率臣淳風等謹按方面自乘卽得其積圓周求其羃股率乃通但此術所求用三一爲率圓田正法半周及半徑以相乘今乃用全周自乘故須以十二爲母何者據全周而求半周則須以二爲法就全周而求半徑復假六以除之是二六相乘除周自乘之數依密率以七乘之八十八而一今有宛田下周三十步徑十六步問爲田幾何荅曰一百二十步又有宛田下周九十九步徑五十一步問爲田幾何荅曰五畝六十二步四分步之一術曰以徑乘周四而一此術不驗故推方錐以見其形假令方錐下方六尺高四尺四尺爲股下方之半三尺爲句正面邪爲弦弦五尺也令句弦相乘四因之得六十尺卽方錐四面見者之羃若令其中容圓錐圓錐見羃與方錐見羃其率猶方羃之與圓羃也按方錐下六尺則方周二十四尺以五尺乘而半之則亦方錐之見羃故求圓錐之數折徑以乘下周之半卽圓錐之羃也今宛田上徑圓穹而與圓錐同術則羃失之於少矣然其術難用故略舉大較施之大廣田也求圓錐之羃猶求圓田之羃也今用兩全相乘故以四爲法除之亦如圓田矣開立圓術說圓方諸率甚備可以驗此今有弧田弦三十步矢十五步問爲田幾何荅曰一畝九十七步半又有弧田弦七十八步二分步之一矢十三步九分步之七問爲田幾何荅曰二畝一百五十五步八十一分步之五十六術曰以弦乘矢矢又自乘并之二而一方中之圓圓裏十二觚之羃合外方之羃四分之三也方中合外方之半則朱實合外方四分之一也弧田半圓之羃也故依半圓之體而爲之術以弦乘矢而半之則爲黄羃矢自乘而半之爲二青羃青黃相連爲弧體弧體法當應規令觚面不至外畔失之於少矣圓田舊術以周三徑一爲率俱得十二觚之羃亦失之於少也與此相似指驗半圓之弧耳若不滿半圓者益復疎闊宜依句股鋸圓材之術以弧弦爲鋸道長以矢爲句深而求其徑旣知圓徑則弧可割分也割之者半弧田之弦以爲股其矢爲句爲之求弦卽小弧之弦也以半小弧之弦爲句半圓徑爲弧爲之求股以減半徑其餘卽小弦之矢也割之又割使至極細但舉弦矢相乘之數則必近密率矣然於算數差繁必欲有所㝷究也若但度田取其大數舊術爲約耳今有環田中周九十二步外周一百二十二步徑五步此欲令與周三徑一之率相應故言徑五步也據中外周以徽術言之當徑四步一百五十七分步之一百二十二也臣淳風等謹按依密率合徑四步二十二分步之十七問爲田幾何荅曰二畝五十五步於徽術當爲田二畝三十一步一百五十七分步之二十三臣淳風等謹依密率爲田二畝三十步二十二分步之十五又有環田中周六十二步四分步之三外周一百一十三步二分步之一徑十二步三分步之二此田環而不通匝故徑十二步三分步之二若據上周求徑者此徑失之於多過周三徑一之率蓋爲疎矣於徽術當徑八步六百二十八分步之五十一臣淳風等謹按依周三徑一考之合徑八步二十四分步之一十一依密率合徑八步一百七十六分步之一十三問爲田幾何荅曰四畝一百五十六步四分步之一於徽術當爲田二畝二百三十二步五千二十四分步之七百八十七也依周三徑一爲田三畝二十五步六十四分步之二十五臣淳風等謹按密率爲田二畝二百三十一步一千四百八分步之七百一十七也術曰并中外周而半之以徑乘之爲積步此田截齊中外之周周則爲長并而半之者亦以盈補虚也此可令中外周各自爲圓田以中圓減外圓餘則環實也按此術置中外周步數於上分母子於下母乘子者爲中外周俱有餘分故以互乘齊其子母相乘同其母子齊母同故通全步內分子并而半之者以盈補虚得中平之周周則爲從徑則爲廣故廣從相乘而得其積旣合分母還須分母出之故令周徑分母相乘而連除之卽得積步不盡以等數除之而命分以畝法除積步得畝數也密率術曰置中外周步數分母子各居其下母互乘子分母相乘通全步內分子并而半之又可以中周減外周餘半之以益中周徑亦通分內子以乘周爲實分母相乘爲法除之爲積步餘積步之分等數約之以畝法除之卽畝數也九章算術卷一九章算術卷一訂訛補圖算經十書之二休寧戴震東原臣淳風等謹按母互乘子副并爲平實者定此平實立限衆子所當損益如限爲平, WYG: 舛誤}

  - {type: variant, offset: 8036, length: 1, content: 臣, WYG: 以増于一百九十二觚之幂以為圎幂三百一十四寸二十五分寸之四置徑自乘之方幂四百寸令與圎幂通相約圓幂三千九百二十七方幂得五千是為率方幂五千中容圎幂三千九百二十七圎幂三千九百二十七中容方幂二千五百也以半徑一尺除圓幂三百一十四寸二十五分寸之四倍之得六尺二寸八分二十五分寸之八即周數也全徑二尺與周數通相約徑得一千二百五十周得三千九百二十七即其相與之率若此者葢盡其纎微矣舉而用之上法仍約耳當求一千五百三十六觚之一面得三千七十二觚之幂而裁其㣲分數亦宜然重其驗耳}
  - {type: page-break, offset: 8036, content: '', id: KR3f0032_WYG_001-22a, image: WYG0797/WYG0797-0016a.png}

  - {type: variant, offset: 8040, length: 1, content: 謹, WYG: 按舊術求圎皆以周三徑一為率若用之求圎周之數則周少徑多用之求其六觚之田乃與此率合㑹耳何則假令六觚之田觚間各一尺為面自然從角至角其徑二尺可知案二尺原本訛作一尺今改正此則周六徑二與周三徑一已合恐此猶為難曉今更引物為喻設令刻物作圭形者六枚枚别三面皆長一尺攢此六物悉使鋭頭向裏則成六觚之周角徑亦皆一尺更從觚角外畔圍繞為規則六觚之徑盡達規矣當面徑短不至外規若以徑言之則為規六尺徑三尺面徑皆一尺案此三句有舛誤當云若以言觚言之則為周六尺徑二尺面皆一尺言觚二字訛作徑周訛作規二訛作三面字下又衍徑字遂不可通面徑股不至外畔定無二尺可知故周三徑一之率于圎周乃是徑多周少徑一周三理非精密葢術從簡要舉大綱畧而言之劉徽特以為疎遂改張其率但周徑相乘數難契合徽雖出斯一法終不能究其纎毫也祖沖之以其不精就中更推其數今者修撰攈摭諸家攷其是非沖之為密故顯之于徽術之下冀學者知所裁焉案沖之密率較徽率為密其約率較徽率為踈淳風等所稱宻率皆約率以之譏徽似誤又術曰周徑相乘四而一此周與上觚同耳周徑相乘各當一半而今周徑兩全案原本兩訛作田今改正故兩母相乘為四以報除之于徽術以五十乘周一百五十七而一即徑也以一百五十七乘徑五十而一即周也新術徑率猶當㣲少據周以求徑則失之長據徑以求周則失之短諸據見徑以求幂者皆失之于㣲少據周以求幂者皆失之于㣲多淳風等}

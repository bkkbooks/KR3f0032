  - {type: variant, offset: 7773, length: 0, content: '', WYG: 母相乘為法母相乘為法知亦齊其子又同其母以列數乘未并者各自為列實亦以列數乘法此當副并列數為平實若然則重有分故反以列數乘周齊淳風等按問云所平之分多少不定或三或二列位無常平三知置位三重平二知置位二重凡此之例一準平分不可豫定多少故直云列數而已以平實減列實餘約之為所減并所減以益于少以法命平實各得其平今有七人分八錢三分錢之七問人得幾何答曰人得一錢二十一分錢之四又有三人三分人之一分六錢三分錢之一四分錢之三問人得幾何答曰人得二錢八分錢之一經分淳風等按經分者自合分已下皆與諸分相齊此乃直求一人之分以人數分所分故曰經分也術曰以人數為法錢數為實實如法而一有分者通之母互乘子知齊其子母相乘者同其母以母通之者分母乘全内子散全則為積分積分則與子相通故可令相通凡數相與者謂之率率知自相與通有分則可散分重疊則約也等除法實相與率也故散分者必令兩分母相乘為法也重有分者同而通之又以法分母乗實實分母乗法此謂法實俱有分故令分母各乗全分内子又令分母互乗上下今有田廣七分步之四從五分步之三問為田幾何答曰三十五分步之十二又有田廣九分步之七從十一分步之九問為田幾何答曰十一分步之七又有田廣五分步之四從九分步之五問為田幾何答曰九分步之四乘分淳風等按乗分者分母相乗為法子相乘為實故曰乘分術曰母相乗為法子相乗為實實如法而一凡實不滿法者而有母子之名若有分以乗其實而長之則亦滿法乃為全耳又以子所乘乗故母當報除報除者實如法而一也今子相乘則母各當報除因令分母相乗而連除也此田有廣從難以廣諭設有問者曰馬二十匹直金十二斤今賣馬二十匹三十五人分之人得幾何答曰三十五分斤之十二其為之也當如經分術以十二斤金為實三十五人為法設更言馬五匹直金三斤今賣馬四匹七人分之人得幾何答曰人得三十五分斤之十二其為之也當齊其金人之數皆合初問入于經分矣然則分子相乘為實者猶齊其金也母相乘為法者猶齊其人也同其母為二十馬無事于同但欲求齊而已又馬五匹直金三斤完全之率分而言之則為一匹直金五分斤之三七人賣四匹馬一人賣七分馬之四分子與人交互相生所從言之異而計術則三術同歸也今有田廣三步三分步之一從五步五分步之二問為田幾何答曰十八步又有田廣七步四分步之三從十五步九分步之五問為田幾何答曰一百二十步九分步之五又有田廣十八步七分步之五從二十三步十一分步之六問為田幾何答曰一畝二百步十一分步之七大廣田淳風等按大廣田知初術直有全步而無餘分次術空有餘分而無全步此術先見全步復有餘分可以廣兼三術故曰大廣術曰分母各乘其全分子從之分母各乘其全分子從子者通全步内分子如此則母子皆為實矣相乘為實分母相乘為法猶乘分也實如法而一今為術廣從俱有分當各自通其分命母入者須還出之故令分母相乘為法而連除之今有圭田廣十二步正從二十一步問為田幾何答曰一百二十六步又有圭田廣五步二分步之一從八步三分步之二問為田幾何答曰二十三步六分步之五術曰半廣以乘正從半廣知以盈補虚為直田也亦可半正從以乘廣按半廣乘從以取中平之數故廣從相乘為積步畝法除之即得也今有斜田一頭廣三十步一頭廣四十二步正從六十四步問為田幾何答曰九畝一百四十四步又有斜田正廣六十五步一畔從一百步一畔從七十步步問為田幾何答曰二十三畝七十步術曰并兩斜而半之以乘正從若廣又可半正從若廣以乘并畝法而一并而半之者以盈補虚也今有箕田舌廣二十步踵濶五步正從三十步問為田幾何答曰一畝一百三十五步又有箕田舌廣一百一十七步踵廣五十步正從一百三十五步問為田幾何答曰四十六畝二百三十二步半術曰并踵舌而半之以乘正從畝法而一中分箕田則為兩斜田故其術相似又可并踵舌半正從以乘之今有圓田周三十步徑十步淳風等按術意以周三徑一為率周三十步合徑十步今依密率合徑九步十一分步之六問為田幾何答曰七十五步此于徽術當為田七十步一百五十七分步之一百三淳風等按依密率為田七十一步二十二分步之一十三今有圎田周一百八十一步徑六十步三分步之一淳風等按周三徑一周一百八十一步徑六十步三分步之一依宻率徑五十七步二十二分步之一十三問為田幾何答曰十一畝九十步十二分步之一此于徽術當為田十畝二百八步三百一十四分步之一百一十三淳風等按依密率當為田十畝二百五步八十八分步之八十七術曰半周半徑相乘得積步}

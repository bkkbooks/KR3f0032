  - {type: variant, offset: 0, length: 0, content: '', WYG: 又術曰徑自相乘三之四而一按圎徑自乘為外方三之四而一者是為圎居外方四分之三也若令六觚之一面乘半徑其幂即外方四分之一也因而三之即亦居外方四分之三也是為圎裏十二觚之幂耳取以為圎失之于㣲少于徽新術當徑自乘又以一百五十七乘之二百而一淳風等按密率令徑自乘以十一乘之十四而一即圎幂也又術曰周自乘十二而一六觚之周其于圎徑三與一也故六觚之周自相乘為幂若圎徑自乘者九方九方凡為十二觚者十有二故曰十二而一即十二觚之幂也今此令周自乘非但為圎徑自乘者九方而已然則十二而一所得又非十二觚之幂也若欲以為圎幂失之于多矣以六觚之周十二而一可也于徽新術直令圎周自乘又以二十五乘之三百一十四而一得圎幂其率三百一十四者周自乘之幂也置周數六尺二寸八分令自乘得幂三十九萬四千三百八十四分又置圎幂三萬一千四百分皆以一千二百五十六約之得此率淳風等按方面自乘即得其積圓周求其幂假率乃通案假原本訛作股今改正但此術所求用三一為率圎田正法半周及半徑以相乘今乃用全周自乘故須以十二為母何者據全周而求半周則須以二為法就全周而求半徑復假六以除之是二六相乘除周自乘之數依密率以七乘之八十八而一今有􅀈田下周三十步徑十六步問為田幾何答曰一百二十步今有􅀈田下周九十九步徑五十一步問為田幾何答曰五畝二十六步四分步之一術曰以徑乘周四而一此術不驗故推方錐以見其形假令方錐下方六尺高四尺四尺為股下方之半三尺為句正面邪為弦弦五尺也令句弦相乘案句弦原本訛作句股今改正四因之得六十尺即方錐四面見者之幂若令其中容圎錐圓錐見幂與方錐見幂其率猶方幂之與圎幂也案圎幂原本訛作圎錐今改正按方錐下六尺則方周二十四尺以五尺乘而半之則亦方錐之見幂故求圎錐之數折徑以乘下周之半即圎錐之幂也今􅀈田上徑圎穹而與圎錐同術則幂失之于少矣然其術難用故畧舉大較施之大廣田也求圎錐之幂猶求圎田之幂也今用兩全相乘故以四為法除之案原本脱四字今補亦如圎田矣開立圎術説圎方諸率甚備可以驗此今有弧田弦三十步矢十五步問為田幾何答曰一畝九十七步半又有弧田弦七十八步二分步之一矢十三步九分步之七問為田幾何答曰二畝一百五十五步八十一分步之五十六術曰以弦乘矢矢又自乘并之二而一方中之圓圓裏十二觚之幂合外方之幂四分之三也方中合外方之半則朱實合外方四分之一也弧田半圎之幂也故依半圎之體而為之術以弦乘矢而半之案弦原本訛作弧今改正則為黄幂矢自乘而半之則為二青幂青黄相連案注文此書舊有圗而缺又上圎田注内亦引弧田圗詳攷其説非圗不顯今補圗于後為弧體法當用規今觚面不至外畔案原本訛作令弧而不至外畔今改正失之于少矣圎舊術以周三徑一為率俱得十二觚之幂案原本訛作十二弧之弧今改正亦失之子少也與此相似指驗半圎之幂耳若不滿半圎者益復疎濶宜句股鋸圎材之術以弧弦為鋸道長以矢為句深而求其徑案此謂弧矢形求圎徑其術以弧弦折半自乘矢除之加矢為圎徑既知圎徑則弧可割分也割之者半弧田之弦以為股其矢為句為之求弦即小弧之弦也以半小弧之弦為句半圎徑為弦為之求股以減半徑其餘即小弦之矢也割之又割使至極細但舉弦矢相乘之數則必近密率矣然于算數差繁必欲有尋究也若但度田取其大舊術為約耳今有環田中周九十二步外周一百二十二步徑五步此欲令與周三徑一之率相應故言徑五步也據中外周以徽術言之當徑四步一百五十七分步之一百二十二也淳風等按依密率合徑四步二十二分步之十七問為田幾何答曰二畝五十五步于徽術當為田二畝三十一步一百五十七分步之二十三淳風等按依密率為田二畝三十步二十二分步之十五術曰并中外周而半之以徑乘之為積步此田截而中之周則為長案此處有脱誤當云截齊中外之周周則為長并而半之知亦以盈補虚也此可令中外周各自為圎田以中圎減外圎餘則環實也又有環田中周六十二步四分步之三外周一百一十三步二分步之一徑十二步三分步之二此田環而不通匝故徑十二步三分步之二若據上周求徑者此徑失之于多過周三徑一之率葢為疎矣于徽術當徑八步六百二十八分步之五十一淳風等按依周三徑一攷之合徑八步二十四分步之一十一依密率合徑八步一百七十六分步之一十三問為田幾何答曰四畝一百五十六畝四分步之一于徽術當為田二畝二百三十二步五千二十四分步之七百八十七也依周三徑一為田三畝二十五步六十四分步之三十五淳風等按宻率為田二畝二百三十一步一千四百八分步之七百一十七也術曰置中外周步數分母子各居其下案原本脱母字今據注補母互乘子通全步内分子案此句上下皆有脱文當云分母相乘通全步内分子并而半之以中周減外周餘半之案此别記術之小異亦有脱文當云又可以中周減外周餘半之以益中周徑亦通分内子以乘周為實分母相乘為法除之為積步餘積步之分案此句下有脱文當云餘積步之分等數約之以畝法除之即畝數也按此術并中外周步數于上以分母子置于下母互乗子者為中外周俱有餘分故以互乗齊其子母相乗同其母子齊母同故通全步内分子半之上二字有脱文當云并而半之知以盈補虚得中平之周周則為從徑則為廣故廣從相乗而得其積既合分母還須分母出之故令周徑分母相乗而連除之即得積步不盡以等數除之而命分以畝法除積步得畝數也}

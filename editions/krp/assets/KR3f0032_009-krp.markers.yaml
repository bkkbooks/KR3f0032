  - {type: variant, offset: 7488, length: 0, content: '', WYG: 并餘為圓徑以句弦差乘股弦差而倍之開方除之亦圓徑也今有邑方二百步各中開門出東門一十五步有木問出南門幾何步而見木答曰六百六十六步太半步術曰出東門步數為法以句率為法也半邑方自乘為實實如法得一案原本此句之下衍步字及後人妄加今刪正此以出門十五步為句率東門南至隅一百步為股率南門東至隅一百步為見句步欲以見句求股以為出南門数正合半邑方自乘者股率當乘見句此二者數同也今有邑東西七里南門九里各中開門出東門一十五里有木問出南門幾何步而見木答曰三百一十五步術曰東門南至隅數步以乘南門東至隅步數為實以木去門步數為法實如法而一此以東門南至隅四里半為句率出東門一十五里為股率南門東至隅三里半為見股所問出南門即見股之句為術之意與上同也今有一方不知大小各中開門出北門三十步有木出西門七百五十步見木問邑方幾何答曰一里術曰令兩出門步數}
  - {type: page-break, offset: 7488, content: '', id: KR3f0032_WYG_009-21a, image: WYG0797/WYG0797-0117a.png}

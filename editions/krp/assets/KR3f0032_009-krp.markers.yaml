  - {type: variant, offset: 7490, length: 0, content: '', WYG: 因而四之為實開方除之即得邑方按半邑方令半方自乘出門除之即步案此注不分曉應有說誤據前出東門術半邑方自乘出東門步數除之即出南門步数似似之以互相證明今之出相乘案今之二字誤當云今兩出門相乘故為半方邑自乘居一隅之積分因而四之即得四隅之積分故為實開方除即邑方也今有邑方不知大小各出開門出北門二十步有木出南門一十四步折而西行一千七百七十五步見木門邑方幾何答曰二百五十步術曰出以北門步数乘西行步數倍之為實此以折而西行為股自木至邑一十四步為句案邑下脱南字當云自木至邑南十四步為句以為北門二十步為率為丈弦字當云為南率北門至西隅為單望半廣数案單望二字誤當云為弦率即半廣數故以出北門乘至南行股以半率乘句之幂案此二句訛舛當云故以出北門句率乘西行股得半廣股率乘句之幂然北門居半以西行故又倍之合東盡之也案此亦訛舛當云然此幂居半以西故又倍之合半以東也并出南門步數為從法開方除之即邑方此術之幂東西南北邑自木盡邑南四十步之幂案此三句訛舛當云東西南北邑南北自木盡邑南十四步各南北步為廣邑方為袤故連兩廣為法從并案此八字訛舛當云故建并兩廣為從法以為隅外之幂也今有邑方一十里各中開門甲乙俱從邑中央而出乙東出甲南出出門不知步數邪向東門磨邑適與乙㑹率甲行五乙行三問甲乙行各幾何答曰甲出南門八百步邪東北行四八八百八十七步半及乙乙東行四千三百一十二步半術曰令五自乘三亦自乘并而}

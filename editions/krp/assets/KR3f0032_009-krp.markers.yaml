  - {type: variant, offset: 7492, length: 1, content: 爲, WYG: 為邪行率邪行率減于五自乘者餘為南行率三三乘五為乙東行率求三率之意與上甲乙同置邑方半之以南行率乘之如東行率而一即得出南門步數今半方南門東隅五里半邑者謂為小股也求以為出南門步數案此注有脱誤當云邑半方自南門至東隅五里以為小股求出南門步數為小股之句以東行為股率南行為句率故置邑方半之以南行句率乘之如股率而一以増邑方半即南行半邑者謂從邑心中停也置南行步求弦者以邪行率乘之求東者以東行率乘之各自為實實如法而率得一案原本訛作實如法南行率得一步據前甲乙術云實如南行率而一各得行數則此文法字步字乃後人妄増今刪正此術與上甲乙同今有木去人不知逺近立四表相去各一丈令左兩表與所望参相直從後右表望之入前右表三寸問木去人㡬何答曰三十三丈三寸三尺少半寸術曰令一丈自乘實如法三寸為法實如法而一此以入前右表三寸為句率右兩表相去一尺為股率左右兩表相去一丈為見句所問木去人者見句之股以右行案此三字乃衍文當刪股率當乘見句此二率俱一丈故曰自乘之以三寸為實實如法得一今有山居木西不知其高山去木五十三里木髙九丈五尺案原本訛作九尺五寸今改正人立木東三里望木末適與山峯斜平人目髙七尺問山髙㡬何答曰一百六十四丈九尺六寸太半寸術曰置木髙減人目髙七尺此以木髙減人目髙七尺餘有八丈八尺為句率去人目三里為股率山去木五十三里為見股以木髙為見股求句加人目之髙案此二句訛舛當云以句率乘見股如股率而一得句加木之髙故為山髙也餘以乘五十三里為實以人去木三里為實法如法而一所得加木髙即山髙此術}

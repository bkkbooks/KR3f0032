  - {type: variant, offset: 2916, length: 2741, content: 不容圓率以今有衰分言之可以見之也今有句八步股十五步問句中容圓徑幾何荅曰六步術曰八步爲句十五步爲股爲之求弦三位并之爲法以句乘股倍之爲實實如法得徑一步句股相乘爲圖之本體朱靑黃幂各二則倍之爲各四可用畫於小𥿄分裁邪正之會令顛倒相補各以類合成脩幂圓徑爲廣并句股弦爲袤故并句股弦以爲法又以圖之大體言之股中靑必令立規於橫廣句股又邪三徑均而復連規從橫量度句股必合而成小方矣又畫中弦以觀其會則句股之中成小句股弦者四句面之小股股面之小句皆小方之面皆圓徑之半其數故可衰以句股弦爲列衰副并爲法以小句乘未并者各自爲實實如法而一得句面之小股可知也以股乘列衰爲實則得股面之小句可知言雖異矣及其所以成法之實則同歸矣則圓徑又可以句乘之差并句弦差減股爲圓徑又弦減句股并餘爲圓徑以句弦差乘股弦差而倍之開方除之亦圓徑也今有邑方二百步各中開門出東門十五步有木問出南門幾何步而見木荅曰六百六十六步太半步術曰出東門步數爲法以句率爲法也半邑方自乘爲實實如法得一步此以出東門十五步爲句率東門南至隅一百步爲股率南門東至隅一百步爲見句步欲以見句求股以爲出南門數正合半邑方自乘者股率當乘見句此二者數同也今有邑東西七里南北九里各中開門出東門十五里有木問出南門幾何步而見木荅曰三百一十五步術曰東門南至隅步數以乘南門東至隅步數爲實以木去門步數爲法實如法而一此以東門南至隅四里半爲句率出東門十五里爲股率南門東至隅三里半爲見股所問出南門卽見股之句爲術之意與上同也今有邑方不知大小各中開門出北門三十步有木出西門七百五十步見木問邑方幾何荅曰一里術曰令兩出門步數相乘因而四之爲實開方除之卽得邑方按前術半邑方自乘出東門步數除之卽出南門步數今兩出門相乘爲半方邑自乘居一隅之積分因而四之卽得四隅之積分故以爲實開方除之卽邑方也今有邑方不知大小各中開門出北門二十步有木出南門十四步折而西行一千七百七十五步見木問邑方幾何荅曰二百五十步術曰以出北門步數乘西行步數倍之爲實此以折而西行爲股自木至邑南十四步爲句以出北門二十步爲句率北門至西隅爲股率卽半廣數故以出北門句率乘西行股得半廣股率乘句之幂然此幂居半以西故又倍之合半以東也并出南門步數爲從法開方除之卽邑方此術之幂東西廣如邑方南北自木盡邑南十四步爲袤合南北步數爲廣袤差故連并兩步數爲從法以爲隅外之幂也今有邑方十里各中開門甲乙俱從邑中央而出乙東出甲南出出門不知步數邪向東門磨邑適與乙會率甲行五乙行三問甲乙行各幾何荅曰甲出南門八百步邪東北行四千八百八十七步半及乙乙東行四千三百一十二步半術曰令五自乘三亦自乘并而半之爲邪行率邪行率減於五自乘者餘爲南行率以三乘五爲乙東行率求三率之意與上甲乙同置邑方半之以南行率乘之如東行率而一卽得出南門步數邑半方自南門至東隅五里以爲小股求出南門步數爲小股之句以東行爲股率南行爲句率故置邑方半之以南行句率乘之如股率而一以增邑方半卽南行半邑者謂從邑心中停也置南行步求弦者以邪行率乘之求東者以東行率乘之各自爲實實如南行率得一步此術與上甲乙同有木去人不知遠近立四表相去各一丈令左兩表與所望參相直從後右表望之入前右表三寸問木去人幾何荅曰三十三丈三尺三寸少半寸術曰令一丈自乘爲實以三寸爲法實如法而一此以入前右表三寸爲句率右兩表相去一丈爲股率左右兩表相去一丈爲見句所問木去人者見句之股股率當乘見句此二率俱一丈故曰自乘以三寸爲法實如法得一寸有山居木西不知其高山去木五十三里木高九丈五尺人立木東三里望木末適與山峯斜平人目高七尺問山高幾何荅曰一百六十四丈九尺六寸太半寸術曰置木高減人目高七尺餘以乘五十三里爲實以人去木三里爲法實如法而一所得加木高卽山高此術句股之義以木高減人目高七尺餘有八丈八尺爲句率去人目三里爲股率山去木五十三里爲見股以句率乘見股如股率而一得句加木之高故爲山高也今有井徑五尺不知其深立五尺木於井上從木末望水岸入徑四寸問井深幾何荅曰五丈七尺五寸術曰置井徑五尺以入徑四寸減之餘以乘立木五尺爲實以入徑四寸爲法實如法得一寸此以入徑四寸爲句率立木五尺爲股率井徑四尺六寸爲見句問井深者見句之股也九章算術卷之九終錢唐莫濰校字大淸乾隆三十八年癸巳秋闕里孔氏依汲古閣影宋刻本重雕秘書省九章算術一部共九冊元豐七年九月日校定降授宣德郎秘書省校書郞臣葉祖洽上進校定承議郎行秘書省校書郎臣王仲脩校定朝奉郎行秘書省校書郎臣錢長卿奉議郎守秘書郞丞臣韓宗古朝請郎試秘書少監臣趙彦若元豐七年九月二十八日進呈奉御寶批宐依已校定鏤板朝奉郎祕書丞上騎都尉賜緋魚袋臣韓治朝散郎試祕書少監上騎都尉賜緋魚袋臣顧臨朝議大夫守祕書少監上䕶軍賜紫金魚袋臣劉攽中大夫守尙書右丞䕶軍東平郡開國侯食邑貳千叁百戸賜紫金魚袋臣呂大防通議大夫守尙書左丞上柱國平原郡開國公食邑貳千捌百戸食實封伍伯戸臣李淸臣正議大夫守中書侍郞上柱國馮翊郡開國公食邑貳千叁百戸食實封伍伯戸臣張璪正議大夫守門下侍郎上柱國南陽郡開國公食邑貳千壹百戸食實封壹阡戸臣韓維金紫光祿大夫守尙書右僕射兼中書侍郎上柱國東平郡開國公食邑六千二百戸食實封壹阡玖伯戸臣呂公著正議大夫守尙書左僕射兼門下侍郎上柱國河内郡開國公食邑四千一百戸食實封壹阡伍伯戸臣司馬光九章算術卷九訂訛補圖算經十書之二休寧戴震東原句股弦互求圖注云句自乘爲朱方股自乘爲靑方令出入相補合成弦方之幂又李淳風等釋云句方於内則句短於股據此則劉徽注此章舊有圖而缺今並按注補圖據圍廣木長求葛之長其形葛卷裏袤以筆管靑線宛轉有似葛之纏木解而觀之則每周之閒自有相閒成句股弦則其閒木長爲股圍之爲句葛長爲弦弦七周乘三圍是并合衆句以爲一句則句長而股短故術以木長謂之句圍之謂之股言之倒互句與股求弦亦如前圖句三自乘爲朱幂股四自乘爲靑幂合朱靑二十五爲弦五自乘幂出上第一圖句股幂合爲弦幂明矣然二幂之數謂倒在於弦幂之中而已可更相裏者則成方幂其居表者則成矩幂二表裏形訛而數均又按此圖句幂之矩靑卷白表是其幂以句股弦差爲廣股弦并爲袤而股幂方其裏股幂之矩靑卷白表是其幂以句弦差爲廣句弦并爲袤而句幂方其裏是故差之與并用除之短長互相乘也據趙君卿注周髀算經云凡并句股之實卽成弦實或矩於外或方於内形詭而量均體殊而數齊句實之矩以股弦差爲廣股弦并爲袤而股實方其裏股實之矩以句弦差爲廣句弦并爲袤而句實方其裏君卿漢人此注葢用其說而傳寫失真加以後人竄改遂不可通句股差句股并與弦互求之圖據注意滿大方卽句股并自乘之幂有朱幂八黃幂一内小方卽弦實有朱幂四黃幂一倍弦實滿外大方而多一黃幂於弦實内減黃幂四分之二半其餘適得外大方四分之一朱幂者句股積也黃幂之面卽句股差股實之矩圖趙君卿云股實之矩以句弦差爲廣句弦并爲袤而句實方其裏劉注用句弦差句弦并與句股弦互求本此句實之矩圖趙君卿云句實之矩以股弦差爲廣股弦并爲袤而股實方其裏劉注用股弦差股弦并與句股弦互求本此臣淳風等謹按下鐻深得一寸爲半股弦差注云爲股弦差者鐻道也, WYG: ''}

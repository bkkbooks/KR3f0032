  - {type: variant, offset: 5205, length: 1, content: 終, WYG: 九章算術後序九章算經九卷周公之遺書而漢丞相張蒼之所刪補也算數之書凡數十家獨以九章為經之首以其九數之法無所不備諸家立術雖有變通推其本意皆自此出而且知後人無以易周漢之舊也自唐有國用之以取士本朝崇寧亦立于學官故前世算數之學相望有人自衣冠南渡以來此學既廢非獨好之者寡而九章正經亦幾泯没無傳矣近世民間之本題之曰黄帝九章豈以為為隸首之所作歟名以不當雖有細草類皆簡捷殘闕懵于本原無有劉徽李淳風之舊注者古人之意不復可見每為慨嘆慶元庚申之夏余在都城與太史局同知算造楊忠輔徳之論厯因從其家得古本九章乃汴都之故書今秘館所定著亦從此本寫以送官者也謹按晉志劉徽所注九章實魏之景元四年觀其序文以謂折理以辭解體用圖又造重差于勾股之下辭乃令之注文其圖至唐猶在今則亡矣重差之法今之海島算經是也又李淳風之注見于唐志凡九卷而今之盈不足方程之篇咸闕淳風注文意者此書嵗久傳録不無錯漏猶幸有此存者今此乃是合劉李二注而為一書云其年六月一日乙酉迪功郎新隆興府靖安縣主簿括蒼鮑澣之仲祺謹書}

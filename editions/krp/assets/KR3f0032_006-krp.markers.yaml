  - {type: variant, offset: 9697, length: 487, content: 之二休寧戴震東原臣淳風等謹按爲衰於今有術副并爲所有率未并者各爲所求率以賦卒人數爲所有數此術以别考則意同以廣異聞故存之也爲衰二字上有脫文當云各令居所及行道曰數約縣卒爲衰計經賦之率旣有戸算之率亦有遠近貴賤之率此二率者各自相與通通則甲二十乙十二丙七丁十三戊五一斛之費謂之錢率錢率約戸率者則錢爲母戸爲子子不齊令母互乘爲齊卽衰也若其不然以一斛之費約戸數取衰並有分當通分内子約之於算甚繁此一章皆相與通功共率畧相依似以上二率下一率亦可放此從其簡易而巳又以分言之使甲一戸出二十分斛之一乙一戸出十八分斛之一各以戸數乘之亦可得一縣凡所當輸俱未衰也乘之者乘其子母報除之以此觀之則以一斛之費約戸數者其意不異矣然則可置一斛之費而反衰之約戸以乘戸數爲衰也合分注曰母除爲率率乘子爲齊反衰法曰先同其母各以分母約其子爲反衰施其率爲算旣約且不妨處下也計經賦之率至此多舛誤不可通術曰以下三節分四升爲下率以上四節分三升爲上率謂之率者以四節三節爲分母三升四升爲分子母互乘子得上率九下率十六母相乘得十二上下率以少減多餘爲實十六減九餘七置四節三節各半之以減九節餘爲法實如法得一升卽衰相去也以十二通五節半得六十六爲一升之率, WYG: ''}

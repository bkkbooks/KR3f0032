  - {type: variant, offset: 6986, length: 0, content: '', WYG: 分母得四十二分子乘分子得二十一是為丸居立方四十二分之二十二即二十二分之十一也祖氏求圓囷立圓平圖三法本係貫為一等数既宻心亦昭晰張衡倣舊貽哂于後劉徽循故未暇校新夫豈難哉栁未之思也依率立此圓積本以圓徑冄自乘十一乘之二十一而一約此積今欲求其本積故二十一乘之十一而一凡物冄自乘開立方除之復其本数故立方除之即丸徑也九章算術卷四}

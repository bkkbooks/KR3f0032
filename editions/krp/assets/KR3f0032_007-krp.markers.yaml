  - {type: variant, offset: 474, length: 0, content: '', WYG: 也其第一問所出率相減餘一則法實無庸約故維乗并之徑得物價并盈不足徑得人數偶省一算耳第三問人出半盈四人出少半不足三半即二分之一少半即三分之一也又即為二人共出一盈四三人共出一不足三以二分通三之一得二以三分通二之一得三是齊其子也二分三分相乗得六是同其母也以盈四互乗二得八以不足三互乗三得九并之十七為實是盈不足維乗所出率并以為實也盈四及不足三并而為七以分母相乗所得六通而齊之得四十二為法是并盈不足為法也二三相減餘一以約法實亦無庸約故徑得物價人數第四問七家共出一百九十不足三百三十九家共出二百七十盈三十以九家互乗一百九十得一千七百一十以七家互乗二百七十得一千八百九十猶之齊其子也七家九家相乗得六十三猶之同其母也以盈三十互乗一千七百一十得五萬一千三百以不足三百三十互乗一千八百九十得六十二萬三千七百并之六十七萬五千為實是盈不足維乗所出率并以為實也盈三十及不足三百三十并而為三百六十以六十三通而齊之得二萬二千六百八十為法是并盈不足為法也于一千八百九十減一千七百一十餘一百八十以一百八十約實六十七萬五千得價三千七百五十以一百八十約法二萬二千六百八十得一百二十六家是副置所出率以少減多餘以約法實也三四兩問皆所謂有分者通之也由此觀之後人改竄之謬顯然後兩盈兩不足相與同共買物者後人亦改竄其文謬戻倣此}

  - {type: punctuation, offset: 452, content: ), id: KR3f0032_krp_007-bkkpn37}
  - {type: variant, offset: 452, length: 0, content: '', WYG: 案此條首句之上原本有注云二字接上條故并三四為法之下係後人連合注文田其更端不相通貫竄入注云二字以别之今刪正副置所出率案原本脱副字今補以少減多餘以約法實實為物價法為人數案此術前列四問本會通為一徽注辭不逹意後人失其解遂妄加改竄據第二問人出九盈十一人出六不足十六以十六互乗九得一百四十四以十一互乗六得六十六并之二百一十為實所謂相與同共買物者置所出率盈不足各俱其丅令維乗所出率并以為實也盈十一及不足十六并之二十七為法所謂并盈不足為法也于出九減出六餘三以三約實二百一十得價七十以三約法二十七得九人所謂}

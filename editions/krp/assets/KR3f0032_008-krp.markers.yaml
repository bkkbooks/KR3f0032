  - {type: variant, offset: 3138, length: 0, content: '', WYG: 案此問不言丈尺無由知井深綆長于丈尺㡬何使井深半之為三丈六尺有半寸則甲綆一丈三尺二寸半乙綆九尺五寸半丙綆七尺四寸丅綆六尺四寸半戊綆三尺八寸使井深倍之為十四丈四尺二寸則甲綆五丈三尺乙綆三丈八尺二寸丙綆二丈九尺六寸丅綆二丈五尺八寸戊綆一丈五尺二十皆合所問由是言之問既不定以丈尺依術推求先得七百二十一無以定百為丈十為尺也問井深綆長之率各㡬何答以井深之率七百二十一甲綆長率二百六十五乙綆長率一百九十一丙綆長車一百四十八丅綆長率一百二十九戊綆長率七十六于義乃通}

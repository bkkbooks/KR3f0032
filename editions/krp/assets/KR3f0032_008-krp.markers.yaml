  - {type: variant, offset: 8818, length: 0, content: '', WYG: 據麻四當麥七即麻價率案此四字有脫誤當云即為麻價率七而麥價率四又麥三當菽四即為麥價率四而菽價率三案此下原本有而荅價率五凡五字今刪正又荅六當黍五即為荅價率五而黍價率六案此下原本有荅價率五又荅六當黍五即荅價率五也凡十六字乃重出衍文今刪正而率通矣更置第三行以第四行減之餘有麻一斗菽四斗荅三斗負黍四斗正案第三行黍四以第四行黍四減之適盡惟下實一百一十六以第四行一百一十二減之餘四當云下實四正此作黍四斗正乃後人所妄改求其同為麻之數以菽率四黍率四案黍率四三字亦後人所妄改又有脱文當云以菽率三荅率五各乘菽荅斗數如麻率七而一得一斗七分斗之一負案此句亦脱誤當云菽得一斗七分斗之五正荅得二斗七分斗之一負則菽荅化為麻以并之令同名相從異名相消餘得定麻七分斗之四以為法置四為實案此句有脱文當云置下實四為實以分母乘之案以原本訛作而今改正實得二十八而分子化為法矣案實字法字之上原本竝衍荅字今刪正以法除得七即麻一斗之價案麻字原本訛作麥今改正置麥率四菽率三荅率五黍率六皆以麻乘之案此句誤當云皆以其斗數乗之各自為實以麻率七為法案麻字原本訛作實今改正所得即各為實案此句誤當云所得即同為麻之數亦可使置本行實與物同通之各以本率今有之求其本率所得并以為法如此即無正負之異矣擇異同而已又可以一術為之置五行通率為麻七麥四菽三荅五黍六以為列衰減行麻一斗菽四斗正荅三斗負各以其率乗之訖令同名相從異名相消餘為法案法原本訛作減今改正或置餘乗列衰為實所得各為實案此二句舛誤當云又置下實乘列衰所得各為實此可以實約法案實字原本訛作置今改正此所謂法乃各物之率總數實乃各物之價總數價于率或適相等或幾倍也則不復乘列衰各以列衰為實以此句亦脱誤當云各列衰如所約知其價如此則凡用一百二十四算也}

  - {type: variant, offset: 4547, length: 3270, content: 以新術爲此先以第四行減第三行次以第三行去右行及第二行第四行下位又以減右行下位不足減乃止次以左行減第三行下位次以第三行去左行下位訖廢去第三行次以第四行去左行下位右行當左行下位次以右行去第二行及第四行下位次以第二行減第四行及左行願位次以第四行減右行菽位不足減乃止次以左行減第二行頭位餘可再半次以第四行去右行及第二行頭位次以第二行去右行頭位餘約之上得五下得三是菽五當荅三次以左行去第三行菽位又以減第四行及右行菽位不足減乃止次以右行減第二行頭位不足減乃止次以第三行去左行頭位次以左行去右行頭位餘上得六下得五是爲荅六當黍五次以右行去左行荅位餘約之上爲二下爲三次以左行去第二行下位以第二行去第四行下位又以減左行下位次右行去第二行下位餘上得三下得四是爲麥三當菽四次以第二行減第四行下位次以第四行去第二行下位餘上得四下得七是爲麻四當麥七是爲相當之率舉矣據麻四當麥七卽爲麻價率七而麥價率四又麥三當菽四卽爲麥價率四而菽價率三又荅六當黍五卽爲荅價率五而黍價率六而率通矣更置第三行以第四行減之餘有麻一斗菽四斗荅三斗負下實四正求其同爲麻之數以菽率三荅率五各乘菽荅斗數如麻率七而一菽得一斗七分斗之五正荅得二斗七分斗之一負則菽荅化爲麻以并之令同名相從異名相消餘爲定麻七分斗之四以爲法置下實四爲實以分母乘之實得二十八而分子化爲法矣以法除得七卽麻一斗之價置麥率四菽率三荅率五黍率六皆以其斗數乘之各自爲實以麻率七爲法所得卽同爲麻之數亦可使置本行實與物同通之各以本率今有之求其本率所得并以爲法如此則無正負之異矣擇異同而已又可以一術爲之置五行通率爲麻七麥四菽三荅五黍六以爲列衰減行麻一斗菽四斗正荅三斗負各以其率乘之訖令同名相從異名相消餘爲法又置下實乘列衰所得各爲實此可以實約法則不復乘列衰各以列衰如九章算術卷八訂訛休寧載震東原術曰置上禾三秉中禾二秉下禾一秉實三十九斗於右方中左禾列如右方以右行上禾徧乘中行而以直除古字直値通用直除猶言對減也以右行上禾徧乘中行復以中行上禾徧乘右行然後可相對減古人文省故但舉一以該之又乘其次亦以直除此謂右行上禾徧乘左行復以左行上禾徧乘右行亦相對減古人文多省畧然以中行中禾不盡者古人單用然字不曰然後者然猶乃也徧乘左行此以中行左行所減之餘如前徧乘文亦從省用算繁而不省所以别爲法約也然猶不如自用其舊廣異法也用法繁而不省以下訛舛衍文益行減行當各以其類矣其異名者非其類也非其類者猶無對也非所得減也故赤用黑對則除黑無對則除赤赤黑并於本數此爲相益之皆所以爲消奪消奪之與減益成一實也此注多訛舛據方程術無論物有幾品遞減至一物乃止又以赤黑别正負首位赤減赤黑減黑者同名伯除也次位以下遇赤用黑對則相益此條是也首位赤減黑黑減赤者異名相除也次位以下遇皆赤皆黑則相益後條是也由此言之注之謬顯然葢傳寫失真後人復妄加改竄遂不可通正無入負之入字原本訛作人下文及注並同據注云無入爲無對也無對之說亦未分曉釋方程者專爲遇空位起例而左右兩行相對減或正宜變爲負或負宜變爲正往往不得其義例今考同名相除異名相益者如下實左右俱正所減之餘屬左行則去右行屬右行則去左行其物品以正減正餘在所去之行爲正無入以負減負餘在所去之行爲負無入以正從負爲正無入以負從正爲負無入負對空位而負數在所去之行與以負減負同例正對空位而正數在所去之行與以正從負同例此皆所謂正無入負之負無入正之也異名相除同名相益者如下實左右俱正并爲一數則無分於左右其物品以負減正餘或左或右爲正無入以正減負餘或左或右爲負無入以正從正爲正無入以負從負爲負無入正對空位與以負減正同例負對空位與以負從負同例此皆所謂正無入正之負無入負之也由是言之在所去之行則其數無入而或左或右以與無分於左右合爲一行因亦謂之無入人字乃傳寫之誤明矣今悉改正無入爲無對也無所得減則使消奪者居位也其當以列實或減下實此句訛舛據後注内方程新術以列衰乘下實又以列衰乘羣物之數并爲法其當相并而行中正負雜者同名相從異名相消似卽此所舉此條異名相除爲例故亦與上條互取凡正負所以記其同異使二品互相取而已矣言負者未必負於少言正者未必正於多故每一行之中雖復赤黑異算無傷然則可得使頭位常相與異名此條之實兼通矣遂以二條反覆一率觀其每與上下互相取位則隨算而言耳猶一術也又本設諸行欲因減數以相去耳故其多少無限令上下相命而已若以正負相減如數有舊增法者每行可均之不但數物左右之也此注皆不分曉當由傳寫失真後人又妄加改竄遂不可通此中行買賣相折錢適足但互買賣算而已故下無錢直也設欲以此行如方程法先令牛二徧乘左行而以右行直除之是終於下實虚缺矣故注曰正無實負負無實正方爲類也方將以别實加不足之數與實物作實此注訛脫不分曉據術意應列三行先令右行牛二徧乘中行復令中行牛三徧乘右行而以直除得羊三十三正豕四十五負餘錢三千正此同名相除異名相益正無入負之負無入正之也次令右行牛二徧乘左行復令左行牛五徧乘右行而以直除得羊三十七正豕四十九負餘錢三千八百正此異名相除同名相益正無入正之負無入負之也重列爲左右兩行先令右行羊三十三徧乘左行復令左行羊三十七徧乘右行而以直除得豕四十八正以爲法錢一萬四千四百正爲實實如法而一得豕價三百轉減而上得羊價五百牛價一千二百此亦同名相除異名相益正無入負之負無入正之也中行下實虛缺本無庸論葢注文傳寫失眞後人又妄加改竄遂不可通此四雀一燕與一雀五燕衡適平并重一斤故各八兩列兩行程數左行頭位其數是一可省乘令右行徧乘左行而取其法實於左左行數多以右行取其數左頭位減盡中法下實卽每枚當重宜可知也按此四雀一燕與一雀五燕其重等是三雀四燕重相當雀率重四燕率重三也諸再程之率皆可異術求之卽其數也此卽末條所言新術以下實俱重八兩徧乘上雀燕以左雀八減右雀三十二餘二十四以右燕八減左燕四十餘三十二是爲二物正負相借因而約之雀得三燕得四乃三雀當四燕也對易其數卽雀率重四而燕率重三注於此突入異術幾不解其所謂今有五家共井甲二綆不足如乙一綆乙三綆不足如丙一綆丙四綆不足如丁一綆丁五綆不足如戊一綆戊六綆不足如甲一綆各得所不足一綆皆逮問井深綆長各幾何荅曰井深七丈二尺一寸甲綆長二丈六尺五寸乙綆長一丈九尺一寸丙綆長一丈四尺八寸丁綆長一丈二尺九寸戊綆長七尺六寸此問不言丈尺無由知井深綆長於丈尺幾何使井深半之爲三丈六尺有半寸則甲綆一丈三尺二寸半乙綆九尺五寸半丙綆七尺四寸丁綆六尺四寸半戊綆三尺八寸使井深倍之爲十四丈四尺二寸則甲綆五丈三尺乙綆三丈八尺二寸丙綆二丈九尺六寸丁綆二丈五尺八寸戊綆一丈五尺二寸皆合所問由是言之問旣不定以丈尺依術推求先得七百二十一無以定百爲丈十爲尺也問井深綆長之率各幾何荅以井深之率七百二十一甲綆長率二百六十五乙綆長率一百九十一丙綆長率一百四十八丁綆長率一百二十九戊綆長率七十六於義乃通此率初如方程爲之名各一逮井其後法得七百二十一實七十六此上訛舛不可通據術先得七百二十一爲所列五行之通率卽井深率也以此率列各行下爲各行之下實重求之法得七百二十一實得五萬四千七百九十六以法除實得用逮之數七十六此麻麥與均輸少廣章之重衰積分皆爲大事其拙於精理徒按本術者或用算而布氊方好煩而喜誤曾不知其非反欲以多爲貴故其算也莫不闇於設通而專於一端至於此類苟務其成然或失之不可謂要約更有異術者庖丁解牛游刃理閒故能歷久其刃如新夫數猶刃也易簡用之則動中庖丁之理故能和神愛刃速而寡尤凡九章爲大事按法皆不盡一百算也雖布算不多然足以算多世人多以方程爲難或盡布算之象在綴正負而已未暇以論其設動無方斯膠柱調瑟之類聊復恢演爲作新術著之於此將亦啓導疑意網羅道精豈傳之空言記其施用之例著䇿之數每舉一隅焉以上字句多誤又皆屬虛辭非有實義可考無從訂正姑仍之其一術曰置羣物通率爲列衰更置減行羣物之數各以其率乘之并以爲法其當相并而行中正負雜者同名相從異名相消餘爲法以減行下實乘列衰各自爲實實如法而一卽得以舊術爲之凡應置五行今欲要約先置第三行以減第四行及減第三行次置第二行以第二行減第三行去其頭位次置右行去其頭位次以第四行減左行頭位次以左行去第四行及第二行頭位次以第五行減第二行頭位餘可半次以第二行去第四行頭位餘約之爲法實如法而一得空卽有黍價以法減第二行得荅價左行得麥價第三行麻價右行得菽價如此凡用七十七算, WYG: 案}

  - {type: variant, offset: 522, length: 0, content: '', WYG: 所以别為法約也然猶不如自用其舊廣異法也案用算繁而不省以下亦訛舛衍文求中禾以法乗中行下實而除下禾之實此謂中下兩禾實案原本脫下字今補下禾一秉實數先見將中秉求中禾其列實以減下實而左方下禾雖去一秉以法為母于率不通案此三句有脫誤當云而左方下禾不惟一秉下禾實既以法為母則中行下實不以法為母于率不通故先以法乘其實而同之案實原本訛作通今改正俱令法為母而除下禾實以下禾先見之實令乘下禾秉數即得下禾一位之列實減于下實案原本脱減字今補則其數是中禾之實也餘如中禾秉數而一即中禾之實餘中禾一位之實也故以一位秉數約之乃得一秉之實也求上禾亦以法乘右行下實而除下禾中禾之實此右行三禾共實合三位之實案合原本訛作令今改正故以二位秉數約之案二原本訛作一今改正乃得上禾一秉之實案原本脫上禾二字今補此右行三禾共}

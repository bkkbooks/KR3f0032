  - {type: variant, offset: 0, length: 153, content: 劉徽九章算術注原序昔在包犧氏始畫八卦以通神明之德以類萬物之情作九九之術以合六爻之變曁於黃帝神而化之引而伸之於是建歷紀協律呂用稽道原然後兩儀四象精微之氣可得而效焉記稱隸首作數其詳未之聞也按周公制禮而有九數九數之流則九章是矣往者暴秦焚書經術散壞自時厥後漢北平侯張蒼大司農中丞耿壽昌皆以善算命世蒼等因舊文之遺殘各, WYG: ''}

body:
  text: 九章算術卷九晋劉徽注唐李淳風注釋句股以御髙深廣逺今有句三尺股四尺問為弦㡬何答曰五尺今有弦五尺句三尺問為股㡬何答曰四尺今有股四尺弦五尺問為句㡬何答曰三尺句股短面曰句長面曰股相與結角曰弦句其股短股短其弦將以施于諸率故先具此術以見其源也術曰句股各自乘并而開方除之即得句自乘為朱方股自乘為青方令出入相補各從其類因就其餘不移動也合成弦方之幂案注内以朱青分句股之方幂則知舊有圖而缺今補圖于後開方除之即弦也又股自乘以減弦自乘其餘開方除之即句淳風等按此術以句股幂合成弦幂句方于内則句短于股今股自乘以減弦自乘餘者即句幂也故開方除之即句也又句自乘以減弦自乘其餘開除之即股句股幂合以成弦幂令去其一則餘在者皆可得而知之今有圓材徑二尺五寸欲為方版今厚七寸問廣幾何答曰二尺四寸術曰令徑二尺五寸自乘以七寸自乘減之其餘開方除之即廣此以圓徑二尺五寸為弦版厚七寸為句所求廣為股也今有木長二丈圍之三尺葛生其下纏木七周上與木齊問各長幾何答曰二丈九尺術曰以七周乘三圍為股木長為句為之求弦弦者葛之長㩀圍廣求從為木長者案此句有舛誤當云㩀圍廣木長求葛之長其形萬卷裏袤以筆官青線宛轉有似葛之纏木解而觀之則每周之間自有相間成句股弦則其間葛青七弦周乘三圍并合衆句以為一句木長而股短術云木長謂之股言之倒案此數句訛舛不可通當云則其間木長股圍為之為句葛長為弦弦七周乘三圍是并合衆句以為一句則句長而股短故術以木長謂之句圍之謂之股言之倒互句互與股求弦亦無圍二十五青弦之自乘幂出上第一圍案此亦訛舛當云句與股求弦亦如前圖句三自乘為味幂股四自乘為青幂合朱青得二十五為弦五自乘幂出上第一圍句股幂合為弦幂明矣然二幂之數謂倒在于弦幂之中而已可更相裏者則成方幂其居表者老成矩幂二表裏形訛而數均又按此圖句幂之矩青卷白表是其幂以股弦差為廣股弦并為袤而股幂方其裏股幂之矩青卷白表是其幂以句弦差為廣句弦并為袤而句幂方其裏是其幂之與并用除之短長互相乘也案此上亦多訛舛又非本術所該特因論句幂股幂合為弦幂旁推交相言之據君卿注周趙髀算經云凡并句股之實即成弦實或矩于外或方于内形詭而量均體殊而數齊句實之矩以股弦差為廣股弦并為袤而股實方其裏股實之矩以句弦差為廣句弦并為袤而句實方其裏君卿漢人此注葢用其説而傳冩失真加以後人竄改遂不可通其圖已見上今有池方一丈葭生其中央出水一尺引葭赴岸適與岸齊問水深葭長各幾何答曰水深一丈二尺葭長一丈三尺術曰半池方自乘此以池方半之得五尺為句水深為股葭長為弦以句弦見股故令自乘先矩見幂也案此注有脱誤當云以句及股弦差求弦股故令句自乘先見矩幂也以出水一尺自乘減之出水者股胘差減此差幂于矩幂則除之案此三字舛誤當云餘為倍股弦差乘股為之矩幂餘倍出水除之即得水深差為矩廣之幂案此句有脱誤當云倍差為矩幂之廣水深是股令此幂得出水一尺為長故為矩而得葭長也案此二字有脱誤當云欲先見葭長者出水一尺自乘以加于半池方自乘尺数倍出水除之即得令此幂得出水一尺為袤故為矩而得葭長也加出水數得葭長淳風等按此葭本出水一尺既見水深故加出水尺數而得葭長也今有立木繫索其末委地三尺引索卻行本去八尺而索盡問索長幾何答曰一丈二尺六分尺之一術曰以去本自乘此以去本八尺為句所求索者弦也引而索盡開門去閫者句及股弦差同一術案此句有脫誤當云與閫者去閫者句及股弦差求股弦同一術去本自乘者先張矩幂今如委數而一委地者股弦差也以除矩幂即是股胘并也所得加委地數而半之即索長子不可半者倍其母加差者并而成長故又半之其減差者并而半之也案此注脫誤不可通據句自乘之矩幂如股弦差而一得股弦并加差為兩弦減差為兩股當云加差于并則成兩索長故又半之其減差于并而半之得木長也今有垣髙一丈倚木于垣上與垣齊引木卻行一尺其木至地問木長幾何答曰五丈五寸術曰以垣髙一十尺自乘如卻行尺數而一所得以加郤行尺數而半之即木長數此以垣髙一丈為句所求倚木者為弦引卻行一尺為股弦差為術之意與繫索問同也今有圓材埋在壁中不知大小以鐻鐻之深一寸鐻道長一尺問徑幾何答曰材徑二尺六寸術曰半鐻道自乘此術以鐻道一尺為句材徑為弦鐻深一寸為股弦差之一半鐻長是半也案此五字舛誤當云故鐻長亦半之也淳風等按下鐻深得一寸為半股弦差注云為股弦差者鐻道也案此言下鐻道得一寸為半股弦差即注所謂鐻深一寸為股弦差之一半也更綴注云為股弦差者鐻道五寸字舛誤不可通據割圓術鐻深寸即一可為股弦差半鐻道五寸為句材半徑為弦若以此言之尤合術意如深寸而一以深寸増之即材徑亦以半増之如上術去本當半之今此皆同半差不復半也今有開門去閫一尺不合二寸開門廣幾何答曰一尺一寸術曰以去閫一尺自乘所得以不合二寸半之而一所得増不合之半即得門廣此去閫一尺為句門廣為股不合二寸以半之得一寸為股弦差求弦故當半之今次以兩弦為廣数案次字誤當云今即以兩弦為廣数故不復半之也今有户髙多于廣六尺八寸兩隅相去適一丈問户髙廣各幾何答曰廣二尺八寸髙九尺六寸術曰令一丈自乘為實半相多令自乘倍之減實半其餘以開方除之所得減相多之半即户廣加相多之半即户髙今户廣為句髙為股兩隅相去一丈為弦髙多于廣六尺八寸為句股差按圖為位弦幂適滿萬守倍之減句股差幂開方除之其所得即高廣并數以差減并而求之即廣户加相多之數即户髙也今此術先求其半一丈自乘為朱幂四黄幂一半差自乘又倍之為朱幂案此處脱誤當云為黄幂四分之二減實半其餘有朱幂二黄幂四半一丈案此亦訛當云黄幂四分之一其于大方棄四分之二故開方除之即户廣并數半并数案此亦訛當云棄四分之三適得四分之一故開方除之得髙廣并数之半減差半得廣加得户髙又按此圓幂案圓字誤當作圖據注文知舊有圖而缺今補圖于後句股相并而加其差幂亦減弦幂為積葢先見其弦然後知其句與股案此亦訛舛據句股并自乘加差幂為兩弦幂半之開方得弦今倍弦幂減差幂求句葢并葢先見其弦然後知其句股也今適自等乘亦各為方先見其弦然而後知其句與股適等者今自乘亦今為弦幂案此亦訛舛據句股適等者并而自乘即為兩弦幂皆各為方先見其弦然後知其句與股者倍弦幂即為句股適等者并兩自乘之幂令半相多而自乘倍之亦為弦幂而差数復先此各自乘之而與相乘数各為門實案此亦訛舛不可通據半相多自乘倍之又半句股并自乘亦倍之合為弦幂其無差数者句股各自乘并之為實與句股相乘倍之為實皆開方得弦弦幂半之為實開方即得句幂及股長句股同源而分流焉假令句股各五弦幂五十開方除之得七尺有餘一不盡假令弦十其幂有百半之為句股弦三幂各得五十案此句舛誤當云為句股二幂各得五十當亦不可開故曰圓三徑一方五斜七雖不正得盡理亦可言相近耳其句股合而自相之乘幂者令自乘為四幂以減之開方除之其餘為句股差加于合而半為股減差于合而半之為句案此亦訛舛當云其句股合而自乘之幂令弦自乘而之為兩弦幂以減之其餘開方除之為句弦差于合而合而半之為股減差于合而半之為句股弦即髙廣袤其出此圖也其倍弦為廣袤今矩句即為幂得廣即句股差廣此亦訛舛據趙君卿注周髀算經云其倍弦為袤合而令句股見者自乘為其實四實以減之開其餘所得為差以差減合半其餘為廣減廣于弦即所求也此注似用其説而傳寫舛誤後人又妄加改竄遂不可通就君卿説攷之倍弦自乘得弦實四内有句實股實各四減四句實餘即四股實開之得倍股減四股實餘即四句實開之淂倍句所謂開其餘所得為差也減即四于倍弦半其餘為股弦差減倍句于倍弦半其餘為句弦差所謂以差減合半其餘為廣也減股弦差于弦即股減句弦差于弦即句所謂減廣于弦即所求也凡股弦差為廣股弦并為袤其幂即向幂句弦差為廣句弦并為袤其幂即股幂合廣袤皆成倍弦故曰倍弦為廣袤合而倍句倍股即廣袤差此云廣即句股差其謬甚矣其倍句之幂倍為從法開之亦句股差其餘以句股幂減半其餘差為從法開法除之即句也案此亦訛舛據趙君卿云減矩句之實于弦實開其餘即股倍股在兩邉為從法開矩句之角即股弦差減矩股之實于弦實開其餘即句倍句在兩邉為從法開矩服之角即句弦差此注亦用其説而殘缺失次遂不可通今有竹髙一尺末折抵地去本三尺問折者髙幾何答曰尺四二十分尺之一十一術曰以去本自乘以去三尺為句折之餘髙為股以先令自乘之幂案此句有脱誤當云末折折地為弦以句及股弦并求朕故先令句自乘見矩幂令如髙而一凡為髙一丈為股弦并之案此句有舛誤當云竹髙一丈為股弦并以除此幂得差所得以減竹髙而半餘即折者之髙也此術與繫索之類更相反覆也亦可如上術令自乘為朕弦并幂案此句脱一髙字當云令髙自乘為股弦并幂去本自乘為矩幂減之餘為實倍髙為法則得折之髙数也今有二人同所立甲行率七乙行率三乙東行甲南行十步而斜東北與乙㑹問甲乙行各㡬何答曰乙東行一十步半甲斜行一十四步半及之術曰令七自乘三亦自乘并而半之以為甲斜行率斜行率減于七自乘餘為南行率以三乘七為乙東乙率案此問甲行率七者設句弦并七也乙南率者三設股三也術令七自乘三亦自乘并而半之以為甲斜行率者句股并自乘加股自乘半之即弦乘句弦并所得数以為弦率斜行率減于七自乘餘為南行率者句弦并自乘減弦乘句弦并餘即句乘句弦并所得數以為句率弦率句率皆句弦并乘出之率故所設股三亦以乘句弦并七及為股率句率二十股率二十一弦率三十九則句之十步股必十步股必十步半步半矣此以南行為句東行為股斜行為弦并句率七句并二字誤當云句弦并七欲行者當以為幂案此亦訛舛當云欲知弦者當以股自乘為幂如并而一所淂為句弦差加半之半為率以率減餘為句率案此亦訛舛當云加差于并而半之為弦以弦減差餘為句如是或有分當通而約之及定術以可使為分母案此亦說誤當云乃定術以句弦并為分母差為分子故令句自乘為朱黄相連之方弦并股自乘為青矩之矩以句弦并為袤差為廣今有相引之直加損同上案上當作之其圖大體案圖原本訛作圖今改正以兩弦為袤句股為廣案此句誤當云句股并為廣引黄㫁其半為弦率七自乘者句弦并之率故弦減之餘為句率同立䖏是中停也列用率案此三字原本訛在上斷其半為弦率之下今訂正皆句弦并為率故亦以句率同其袤也案此亦說誤當云皆句弦并為袤弦與句各為之廣故亦以股率同其袤也置南行十步以甲斜行率乘之副置十步以乙東行率乘之各自為實實如南行率而一各淂行数南行十步者所見有句求見弦股故以弦股率如句率而一今有向五步股十五步問句中容方㡬何答曰方三步十一七分步之九術曰并句股為法句股相乘為實實如法而一得方案方字下原本衍一步二字乃後人妄加今刪正句股相乘為朱黄幂青各二案此及下注舊皆有圖而缺今各補圖于後令黄袤于隅朱青各以其類令從以兩徑共幂共成脩之幂案此有訛舛據後容圓術注云可用畫于小紙分裁正之㑹令顛倒相補各各以類合成修幂則此亦謂令黄幂連于下隅朱青各以其類移而相補共成脩幂也方中黄案此三字下有脫文當云中方黄為幂并句股為袤故并句股為法幂圓方在句中案圓字誤當作圖則方之兩亷各自成小股袤案此句誤當云各自成小句股而其相與之勢不失本率也句中之小股股面之半為中率案此亦訛舛當是言句面之小股股面之小句從連相連合而成中方合股為中方率并句股焉案此四字之下有脱文當云并句股為廣率據見句五步而今有之得中方也復令句為中率以句股為率案此二句有脫誤當云復令句為中方率以并句股為袤率據股十二步而今有之則中方又何如案此句舛誤當云則中方又可知此則雖不效而法實有法由生矣案此亦舛誤據上以粟米章今有術及衰分章列衰之意解此術大小句股互求并句股即所有率中方率即所求率見句見股即所有數于事雖不同而意相倣效實術所生由也注意當是如此不容圓率而似今有衰分言之案此二句舛誤當云下容下容而以今有衰分言之可以見之也令有句八步股十五步一問句中容圓徑幾何答曰六步術曰八步為句十五步為股為之求弦三位并之為法以句乘股倍之為實實如法得徑案徑字下原本衍一步二字乃後人妄加今刪正句股相乘為圓本體朱青黄幂各二之則田為各四案此注訛舛當云句股相乘為圖之本體朱青黄幂各二則倍之為各四可用畫于小紙分裁邪正之㑹令倒顛相補各以類合成修幂圓徑為廣并句股弦為袤故并句股弦以為法又以圓大體言之案圓字誤當作圖股中青必令立規于横廣句股又邪三徑均而復連規案此亦舛誤據容圓之徑即減弦于句朕并之餘也取半徑規之又以半徑減句股其餘并之適為弦如是截句股弦各為二三半徑均而復連于規之中央注意葢以此為言而殊缺失次遂不可通從横量度句股必合而成小方矣又畫中弦以規除㑹則句股之面中央小句股弦案此亦訛舛當是言又畫中弦以觀其㑹則句股之中成小句股弦者四句之小股面面中句案此二句誤當作句面之小股股面之小句皆小方之面皆圓徑之半其数故可衰以句股弦為列衰副并為法以小句乘未并者各自為實實如法而一得句面之小股可知也以股乘列衰為實則得股面之小句可知案以小句乘未并者至此訛舛不可通或後人妄加改竄又援衰分章之文入于此遂漫無辦䖏當是言令股為列衰以見句乘之為實實如法而一則句面之小股可知也今句為列衰以見股乘之為實實如法而一則股面之小句可可此在粟米章即今有實以所求率乘所有數所有率除之古算家謂之異乘同除注以解大小句股互乘句率股率為所有率及所求率見句或見股為所有數不可以見句乘句率見股乘股率也言雖異矣及其所以成法之實則同歸矣則圓徑又可以句乘之差并案此句亦訛舛當云則又可以句弦差減句為圓徑句弦差減股為圓徑案此下有脱文當補云句弦差股弦差并之以減弦餘為圓徑又弦減句股并餘為圓徑以句弦差乘股弦差而倍之開方除之亦圓徑也今有邑方二百步各中開門出東門一十五步有木問出南門幾何步而見木答曰六百六十六步太半步術曰出東門步數為法以句率為法也半邑方自乘為實實如法得一案原本此句之下衍步字及後人妄加今刪正此以出門十五步為句率東門南至隅一百步為股率南門東至隅一百步為見句步欲以見句求股以為出南門数正合半邑方自乘者股率當乘見句此二者數同也今有邑東西七里南門九里各中開門出東門一十五里有木問出南門幾何步而見木答曰三百一十五步術曰東門南至隅數步以乘南門東至隅步數為實以木去門步數為法實如法而一此以東門南至隅四里半為句率出東門一十五里為股率南門東至隅三里半為見股所問出南門即見股之句為術之意與上同也今有一方不知大小各中開門出北門三十步有木出西門七百五十步見木問邑方幾何答曰一里術曰令兩出門步數相乘因而四之為實開方除之即得邑方按半邑方令半方自乘出門除之即步案此注不分曉應有說誤據前出東門術半邑方自乘出東門步數除之即出南門步数似似之以互相證明今之出相乘案今之二字誤當云今兩出門相乘故為半方邑自乘居一隅之積分因而四之即得四隅之積分故為實開方除即邑方也今有邑方不知大小各出開門出北門二十步有木出南門一十四步折而西行一千七百七十五步見木門邑方幾何答曰二百五十步術曰出以北門步数乘西行步數倍之為實此以折而西行為股自木至邑一十四步為句案邑下脱南字當云自木至邑南十四步為句以為北門二十步為率為丈弦字當云為南率北門至西隅為單望半廣数案單望二字誤當云為弦率即半廣數故以出北門乘至南行股以半率乘句之幂案此二句訛舛當云故以出北門句率乘西行股得半廣股率乘句之幂然北門居半以西行故又倍之合東盡之也案此亦訛舛當云然此幂居半以西故又倍之合半以東也并出南門步數為從法開方除之即邑方此術之幂東西南北邑自木盡邑南四十步之幂案此三句訛舛當云東西南北邑南北自木盡邑南十四步各南北步為廣邑方為袤故連兩廣為法從并案此八字訛舛當云故建并兩廣為從法以為隅外之幂也今有邑方一十里各中開門甲乙俱從邑中央而出乙東出甲南出出門不知步數邪向東門磨邑適與乙㑹率甲行五乙行三問甲乙行各幾何答曰甲出南門八百步邪東北行四八八百八十七步半及乙乙東行四千三百一十二步半術曰令五自乘三亦自乘并而半之為邪行率邪行率減于五自乘者餘為南行率三三乘五為乙東行率求三率之意與上甲乙同置邑方半之以南行率乘之如東行率而一即得出南門步數今半方南門東隅五里半邑者謂為小股也求以為出南門步數案此注有脱誤當云邑半方自南門至東隅五里以為小股求出南門步數為小股之句以東行為股率南行為句率故置邑方半之以南行句率乘之如股率而一以増邑方半即南行半邑者謂從邑心中停也置南行步求弦者以邪行率乘之求東者以東行率乘之各自為實實如法而率得一案原本訛作實如法南行率得一步據前甲乙術云實如南行率而一各得行數則此文法字步字乃後人妄増今刪正此術與上甲乙同今有木去人不知逺近立四表相去各一丈令左兩表與所望参相直從後右表望之入前右表三寸問木去人㡬何答曰三十三丈三寸三尺少半寸術曰令一丈自乘實如法三寸為法實如法而一此以入前右表三寸為句率右兩表相去一尺為股率左右兩表相去一丈為見句所問木去人者見句之股以右行案此三字乃衍文當刪股率當乘見句此二率俱一丈故曰自乘之以三寸為實實如法得一今有山居木西不知其高山去木五十三里木髙九丈五尺案原本訛作九尺五寸今改正人立木東三里望木末適與山峯斜平人目髙七尺問山髙㡬何答曰一百六十四丈九尺六寸太半寸術曰置木髙減人目髙七尺此以木髙減人目髙七尺餘有八丈八尺為句率去人目三里為股率山去木五十三里為見股以木髙為見股求句加人目之髙案此二句訛舛當云以句率乘見股如股率而一得句加木之髙故為山髙也餘以乘五十三里為實以人去木三里為實法如法而一所得加木髙即山髙此術句股之義案丄節注文似應接此句之下衍注端一此字今有井徑五尺不知其深立五尺木于井上從木末望水岸入徑四寸問井深㡬何答曰五丈七尺五寸術曰置井徑五尺以入徑四寸減之餘以乘立木五尺為實以入徑四寸為法得一法得一案此句之下原本衍寸字乃後人妄加今刪正此以入徑四寸為句率立木五尺為股率井徑四尺六寸為見句問井深者見句之股也今有户不知髙廣竿不知長短横之不出四尺從之不出二尺邪之適出問户髙廣袤各㡬何答曰廣六尺髙八尺袤一丈術曰從横不出相乘倍而開方除之所得加從不出即戸廣此以户廣為句户髙為股戸袤為弦凡句之在股案此句有訛舛當云凡并句股之幂即為弦幂或矩于表或方于裏連之者舉表矩而端之又句句方裏令為青矩之表未滿黄方滿此方則兩端之邪案邪字誤當作亷重于隅中各以股弦差為廣句弦并為袤案并字誤當作差又據注文舊有圗而缺今補圖于後故兩端差相乘又倍之則成黄方之幂開方除之得黄方之面其外之幂知亦以股弦差為廣故以股弦差加則為句也加横不出即戸髙兩不出加之得户袤九章算術卷九欽定四庫全書

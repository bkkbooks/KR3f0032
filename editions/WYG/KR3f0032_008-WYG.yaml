front:
  text: 九章算術卷八晉
  hash: sha256:7b52313ee749370a96ba92a38b66df534599057e909e44a5f25b686abd3ca7f8
body:
  text: 劉徽注唐李淳風注釋方程以御錯糅正負今有上禾三秉中禾二秉下禾一秉實三十九斗上禾二秉中禾三秉下禾一秉實三十四斗上禾一秉中禾二秉下禾三秉實二十六斗問上中下禾實一秉各幾何答曰上禾一秉九斗四分斗之一中禾一秉四斗四分斗之一下禾一秉二斗四分斗之三案三原本訛作一今改正程課程也羣物總雜各列有數總言其實令每行為率二物者再程三物者三程皆如物數程之並列為行故謂之方程行之左右無所同存且為有所據而言耳此都術也以空言難曉故特繫之禾以決之又列中行如右行也術曰置上禾三秉中禾二秉下禾一秉實三十九斗于右方中左禾列如右方以右行上禾徧乘中行而以直除案古字直值通用直除猶言對減也以右行上禾徧乘中行復以中行上禾徧乘右行然後可相對減古人文省故但舉一以該之為術之意令少行減多行反覆相減則頭位必先盡上無一位則此行亦闕一物矣然而舉率以相減不害餘數之課也若消去頭位則下去一物之實如是叠令左右行相減審其正負則可得而知先令右行上禾乗中行為齊同之意為齊同者謂中行直減右行也案此句舛誤當云謂中行上禾亦乗右行也從簡易雖不言齊同以齊同之意觀之其義然矣又乗其次亦以直除案此謂右行上禾徧乗左行復以左行上禾徧乗右行亦相對減古人文多省畧復去左行首然以中行中禾不盡者案古人單用然字不曰然後者然猶乃也非脫後字徧乗左行案此以中行左行所減之餘如前徧乗文亦從省而以直除亦令兩行相乗去行之中禾也左方下禾不盡者案下原本訛作上今改正上為法下為實實即下禾之實上中禾皆去故餘數是下禾實非但一秉欲約衆秉之實當以禾秉數為法列此下禾之秉實案下禾上原本衍以字今刪乗兩行以直除則下禾之位自決矣若以其餘一位之秉除其下實即斗數矣案斗原本訛作計今改正用算繁而不省所以别為法約也然猶不如自用其舊廣異法也案用算繁而不省以下亦訛舛衍文求中禾以法乗中行下實而除下禾之實此謂中下兩禾實案原本脫下字今補下禾一秉實數先見將中秉求中禾其列實以減下實而左方下禾雖去一秉以法為母于率不通案此三句有脫誤當云而左方下禾不惟一秉下禾實既以法為母則中行下實不以法為母于率不通故先以法乘其實而同之案實原本訛作通今改正俱令法為母而除下禾實以下禾先見之實令乘下禾秉數即得下禾一位之列實減于下實案原本脱減字今補則其數是中禾之實也餘如中禾秉數而一即中禾之實餘中禾一位之實也故以一位秉數約之乃得一秉之實也求上禾亦以法乘右行下實而除下禾中禾之實此右行三禾共實合三位之實案合原本訛作令今改正故以二位秉數約之案二原本訛作一今改正乃得上禾一秉之實案原本脫上禾二字今補此右行三禾共實合中下禾之實其數竝見右行之禾秉以減之案此句有脫誤當云以中下禾先見之實令乗右行中下禾秉數以減之故亦如前各求列實以減下實也餘如上禾秉數而一即上禾之實實皆如法各得一案此下原本衍斗字係後人妄加今刪正三實同用不滿法去以法命之母實皆當除之案此六字亦訛舛衍文今有上禾七秉損實一斗益之下禾二秉而實一十斗下禾八秉益實一斗與上禾二秉而實一十斗問上下禾實一秉各㡬何答曰上禾一秉實一斗五十二分斗之一十八下禾一秉實五十二分斗之四十一術曰如方程損之曰益益之曰損問者之辭雖案此字下有脫文當云雖以損益為説今按實云上禾七秉下禾二秉實一十一斗上禾二秉下禾八秉實九斗也損之曰益言損一斗餘當一十斗今欲全其實當加所損也益之曰損言益實以一斗乃滿一十斗今欲加本實當減所加即得也損實一斗者其實過一十斗也益實一斗者其實不滿一十斗也重諭損益數者各以損益之數損益之也今有上禾二秉中禾三秉下禾四秉實皆不滿斗上取中中取下下取上各一秉而實滿斗問上中下禾實一秉各㡬何答曰上禾一秉實二十五分斗之九中禾一秉實二十五分斗之七下禾一秉實二十五分斗之四術曰如方程各置所取置上禾二秉為右行之上中禾三秉為中行之中下禾四秉為左行之下所取一秉及實一斗各從其位諸行相借取之物皆依此例以正負術入之正負術曰今兩算得失相反要令正負以名之正算赤負算黑否則以邪正為異方程自有赤黑相取左右數相推求之術而其并減之勢不得交通故使赤黑相消奪之于算或減或益同行異位殊為二品各有并減之差見于下焉著此二條特繫之禾以成此二條之意故赤黑相雜足以定上下之程減益雖殊足以通左右之數差實雖分足以應同異之率然則其正無人以負之案此句有脱誤當云然則其正無入負之負無入正之其率不妄也同名相除此為以赤除赤以黑除黑行求相減者為法頭位也然則頭位同名當用此條頭位異名者當用下條異名相益益行減行當各以其類矣其異名者非其類也非其類者猶無對也非所得減也故赤用黑對則除黑無對則除赤赤黑并于本數此為相益之皆所以為消奪消奪之與減益成一實也案此注多訛舛據方程術無論物有幾品遞減至一物乃止又以赤黑别正負首位赤减赤黑減黑者同名相除也次位以下遇赤用黑對則相益此條是也首位赤減黑黑減赤者異名相除也次位以下遇皆赤皆黑則相益後條是中由此言之注之謬顯然蓋傳冩失真後人復妄加改竄遂不可通術本取要必除行首至于他位不嫌多少故或令相減或令相并理無同異一也案一上原本衍而字今刪正正無入負之案入原本訛詐人下文及注竝同據注云無人為無對也無對之説亦未分曉釋方程者專為遇空位起例而左右兩行相對減或正宜變為負或負宜變為正徃徃不得其義例今考同名相除異名相益者如下實左右俱正所減之餘屬左行則去右行屬右行則去左行其物品以正減正餘在所去之行為正無入以負減負餘在所去之行為負無入以正從負為正無入以負從正為負無入負對空位而負數在所去之行與以負減負同例正對空位而正數在所去之行與以正從負同例此皆所謂正無入負之負無入正之也異名相除同名相益者如下實左右俱正并為一數則無分于左右其物品以負減正餘或左或右為正無入以正減負餘或左或右為負無入以正從正為正無入以負從負為負無入正對空位與以負減正同例負對空位與以負從負同例此皆所謂正無入正之負無入負之也由是言之在所去之行則其數無入而或左或右以與無分于左右合為一行因亦謂之無入又字乃傳冩之誤明矣今悉改正負無入正之無入為無對也無所得減則使消奪者居位也其當以列實或減下實案此句訛舛據後注内方程新術以列衰乘下實又以列衰乗羣物之數并為法其當相并而行中正負雜者同名相從異名相消似即此所舉而行中正負雜者亦用此條此條者同名減實異名益實正無入負之負無入正之也其異名相除同名相益正無入正之負無入負之此條異名相除為例故亦與上條互取凡正負所以記其同異使二品互相取而已矣言負者未必負于少言正者未必正于多故每一行之中雖復赤黑異算無傷然則可得使頭位常相與異名此條之實兼通矣遂以二條反覆一率觀其每與上下互相取位則隨算而言耳猶一術也又本設諸行欲因成數以相去耳案成字誤當作減故其多少無限令上下相命而已若以正負相減如數有舊増法者每行可均之不但數物左右之也今有上禾五秉損實一斗一升當下禾七秉上禾七秉損實二斗五升當下禾五秉問上下禾實一秉各幾何答曰上禾一秉五升下禾一秉二升術曰如方程置上禾五禾正下禾七秉負損實一斗一升正言上禾五秉之實多減其一斗一升餘是與下禾七秉相當數也故互其算令相折除以一斗一升為差為差者上禾之餘實也次置上禾七秉正下禾五秉負損實二斗五升正以正負術入之按正負之術本設列行物程之數不限多少必令與實上下相次而以每行各自為率案此下原本衍多少二字乃上文不限多少句重出今刪正然而或減或益同行異位殊為二品案此下原本衍各自二字乃上文各自為率句重出今刪正并減之差見于下也今有上禾六秉損實一斗八升當下禾一十秉下禾一十五秉損實五升當上禾五秉問上下禾實一秉各㡬何答曰上禾一秉實八升下禾一秉實三升術曰如方程置上禾六秉正下禾一十秉負損實一斗八升正次置上禾五秉負案原本脱置字今據前後文補入下禾一十五秉正損實五升正以正負術入之言上禾六秉之實多減損其一斗八升餘是與下禾十秉相當之數故亦互其算而以一斗八升為差實差實者下禾之餘實今有上禾三秉益實六斗當下禾一十秉下禾五秉益實一斗當之禾二秉問上下禾實一秉各㡬何答曰上禾一秉實八斗下禾一秉實三斗術曰如方程置上禾三秉正下禾一十秉負益實六斗正次置上禾二秉負下禾五秉正益實一斗正以正負術入之言上禾三秉之實少益其六斗然後于下禾十秉相當也故亦互其算而以六斗為差實差實者下禾之餘實今有牛五羊二直金十兩牛二羊五直金八兩問牛羊各直金㡬何答曰牛一直金一兩二十一分兩之一十三羊一直金二十一分兩之二十術曰如方程假令為同齊頭位為牛當相乘右行定案此句舛誤應作左右行相乘定更置牛十羊四直金二十兩左行牛十羊二十五直金四十兩牛數等同金多二十兩左行牛二十一使之然也以少行減多行則牛數盡惟羊與直金之數見可得而知也以小推大雖四五行不異也今有賣牛二羊五以買一十三豕有餘錢一千賣牛三豕三以買九羊錢適足賣六羊八豕以買五牛錢不足六百問牛羊豕價各㡬何答曰牛價一千二百羊價五百豕價三百術曰如方程置牛二羊五正豕一十三負餘錢數正次牛三正羊九負豕三正次五牛負六羊正八豕正不足錢負以正負求術入之此中行買賣相折錢適足故但互買賣算而已故下無錢直也設欲以此行如方程法先令二牛徧乘左行而以右行直除之是故終于下實虚缺矣故注曰正無實負負無實正方為類也方將以别實加不足之數與實物作實案此注訛脱不分曉據術意應列三行先令右行牛二徧乘中行復令中行牛三徧乘右行而以直除得羊三十三正豕四十五負餘錢三千正此同名相除異名相益正無入負之負無入正也也次令右牛二徧乗乗左行復令左行牛五徧乗右行而以直除得羊三十七正豕四十九負餘錢三千八百正此異名相除同名相益正無入正之負無入負之也重列為左右兩行先令左行羊三十三徧乘左行復令左行羊三十七徧乗右行而以直除得豕四十八正以為法錢一萬四千四百正為實實如法而一得豕價三百轉減而上得羊價五百牛價一千二百此亦同名相除異名相益正無入負之負無入正之也中行下實虚缺本無庸論蓋注文傳冩失真後人又妄加改竄遂不可通盈不足章黄金白銀與此相當假令黄金九白銀一十一稱之重適等交易其一金輕十三兩問金銀一枚各重㡬何與此同今有五雀六燕集稱之衡雀俱重燕俱輕一雀一燕交而處衡適平并雀燕重一斤問雀燕一枚各重㡬何答曰雀重一兩一十九分兩之一十三燕重一兩一十九分兩之五術曰如方程交易質之各重八兩此四雀一燕與一雀五燕衡適平并重一斤故各八兩列兩行程數左行頭位其數有一者今右行徧除亦可令于左行案此十六字訛舛不可通當云其數是一可省乗令右徧乗乗左行而取其法實于左左行數多以右行取其數左頭位減盡中下行算當燕與實右行不動左上空案此十五字係訛舛術文中法下實即每枚當重宜可知也按此四雀一燕與一雀五燕其重等是三雀四燕重相當案四原本訛作一今改正雀率重四燕率重三也諸再程之率皆可異術求也即其數也案此即末條所言新術以下實俱重八兩徧乗上雀燕以左雀八減右雀三十二餘二十四以右燕八減左燕四十餘三十二是為二物正負相借因而約之雀得三燕得四乃三雀當四燕也對易其數即雀率重四而燕率重三注于此突入異術㡬不解其所謂姑附論之今有甲乙二人持錢不知其數甲得乙半而錢五十乙得甲太半而亦錢五十問甲乙持錢各㡬何答曰甲持三十七錢半乙持二十五錢術曰如方程損益之此問者言一甲半乙而五十太半甲一乙亦五十也各以分母乘其全内子行定二甲一乙而錢一百二甲三乙而錢一百五十于是乃如方方諸物有分者放此今有二馬一牛價過一萬如半馬之價一馬二牛價不滿一萬如半牛之價問牛馬價各㡬何答曰馬價五千四百五十四錢一十一分錢之六牛價一千八百一十八錢一十一分錢之二術曰如方程損益之此一馬半與一牛價直一萬也二牛半與一馬亦直一萬也一馬半與一牛通分内子右行為三馬二牛直錢二萬二牛半與一馬直錢一萬通分内子左行為二馬五牛直錢二萬也今有武馬一匹中馬二匹下馬三匹皆載四十石至阪皆不能上武馬借中馬一匹中馬借下馬一匹下馬借武馬一匹乃皆上問武中下馬一匹各力引㡬何答曰武馬一匹力引二十二石七分石之六中馬一匹力引一十七石七分石之一下馬一匹力引五石七分石之五術曰如方程各置所借以正負術入之今有五家共井甲二綆不足如乙一綆乙三綆不足如丙一綆案此句如字及下三如字原本竝訛作以惟上如字不悞今據上文改正丙四綆不足如丁一綆丁五綆不足如戊一綆戊六綆不足如甲一綆案此下原本衍一如字今刪各得所不足一綆皆逮問井深綆長各㡬何答曰井深七丈二尺一寸甲綆長二丈六尺五寸乙綆長一丈九尺一寸丙綆長一丈四尺八寸丅綆長一丈二尺九寸戊綆長七尺六寸案此問不言丈尺無由知井深綆長于丈尺㡬何使井深半之為三丈六尺有半寸則甲綆一丈三尺二寸半乙綆九尺五寸半丙綆七尺四寸丅綆六尺四寸半戊綆三尺八寸使井深倍之為十四丈四尺二寸則甲綆五丈三尺乙綆三丈八尺二寸丙綆二丈九尺六寸丅綆二丈五尺八寸戊綆一丈五尺二十皆合所問由是言之問既不定以丈尺依術推求先得七百二十一無以定百為丈十為尺也問井深綆長之率各㡬何答以井深之率七百二十一甲綆長率二百六十五乙綆長率一百九十一丙綆長車一百四十八丅綆長率一百二十九戊綆長率七十六于義乃通術曰如方程以正負術入之此率初如方程為之名各一逮井其後法得七百二十一實七十六案此上訛舛不可通據術先得七百二十一為所列五行之通車即井深率也以此率列各行下為各行之下實重求之法得七百二十一實得五萬四千七百九十六以法除實得用逮之數七十六是為七百二十一而七十六逮井用逮之數以法除實者案此九字乃訛舛衍文而戊一綆逮之數定逮七百二十一分之七十六是故七百二十一為井深七十六為戊綆之長舉率以言之今有白禾二歩青禾三歩黄禾四歩黑禾五歩實各不滿斗白取青黄青取黄黑黄取黑白黑取白青各一歩而實滿斗問白青黄黑禾實一歩各㡬何答曰白禾一歩實一百一十一分斗之三十三青禾一歩實一百一十一分斗之二十八黄禾一歩實一百一十一分斗之一十七黑禾一歩實一百一十一分斗之一十術曰如方程各置所取以正負術入之今有甲禾二秉乙禾三秉丙禾四秉重皆過于石甲二重如乙一乙三重如丙一丙四重如甲一問甲乙丙禾一秉各重幾何答曰甲禾一秉重二十三分石之一十七乙禾一秉重二十三分石之一十一丙禾一秉重二十三分石之一十術曰如方程置重過于石之物為負此問者言甲禾二秉之重過于一石也其過者何云案何云當作㡬何如乙一秉重矣互其算令相折除案原本訛作互言其算令相折除而一衍言字及而一二字今刪正以石為之差實差實者如甲禾餘實故置算相與同也以正負術入之此入頭位異名相除者正無入正之負無入負之也今有令一人吏五人從者一十人食鷄一十令一十人吏一人從者五人食鷄八令五人吏一十人從者一人食鷄六問令吏從者食鷄各幾何答曰令一人食一百二十二分鷄之四十五吏一人食一百二十二分鷄之四十一從者一人食一百二十二分鷄之九十七術曰如方程以正負術入之今有五羊四犬三鷄二兎直錢一千四百九十六四羊二犬六鷄三兎直錢一千一百七十五三羊一犬七鷄五兎直錢九百五十八二羊三犬五鷄一兎直錢八百六十一問羊犬鷄兎價各㡬何答曰羊價一百七十七犬價一百二十一鷄價二十三兎價二十九術曰如方程以正負術入之今有麻九斗麥七斗菽三斗荅二斗黍五斗直錢一百四十麻七斗麥六斗菽四斗荅五斗黍三斗直錢一百二十八麻三斗麥五斗菽七斗荅六斗黍四斗直錢一百一十六麻二斗麥五斗菽三斗荅九斗黍四斗直錢一百一十二麻一斗麥三斗菽二斗荅八斗黍五斗直錢九十五問一斗直㡬何答曰麻一斗七錢麥一斗四錢菽一斗三錢荅一斗五錢黍一斗六錢術曰如方程以正負術入之此麻麥與均輸少廣之章重衰積分皆為大事其拙于精理從按本術者或用算而布氊方好煩而喜誤曾不知其非反欲以多為貴故其算也莫不同于設通而專于一端至于此類苟務其成然或失之不可謂要約更有異術者庖丁解牛游刄理間故能乆其刄如新夫數猶刄也易簡用之則動中庖丅之理故能和神愛刄速而寡尤凡九章為大事按法皆不盡一百算也雖布算不多然足以算多世人多以方程為難或盡布算之象在綴正負而已未暇以論其設動無方斯膠柱調瑟之類聊復恢演為作新術著之于此將亦啟導疑意綱羅道精豈傳之空言記其施用之例著䇿之數每舉一隅焉案以上字句多訛誤又皆屬虚辭非有貿義可考無從訂正姑仍之方程新術曰以正負術入之令左右相減先去下實又轉去物位則其求一行二物正負相借者案此句則其求三字舛誤當云求其一行二物正負相借者據所立新術推算至一行二物若非遇一正一負彼此相借者則不得其率須另推算徃徃輒窮易其相當之率又令二物與他行互相去取轉其二物相借之數即皆相當之率也各據二物相當之率對易其數即各當之率也更置成行及其下實案成行不可通後稱減行指所減之餘也疑成乃减之訛各以其物本率今有之求其所同并以為法其當相并而行中正負雜者同名相從異名相消餘以為法以下實為實案下實原本訛作下置今據上下文謂價直為下實改正實如法即合所問也一物各以本率今有之即皆合所問也率不通者齊之其一術曰置羣物通率為列衰更置成行羣物之數案成行亦減行之訛各以其率乘之案率原本訛作數今改正并以為法其當相并而行中正負雜者同名相從異名相消餘為法以成行下實案成行亦減行之訛乘列衰各自為實實如法而一即得以舊術為之凡應置五行今欲要約先置第三行以減第四行及減第三行次置第二行以第二行減第三行去其頭位次置右行去其頭位次以第四行減左行頭位次以左行去第四行及第二行頭位次以第五行減第二行頭位餘可半次以第二行去第四行頭位餘約之為法實如法而一得空即有黍價以法治第二行得荅價左行得麥價第三行麻價右行得菽價如此凡用七十七算案以上所言舊術訛舛不可通據方程術凡五物及總價求其各物之價者應列五行行五位及價直以上一位互乘因徧乘次位以下及價直兩兩相對減去其頭位所減之餘重列之減至一物一價乃止物為法價為實實如法而一得一物之價轉減而止以知各價先化五為四次化四為三次化三為二次化二為一凡用十算兼乘減除言之則一百四十五算凡上一位互乘其數必同可省乘若遇上一位數同則省徧乘或上一位遇一則省其與對行徧乘考問意左行上一位是一先以左行減右行次減第二行次減第三行次減第四行所減之餘重列為四行其左行上一位又是一以左行減右行次減第二行次減第三行所減之餘重列為三行其上一位數皆同即以本數減之餘列為兩行依術得荅價轉而上求得菽價及麥價麻價凡用九十九算以新術為此先以第四行減第三行次以第三行去右行及第二行第四行下位又以減右行下位不足減乃止次以左行減第三行下位次以第三行去左行下位訖廢去第三行次以第四行去左行下位右行當左行下位次以右行去第二行及第四行下位次以第二行減第四行及左行頭位次以第四行減右行菽位不足減乃止次以左行減第二行頭位餘可再半次以第四行去右行及第二行頭位次以第二行去右行頭位餘約之上得五下得三是菽五當荅三次以左行去第三行菽位又以減第四行及右行菽位不足減乃止次以右行減第二行頭位不足減乃止次以第三行去左行頭位次以左行去右行頭位餘上得六下得五是為荅六當黍五次以右行去左行荅位餘約之上為二下為三次以左行去第二行下位以第二行去第四行下位又以減左行下位次右行去第二行下位餘上得三下得四是為麥三當菽四次以第二行減第四行下位次以第四行去第二行下位餘上得四下得七是為麻四當麥七是為相當之率舉矣案以上所言新術亦訛舛不可通據其術求之先以左行減第三行去其次位次并右行亦并亦并第三行第四行以減之去其次位次倍左行以第二行減之去其次位所減之餘重列之為三行次以第四行減第二行去次位及下位次以重列之中行減右行去其下位次以重列之左行減右行去其下位所減之餘又重列之為三行次以此右行減中行去其頭位次以此右行減左行去其頭位所減之餘兩行兩物減去下實餘約之上得五下得三是菽五當荅三前云令左右相減先去下實又轉去物位求其一行二物正負相借者易其相當之率謂菽五當荅三即菽價率三荅價率五也或先減下實乃減物位或先減物位乃減下實各從省便本無一定之先後其先求菽與荅相當之率次求荅與黍相當之率次求麥與菽相當之率次求麻與麥相當之率亦無一定之先後然非遇正負相借者則二物相當之率不可得徃徃窮而復推輾轉滋繁逺不若舊術之究歸易簡也據麻四當麥七即麻價率案此四字有脫誤當云即為麻價率七而麥價率四又麥三當菽四即為麥價率四而菽價率三案此下原本有而荅價率五凡五字今刪正又荅六當黍五即為荅價率五而黍價率六案此下原本有荅價率五又荅六當黍五即荅價率五也凡十六字乃重出衍文今刪正而率通矣更置第三行以第四行減之餘有麻一斗菽四斗荅三斗負黍四斗正案第三行黍四以第四行黍四減之適盡惟下實一百一十六以第四行一百一十二減之餘四當云下實四正此作黍四斗正乃後人所妄改求其同為麻之數以菽率四黍率四案黍率四三字亦後人所妄改又有脱文當云以菽率三荅率五各乘菽荅斗數如麻率七而一得一斗七分斗之一負案此句亦脱誤當云菽得一斗七分斗之五正荅得二斗七分斗之一負則菽荅化為麻以并之令同名相從異名相消餘得定麻七分斗之四以為法置四為實案此句有脱文當云置下實四為實以分母乘之案以原本訛作而今改正實得二十八而分子化為法矣案實字法字之上原本竝衍荅字今刪正以法除得七即麻一斗之價案麻字原本訛作麥今改正置麥率四菽率三荅率五黍率六皆以麻乘之案此句誤當云皆以其斗數乗之各自為實以麻率七為法案麻字原本訛作實今改正所得即各為實案此句誤當云所得即同為麻之數亦可使置本行實與物同通之各以本率今有之求其本率所得并以為法如此即無正負之異矣擇異同而已又可以一術為之置五行通率為麻七麥四菽三荅五黍六以為列衰減行麻一斗菽四斗正荅三斗負各以其率乗之訖令同名相從異名相消餘為法案法原本訛作減今改正或置餘乗列衰為實所得各為實案此二句舛誤當云又置下實乘列衰所得各為實此可以實約法案實字原本訛作置今改正此所謂法乃各物之率總數實乃各物之價總數價于率或適相等或幾倍也則不復乘列衰各以列衰為實以此句亦脱誤當云各列衰如所約知其價如此則凡用一百二十四算也九章算術卷八

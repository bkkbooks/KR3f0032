  text: 上舛
  hash: sha256:c0d5a4db2fa36d74b075393938693465ee981001c4dbbb3982685a6c8c447b01
body:
  text: 誤不可通参攷上注當云按其率錢多物少反之錢少物多出錢六百二十買羽二千一百翭當以除羽得三實餘二百四十是為三翭復可増一翭然則實餘之數即是多者之錢故曰實多本以六百二十錢為法今以多者減之則其餘三百八十悉是少者之錢故曰法少也二百四十錢一錢四翭乘得九百六十其三百八十錢一錢三翭乗得一千一百四十是錢有二價物有貴賤故以羽乘反二率也淳風等按其率者錢多物少反其率知錢少物多多少相反故曰反其率也其率者以物數為法錢數為實反之知以錢數為法物數為實不滿法知實餘也當以餘物化為錢矣法為凡錢而今以化錢減之故以實減法法少知經分之所得故曰法少實多者餘分之所益故曰實多乘實宜以多乘法宜以少故曰各以其所得多少之數乗法實即物數九章算術卷二欽定四庫全書九章算術卷三晋劉徽注唐李淳風注釋衰分以御貴賤稟税術曰各置列衰列衰相與率也重疊則可約副并為法以所分乘未并者各自為實實如法而一法集而衰别數本一也今以所分乘上别以下集除之一乘一除適相足消故所分猶存且各應率而别也于今有術列衰各為所求率副并為所有率所分為所有數又以經分言之假令甲家三人乙家二人丙家一人并六人共分十二為人得二也欲復作逐家者則當列置人數以一人所得乘之今此術先乘而後除也不滿法者以法命之今有大夫不更簮褭上造公士凡五人共獵得五鹿欲以爵次之分問各得㡬何答曰大夫得一鹿三分鹿之二不更得一鹿三分鹿之一簪褭得一鹿上造得三分鹿之二公士得三分鹿之一術曰列置爵數各自為衰爵數者謂大夫五不更四簪褭三上造二公士一也墨子號令篇以爵級為賜然則戰國之初有此名也副并為法以五鹿乘未并者各自為實實如法得一案原本作得一鹿衍鹿字攷古算凡以法除實得所求之數多云實如法而一所有率恒為法所求率通所有數恒為實準所有率以剖實取其一為所求數故曰如法而一或變言實如法得某數篇内有云實如法得絲數及得銀數得粟數之類是也一乃該舉得所求之數為言此云得一亦該舉得所求數之辭不知者妄加鹿字得一鹿便不足該舉與後妄加斗字錢字尺字斛字升字作得一斗得一錢得一尺得一斛得一升者皆不可通今竝為之訂正冊去于今有術案原本脱于字今㨿後注文之例補列衰各為所求率副并為所有率今有鹿數為所有數而今有之卽得今有牛馬羊食人苗苗主責之粟五斗羊主曰我羊食半馬馬主曰我馬食半牛今欲衰償之問各出㡬何答曰牛主出二斗八升七分升之四馬主出一斗四升七分升之二羊主出七升七分升之一術曰置牛四馬二羊一各自為列衰副并為法以五斗乘未并者各自為實實如法得一案原本作得一斗乃後人妄加斗字今刪淳風等按此術問意羊食半馬馬食半牛是謂四羊當一牛二羊當一馬今術置羊一馬二牛四者通其率以為列衰今有甲持錢五百六十乙持錢三百五十丙持錢一百八十凡三人俱出關關税百錢欲以錢數多少衰出之問各㡬何答曰甲出五十一錢一百九分錢之四十一乙出三十二錢一百九分錢之一十二丙出一十六錢一百九分錢之五十六術曰各置錢數為列衰副并為法以百錢乘未并者各自為實實如法得一案原本作得一錢亦後人妄加錢字今刪淳風等按此術甲乙丙持錢數以為列衰副并爲所有率未并者各為所求率百錢為所有數而今有之即得今有女子善織日自倍五日織五尺問日織㡬何答曰初日織一寸三十一分寸之十九次日織三寸三十一分寸之七次日織六寸三十一分寸之十四次日織一尺二寸三十一分寸之二十八次日織二尺五寸三十一分寸之二十五術曰置一二四八十六為列衰副并為法以五尺乘未并者各自為實實如法得一案原本作得一尺亦後人妄加尺字今刪今有北鄉算八千七百五十八西鄉算七千二百三十六南鄉算八千三百五十六凡三鄉發徑三百七十八人欲以算數多少衰出之問各㡬何答曰北鄉遣一百三十八人一萬二千一百七十五分人之一萬一千六百三十七西鄉遣一百一十二人一萬二千一百七十五分人之四千四南鄉遣一百二十九人一萬二千二一百七十五分之之八千七百九術曰各置算數為列衰淳風等按三鄉算數約可半者為列衰副并為法以所發徭人數乘未并者各自為實實如法得一案原本作得一人亦後人妄加人字今刪按此術今有之義也案此注有脱誤㨿注文之例當云亦今有之義以列衰各為所求率副并為所有率所發徭人數為所有數而今有之即得今有稟粟大夫不更簪褭上造公士凡五人一十五斗今有大夫一人後来亦當稟五斗倉無粟欲以衰出之問各㡬何答曰大夫出一斗四分斗之一不更出一斗簪褭出四分斗之三上造出四分斗之二公士出四分斗之一術曰各置所稟粟斛斗數爵次均之以為衰列副并而加後来大夫亦五斗得二十以為法以五斗乘末并者各自為實實如法得一案原本作得一斗亦後人妄加斗字今刪稟前五人十五斗者大夫得五斗不更得四斗簪褭得三斗上造得二斗公士得一斗欲令五人各依所得粟多少減與後来大夫即與前来大夫同據前来大夫已得五斗故言亦也各以所得斗數為衰并得十五而加後來大夫亦五斗凡二十為法也是為六人共出五斗後來天子亦俱損折于今有術案原本脱于字今補副并為所有率未并者各為所求率五斗為所有數而今有之即得今有稟粟五斛五人分之欲令三人得三二人得二問各㡬何答曰三人人得一斛一斗五升十三分升之五二人人得七斗六升十三分升之十二術曰置三人人三二人人二為列衰副并為法以五斛乘未并者各自為實實如法得一案原本作得一斛亦後人妄加斛字今刪今有大夫不更簪褭上造公士凡五人共出百錢欲令髙爵出少以次漸多問各㡬何答曰大夫出八錢一百三十七分錢之一百四不更出一十錢一百三十七分錢之一百三十簪褭出一十四錢一百三十七分錢之八十二上造出二十一錢一百三十七分錢之一百二十三公士出四十三錢一百三十七分錢之一百九反衰術曰列置衰而令相乘動者為不動者哀置爵數各自為衰而反衰之副并為法以百錢乘未并者各自為實實如法得一案原本作得一錢亦後人妄加錢字今刪以爵次言之大夫五不更四欲令髙爵得多者者使大夫愛五分不更一人愛四分人数為母分􅂾為子為子同母則子齊齊卽衰也故上衰分宜以五四為列焉今此令髙爵出少則當大夫五人共出一人分不更四人共出一人分故謂之反衰人􅂾不同則分數不齊當令母互乘子母互乘子則動者為不動者衰也亦可先同其母各以分母約其子為反衰副并為法以所分乘未并者各為實實如法而一今有甲持粟三升乙持糲米三升丙持糲飯三升欲令合而分之問各㡬何答曰甲二升一十分升之七乙四升一十分升之五丙一升一十分升之八術曰以粟率五十糲米率三十糲飯率七十五為衰而反衰之副并為法以九升乘未并者各自為實實如法得一案原本作得一升亦後人妄加升字今刪按此術三人所持升􅂾雖等論其本率精麤不同米率雖少令最得多飯率得多反使得少故令反之使精得多而麤得少于今有術副并為所有率未并者各為所求率九升為所有數而今有之即得今有絲一斥價直二百四十今有錢􅂾為實定二十八問得絲㡬何答曰五斤八両一十二銖五分銖之四術曰以一斤價數為法以一斤乘今有錢數為實實如法得絲􅂾按此術亦今有之義以一斤價為所有率一斤為此求率今有錢為所有數而今有之即得今有絲一斤價直三百四十五今有絲七兩一十二銖問得錢㡬何答曰一百六十一錢三十二分錢之二十三術曰以一斤銖􅂾為法以一斤價􅂾乘七両一十二銖為實實如法得錢􅂾按此術亦今有之義以絲一斤銖數為所有率案原本脱銖字今補價錢為所求率今有絲為所有數而今有之即得今有縑一丈價直一百二十八今有縑一匹九尺五寸問得㡬何答曰六百三十三錢五分錢之三術曰以一丈寸數為法以價錢數乘今有縑寸數為實實如法得錢數淳風等按此術亦今有之義以縑一丈寸數為所有率價錢為所求率今有縑寸數為所有數而今有之即得今有布一匹價直一百五十五今有布二丈七尺問得錢㡬何答曰八十四錢八分錢之三術曰以一匹尺數為法今有布尺數為乘錢為實實如法得錢數按此術亦今有之義以一匹尺數為所有率價錢為所求率今有布所有數而今有之即得今有素一匹一丈價直六百二十五今有錢五百問得㡬何答曰得素一匹術曰以價直為法以一匹一丈尺數乘今有錢數為實實如法得素數按此術亦今有之義以價錢為所有率以丈尺數為所求率今有錢為所有數而今有之即淂今有與人絲一十四斤約淂縑一十斤今與人絲四十斤八兩問得縑㡬何答曰三十二斤八両術曰一十四斤兩數為法以十一斤乘今有絲兩為數實實如法得縑數按此術亦今有之義以十四斤兩數為所有率以十一斤為所求率今有絲為所有數而今有之即得今有絲一斤耕七兩今有絲二十三斤五兩問耗㡬何答曰一百六十三兩四銖半術以曰以一斤展十六兩為法以七兩乘今有絲數為實實如法得耗數按此術亦今有之義以一斤為十六兩為所有率七兩為所求率今有絲為所有數而今有之即得今有生絲三十斤乾之耗三斤十二兩今有乾絲一十二斤問生絲㡬何答曰一十三斤一十一兩十銖七分銖之二術曰置生絲兩數除耗數餘以為法餘四百二十兩即乾絲率三十斤乘乾絲兩數為實實如法得生絲數凡所得率如細則俱細麤則俱麤兩數相抱而已故品物不同如上縑絲之比相與乘為三十斤凡四百八十兩今生絲率四百八十兩今乾絲率四百二十兩則其數相通可俱為銖可俱為兩可俱為斤無所歸滯也若然宜以所有乾絲斤數乘生絲兩數為實今以斤兩錯互而亦同歸者使乾絲以兩數為率生絲以類為率譬之異類亦各有一定之勢淳風等按此術置生絲兩數除耗數餘即乾絲之率于今有術為所有率三十斤為所求率乾絲兩數為所有數凡所為率者細則俱細麤則俱麤今有一斤乘兩知乾絲即以兩數為率生絲即以斤數為率譬之異物各有一定之率也今有田一畞收粟六升大半升今有田一頃二十六畞一百五十九步問收粟㡬何答曰八斛四斗四升一十二分升之五術曰以畞二百四十步為法以六升太半升乘今有田積步為實實如法得粟數按此術亦今有之義以一畞步數為所有率六升太半升為所求率今有田積步為所有數而今有之即得今有取保一嵗價錢二千五百今先取一千二百問當作日㡬何答曰一百六十九日二十五分日之三十二為實實如法為法以一嵗三百五十四日乘先取錢數為實實如法得日數按此術亦今有之義以價為所有率一歲日數為所求率取錢為所有數而今有之即得今有貨人千錢月息三十今有貨人七百五十錢九日歸之問息㡬何答曰六錢四分錢之三術曰以月三十日乘千錢為法以三十日乘千錢為法者得三萬是為貨人錢三萬一日息三十也以息三十乘今所貨錢數又以九日乘之為實實如法得一案原本作淂一錢亦後人妄加錢字今刪以九日乘今所貨錢為今日一所有錢于今有術為所有數息三十日為所求率三萬錢為所有率又可以又月三十日約息三十錢為十分一日以乘今日日所有錢為實千錢為法為率者當等之于一也故三十日或可乘本或可約息皆所以等之也

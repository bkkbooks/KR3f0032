canonical_identifier: bkk:krp/KR3f0032/WYG/v1/juan/2
seq: 2
front:
  text: 又術曰徑自相乘三之四而一
  hash: sha256:51c1bc7909599182f985c11078217514e7a3643f9f052822b154bb5fdd7554da
body:
  text: 按圎徑自乘為外方三之四而一者是為圎居外方四分之三也若令六觚之一面乘半徑其幂即外方四分之一也因而三之即亦居外方四分之三也是為圎裏十二觚之幂耳取以為圎失之于㣲少于徽新術當徑自乘又以一百五十七乘之二百而一淳風等按密率令徑自乘以十一乘之十四而一即圎幂也又術曰周自乘十二而一六觚之周其于圎徑三與一也故六觚之周自相乘為幂若圎徑自乘者九方九方凡為十二觚者十有二故曰十二而一即十二觚之幂也今此令周自乘非但為圎徑自乘者九方而已然則十二而一所得又非十二觚之幂也若欲以為圎幂失之于多矣以六觚之周十二而一可也于徽新術直令圎周自乘又以二十五乘之三百一十四而一得圎幂其率三百一十四者周自乘之幂也置周數六尺二寸八分令自乘得幂三十九萬四千三百八十四分又置圎幂三萬一千四百分皆以一千二百五十六約之得此率淳風等按方面自乘即得其積圓周求其幂假率乃通案假原本訛作股今改正但此術所求用三一為率圎田正法半周及半徑以相乘今乃用全周自乘故須以十二為母何者據全周而求半周則須以二為法就全周而求半徑復假六以除之是二六相乘除周自乘之數依密率以七乘之八十八而一今有􅀈田下周三十步徑十六步問為田幾何答曰一百二十步今有􅀈田下周九十九步徑五十一步問為田幾何答曰五畝二十六步四分步之一術曰以徑乘周四而一此術不驗故推方錐以見其形假令方錐下方六尺高四尺四尺為股下方之半三尺為句正面邪為弦弦五尺也令句弦相乘案句弦原本訛作句股今改正四因之得六十尺即方錐四面見者之幂若令其中容圎錐圓錐見幂與方錐見幂其率猶方幂之與圎幂也案圎幂原本訛作圎錐今改正按方錐下六尺則方周二十四尺以五尺乘而半之則亦方錐之見幂故求圎錐之數折徑以乘下周之半即圎錐之幂也今􅀈田上徑圎穹而與圎錐同術則幂失之于少矣然其術難用故畧舉大較施之大廣田也求圎錐之幂猶求圎田之幂也今用兩全相乘故以四為法除之案原本脱四字今補亦如圎田矣開立圎術説圎方諸率甚備可以驗此今有弧田弦三十步矢十五步問為田幾何答曰一畝九十七步半又有弧田弦七十八步二分步之一矢十三步九分步之七問為田幾何答曰二畝一百五十五步八十一分步之五十六術曰以弦乘矢矢又自乘并之二而一方中之圓圓裏十二觚之幂合外方之幂四分之三也方中合外方之半則朱實合外方四分之一也弧田半圎之幂也故依半圎之體而為之術以弦乘矢而半之案弦原本訛作弧今改正則為黄幂矢自乘而半之則為二青幂青黄相連案注文此書舊有圗而缺又上圎田注内亦引弧田圗詳攷其説非圗不顯今補圗于後為弧體法當用規今觚面不至外畔案原本訛作令弧而不至外畔今改正失之于少矣圎舊術以周三徑一為率俱得十二觚之幂案原本訛作十二弧之弧今改正亦失之子少也與此相似指驗半圎之幂耳若不滿半圎者益復疎濶宜句股鋸圎材之術以弧弦為鋸道長以矢為句深而求其徑案此謂弧矢形求圎徑其術以弧弦折半自乘矢除之加矢為圎徑既知圎徑則弧可割分也割之者半弧田之弦以為股其矢為句為之求弦即小弧之弦也以半小弧之弦為句半圎徑為弦為之求股以減半徑其餘即小弦之矢也割之又割使至極細但舉弦矢相乘之數則必近密率矣然于算數差繁必欲有尋究也若但度田取其大舊術為約耳今有環田中周九十二步外周一百二十二步徑五步此欲令與周三徑一之率相應故言徑五步也據中外周以徽術言之當徑四步一百五十七分步之一百二十二也淳風等按依密率合徑四步二十二分步之十七問為田幾何答曰二畝五十五步于徽術當為田二畝三十一步一百五十七分步之二十三淳風等按依密率為田二畝三十步二十二分步之十五術曰并中外周而半之以徑乘之為積步此田截而中之周則為長案此處有脱誤當云截齊中外之周周則為長并而半之知亦以盈補虚也此可令中外周各自為圎田以中圎減外圎餘則環實也又有環田中周六十二步四分步之三外周一百一十三步二分步之一徑十二步三分步之二此田環而不通匝故徑十二步三分步之二若據上周求徑者此徑失之于多過周三徑一之率葢為疎矣于徽術當徑八步六百二十八分步之五十一淳風等按依周三徑一攷之合徑八步二十四分步之一十一依密率合徑八步一百七十六分步之一十三問為田幾何答曰四畝一百五十六畝四分步之一于徽術當為田二畝二百三十二步五千二十四分步之七百八十七也依周三徑一為田三畝二十五步六十四分步之三十五淳風等按宻率為田二畝二百三十一步一千四百八分步之七百一十七也術曰置中外周步數分母子各居其下案原本脱母字今據注補母互乘子通全步内分子案此句上下皆有脱文當云分母相乘通全步内分子并而半之以中周減外周餘半之案此别記術之小異亦有脱文當云又可以中周減外周餘半之以益中周徑亦通分内子以乘周為實分母相乘為法除之為積步餘積步之分案此句下有脱文當云餘積步之分等數約之以畝法除之即畝數也按此術并中外周步數于上以分母子置于下母互乗子者為中外周俱有餘分故以互乗齊其子母相乗同其母子齊母同故通全步内分子半之上二字有脱文當云并而半之知以盈補虚得中平之周周則為從徑則為廣故廣從相乗而得其積既合分母還須分母出之故令周徑分母相乗而連除之即得積步不盡以等數除之而命分以畝法除積步得畝數也九章算術卷一欽定四庫全書九章算術卷二晉劉徽注唐李淳風注釋粟米以御交質變易凡此諸率相與大通其時相求各如本率可約者約之别術然也粟率五十糲米三十粺米二十七糳米二十四御米二十一侍詩大雅鄭箋云米之率糲十粺九糳八御七疏云九章粟米之法粟率五十糲米三十粺二十七鑿二十四御二十一言粟五升爲糲米三升已下則米漸細故數益少今攷鑿糳古多通用小䵂十三半大䵂五十四糲飯七十五粺飯五十四糳飯四十八御飯四十二菽荅麻麥各四十五稻六十豉六十三飧九十熟菽一百三半糱一百七十五今有稱今有即下文所有率是也此都術也凡九數以爲篇名可以廣施諸率所謂告往而知來舉一隅而三隅反者也誠能分詭數之紛雜通彼此之否塞因物成率審辨名分平其偏頗齊其参差則終無不歸于此術也術曰以所有數乗所求率爲實以所有率爲法少者多之始一者數之母故爲率者必等之於一據粟率五糲率三是粟五而爲一糲米三而爲一也欲化粟爲米者糲當先本是一案下舉粟率五令五為一則此不得云糲當先本是一糲字應改作粟一者謂以五約之令五而為一也訖乃以三乗之令一而爲三如是則率至于一上至字誤云爲率者必等之于一至乃等字之誤以五為三矣然先除後乗或有餘分故術反之又究言之知粟五升爲糲米三升以分言之知粟一斗為糲米五分斗之三以五為母三為子以粟求糲米者乗其母報除也案此句有脱誤當云以子乗其母報除也然則所求之率常為母也淳風等按宜云所求之率常為子所有之率常為母今乃云所求之率常為母知脱錯也實如法而一今有粟一斗欲爲糲米問得㡬何答曰爲糲米六升術曰以粟求糲米三之五而一淳風等按都術以所求率乗所有數以所有率為法此術以粟求米故粟爲所有數三是米率故三為所求率五為粟率故五為所有率粟率五十米率三十退位求之故惟云三五也今有粟二斗一升欲爲粺米問得㡬何答曰爲粺米一斗一升五十分升之十七術曰以粟求粺米二十七之五十而一淳風等按粺米之率二十有七故直以二十七之五十而一也今有粟四斗五升欲為糳米問得㡬何答曰為糳米二斗一升五分升之三術曰以粟求糳米十二之二十五而一淳風等按糳米之率二十有四以為率太繁故因而半之半所求之率以乗所有之數所求之率既減半所有之率亦減半是故十二乗之二十五而一也今有粟七斗九升欲為御米問得㡬何答曰為御米三斗三升五十分升之九術曰以粟求御米二十一之五十而一今有粟一斗欲為小䵂問得㡬何答曰爲小䵂二升一十分升之七術曰以粟求小䵂二十七之百而一淳風等按小䵂之率十三有半半者二為母以二通之得二十七為所求率又以母二通其粟率得一百為所有率凡本率有分者須即乗除也他皆倣此今有粟九斗八升欲為大䵂問得㡬何答曰為大䵂一十斗五升二十五分升之二十一術曰以粟求大䵂二十七之二十五而一淳風等按大䵂之率五十有四因其可半故二十七之亦如粟求糳米半其二率今有粟二斗三升欲為糲飯問得㡬何答曰爲糲飯三斗四升半術曰以粟求糲飯三之二而一淳風等按飯之率七十有五粟求糲飯合此此數乗之今以等數二十有五約其二率所求之率得三所有之率得二故以三乗二除今有粟三斗六升欲為粺飯問得㡬何答曰為粺飯三斗八升二十五分升之二十二術曰以粟求粺飯二十七之二十五而一淳風等按此術與大䵂多同今有粟八斗六升欲為糳飯問得㡬何答曰為糳飯八斗二升二十五分升之一十四術曰以粟求糳飯二十四之二十五而一淳風等按糳飯率四十八此亦半二率而乗除今有粟九斗八升欲為御飯問得㡬何答曰為御飯八斗二升二十五分升之八術曰以粟求御飯二十一之二十五而一淳風等按此術半率亦與糳飯多同今有粟三斗少半升欲為菽問得㡬何答曰為菽二斗七升一十分升之三今有粟四斗一升太半升欲為荅問得㡬何答曰為荅三斗七升半今有粟五斗太半升欲為麻問得㡬何答曰為麻四斗五升五分升之三今有粟一十斗八升五分升之二欲為麥問得㡬何答曰為麥九斗七升二十五分升之一十四術曰以粟求菽荅麻麥皆九之十而一淳風等按四術率竝四十五案竝原本訛作并今改正皆是為粟所求俱合以此率乗其本粟術欲從省先以等數五約之所求之率得九所有之率得十故九乗十除義由于此今有粟七斗五升七分升之四欲為稲問得㡬何答曰為稻九斗三十五分斗之二十四術曰以粟求稻六之五而一淳風等按稻率六十六約二率而乗除今有粟七斗八升欲為豉問得㡬何答曰為豉九斗八升二十五分升之七術曰粟求豉六十三之五十而一今有粟五斗五升欲為飧問得㡬何答曰為飧九斗九升術曰以粟求飧九之五而一淳風等按飧率九十退位與求稻多同今有粟四斗欲為熟菽問得㡬何答曰為熟菽八斗二升五分升之四術以粟求熟菽二百七之百而一淳風等按熟菽之率一百三半半者其母二故以母二通之所求之率既被二乗所有之率随而俱長故以二百七之百而一今有粟二斗欲為糱問得㡬何答曰為糱七斗術曰以粟求糱七之二而一淳風等按糱率一百七十有五合以此數乗其本粟術欲從省先以等數二十五約之所求之率得七所有之率得二故七乗二除今有糲米十五斗五升五分升之二欲為粟問得㡬何答曰為粟二十五斗九斗術曰以糲米求粟五之三而一淳風等按上術以粟求米故粟為所有數三為所求率五為所有率今此以米求粟故米為所有數五為所求率三為所有率準都術求之各合其數以下所有反求多同皆準此今有粺米二斗欲為粟問得㡬何答曰為粟斗斗七升二十七分升之一術曰以粺米求粟五十之二十七而一今有糳米斗求半升欲為粟問得㡬何答曰為粟二斗三升三十六分升之七術曰以糳米求粟二十五之十二而一今有御米十四斗欲為粟問得㡬何答曰為粟三十三斗三升少半升術曰以御米求粟五十之二十一而一案原本作二十二而一今改正今有稻一十二斗六升一十五分升之一十四欲為粟問得㡬何答曰為粟一十斗五升九分升之七術曰以稻求粟五之六而一今有糲米一十九斗二升七分升之一欲為粺米問得㡬何答曰為粺米一十七斗二升一十四分升之一十三術曰以糲米求粺九之十而一淳風等按粺米率二十七合以此數乗糲米術欲從省先以等數三約之所求之率得九所有之率得十故九乘而十除今有糲米六斗四升五分升之三欲為糲飯問得㡬何答曰為糲飯一十六斗一升半術曰以糲米求糲飯五之二而一淳風等按糲飯之率七十有五宜以本糲飯乗以率數案此句舛誤當云宜以本糲米乗此率術欲從省先以等數十五約之所求之率得五所有之率得二故五乗二除義由於此今有糲飯七斗六升七分升之四欲為飧問得㡬何答曰為飧九斗一升三十五分升之三十一術曰以糲飯求飧六之五而一淳風等按飧率九十為糲飯所求宜以飧乗此率案此句誤當云宜以糲飯乗此率術欲從省先以等數十五約之所求之率得六所有之率得五以此故六乗五除也今有菽一斗欲為熟菽問得㡬何答曰為熟菽二斗三升術曰以菽求熟菽二十三之十而一淳風等按熟菽之率一百三半作率原本訛粟今改正因其有半各以母二通之宜以熟菽數乗此率案此句誤當云宜以菽數乗此率衍熟字術欲從省先以等數九約之所求之率得一十一半所有之率得五也今有菽二斗欲為豉問得㡬何答曰為豉二斗八升術曰以菽求豉七之五而一淳風等按豉率六十三為菽所求宜以豉乗此率此句誤當云宜以菽乗此率術欲從省先以等數九約之所求之率得七而所有之率得五也今有麥八斗六升七分升之三欲為小䵂問得㡬何答曰為小䵂二斗五升一十四分升之一十三術曰以麥小䵂三之十而一淳風等按小䵂之率十三半宜以母二通之以乗本麥之數術欲從省先以等數九約之所求之率得三所有之率得十也今有麥一斗欲為大䵂問得㡬何答曰為大䵂一斗二升術曰以麥求大䵂六之五而一淳風等按大䵂之率五十有四合以大䵂數乗此率此句誤當云合以麥數乗此率術欲從省先以等數九約之所求之率得六所有之率得五也今有出錢一百六十買瓴甓十八枚瓴甓甎也問枚㡬何答曰一枚八錢九分錢之八今有出錢一萬三千五百買竹二千三百五十箇問箇㡬何答曰一箇五錢四十七分錢之三十五經率術曰以所買率為法所出錢數為實實如法得一此術猶經分淳風等按今有之義以所求率乗所有數合以瓴甓一枚乗錢一百六十為實案此句原本脱乗字今補但以一乗不長故不復乗是以徑將所買之率與所出之錢為法實也又按此今有之義出錢為所有數一枚為所求率所買為所有率而今有之即得所求數案原本訛作即得所求率今改正一乗不長故不復乗是以徑將所買之率為法以所出之錢為實實如法得一枚錢不盡者等數而命分今有出錢五千七百八十五買漆一斛六斗七升太半升欲斗率之問斗㡬何答曰一斗三百四十五錢五百二分錢之一十五今有出錢七百二十買縑一匹二丈一尺欲丈率之問丈㡬何答曰一丈一百一十八錢六十一分錢之二今有出錢二千三百七十買布九匹二丈七尺欲匹率之問匹㡬何答曰一匹二百四十四錢一百二十九分錢之一百二十四今有出錢一萬三千六百七十買絲一石二鈞一十七斤欲石率之問石㡬何答曰一石八千三百二十六錢一百九十七分錢之百七十八術曰以所求率乗錢數為實以所買率為法實如法得一淳風等按今有之義錢為所求率物為所有數故以乗錢又以分母乗之為實實如法而一有分者通之所買通分内子為所有率故以為法得錢案此已上舛誤不可通攷書内列數問淳風等多據首一問為言此當云今有之義一斗為所求率出錢為所有數故以一斗乗錢數有分者通之又以分母乗之為實所買通分内子為所有率故以為法實如法而一得錢數不盡而命分者因法為母實餘為子實見不滿故以命之今有出錢五百七十六買竹七十八箇欲其大小率之問各㡬何答曰其四十八箇箇七錢其三十箇箇八錢今有出錢一千一百二十買絲一石二鈞十八斤欲其貴賤斤率之問各㡬何答曰其二鈞八斤斤五錢其一石一十斤斤六錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤石率之問各㡬何答曰其一鈞九兩一十二銖石八千五十一錢其一石一鈞二十七斤九兩一十七銖石八千五十二錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤鈞率之問各㡬何答曰其七斤一十兩九銖鈞二千一十二錢其一石二鈞二十斤八兩二十銖鈞二千一十三錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤斤率之問各㡬何答曰其一石二鈞七斤十兩四銖斤六十七錢其二十斤九兩一銖斤六十八錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤兩率之問各㡬何答曰其一石一鈞一十七斤一十四兩一銖兩四錢其一鈞一十斤五兩四銖兩五錢其率術曰各置所買石鈞斤兩以為法以所率乗錢數為實實如法而一不滿法者反以實減法法賤實貴其求石鈞斤兩以積銖各除法實各得其積數餘各為銖其率如欲令差分按出錢五百七十六買竹七十八箇以除錢得七實餘三十是以三十箇復可増一錢然則實餘之數即是貴者之數故曰實貴也本以七十八箇為法今以貴者減之則其餘悉是賤者之數故曰法賤也其求石鈞斤兩以積銖各除法實各得其積數餘各為銖者謂石鈞斤兩積銖除實又以石鈞斤兩積銖除法餘各為銖即合所問今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤銖率之問各㡬何答曰其一鈞二十斤六兩十一銖五銖一錢其一石一鈞七斤一十二兩一十八銖六銖一錢今有出錢六百二十買羽二千一百翭翭羽本也數羽稱其本猶數草木稱其根株欲其貴賤率之問各㡬何答曰其一千一百四十翭三翭一賤其九百六十翭四翭一錢今有出錢九百八十買矢榦五千八百二十枚欲其貴賤率之問各㡬何答曰其三百枚五枚一錢其五千五百二十枚六枚一錢反其率術曰以錢數為法所率為實實如法而一不滿法者反以實減法法少實多二物各以所得多少之數乘法實即物數按其率出錢六百二十買羽一千二百翭反之當二百四十錢一錢四翭其三百八十錢一錢三翭案以

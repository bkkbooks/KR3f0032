body:
  text: 九章算術卷三欽定四庫全書九章算術卷四晉劉徽注唐李淳風注釋少廣以御積幂方圓淳風等按一畝之田廣一步長二百四十歩今欲截取其從少以益其廣故曰少廣術曰置全歩反分母子以最下分母徧乘諸分子及全歩淳風等按以分母乘全少者通其分也以母乘子者齊其子也各以其母除其子置之子左命通分者又以分母徧乘諸分子反已通者皆通而同之并之為法淳風等按諸子悉通故可并之為法亦宜用合分術列數尤多若用乘則算數至繁故别置此術從省約置所求歩數以全歩積分乘之為實實如法而一得從歩案此句實如法之上原水以劉幾總注列入求注又誤截為三中間法有分者至子如母而一凡三十五字訛作正攵語意遂横隔不句通今改正此以田廣為法以畝積歩為實案此十二字原本截作置所求步數以全歩積分乘之為實下注又今攷其文意乃劉注總解田廣求從之術定以田廣為廣以畝積步為實非専釋二語也法有分者當同其母齊其子以同乘法實而使齊子法今以分母乘全歩及子子如母而一案此三十五字原本訛作正文今改正攷注有分者言田廣既有分母子須令母同子齊也以同乘法實言母相乘為同既以子來法通其子母又必以之乘實則實齊子法也今以分母乘全步及子之如母而一即正文所云以孜下分母偏乘諸分子及全歩也以其母除其子也竝以并全法則法實俱長意亦等也故如法而一得從步數案此二十三字原本截作上文法有分者已下之注今攷竝以并全法即此文所云并之為法也則法寳俱長意亦等也承土法既以分母通之而長畝積步為實者亦以通之而長實與法方相等此二句始専釋置所求步數以余歩積分乘之為實二語前後文意相貫自中間訛作正立截首尾而三遂不可通今有田廣一歩半求田一畝間從幾何答曰一百六十步術曰下有半是二分之一以一為二半為一并之得三為法置田二百四十歩亦以一為二乘之為實實如法得從歩今有田廣一步半三分步之一求田一畝問從幾何答曰一百三十歩一十一分歩之一十術曰下有三分以一為六半為三三分之一為二并之得一十一為法置田二百四十步亦以一為六乘之為實實如法得從步今有田廣一步半三分步之一四分歩之一求田一畝問從幾何答曰一百一十五步五分步之一術曰下有四分以為一十二半為六三分之一為四四分之一為二并之得二十五以為法置田二百四十步亦以一為一十二乘之為實實如法而一得従步今有田廣一步半三分步之一四分步之一五分步之一求田一畝問從幾何答曰一百五步一百三十七分步之一十五術曰下有五分以一為六十半為三十三分之一為二十四分之一為一十五五分之一為一十二并之得一百三十七以為法置田二百四十步亦以一為六十乘之為實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一求田一畝問從幾何答曰九十七步四十九分步之四十七術曰下有六分以一為一百二十半為六十三分之一為四十四分之一為三十五分之一為二十四六分之一為二十并之得二百九十四以為法置田二百四十步亦一為一百二十乘之為實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一求田一畝問從幾何答曰九十二步一百二十一分歩之六十八術曰下有七分以一為四百二十半為二百一十三分之一為一百四十四分之一為一百五五分之一為八十四六分之一為七十七分之一為六十并之得一千八十九以為法置田二百四十步亦以一為四百二十乘之為實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一八分步之一求田一畝問從幾何答曰八十八步七百六十一分步之二百三十二術曰下有八分以一為八百四十半為四百二十三分之一為二百八十四分之一為二百一十五分之一為一百六十八六分之一為一百四十七分之一為一百二十八分之一為一百五并之得二千二百八十三以為法置四二百四十步亦以一為八百四十乘之為實實如法得從歩今有田廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一八分步之一九分步之一求田一畝問從幾何答曰八十四步七千一百二十九分步之五千九百六十四術曰下有九分以一為二千五百二十半為一千二百六十三分之一為八百四十四分之一為六百三十五分之一為五百四六分之一為四百二十七分之一為三百六十八分之一為三百一十五九分之一為二百八十并之得七千一百二十九以為法置四二百四十步亦以一為二千五百二十乘之為實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一八分步之一九分步之一十分步之一求田一畞問從幾何答曰八十一步七千三百八十一分步之六千九百三十九術曰下有一十分以一為二千五百二十半為一千二百六十三分之一為八百四十四分之一為六百三十五分之一為五百四六分之一為四百二十七分之一為三百六十八分之一為三百一十五九分之一為二百八十十分之一為二百五十二并之得七千三百八十一以為法置田二百四十步亦以一為二千五百二十乘之為實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一八分步之一九分步之一十分步之一十一分步之一求田一畝問從幾何答曰七十九步八萬三千七百一十一分步之三萬九千六百三十一術曰下有一十一分以一為二萬七千七百二十半為一萬三千八百六十三分之一為九千二百四十四分之一為六千九百三十五分之一為五千五百四十四六分之一為四千六百二十七分之一為三千九百六十八分之一為三千四百六十五九分之一為三千八十一十分之一為二千七百七十二十一分之一為二千五百二十并之得八萬三千七百一十一以為法置田二百四十步亦以一為二萬七千七百二十乘之為實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一八分步之一九分步之一十分步之一十一分步之一十二分步之一求田一畝問從幾何答曰七十七步八萬六千二十一分步之二萬九千一百八十三術曰下有一十二分以一萬八萬三千一百六十半為四萬一千五百八十三分之一為二萬七千七百二十四分之一為二萬七百九十五分之一為一萬六千六百三十二六分之一為一萬三千八百六十七分之一為一萬一千八百八十八分之一為一萬三百九十五九分之一為九千二百四十一十分之一為八千三百一十六十一分之一為七千五百六十十二分之一為六千九百三十并之得二十五萬八千六十三以為法置田二百四十步亦以一為八萬三千一百六十乘之為實實如法得從步淳風等按凡為術之意約省為善宜云下有一十二分以一為二萬七千七百二十半為一萬三千八百六十三分之一為九千二百四十四分之一為六千九百三十五分之一為五千五百四十四六分之一為四千六百二十七分之一為三千九百六十八分之一為三千四百六十五九分之一為三千八十十分之一為二千七百七十二十一分之一為二千五百二十十二分之一為二千三百一十并之得八萬六千二十一以為法置田二百四十步亦以一為二萬七千七百二十乘之以為實實如法得從步其術亦得如不繁也今有積五萬五千二百二十五步問為方幾何答曰二百三十五步今有積二萬五千二百八十二步問為方幾何答曰一百五十九步今有積七萬一千八百二十四步問為方幾何答曰二百六十八步今有積五十六萬四千七百五十二步四分步之一問為方幾何答曰七百五十一步半今有積三十九億七千二百一十五萬六百二十五步問為方幾何答曰六萬三千二十五步開方求方幂之一面也術曰置積為實借一算步之超一位言百之面十也言萬之面百也議所得以一乘所借一算為法而以除先得黄甲之而上下相命是自乘而除也案注而有黄甲黄乙朱青幂之文則知舊有圖而缺今補鬬方圖附于後除已倍法為定法倍之者豫張兩面求幂定袤以待復除故曰定法其復除折法而下欲除朱幂者本當副置所得成方倍之為定法以折議乘而以除如是當復步之而止乃得相命故使就上折下復置借算步之如初以復議一乘之欲除朱幂之角黄乙之幂其意如初之所得也所得副以加定法以除以所得副從定法冄以黄乙之面加定法是則張兩青幂之袤復除折下如前若開之不盡者為不可開當以面命之術或有以借算加定法而命分者雖粗相近不可用也凡開積為方方之自乘當還復有積分令不加借算而命分則常微少其加借算而命分則又微多其数不可得而定故惟以面命之為不朱耳譬猶以三除十以其餘為三分之一而復其數可以舉不以面命之加定法如前求其微数微数無名者以為分子其一退以十為母其冄退以百為母退之彌下其分彌細則朱幂雖有所乘之数不足言之也若實有分者通分内子為定實乃開之訖開其母報除淳風等按分母可開者竝通之積先合二母既開之後一母尚存故開分母求一母為法以報除也若母不可開者又以母冄乘定實乃開之訖令如母而一淳風等按分母不可開者本一母也又以母乘之乃合二母既開之後亦一母存焉故令如母而一得全面也又按此術開方者求方幂之一面也借一算者假借一算空有列位之名而無除積之實方隅得面是故借算列之于下也步之超一位者方十自乘其積有百方百自乘其積有萬故超位至百而言十至萬而言百也議所得以一乘所借一算為法而以除者先得黄甲之面以方為積者兩相乘故開方除之還令呐面上下相命是自乘而除之也除已倍法為定法者實積未盡當復更除故豫張兩面朱幂定袤以待復除故曰定法也其復除折法而下者欲除朱幂本當副置所得成方倍之為定法以折議乘之而以除如是當復步之而止乃得相命故使就上折之而下也復置借算步之如初以復議一乘之所得副以加定法以除之欲除朱幂之角黄乙之幂以所得副從定法者再以黄乙之幂加定法是則張兩青幂之袤故如前開之即合所問今有積一千五百一十八步四分步之二問為圓周幾何答曰一百三十五步于徽術當周一百三十八步一十分步之一淳風等按此依宻率為周一百三十八步五十分步之九今有積三百步問為圓周幾何答曰六十步于徽術當周六十一步五十分步之十九淳風等按依宻率為周六十一步一百分步之四十一術曰置積步数以十二乘之以開方除之即得周此術以周三徑一為率與舊圓田術相反覆也于徽術以三百一十四乘積如二十五而一所得開方除之即周也開方除之即徑是為據見幂以求周猶失之于微少其以二百乘積一百五十七而一開方除之即徑猶失之于微多淳風等按此注于徽術求周之法其中不用開方除之即徑六字今木有者衍賸也依宻率八十八乘之七而一按周三徑一之率假令周三徑二半周半徑相乘得幂三周六自乘得三十六俱以等数除得幂一周之数十二也其積本周自乘合以二乘之十二而一得積三也術為一乘不長故以十二而一得此積今還原置此積三以方二乘之者復其本周自乘之数凡物自乘開方除之復其本数故開方除之耶周今有積一百八十六萬八百六十七尺此尺謂立方尺也凡物有高深深而言積者曰立方問為立方幾何答曰一百二十三尺今有積一千九百五十三尺八分尺之一問為立方幾何答曰一十二尺半今有積六萬三千四百一尺五百一十二分尺之四百四十七問為立方幾何答曰三十九尺八分尺之七今有積一百九十三萬七千五百四十一尺三十七分尺之一十七問為立方幾何答曰一百二十四尺太半尺開立方立方適等求其一面也術曰置積為實借一算步之超二位言千之面十言百萬之面百議所得以冄乘所借一算為法而以除冄乘者亦求為方幂以上議命而除之則立方等也除已三之為定法為當復除故豫張三面已定方幂為定法也復除折而下復除者三面方幂已皆自乘之数湏得折議定其厚薄耳開平幂者方百之面十開立幂者方千之面十據定法也有成方之幂故復除當以千為百折下一等也以三乘所得数置中行設三亷之定長復借一算置下行欲以為隅方立方等未有定数且置一算定其位步之中超一下超二位上方法長自乘而折中亷法但有長故除一等下隅法無面長故又降一等也復置議以一乘中為三亷借幂也冄乘下令隅自乘為方幂也皆副以加定法以定法除三面三亷一隅皆已有幂以上議命之而除去三袤之厚也除已倍下并中従定法凡冄以中三以下加定法者三亷各當以兩面之幂連于兩方之面一隅連于三亷之端案原本脱兩方之面一隅連于凡八字今據李淳風注釋所舉此文補入以待復除也言不盡意解此要當以棊乃得明耳復除折下如前開之不盡者亦為不可開術亦有以定法命分者不如故幂開方以微数為分也若積有分者通分内子為定實定實乃開之託開其母以報除淳風等按分母可開者竝通之積先合三母既開之後一母尚存故開分母求一母為法以報除也若母不可開者又以母冄乘定實乃開之訖令如母而一淳風等按分母不可開者本一母也又以母再乘之今合三母既開之後一母猶存故令如母而一得全面也又按開立方者立方適等求其一面之数也借一算步之超二位者立方求積方再自乘就積開之故超二位言千之面十言百萬之面百也議所得以再乘所借一算為法而以除者求為方幂以議命之而除則立方等也除已三之為定法者為積米盡當復更除故豫張三面已定方幂為定法也復除折而下者三面方幂皆已有自乘之数湏得折議定其厚薄據開平方百之面十其開立方則千之面十而定法已有成方之幂故復除之當以千為百折下一等也以三乘所得数置中行者設三亷之定長也復借一算置下行者欲以為隅方立方等未有数且置一算定其位也步之中超一下超二者上方法長自乘而一折中亷法但有長故降一等下隅法無面長故又降一等也復置議以一乘中者為三亷借幂也再乘下者當令隅自乘為方幂也皆副以加定法以定法除者三面三亷一隅皆已有幂以上議命之而除去三袤之厚也除已倍下并中從定法者三亷各當以兩面之幂連于兩方之面一隅連于三亷之端以待復除也其開之不盡者折下如前開方即合所問有分者通分納子開之訖開其母以報除可開者竝適之積先令三母既開之後一母尚存故開分母者求一母為法以報除若母不可開者又以母冄乘定實乃開之訖令如母而一分母不可開者本一母又以母冄乘今合三母既開之後亦一母尚存故令如母而一得全面也今有積四千五百尺亦謂立方之尺也問為立圓徑幾何答曰二十尺淳風等按依宻率立圓徑二十八尺計積四千一百九十尺二十一分尺之一十今有積一萬六千四百四十八億六千六百四十三萬七千五百尺問為立圓徑幾何答曰一萬四千三百尺淳風等按依宻率為徑一萬四千六百四十三尺四分尺之三術曰置積尺数以十六乘之九而一所得開立方除之即圓徑立圓即丸也為術者葢依周三徑一之率令圓幂居方幂四分之三圓囷居立方亦四分之三更令圓囷為方率十二為丸率九凡居圓囷又四分之三也置四分自乘得十六三分自乘得九故丸居立方十六分之九也故以十六乘積九而一得立方之積丸徑與立方等故開立方而除得徑也然此意非也何以驗之取立方棊八枚皆令立方一寸積之為立方二寸規之為圓囷徑二寸高二寸又復横因之案此句有舛誤後李淳風注釋亦以立方棊為喻有従規横規之語此當云又復横規之則其形有似牟合方葢矣八棊皆然似陽馬圓然也按合葢者方率也丸居其中即圓率也推此言之謂夫圓囷為方率豈不闕哉以周三徑一為圓率則圓幂傷少令圓囷為方率則九積傷多互相通補是以九與十六之率偶與實相近而丸猶傷多耳觀立方之内合葢之外雖哀殺有漸而多少不揜判合總結方圓相纒濃纎詭互不可等正欲陋形措意懼失正理敢不闗疑以俟能言者黄金方寸重十六兩金丸徑寸重九兩率生于此未曾驗也周官考工記㮚氏為量改煎金錫則不耗不耗然後權之權之然後凖之凖之然後量之言鍊金使極精而後分之則可以為率也命丸徑自乘三而一開方除之即丸中之立方也微令丸中立方立尺五尺為句句自乘幂二十五尺倍之得五十尺以為股幂謂平面方五尺之弦也以此弦幂為股亦以五尺為句并句股幂得七十五尺是為大弦幂開方除之則大弦可知也大弦即中立方之長邪邪即丸徑故中立方自乘之幂于丸徑自乘之幂三分之一也今大弦還乘其幂即丸外立方之積也大弦幂開之不盡令囷幂七十五案七十五即大弦幂是為外立方一面自乘之幂非囷幂也囷幂當是具幂之誤冄自乘之為面命得外立方積四十二萬一千八百七十五尺之面又令中立方五尺自乘又以方乘之得積一百二十五尺一百二十五尺自乘為面句得積一萬五千六百二十五尺之面案句字誤彼上云命得外立方積之面此乃命得中立方積之面也句當作命皆以六百二十五約之外立方積六百七十五尺之面中立方積二十五尺之面也張衡算又謂立方為質立圓為渾衡言質之與中外之渾六百七十五尺之面開方除之不足一謂外質積二十六也内渾二十五之面謂積五尺也今徽令質言中渾渾又言質則二質相與之率猶衡二渾相與之率也衡葢亦先二質之率推以言渾之率也衡又言質六十四之面渾二十五之面質復言渾謂居質八分之五也又云方八之面圓案此下有脱文據前言丸居圓圖四分之三此當作方八之面圓六之面故斷之云圖渾相推知其復以圓圖為方率渾為圓率脱六之而三字圓渾相推知其復以圓囷為方率渾為圓率也失之逺矣衡説之自然欲協其陰陽竒偶之説而不顧疎宻矣雖有文辭斯亂道破義病也置外質積二十六以九乘之十六而一得積十四尺八分之五即質中之渾也以分母乘全内子得一百一十七又置内質積五以分母乘之得四十是謂質居渾一百一十七分之四十案此言渾圓内所客之立方是謂質當作是内質而渾率猶為傷多也假令方二尺方四面并得八尺也謂之方周其中令圓徑與方等亦二尺也丸半徑以乘圓周之半即圓幂也半方以乘方周之半即方幂也然則方周知方幂之率也圓周知圓幂之率也按如衡術方周率八之面圓周率五之面也令方周六十四又之面則圓周四十尺之面也又令徑二尺自乘得徑四尺之面案上言張衡術立方内容五圓者止圓積居立方積八分之五以此通之立間外非周之幂亦居立方外六面之幂八分之五故設立方幂六七四尺則立圓幂四十尺也此言又令徑二尺白乘得徑四尺之而二語無從得其解據下云是為圓周率十二之面而徑率一之面也謂周自乘得十二耆徑自乘得一置十二開方除之得圓周三四六四三五弱由此言之衡所定平方與平圓周徑之率古周四其靣一内容圓之周三四六四三五弱其徑亦一劉徽所定方圓周徑之率則方周四圓周三一四一六其徑一故下言衡增周人多過其實然則當云又令徑一尺分周四尺自乘得十六尺之面不得言徑二尺自乘得徑四尺之而或傳冩舛誤校是書者又有竄改遂致不可通是為圓周率十二之面而徑率一之面也衡亦以周三徑一之率為非是故更著此法然僧周太多過其實矣淳風等按祖一之謂劉徽張衡二人皆以圓囷為方率丸為圓率乃設新法祖暅之開立圓術曰以二乘積案此句有脱誤據淳風中明祖暅之所定立圓術以徑冄司乘十一乘之二十一而一得圓積反是以求徑當云以二十一乘積十一而一葢立圓積約居同徑之立方積二十一分之十一也君以二乘積則立圓居立方之半疏謬甚矣復云今欲求其本清故二十一乘之十一而一正承此申明其説開立方除之即立徑其意何也取立方棊一枚令立樞子左後之下隅從規去其右上之亷又合而横規之去其前上之亷案此下有脱文據上去立相于左後之下隅則其隅正與右前之上隅相對成内外而外之亷皆連于右前之上隔一為右上之亷一為前上之亷一為右前之亷三亷皆當規去方是外棊三内慕一不得僅言規去二亷也疑脱及右前之亷五字于是立方之慕分而為四規内棊一謂之内棊規外棊三謂之外棊規案上言規内棊一規外棊三以内棊列棊稱之此規字不得連上句當是衍文更合四棊復横斷之以句股言之令餘高為句内棊斷上方為股本方之数其弦句股之法以句幂減弦幂則餘為股幂若令餘高自乘減本方之幂餘即内減其斷上方之幂也本方之幂即外四棊之斷上幂然則餘高自乘即外三棊之㫁上幂矣不問卑勢加然也案此句舛誤不可通反上文借立方棊以論立圓而所言一及句脱竝與乎幂不足見圓術當行脱誤然固有所歸同而途殊者耳而乃控逺以演類借況以析微按陽馬方高数参等者列而立之横截去上則高自乘與㫁上幂数亦等馬夫疊棊成立積緣幂勢既同則積不容異由此觀之規之外三棊旁蹙為一即一陽馬也三分立方則陽馬居一内棊居二可知矣合八小方成一大方合八内棊成一合葢内棊居小方三分之二則合葢居立方亦三分之二較然驗矣置三分之二以圓幂率三率之如方幂率四而一約而定之以為九率故曰九居立方三分之一也案此句舛誤據上言置三分之二以三乘之如四而一乃九居立方二分之一非三分之一况已上明祖氏圓術其率乃丸居立方二十一分之十一下云圓徑冄自乘十一乘之如二十一而一是也君二分之一可祖氏術不隅矣又祖氏方幂率下四圓幂率十一亦不得用方幂四圓幂三之疎率以解祖氏説自祖暅之開立方圓術曰至此似因傳冩既訛後又妄亦一改遂不可通今攷立方與圓圈猶之平方與平圓也其率亦立方積十四圓囷積十一而丸居圓囷三分之二與十四分之十一通之分母乘分母得四十二分子乘分子得二十一是為丸居立方四十二分之二十二即二十二分之十一也祖氏求圓囷立圓平圖三法本係貫為一等数既宻心亦昭晰張衡倣舊貽哂于後劉徽循故未暇校新夫豈難哉栁未之思也依率立此圓積本以圓徑冄自乘十一乘之二十一而一約此積今欲求其本積故二十一乘之十一而一凡物冄自乘開立方除之復其本数故立方除之即丸徑也九章算術卷四

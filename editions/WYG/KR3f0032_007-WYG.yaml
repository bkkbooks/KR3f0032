front:
  text: 九章算術卷七晉
  hash: sha256:f6233e9f2e76dafc8a25c7e20945008f7981296bb1fcc24f8ae88657185aad8c
body:
  text: 劉徽注唐李淳風注釋盈不足以御隠雜互見今有共買物人出八盈三人出七不足四問人數物價各幾何答曰七人物價五十三今有共買雞人出九盈一十一人出六不足十六問人數雞價各幾何答曰九人雞價七十今有共買璡人出半盈四人出少半不足三問人數璡價各幾何答曰四十二人璡價十七今有共買牛七家共出一百九十不足三百三十九家共出二百七十盈三十問家數牛價各幾何答曰一百二十六家牛價三千七百五十按此術并盈不足者為衆家之差故以為實置所出率各以家數除之各得一家所出率以少減多者得一家之差以除即家數以出率乗之減盈故得牛價也術曰盈不足相與同共買物者案此十字原本訛在有分者通之句下共訛作其遂不可通今改正置所出率盈不足各居其下令維乗所出率并以為實并盈不足為法案此下原本有實如法而一五字考此術法實皆以設差約之實為物價法為人數與他術實如法而一者不同此五字後人所加今刪按盈者謂之朓不足者謂之朒所出率謂之假令盈朒維乗兩設者欲為同齊之意據共買物人出八盈三人出七不足四齊其假令同其盈朒盈朒俱十二通計齊則不盈不朒之正數故可并之為實并盈不足為法齊之三十二者是四假令有盈十二齊之二十一者是三假令亦朒十二并七假令合為一實故并三四為法案此條原本訛在以御隠雜互見之下今改正移此有分者通之若兩設有分者齊其子同其母此問兩設俱見零分故齊其子同其母案此條首句之上原本有注云二字接上條故并三四為法之下係後人連合注文田其更端不相通貫竄入注云二字以别之今刪正副置所出率案原本脱副字今補以少減多餘以約法實實為物價法為人數案此術前列四問本會通為一徽注辭不逹意後人失其解遂妄加改竄據第二問人出九盈十一人出六不足十六以十六互乗九得一百四十四以十一互乗六得六十六并之二百一十為實所謂相與同共買物者置所出率盈不足各俱其丅令維乗所出率并以為實也盈十一及不足十六并之二十七為法所謂并盈不足為法也于出九減出六餘三以三約實二百一十得價七十以三約法二十七得九人所謂副置所出率以少減多餘以約法實實為物價法為人數也其第一問所出率相減餘一則法實無庸約故維乗并之徑得物價并盈不足徑得人數偶省一算耳第三問人出半盈四人出少半不足三半即二分之一少半即三分之一也又即為二人共出一盈四三人共出一不足三以二分通三之一得二以三分通二之一得三是齊其子也二分三分相乗得六是同其母也以盈四互乗二得八以不足三互乗三得九并之十七為實是盈不足維乗所出率并以為實也盈四及不足三并而為七以分母相乗所得六通而齊之得四十二為法是并盈不足為法也二三相減餘一以約法實亦無庸約故徑得物價人數第四問七家共出一百九十不足三百三十九家共出二百七十盈三十以九家互乗一百九十得一千七百一十以七家互乗二百七十得一千八百九十猶之齊其子也七家九家相乗得六十三猶之同其母也以盈三十互乗一千七百一十得五萬一千三百以不足三百三十互乗一千八百九十得六十二萬三千七百并之六十七萬五千為實是盈不足維乗所出率并以為實也盈三十及不足三百三十并而為三百六十以六十三通而齊之得二萬二千六百八十為法是并盈不足為法也于一千八百九十減一千七百一十餘一百八十以一百八十約實六十七萬五千得價三千七百五十以一百八十約法二萬二千六百八十得一百二十六家是副置所出率以少減多餘以約法實也三四兩問皆所謂有分者通之也由此觀之後人改竄之謬顯然後兩盈兩不足相與同共買物者後人亦改竄其文謬戻倣此令下維乗上訖以同約之不可約故以乗同之所出率以少減多者餘謂之設差以為少設則并盈朒是為定實故以少設約定實則法為人數適足之實故為物價案二十字有舛誤當云故以少設約法則為人數約實則為物價盈朒當與少設相通不可徧約亦當分母乗設差為約法實此條首句之上原本有又云二字接上條故齊其子同其母之丅亦後人連合注文田其更端竄入此二字以别之今改正其一術曰并盈不足為實以所出率以少減多餘為法實如法得一以所出率乗之減盈増不足即物價此術意謂盈不足衆衆人之差以所出率以少減多餘為一人之差以一人之差約衆人之差故得人數也案此條原本訛在第一問之下今改正今有共買金人出四百盈三千四百人出三百盈一百問人數金價各幾何答曰三十三人金價九千八百今有共買羊人出五不出四十五人出七不足三問人數羊價各幾何答曰二十一人羊價一百五十術曰兩盈兩不足相與同共買物者案此十二字原本亦訛在後有分者通之句下共訛作其今改正置所出率盈不足各居其下令維乗所出率以少減多餘為實兩盈兩不足以少減多餘為法案此下原本有實如法而一五字亦後人妄加今刪有分者通之副置所出率案原木脱副字今補以少減多餘以約法實實為物價法為人數按此術兩盈兩不足者兩設皆不足于正數其所以變化猶兩盈案此有脱誤當云兩盈者兩設皆逾于正數兩不足者兩設皆不足于正數其所以變化則兩不足亦猶兩盈而或有勢同而情違者當其為實俱令不足其相乗減則遺其所不足焉故其餘所以為實者無朒數以損焉葢出而有餘兩盈兩設皆通于正數案以上訛舛不可通假令與共買物人出八盈三人出九盈十齊其假令同其兩盈兩盈俱三十案原本脱盈字今補舉齊則兼去其餘所以為實者無盈數兩盈以少減多餘為法齊之八十者是十假令而凡盈三十者是齊十以十三之案此七字舛誤不可通當云是三以十齊之齊之二十七者是三假令而凡盈三十者是三以十之案此五字亦舛誤當云是十以三齊之今假令兩盈共十三以三減十餘七為一實故令以三減十餘七為法所出率以少減多餘謂之設差因設差為少設則兩盈之差是為定實故以設法人數約實即得全數案此十二字亦舛誤當云故以少設約法則為人數約實則得物價其一術曰置所出率以少減多餘為法兩盈兩不足以少減多餘為實實如法而一得人數以所出率乗之減盈増不足即物價置所出率以少減多得一人之差兩盈兩不足相減餘為衆人之差案原本脱餘字今補故以一人之差除之得人數以所出率乗之減盈増不足即物價今有共買犬人出五不足九十人出五十適足問人數大價各幾何答曰二人犬價一百術曰以盈及不足之數為實實置所出率以少多餘為法實如法得一其求物價者以適足乗人數得物價此術意謂以所出率以少減多者餘是一人不足之差不足數為衆人之差以一人差約之故得人之数也適足數為實者案此句訛舛當云盈不足數為實者數單見即衆人差故以為實所出率以少減多餘即一人差案原本脱餘字今補故以為法以除衆人差得人數以適足乗人數即得物價也今有米在十斗桶中不知其數滿中添粟而舂之得米七斗問故果幾何答曰二斗五升術曰以盈不足術求之假令故米二斗不足二升令之三斗有餘二升案此下有脱文當云以盈不足維乗假令之數并為實并盈不足為法實如法而一得故米斗數按桶受一斛若使故米二斗須添粟八斗以滿之八斗得糲米四斗八升課于七斗是為不足二升若使故米三斗須添粟七斗以滿之七斗得糲米四斗二升課于七斗是為有餘二升以盈不足維乗假令之數者欲為齊同之意案此下原本云為齊同者假令據共買物人出八盈三人出七不足四齊其假令同其盈朒俱十二通計齊即不盈不朒之正數故可以并之為實并盈不足為法齊之三十二者是四假令有盈十二齊之二十一者是三假令而凡物十二并七假令合為一實故亦并三四為法几一百字已見前此處係重出衍文與上下絶不相涉今刪去實如法即得故米斗數乃不盈不朒之正數也今有垣髙九尺𤓰生其上蔓日長七寸瓠其其下蔓日長一尺問幾何日相逄𤓰瓠各長幾何答曰五日十七分日之五𤓰長三尺七寸一十七分寸之一瓠長五尺二寸一十七分寸之一十六術曰假令五日不足五寸令之六日有餘一尺二寸案此下有脱文當云以盈不足維乗假令之數并為實并盈不足為法實如法而一得日數按假令五日不足五寸者𤓰生五日下垂蔓三尺五寸瓠生五日上延蔓五尺課于九尺之垣是為不足五寸令之六日有餘一尺二寸者若使𤓰生六日下垂蔓四尺二寸瓠生六日上延蔓六尺課于九尺之垣是為有餘一尺二寸以盈不足維乗假令之數者欲為齊同之意案此下原本云假令據共買物者人出八盈三人出七不足四齊其假令同其盈朒俱十二通計齊即不盈不朒之正數故可并以為實并盈不足為法齊之三十二者是四假令有盈十二齊之二十一者足三假令而凡朒十二并七假令合為一實故亦并三四為法凡九十六字即上條重出衍文復雜入于此與上下亦絶不相涉今刪去實如法而一即設差不盈不朒之正數即數即得日數以𤓰瓠一日之長乗之故各得其長之數也今有蒲生一日長三尺莞生一日長一尺蒲日自半莞生日自倍問幾何日而長等答曰二日十三分日之六各長四尺八寸一十三分寸之六術曰假令二日不足一尺五寸令之三日有餘一尺七寸半案此下有脱文當云以盈不足維秉假令之數并為實并盈不足為法實如法而一得日數不盡者等數約之而命分以後一日所長乗日分子如日分母而一各増二長為二物共長齊等之數按假令二日不足一尺五寸者蒲生二日長四尺五寸莞生二日長三尺是為未相及一尺五寸故曰不足令之三日有餘一尺七寸半者蒲増前七寸半莞増前四尺是為過一尺七寸半故曰有餘以盈不足乗除之又以後一日所長各乗日分子如日分母而一者各得日分子之長也故各増二長即得其數今有醇酒一斗直錢五十行酒一斗直錢一十今將錢三十得酒二斗問醇行酒各得幾何答曰醇酒二升半行酒一斗七升半術曰假令醇酒五升行酒一斗五升有餘一十令之醇酒二升行酒一斗八升不足二案此下有脱文當云各以盈不足維乗之并為實并盈不足為法實如法而一得二酒之數據醇酒五升直錢二十五行酒一斗五升直錢一十五課于三十是為有餘十據醇酒二升直錢一十行酒一斗八升直錢一十八課于三十是為不足二以盈不足術求之此問已有重説及其齊同之意也今有大器五小器一容三斛大器一小器五容二斛問大小器各容幾何答曰大器容二十四分斛之十三小器容二十四分斛之七術曰假令大器五斗小器亦五斗盈一十斗令之大器五斗五升小器二斗五升不足二斗按大器容五斗大器五容二斛五斗以減二斛餘五斗即小器一所容故曰小器亦五斗小器五容二斛五斗大器一合為三斛課于兩斛乃多十斗令之大器五斗五升大器五合容二斛七斗五升以減三斛餘二斗五升即小器一所容故曰小器二斗五升大器一容五斗五升小器五合容一斛二斗五升合為一斛八斗課于二斛少二斗故曰不足二斗以盈不足維乗除之案此句有脱文當云以盈不足維乗之各并為實并盈不足為法除之今有漆三得油四油四和漆五今有漆三斗欲令分以易油還自和餘漆問出漆得油和漆各幾何答曰出漆一斗一升四分升之一得油一斗五升和漆一斗八升四分升之三術曰假令出漆九升不足六升令之出漆一斗二升有餘二升按此術三斗之漆出九升得油一斗二升可和漆一斗五升餘有二斗一升則六升無油可和故曰不足六升令之出漆一斗二升則易得油一斗六升可和漆二斗于三斗之中已出一斗二升餘有一斗八升見在油合和得漆二斗則是有餘二升以盈不足維乗之為實并盈不足為法實如法而一得出漆升數案此下有脱文當云求油及和漆者四五各為所求率四三各為所有率而今有之即得也今有玉方一寸重七兩石方一寸重六兩今有石立方三寸中有玉并重十一斤問玉石重各幾何答曰玉一十四寸重六斤二兩石一十三寸重四斤一十四兩術曰假令皆玉多十三兩令之皆石不足一十四兩不足為玉多為石各以一寸之重乗之得玉石之積重立方三寸是一面之方計積二十七寸玉方一寸重七兩石方一寸重六兩是為玉石重差一兩假令皆玉合有一百八十九兩課于一十一斤有餘一十三兩案此下原本衍故謂二字今刪玉重而石輕故有此多即二十七寸之中有十三寸寸損一兩則以為石重故言多為石言多之數出于石以為玉假令皆石合有一百六十二兩課于十一斤少十四兩故曰不足此不足即以重為輕故令減少數于石重即二十七寸之中有十四寸寸増一兩也案此句有脱文當云寸増一兩則以為玉重也今有善田一畞價三百惡田七畞價五百今并買一頃價錢一萬問善惡田各幾何答曰善田一十二畞半惡田八十七畞半術曰假令善田二十畞惡田八十畞多一千七百一十四錢七分錢之二令之善田一十畞惡田九十畞不足五百七十一錢七分錢之三按善田二十畞直錢六千惡田八十畞直錢五千七百一十四七分錢之二課于一萬是多一千七百一十四七分錢之二令之善田十畝直錢三千惡田九十畞直錢六千四百二十八七分錢之四課于一萬是為不足五百七十一七分錢之三以盈不足術求之也今有黄金九枚白銀一十一枚稱之重適等交易其一金輕十三兩問金銀一枚各重幾何答曰金重二斤三兩一十八銖銀重一斤一十三兩六銖術曰假令黄金三斤白銀二斤一十一分斤之五不足四十九于右行令之黄金二斤白銀一斤一十一分斤之七多一十五于左行以分母各乗其行内之數以盈不足維乗所出率并以為實并盈不足為法實如法得黄金重分母乗法以除得銀重約之得分也按此術假令黄金九白銀一十一俱重二十七斤金九約之得三斤銀一十一約之得二斤一十一分斤之五各為金銀一枚重數就金重二十七斤之中減一金之重以益銀銀重二十七斤之中減一銀之重以益金則金重二十六斤一十一分斤之五銀重二十七斤一十一分斤之六以少減多則金輕一十七兩一十一分兩之五課于一十三兩多四兩一十一分兩之五通分内子言之是為不足四十九又令之黄金九一枚重二斤九枚重一十八斤白銀一十一亦合重一十八斤也乃以一十一除之得一枚一斤一十一分斤之七為銀一枚之重數今就金重一十八斤之中減一枚金以益銀復減一枚銀以益金則金重一十七斤一十一分斤之七銀重一十八斤一十一分斤之四以少減多即金輕一十一分斤之八課于一十三兩少一兩一十一分兩之四通分内子言之是為多一十五以盈不足為之如法得金重案此二句有脱誤當云以盈不足術求之實如法得金重以除者為銀兩分母故同之案此二句亦脱誤當云分母乗法以除者謂銀兩分母同須通法而後乃除得銀重餘皆約之者術省故也今有良馬與駑馬發長安至齊齊去長安三千里良馬初日行一百九十三里日増一十三里駑馬初日行九十七里日減半里良馬先至齊復還迎駑馬問幾何日相逢及各行幾何答曰一十五日一百九十一分日之一百三十五而相逢良馬行四千五百三十四里一百九十一分里之四十六駑馬行一千四百六十五里一百九十一分里之一百四十五術曰假令十五日不足三百三十七里半令之十六日多一百四十里以盈不足維乗假令之數并而為實并盈不足為法實如法而一得日數不盡者以等數除之而命分案以盈不足維乗至此原本訛入注内今據前術體例改正又此下仍有脱文當云求二馬各行里數以十五日初末之行并而半之十五乗之又以後一日之定行乗日分子日分母為法得一各加于前破半里為半法以入殘分求良馬行者十四乗益疾里數而半之加良馬初日之行里數案此下有脱文當云以乗十五日得十五日之凡行又以十五日乗益疾里數加良馬初日之行以乗日分子如日分母而一所得前良馬凡行里數即得其不盡而命分案此二句有舛誤當云所得及其不盡而命分加于前良馬凡行里數即得求駑馬行者以十四乗半里又半之以減駑馬初日之行里數以乗十五日之凡行案又半之至此有訛脱當云以減駑馬初日之行里數餘以并初日之行又半之乗十五日得駑馬十五日之凡行又以十五日乗半里以減駑馬初日之行餘以乗日分子如日分母而一所得加前里即駑馬定行里數其竒半里者為半法以半法増殘分即得其不盡者而命分按令十五日不足三百三十七里半者據良馬十五日凡行四千二百六十里除先去齊三千里定還迎駑馬一千二百六十里駑馬十五日凡行一千四百二里半并良馬二馬所行得二千六百六十二里半課于三千里少三百三十七里半故曰不足令之十六日多一百四十里者據良馬十六日凡行四千六百四十八里先除去齊三千里定還迎駑馬一千六百四十八里駑馬十六日凡行一千四百九十二里并良駑二馬所行得三千一百四十里課于三千里餘有一百四十里故謂之多也以盈不足之案此五字脱誤不可通當云以盈不足維乗假令之數并而為實并盈不足為法實如法而一得日數者即設差不盈不朒之正數以二馬初日所行里乗十五日為一十五日平行數求初末益疾減遲之數者并一與十四以十四乗而半之為中平之積案此下原本有減益疾之數五字係衍文今刪又令益疾減遲里數乗之各為減益之中平里故各減益平行數得一十五日定行里若求後一日以十六日之定行里數乗日分子如日分母而一各得日分子之定行里數故各并十五日定行里即得其駑馬竒半里者法為全里之分故破半里為半法以増殘分即合所問也今有人持錢之蜀賈利十三初返歸一萬四千次返歸一萬三千次返歸一萬二千次返歸一萬一千後返歸一萬凡五返歸錢本利俱盡問本持錢及利各幾何答曰本三萬四百六十八錢三十七萬一千二百九十三分錢之八萬四千八百七十六利二萬九千五百三十一錢三十七萬一千二百九十三分錢之二十八萬六千四百一十七術曰假令本錢三萬不足一千七百三十八錢半令之四萬多三萬五千三百九十錢八分按假令本錢三萬并利為三萬九千除初返歸留餘加利為三萬二千五百除二返歸留餘又加利為二萬五千三百五十除第三返歸留餘又加利為一萬七千三百五十五除第四返歸留餘又加利為八千二百六十一錢半除第五返歸留合一萬錢不足一千七百三十八錢半若使本錢四萬并利為五萬二千除初返歸留餘加利為四萬九千四百除第二返歸留餘又加利為四萬七千三百二十除第三返歸留餘又加利為四萬五千九百一十六除第四返歸留餘又加利為四萬五千三百九十錢八分除第五返歸留合一萬餘三萬五千三百九十錢八分故曰多又術置後返歸一萬以十乗之十三而一即後所持之本加一萬一千又以十乗之十三而一即第四返之本加一萬二千又以十乗之十三而一即第三返之本加一萬三千又十乗之十三而一即第二返之本加一萬四千又以十乗之十三而一即初持之本并五返之錢以減之即利也今有垣厚五尺兩䑕對穿大䑕日一尺小䑕亦日一尺大䑕日自倍小䑕日自半問幾何日相逢各穿幾何答曰二日一十七分日之二大䑕穿三尺四寸十七分寸之一十二小䑕穿一尺五寸十七分寸之五術曰假令二日不足五寸令之三日有餘三尺七寸半大䑕日倍二日合穿三尺小䑕日自半合穿一尺五寸并大䑕所穿合四尺五寸課于垣厚五尺是為不足五寸令之三日大䑕穿得七尺小䑕穿得一尺七寸半并之以減垣厚五尺有餘三尺七寸半以盈不足術求之即得以後一日所穿案原本訛作求今改正乗日分子如日分母而一即各得日分子之中所穿故各増二日定穿即合所問也九章算術卷七欽定四庫全書

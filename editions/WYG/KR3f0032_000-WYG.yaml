body:
  text: 稱刪補故校其目則與古或異而所論者多近語也徽幼習九章長再詳覽觀陰陽之割裂總算術之根源探賾之暇遂悟其意是以敢竭頑魯采其所見為之作注事類相推各有攸歸故枝條雖分而同本榦者知發其一端而已又所析理以辭解體用圗庶亦約而能周通而不黷覽之者思過半矣且算在六藝古者以賔興賢能教習國子雖曰九數其能窮纎入㣲探測無方至于以法相傳亦猶規矩度量可得而共非特難為也當今好之者寡故世雖多通才達學而未必能綜于此耳周官大司徒職夏至日中立八尺之表其景尺有五寸謂之日中説云南戴日下萬五千里夫云爾者以術推之按九章立四表望逺及因木望山之術皆端旁互見無有超邈若斯之類然則蒼等為術猶未足以博盡羣數也徽尋九數有重差之名原其指趣乃所以施于此也凡望極高測絶深而兼知其逺者必用重差句股則必以重差為率故曰重差也立兩表于洛陽之城令高八尺南北各盡平地同日度其正中之時以景差為法表高乗表間為實如法而一所得加表高即日去地也以南表之景乘表間為實實如法而一即為從南表至南戴日下也以南戴日下及日去地為句股為之求弦即日去人也以徑寸之筩南望日日滿筩空則定筩之長短以為股率以筩徑為句率日去人之數為大股大股之句即日徑也雖夫圓穹之象猶曰可度又况泰山之高與江海之廣哉徽以為今之史籍且畧舉天地之物攷論厥數載之于心以闡世術之美輒造重差并為注解以究古人之意綴於句股之下度高者重表測深者累矩孤離者三望離而又旁求者四望觸類而長之則雖幽遐詭伏靡所不入博物君子詳而覽焉

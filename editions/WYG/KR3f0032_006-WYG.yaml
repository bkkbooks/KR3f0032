body:
  text: 劉徽注唐李淳風注釋均輸以御逺近勞費今有均輸粟甲縣一萬户行道八日乙縣九千五百戸行道十日丙縣一萬三千三百五十戸行道十三日丁縣一萬二千二百戸行道二十日各到輸所凡四縣賦當輸二十五萬斛用車一萬乗欲以道里逺近戸數多少衰出之問粟車各㡬何答曰甲縣粟八萬三千一百斛車三千三百二十四乗乙縣粟六萬三千一百七十五斛車二千五百二十七乗丙縣粟六萬三千一百七十五斛車二千五百二十七乗丁縣粟四萬五百五十斛車一千六百二十二乗術曰令縣戸數各如其本行道日數而一以為衰按此均輸猶均運也令戸率出車以行道日數為均發粟為輸據甲行道八日因使八戸其出一車乙行道十日因使十户共出一車計其在道則皆戸一日出一車案原本作出車脱一字今補故可為均平之率也甲衰一百二十五乙丙衰各九十五丁衰六十一副并為法以賦粟車數乗未并者各自為實衰分科率實如法得一案原本作得一車亦後人妄加車字今刪各置所當出車以其行道日數乗之如户數而一得率户用車二日四十七分日之三十一故謂之均求此户以率當各計車之錢分也案此二句舛誤當云求此率以户當各計車之衰分也淳風等按縣户有多少之差行道有逺近之異欲其均等故各令行道日數約戸為衰案原本脱道字令補行道多者少其户行道少者多其户故各令約户為衰以八日約除甲縣得一百二十五乙丙各九十五丁六十一于今有術副并為所有率未并者各為所求率以賦粟車數為所有數而今有之各得車數一旬除乙十三除丙各得九十五二旬除丁得六十一也案淳風等至此原本訛在前接故可為均平之率也下于術意前後失次今訂正有分者上下輩之輩配也車牛人之數不可分裂推少就多均賦之宜今按甲分既少宜從于乙滿法除之有餘從丙丁分又少亦宜就丙除之適盡加乙丙各一上下輩益以少從多也以二十五斛乘車數即粟數今有均輸卒甲縣一千二百人薄塞乙縣一千五百五十人行道一日丙縣一千二百八十人行道二日丁縣九百九十人行道三日戊縣一千七百五十人行道五日凡五縣賦輸卒一月一千二百人欲以逺近户率多少衰出之問縣各㡬何答曰甲縣二百二十九人乙縣二百八十六人丙縣二百二十八人丁縣一百七十一人戊縣二百八十六人術曰令縣卒各如其居所及行道日數而一以為衰按此亦以日數為均居所為輸甲無行道日但以居所三十日為率言欲為均平之率者當使甲三十人而出一人出一人者計役則皆一人一日是以可為均平之率甲衰四乙衰五丙衰四丁衰三戊衰五副并為法以人數乗未并者各自為實實如法而一各置所當出人數以其居所及行道日數乘之如縣人數而一案此二十四字原本又重見于後接故存之也下今刪彼存此得戸率人役五日七分日之五案此十二字原本接注文重見者之下今據徽説前後體例訂正淳風等按為衰于今有術副并為所有率未并者各為所求率以賦卒人數為所有數此術以别攷則意同以廣異聞故存之也案此條原本訛入上注接如縣人數而一之下脱淳風等按四字今據淳風等所釋前後體例訂正又為衰二字上有脱文當云各令居所及行道日數約縣卒為衰有分者上下輩之輩配也今按丁分最少宜就戊除不從乙者丁近戊故也滿法除之有餘從乙丙分又少亦就乙除有餘從甲除之適盡從甲丙二分其數正等二者于乙逺近皆同不以甲從乙者方以下從上也今有均賦粟甲縣二萬五百二十户粟一斛二十錢自輸其縣乙縣一萬二千三百一十二戸粟一斛一十錢至輸所二百里丙縣七千一百八十二户粟一斛一十二錢至輸所一百五十里丁縣一萬三千三百三十八戸粟一斛一十七錢至輸所二百五十里戊縣五千一百三十戸粟一斛一十三錢至輸所一百五十里凡五縣賦輸粟一萬斛一車載二十五斛與僦一里一錢欲以縣户輸粟令費勞等問縣各粟㡬何答曰甲縣三千五百七十一斛二千八百七十三分斛之五百一十七乙縣二千三百八十斛二千八百七十三分斛之二千二百六十丙縣一千三百八十八斛二千八百七十三分斛之二千二百七十六丁縣一千七百一十九斛二千八百七十三分斛之一千三百一十三戊縣九百三十九斛二千八百七十三分斛之二千二百五十三術曰以一里僦價乘至輸所里此以出錢為均也問者曰一車載二十五斛與僦一里一錢一錢即一里僦價也以乘里數者欲知僦一車到輸所所用錢也甲自輸其縣則無取僦價也以一車二十五斛除之欲知僦一斛所用錢加一斛粟價案原本一訛作以注同今據淳風等所釋竝改正則致一斛之費加一斛之價于一斛僦直即凡餘粟取僦錢也甲一斛之費二十乙丙各十八丁二十七戊十九也各以約其戸數為衰言使甲二十户共出一斛乙丙十八户共出一斛計其所費則皆户一錢故可為均賦之率也甲衰一千二十六乙衰六百八十四丙衰三百九十九丁衰四百九十四戊衰二百七十副并為法所賦粟乘未并者各自為實實如法得一各置所當出粟以其一斛之費乘之如户數而一得率户出三錢二千八百七十三分錢之一千三百八十一淳風等按此以出錢為均問者曰一車載二十五斛與僦一里一錢一錢即一里僦價也案原本脱價字今據注文補入以乗里數者案原本脱數字今據注文補入欲知僦一車到輸所用錢甲自輸其縣則無取僦之價以一車二十五斛除之者欲知僦一斛所用錢加一斛之價于一斛僦直即凡餘粟取僦錢甲一斛之費二十乙丙各十八丁二十七戊一十九各以約其戸為衰甲衰一千二十六乙衰六百八十四丙衰三百九十九丁衰四百九十四戊衰二百七十言使甲二十户共出一斛乙丙十八戸共出一斛計其所費則皆户一錢故可為均賦之率也案率字下原本衍計字今刪于今有術副并為所有率未并者各為所求率賦粟一萬斛為所有數此今有衰分之義也案此條原本誤連上劉徽注脱淳風等三字攷其文義多與徽所注重複應是淳風等更舉注文以總解術意書内此䫫甚多今改正計經賦之率既有户算之率亦有逺近貴賤之率此二率者各自相與通功則甲二十乙十二丙七丁十三戊五一斛之費謂之錢率錢率約戸率者則錢為母户為子子不齊令母互乗為齊則衰也若其不然以一斛之費約户數取衰竝有分當通分内子約之于算甚繁此一章皆相與通功共率畧相依似以上二率下一率亦可放此從其簡易而已又以分言之使甲一戸出二十分斛之一乙一戸出十八分斛之一各以戸數乘之亦可得一縣凡所當輸俱為衰也乘之者乘其子母報除之以此觀之則以一斛之費約戸數者其意不異矣然則可置一斛之費而反衰之約户以乗户率為衰也合分注曰母除為率率乘子為齊反衰汪曰先同其母各以分母約其子為反衰以施其率為算既約且不妨處下也案計經賦之率至此原本訛入前節注文故可為均賦之率也下文多舛誤不可通據辭内引合分注及反衰注乃淳風等推論術意無疑今改正今有均賦粟甲縣四萬二千算粟一斛二十傭價一日一錢自輸其縣乙縣三萬四千二百七十二算粟一斛一十八傭價一日一十錢到輸所七十里丙縣一萬九千三百二十八算粟一斛一十六傭價一日五錢到輸所一百四十里丁縣一萬七千七百算粟一斛一十四傭價一日五錢到輸所一百七十五里戊縣二萬三千四十算粟一斛一十二傭價一日五錢到輸所二百一十里己縣一萬九千一百三十六算粟一斛一十傭價一日五錢到輸所二百八十里凡六縣賦粟六萬斛皆輸甲縣六人共車車載二十五斛重車日行五十里空車日行七十里載輸之間各一日粟有貴賤傭各别價以算出錢令費勞等問縣各粟㡬何答曰甲縣一萬八千九百四十七斛一百三十三分斛之四十九乙縣一萬八千二十七斛一百三十三分斛之九丙縣七千二百一十八斛一百三十三分斛之六丁縣六千七百六十六斛一百三十三分斛之一百二十二戊縣九千二十二斛一百三十三分斛之七十四己縣七千二百一十八斛一百三十三分斛之六術曰以車程行空重相承為法并空重以乘道里各自為實實如法得一案原本作得一日亦後人妄加日字今刪按此術重往空還一輸再行道也置空行一里用七十分日之一重行一里用五十分日之一齊而同之空重行一里之路往返用一百七十五分日之六定言之者一百七十五里之路往返用六日也故并空重者齊其子也空重相乘者同其母也于今有術至輸所里為所有數六為所求率齊一百七十五為所有率而今有之即各得輸所用日也加載輸各一日欲得㡬日也案原本訛作故凡日也今改正而以六人乗之欲知致一車用人也又以傭價乘之欲知致車人傭直㡬錢以二十五斛除之欲知致一斛之傭直也加一斛粟價即致一斛之費加一斛之價于致一斛之傭直案原本價訛作費于訛作則今改正即凡輸一斛餘粟取傭所用錢各以約其算數為衰今按甲衰四十二乙衰二十四丙衰十六丁衰十五戊衰二十己衰十六於今有術副并為所有率未并者各自為所求率所賦粟為所有數此今有衰分之義也副并為法以所賦粟乘未并者各自為實實如法得一案原本作得一斛亦後人妄加斛字今刪各置所當出粟以其一斛之費乗之如算數而一得率算出九錢一百三十三分錢之三又載輸之間各一日者即二日也今有粟七斗三人分舂之一人為糲米一人為粺米一人為糳米令米數等問取粟為米各㡬何答曰糲米取粟二斗一百二十一分斗之一十粺米取粟二斗一百二十一分斗之三十八糳米取粟二斗一百二十一分斗之七十三為米各一斗六百五分斗之一百五十一術曰列置糲米三十粺米二十七糳米二十四而反衰之此先約三率糲為十粺為九糳為八欲令米等者其取粟糲率十分之一粺率九分之一糳率八分之一當齊其子故曰反衰也淳風等按米有精麤之異有多少之差據率粺糳少而糲多用粟則粺糳多而糲少米若依本率之分粟當倍率故今反衰之使精取多而麤得少副并為法以七斗乘未并者各自為取粟實實如法得一于今有術副并為所有率未并者各為所求率粟七斗為所有數而今有之故各得取粟也若求米等者以本率各乘定所取粟為實以粟率五十為法實如法得一案原本作得一斗亦後加妄加斗字今刪若徑求為米等數者置糲米三用粟五粺米二十七用粟五十糳米十二用粟二十五齊其粟同其米并齊為法以七斗乗同為實所得即為米斗數今有人當禀粟二斛倉無粟欲與米一菽二以當所禀粟問各㡬何答曰米五斗一升七分升之三菽一斛二升七分升之六術曰置米一菽二求為粟之數并之得三九分之八案九分原本訛作分九今據註改正以為法亦置米一菽二而以粟二斛乘之各自為實實如法得一案原本作得一斛亦後人妄加斛字今刪淳風等按置粟率五乗米一米率三除之得一三分之二即如米一之粟也粟率十以乘菽二菽率九除之得二九分之二即是菽二之粟也并全得三齊子并之得二十四同母得二十七約之得九分之八故云并之得三九分之八米一菽二當粟三九分之八此其粟率也于今有術米一菽二皆為所求率當粟三九分之八為所有率粟二斛為所有數凡言率者當相與通之則為米九菽十八當粟三十五也亦有置米一菽二求其為粟之率以為列衰副并為法以粟乘列衰為實所得即米一菽二所求粟也以米菽本率而今有之即合所問今有取傭負塩二斛行一百里與錢四十今負塩一斛七斗三升少半升行八十里問與錢㡬何答曰二十七錢一十五分錢之一十一術曰置塩二斛升數以一百里乘之為法按此術以負塩二斛升數乘所行一百里得二萬里是為負塩一升行二萬里得錢四十于今有術為所有率升數乗所行里為法于今有術為所有數也以四十錢乗今負塩升數又以八十里乘之為實實如法得一案原本作得一錢亦後人妄加錢字今刪以今負塩升數乘所行里今負塩一升凡所行里也于今有術以所有四十錢為所求率也衰分章貸人千錢與此同案此條原本訛作正文今據前後體例改為注今有負籠重一石一十七斤行七十六步五十返今負籠重一石行百步問返㡬何答曰五十七返二千六百三分返之一千六百二十九術曰以故所行歩數乘故籠重斤數為法此法謂負一斤一返所行之積步也今籠重斤數乘今歩又以返數乘之為實實如法得一案原本作得一返亦後人妄加返字今刪按此法負一斤一返所行之積步此實者一斤一日所行之積歩故以一返之課除終日之程即是返數也淳風等按此術所行步多者得返少所行歩少者得返多然則所行者今返率也故令所得返乘今返之率為實而以故返之率為法今有術也按此負籠又有輕重于是為術者因令重者得返少輕者得返多故又因其率以乘法實者重今有之義也然此意非也按此籠雖輕而行有限籠過重則人力遺力有遺而術無窮人行有限而籠輕重不等使其有限之力隨彼無窮之變故知此術率乖理也若故所行有空行返數設以問者當因其所負以為返率則今返之數可得而知也假令空行一日六十里負重一斛行四十里減重一斗進二里半負重三斗以下與空行同今負籠重六斗往還行一百步問返㡬何答曰一百五十返術曰置重行率加十里以里法通之為實以一返之歩為法實如法而一即得也今有程傳委輸空車日行七十里重車日行五十里今載太倉粟輸上林五十三返問太倉去上林㡬何答曰四十八里一十八分里之一十一術曰并空重里數以三返乘之為法令空重相乗又以五日乗之為實實如法得一案原本作淂一里亦後人妄加里字今刪此亦如上術率一百七十五里之路往返用六日也于今有術則五日為所有數一百七十五里為所求率六日為所有率以此所得則三返之路今求一返當以三約之因令乘法而并除也為術亦可各置空重行一里用日之率以為列衰副并為法以五日乗列衰為實實如法所得即各空重行日數也各以一日所行以乗為凡日所行三返約之為上林去太倉之數按此術重往空還一輸再還道置空行一里七十分日之一重行一里用五十分日之一齊而同之空重行一里之路往返用一百七十五分日之六定言之者一百七十五里之路往返用六日故并空重者并齊也空重相乗者同其母也于今有術五日為所有數一百七十五為所求率六為所有率以此所得則三返之路今求一返者當以三約之故令乗法而并除亦當約之也案自按術重往空還以下應是李淳風等所釋訛為劉注今有絡絲一斤為練絲一十二兩練絲一斤為青絲一斤一十二銖今有青絲一斤問本絡絲㡬何答曰一斤四兩一十六銖三十三分銖之一十六術曰以練絲十二兩乘青絲一斤一十二銖為法以青絲一斤銖數乘練絲一斤兩數又以絡絲一斤乘之為實案原本脱之字今補實如法得一案原本作得一斤亦後人妄加斤字今刪按練絲一斤為青絲一斤十二銖此練率三百八十四青率三百九十六也又絡絲一斤為練絲十二兩此絡率十六練率十二也置今有青絲一斤以練率三百八十四乗之為實實如青絲率三百九十六而一所得青絲一斤練絲之數也又以絡率十六乗之所得為實以練率十二為法所得即練絲用絡絲之數也是為重今有也雖各有率不問中間故令後實乗前實後法乗前法而并除也故以練絲兩數為實青絲銖數為法一曰又置絡絲一斤兩數與練絲十二兩約之絡得四練得三此其相與之率又置練絲一斤銖數案原本脱數字今補與青絲一斤一十二銖約之練得三十二青得三十三亦其相與之率齊其青絲絡絲同其二練絡得一百二十八青得九十九練得九十六即三率悉通矣今有練絲一斤為所有數絡絲一百二十八為所求率青絲九十九為所有率為率之意猶此但不先約諸率耳凡率錯互不通者皆積齊同用之放此雖四五轉不異也言同其二練者以明三率之相與通耳于術無以異也又一術今有青絲一斤銖數乗練絲一斤兩數為實以青絲一斤一十二銖為法所得即用練絲兩數以絡絲一斤乗所得為實以練絲十二兩為法所得即用絡絲斤數也今有惡粟二十斗舂之得糲米九斗今欲求粺米一十斗問惡粟㡬何答曰二十四斗六升八十一分升之七十四術曰置糲米九斗以九乗之為法亦置粺米十斗以十乗之又以惡粟二十斗乘之為實實如法得一案原本作得一斗亦後人妄加斗字今刪按此術置今有求粺米十斗以糲米率十乘之如糲率九而一即糲亦化為惡粟矣此亦重今有之義為術之意猶絡絲也雖各有率不問中間故令後實乗前實後法乘前法而并除之也今有善行者行一百歩不善行者行六十歩今不善行者先行一百歩善行者追之問㡬何歩及之答曰二百五十歩術曰置善行者一百步減不善行者六十步餘四十步以為法以善行者之一百歩乗不善行者先行一百歩為實實如法得一案原本作得一歩亦後人妄加步字今刪按此術以六十歩減一百歩餘四十步即不善行者先行率也善行者行一百步追及率約之追及率得五先行率得二于今有術案原本脱有字今補不善行者先行一百歩為所有數五為所求率二為所有率而今有之得追及步也今有不善行者先行一十里善行者追之一百里先至不善行者二十里問善行者㡬何里及之答曰三十三里少半里術曰置不善行者先行一十里以善行者先至二十里増之以為法以不善行者先行一十里乗善行者一百里為實實如法得一案原本作得一里亦後人妄加里字今刪按此術不善行者既先行一十里後不及二十里并之得三十里也謂之先行率善行者一百里為追及率約之先行率得三三為所有率而今有之即得也其意如上術也今有免先走一百歩犬追之二百五十步不及三十歩而止問犬不止復行㡬何步及之答曰一百七歩七分歩之一術曰置免先走一百步以犬走不及三十歩減之餘為法以不及三十步乘犬追歩數為實實如法得一案原本作得一歩亦後人妄加歩字今刪按此術以不及三十步減先走一百歩餘七十歩為先走率犬行二百五十歩為追及率約之先走率得七追及率得二十五于今有術不及三十歩為所有數二十五為所求率七為所有率而今有之即得也今有人持金十二斤出闗闗税之十分而取一今闗取金二斤價錢五千問金一斤值錢㡬何答曰六千二百五十術曰以一十乘二斤以十二斤減之餘為法以一十乘五十為實實如法得一案原本作得一錢亦後人妄加錢字今刪按此術置十二斤以一乘之十二一得一斤五分斤之一即所當税者也減二斤餘即闗取盈金以盈除所償錢即金值也案值原本訛作實今改正今術既以十二斤為所税則是以十為母故以十乘二斤及所償錢通其率于今有術五千錢為所有數十為所求率八為所有率而今有之即得也今有客馬日行三百里客去忘持衣日已三分之一主人乃覺持衣追及與之而還至家視日四分之三問主人馬不休日行㡬何答曰七百八十里術曰置四分日之三除三分日之一按此術置四分日之三除三分日之一者除即減也案即原本訛作其今改正減之餘有十二分之五即是主人追客還用日率也半其餘以為法去其還存其往率之者子不可半故倍母二十四分之五是為主人與客均行用日之率也副置法増三分日之一法二十四分之五者主人往追用日之分也三分之一者客去主人未覺之前獨行用日之分也并連此數得二十四分日之十三則主人追及前用日之分也是為客行主人追及用日率也然則主人用日率者客馬行率也客用日率者主人馬行率也母同則子齊是為客馬行率五主人馬行率十三于今有術三百里為所有數十三為所求率五為所有率而今有之即得也以三百里乘之為實實如法得主人馬一日行欲知主人追客所行里者以三百里乘主人均行日分子十三以母二十四而一得一百六十二里半以此乗主人均行日分母二十四如客馬與主人均行用日分子五而一亦得主人馬一日行七百八十里也今有金箠長五尺斬本一尺重四斤斬末一尺重二斤問次一尺各重㡬何答曰末一尺重二斤次一尺重二斤八兩次一尺重三斤次一尺重三斤八兩次一尺重四斤術曰令末重減本重餘即差率也又置本重以四間乘之為下第一衰副置以差率減之毎尺各自為衰按此術五尺有四間者有四差也今本末相減餘即四差之凡數也以四約之即得毎尺之差以差數減本重餘即次尺之重也為術所置如是而已今此率以四為母故令母乘本為衰通其率也亦可置末重以四間乘之為上第一衰以差重率加之為次下衰也副置下第一衰以為法以本重四斤徧乘列衰各自為實實如法得一案原本作得一斤亦後人妄加斤字今刪以下第一衰為法以本重乗其分母之數而又反此率乗本重為實一乘一除勢無損益故惟本存焉衆衰相推為率則其餘可知也亦可副置末衰為法而以末重二斤乗列衰為實此雖迂迴然是其舊故就新而言之也今有五人分五錢令上二人所得與下三人等問各得㡬何答曰甲得一錢六分錢之二乙得一錢六分錢之一丙得一錢丁得六分錢之五戊得六分錢之四術曰置錢錐行衰按此術錐行者謂如立錐初一次二次三次四次五各均為一列者也并上二人為九并下三人為六六少于九三數不得等但以五四三二一為率也以三均加焉副并為法以所分錢乘未并者各自為實實如法得一案原本作得一錢注内刪同亦後人妄加錢字今此問者令上二人與下三人等上下部差一人其差三均加上部則得二三均加下部則得三三下部猶差一人差得一以通于本率即上下部等也于今有術副并為所有率未并者各為所求率五錢為所有數而今有之即得等耳假令七人分七錢欲令上二人與下五人等則上下部差三人并上部為十三下部為十五下多上少下不足減上當以上下部列差而後均減乃合所問耳此可倣下術令上二人分二錢半為上率令下二人分二錢半為下率上下二率以少減多餘為實置二人三人各半之減五人餘為法實如法得一即衰相去也下衰率六分之五者丁所得錢數也今有竹九節下三節容四升上四節容三升問中間二節欲均容各多少答曰下初一升六十六分升之二十九次一升六十六分升之二十二次一升六十六分升之一十五次一升六十六分升之八次一升六十六分升之一次六十六分升之六十次六十六分升之五十三次六十六分升之四十六次六十六分升之三十九術曰以下三節分四升為下率以上四節分三升為上率此二率者各其平率也上下率以少減多餘為實按此上下節各分所容為率者各其平率上下以少減多者餘為中間五節半之凡差故以為實也置四節三節各半之以減九節餘為法實如法得一案原本作得一升亦後人妄加升字今刪即衰相去也按此術上下節所容已定之節中間相去節數也實者中間五節半之凡差也故實如法而一則毎節之差也下率一升少半升者下第二節容也一升少半升者下三節通分四升之平率平率即為中分節之容也今有鳬起南海七日至北海鴈起北海九日至南海今鳬鴈俱起問何日相逢答曰三日十六分日之十五術曰并日數為法日數相乗為實實如法得一案原本作得一日亦後人妄加日字今刪按此術置鳬七日一至鴈九日一至齊其至同其日定六十三日鳬九至鴈七至令鳬鴈俱起而問相逢者是為共至并齊以除同即得相逢日故并日數為法者并齊之意日數相乗為實者猶以同為實也一曰鳬飛日行七分至之一鴈飛日行九分至之一齊而同之鳬飛定日行六十三分至之九鴈飛定日行六十三分至之七是為南北海相去六十三分鳬日行九分鴈日行七分也并鳬鴈一日所行以除南北相去而得相逢日也今有甲發長安五日至齊乙發齊七日至長安今乙發已先二日甲乃發長安問㡬何日相逢答曰二日十二分日之一術曰并五日七日以為法按此術并五日七日為法者猶并齊為法置甲五日一至乙七日一至齊而同之定三十五日甲七至乙五至并之為十二至者用三十五日也謂甲乙與發之率耳然則日化為至當日除故以為法也以乙先發二日減七日減七日者言甲乙俱發今以發為始發之端于本道里則餘分也餘以乘甲日數為實七者長安去齊之率也五者後發相去之率也今問後發故舍七用五以乘甲五日為二十五日言甲七至乙五至更相去用此二十五日也實如法得一案原本作得一日亦後人妄加日字今刪一日甲行五分至之一乙行七分至之一齊而同之甲定日行三十五分至之七乙定日行三十五分至之五是為齊去長安三十五分甲日行七分乙日行五分也今乙先行發二日已行十分餘相去二十五分故減乙二日餘令相乘為二十五分今有一人一日為牝瓦三十八枚一人一日為牡瓦七十六枚今令一人一日作瓦牝牡相半問成瓦㡬何答曰二十五枚少半枚術曰并牝牡為法牝牡相乗為實實如法得一案原本作得一枚亦後人妄加枚字今刪此意亦與鳬鴈同術牝牡瓦相并猶如鳬鴈日飛相并也按此術并牝牡為法者并齊之意牝牡相乘為實者猶以同為實也故實如法即得也今有一人一日矯矢五十一人一日羽矢三十一人一日筈矢十五今令一人一日自矯羽筈問成矢㡬何答曰八矢少半矢術曰矯矢五十用徒一人羽矢五十用徒一人大半人筈矢五十用徒三人少半人并之得六人以為法以五十矢為實實如法得一案原本作得一矢亦後人妄加矢字今刪按此術言成矢五十用徒六人一日工也此同功共作猶鳬鴈共至之類亦以同為實并齊為法可令矢互乗一人為齊矢相乗為同今先令同于五十矢矢同則徒齊其歸一也以此術為鳬鴈者當鴈飛九日而一至鳬飛九日而一至七分至之二并之得二至七分至之二以為法以九日為實實如法而一得一人日矯矢之數也今有假田初假之嵗三畞一錢明年四畞一錢後年五畞一錢凡三嵗得一百問田㡬何答曰一頃二十七畞四十七分畞之三十一術曰置畞數及錢數令畞數互乘錢數并以為法畞數相乗又以百錢乗之為實實如法得一案原本作得一畞亦後人妄加畞字今刪按此術令畞互乗錢者齊其錢畞數相乗者同其畞同于六十則初假之嵗得錢二十明年得錢十五後年得錢十二也凡三嵗得錢一百為所有數同畞為所求率四十七錢為所有率今有之即得也齊其錢同其畞亦如鳬鴈術也于今有術百錢為所有數同畞為所求率并齊為所有率淳風等按假田六十畞初嵗得錢二十明年得錢十五後年得錢十二并之得錢四十七是為得田六十畞三嵗所治于今有術百錢為所有數六十畞為所求率四十七為所有率而今有之即合問也今有程耕一人一日發七畞一人一日耕三畞一人一日耰種五畞今令一人一日自發耕耰種之問治田㡬何答曰一畞一百一十四步七十一分歩之六十六術曰置發耕耰畞數令互乗人數并以為法畞數相乘為實實如法得一案原本作得一畞亦後人妄加畞字今刪此猶鴈術也淳風等按此術亦發耕耰種畞數互乘人者齊其人畞數相乘者同其畞故并齊為法以同為實計田一百五畞發用十五人耕用三十五人種用二十一人并之得七十一工治得一百五畞故以為實而一人一日所治故以人數為法除之即得也今有池五渠注之其一渠開之少半日一滿次一日一滿次二日半一滿次三日一滿次五日一滿今皆決之問㡬何日滿池答曰七十四分日之十五術曰各置渠一日滿池之數并以為法按此術其一渠少半日滿者是一日三滿也次一日一滿次二日半滿者是一日五分滿之二也次三日滿者是一日三分滿之一也次五日滿者是一日五分滿之一也并之得四滿十五分滿之十四也以一日為實實如法得一案原本作得一日下同皆後人妄加日字今刪此猶矯矢之術也先令同于一日日同則滿齊自鳬鴈至此其為同齊有二術焉可隨率宜也其一術列置日數及滿數案列原本訛作各今據注文改正其一渠少半日滿者是一日三滿也次一日一滿次二日半滿者是五日二滿次三日一滿次五日一滿此謂之列置日數及滿數也令日互相乘滿并以為法日數相乗為實實如法得一亦如鳬鴈術也淳風等按此其一渠少半日滿池者是一日三滿池也次一日一滿次二日半滿者是五日再滿次三日一滿次五日一滿此謂列置日數于右行及滿數于左行以日互乗滿者齊其滿日數相乗者同其日滿齊而日同故并齊以除同即得也案此條原本誤連上劉徽注脱淳風等三字攷其文義多與前節注文重複應是淳風等復舉以縂觧術意今訂正今有人持米出三闗外闗三而取一中闗五而取一内闗七而取一餘米五斗問本持米㡬何答曰十斗九升八分升之三術曰置米五斗以所税者三之五之七之為實以餘不税者二四六互相乗為法案互相原本訛作相互今改正實如法得一案原本作得一斗亦後人妄加斗字今刪此亦重今有術也案原本脱術字今補所税者謂今所當税之定三五七皆為所求率二四六皆為所有率置今有餘米五斗以七乗之六而一即内闗未税之本米也又以三乗之二而一即外闗未税之本米也今從末求本不問中間故令中率轉相乘而同之亦如絡絲術又一術外闗三而取一則其餘本米三分之二也求外闗所税之餘則當置三分乗之二而一欲知中闗以四乗之五而一欲知内闗以六乗之七而一凡餘分者乘其母而以三五七相乘得一百五為分母二四六相乘得四十八為分子約而言之則是餘米于本所持三十五分之十六也于今有術餘米五斗為所有數分母三十五為所求率分之十六為所有率也今有人持金出五闗前闗二而税一次闗三而税一次闗四而税一次闗五而税一次闗六而税一并五闗所税適重一斤問本持金㡬何答曰一斤三兩四銖五分銖之四術曰置一斤通所税者以乗之為實亦通其不税者以減所通餘為法實如法得一案原本作得一斤亦後人妄加斤字今刪此意猶上術也置一斤通所税者謂令二三四五六相乗為分母七百二十也通其所不税者謂令所税之餘一二三四五相乘為分子一百二十也約而言之是為餘金于本所持六分之一也以子減母凡五闗所税六分之五也于今有術所税一斤為所有數分母六為所求率分子五為所有率此亦重今有之義又雖各有率不問中間故令中率轉相乘而連除之即得也置一以為持金之本率以税率乘之除之則其率亦成積分也九章算術卷六欽定四庫全書

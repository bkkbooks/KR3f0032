body:
  text: 九章算術卷一晉劉徽注唐李淳風注釋方田以御田疇界域今有田廣十五步從十六步問為田幾何答曰一畝又有田廣十二步從十四步問為田幾何答曰一百六十八步方田術曰廣從步數相乘得積步此積為田幂凡廣從相乘謂之幂淳風等按經云廣從相乗得積步注云廣從相乘謂之幂觀斯注意積幂義同以理推之固不當爾何則幂是四方單布之名積乃衆數聚居之稱循名責實二者全殊雖欲同之竊恐不可今以據言幂者據廣從之一方其言積者舉衆步之都數經云相乗得積歩即是都數之明文注云謂之為幂全乖積步之本意此注前云積為田幂于理得通復云謂之為幂繁而不當今者注釋存善去非畧為科簡遺諸後學以畝法二百四十步除之即畝數百畝為一頃淳風等按此為篇端故特舉頃畝二法餘數不復言者從此可知一畝之田廣十五步從而疏之令為十五行則每行廣一步而從十六步又横而截之令為十六行則每行廣一步而從十五步此即從疏横截之步各自為方凡有二百四十步一畝之地步數正同以此言之則廣從相乘得積步驗以二百四十步者畝法也百畝者頃法也故以除之即得今有田廣一里從一里為田幾何答曰三頃七十五畝又有田廣二里從三里問為田幾何答曰二十二頃五十畝里田術曰廣從里數相乘得積里以三百七十五乘之即畝數按此術廣從里數相乘得積里方里之中有三頃七十五畝故以乘之即得畝數也今有十八分之十二問約之得幾何答曰三分之二又有九十一分之四十九問約之得幾何答曰十三分之七約分按約分者物之數量不可悉全必以分言之分之為數繁則難用設有四分之二者繁而言之亦可為八分之四約而言之則二分之一也雖則異詞至于為數亦同歸爾法實相推動有參差故為術者先治諸分術曰可半者半之不可半者副置分母子之數以少減多更相減損求其等也以等數約之等數約之即除也其所以相減者皆等數之重疊故以等數約之今有三分之一五分之二問合之得幾何答曰十五分之十一又有三分之二七分之四九分之五問合之得幾何答曰得一六十三分之五十又有二分之一三分之二四分之三五分之四問合之得幾何答曰得二六十分之四十三合分淳風等按合分知數非一端分無定準諸分子雜互羣母參差麤細既殊理難從一故齊其衆分同其羣母令可相併故曰合分術曰母互乘子并以為實母相乘為法母互乘子約而言之者其分麤繁而言之者其分細雖則麤細有殊然其實一也衆非錯雜非細不㑹乘而散之所以通之通之則可并也凡母互乘子謂之齊羣母相乘謂之同同者相與通同共一母也齊者子與母齊勢不可失本數也方以類聚物以羣分數同類者無逺數異類者無近逺而通體知雖異位而相從也近而殊形知雖同列而相違也然則齊同之術要矣錯綜度數動之斯諧其猶佩觿解結無往而不理焉乘以散之約以聚之齊同以通之此其算之綱紀乎其一術者可令母除為率率乘子為齊實如法而一不滿法者以法命之今欲求其實故齊其子又同其母令如母而一其餘以等數約之即得知所謂同法為母實餘為子皆從此例其母同者直相從之今有九分之八減其五分之一問餘幾何答曰四十五分之三十一又有四分之三減其三分之一問餘幾何答曰十二分之五減分淳風等按諸分子母數各不同欲知餘幾減餘為實故曰減分術曰母互乘子以少減多餘為實母相乘為法實如法而一母互乘子者知以齊其子也以少減多者知齊故可相減也母相乘為法者同其母也母同子齊故如母而一即得今有八分之五二十五分之十六問孰多多幾何答曰二十五分之十六多多二百分之三又有九分之八七分之六問孰多多幾何答曰九分之八多多六十三分之二又有二十一分之八五十分之十七問孰多多幾何答曰二十一分之八多多一千五十分之四十三課分淳風等按分各異名理不齊一較其相近之數故曰課分也術曰母互乘子以少減多餘為實母相乘為法實如法而一即相多也淳風等按此術母互乘子以少分減多分與減分義同惟相多之數意與減分有異減分知其餘數有幾課分知其餘數相多也今有三分之一三分之二四分之三問減多益少各幾何而平答曰減四分之三者二三分之二者一并以益三分之一而各平于十二分之七又有二分之一三分之一四分之三問減多益少各幾何而平答曰減三分之二者一四分之三者四并以益二分之一而各平于三十六分之二十三平分淳風等按平分知諸分參差欲令齊等減彼之多増此之少故曰平分也術曰母互乘子齊其子也副并為平實淳風等按母互乗子副并為平實知定此平實主限衆子所當損益知限為平案此注有舛誤據首問第二數母三第三數母四互乘第一數子一得十二第一數母三第三數母四互乘第二數子二得二十四第一第二數母各三互乘第三數子三得二十七并之共六十三為平實母三三相乘又與四乗得三十六為法列數凡三即以三乗二十得三十六乗二十四得七十二乗二十七得八十一為列實亦以三乗法三十六得一百八平實六十三減列實三十六少二十七減七十二餘九減八十一餘十八約之九為一則十八為二而二十七為三平實六十三為七法一百八為十二命為十二分之七設以十二作三數三分之一則四也三分之二則八也四分之三則九也定平實七立限八減一九減二皆七所減之一二益于四亦七損多益少適如其限宜云定此平實立限如限為平立訛作主如訛作知遂不可通母相乘為法母相乘為法知亦齊其子又同其母以列數乘未并者各自為列實亦以列數乘法此當副并列數為平實若然則重有分故反以列數乘周齊淳風等按問云所平之分多少不定或三或二列位無常平三知置位三重平二知置位二重凡此之例一準平分不可豫定多少故直云列數而已以平實減列實餘約之為所減并所減以益于少以法命平實各得其平今有七人分八錢三分錢之七問人得幾何答曰人得一錢二十一分錢之四又有三人三分人之一分六錢三分錢之一四分錢之三問人得幾何答曰人得二錢八分錢之一經分淳風等按經分者自合分已下皆與諸分相齊此乃直求一人之分以人數分所分故曰經分也術曰以人數為法錢數為實實如法而一有分者通之母互乘子知齊其子母相乘者同其母以母通之者分母乘全内子散全則為積分積分則與子相通故可令相通凡數相與者謂之率率知自相與通有分則可散分重疊則約也等除法實相與率也故散分者必令兩分母相乘為法也重有分者同而通之又以法分母乗實實分母乗法此謂法實俱有分故令分母各乗全分内子又令分母互乗上下今有田廣七分步之四從五分步之三問為田幾何答曰三十五分步之十二又有田廣九分步之七從十一分步之九問為田幾何答曰十一分步之七又有田廣五分步之四從九分步之五問為田幾何答曰九分步之四乘分淳風等按乗分者分母相乗為法子相乘為實故曰乘分術曰母相乗為法子相乗為實實如法而一凡實不滿法者而有母子之名若有分以乗其實而長之則亦滿法乃為全耳又以子所乘乗故母當報除報除者實如法而一也今子相乘則母各當報除因令分母相乗而連除也此田有廣從難以廣諭設有問者曰馬二十匹直金十二斤今賣馬二十匹三十五人分之人得幾何答曰三十五分斤之十二其為之也當如經分術以十二斤金為實三十五人為法設更言馬五匹直金三斤今賣馬四匹七人分之人得幾何答曰人得三十五分斤之十二其為之也當齊其金人之數皆合初問入于經分矣然則分子相乘為實者猶齊其金也母相乘為法者猶齊其人也同其母為二十馬無事于同但欲求齊而已又馬五匹直金三斤完全之率分而言之則為一匹直金五分斤之三七人賣四匹馬一人賣七分馬之四分子與人交互相生所從言之異而計術則三術同歸也今有田廣三步三分步之一從五步五分步之二問為田幾何答曰十八步又有田廣七步四分步之三從十五步九分步之五問為田幾何答曰一百二十步九分步之五又有田廣十八步七分步之五從二十三步十一分步之六問為田幾何答曰一畝二百步十一分步之七大廣田淳風等按大廣田知初術直有全步而無餘分次術空有餘分而無全步此術先見全步復有餘分可以廣兼三術故曰大廣術曰分母各乘其全分子從之分母各乘其全分子從子者通全步内分子如此則母子皆為實矣相乘為實分母相乘為法猶乘分也實如法而一今為術廣從俱有分當各自通其分命母入者須還出之故令分母相乘為法而連除之今有圭田廣十二步正從二十一步問為田幾何答曰一百二十六步又有圭田廣五步二分步之一從八步三分步之二問為田幾何答曰二十三步六分步之五術曰半廣以乘正從半廣知以盈補虚為直田也亦可半正從以乘廣按半廣乘從以取中平之數故廣從相乘為積步畝法除之即得也今有斜田一頭廣三十步一頭廣四十二步正從六十四步問為田幾何答曰九畝一百四十四步又有斜田正廣六十五步一畔從一百步一畔從七十步步問為田幾何答曰二十三畝七十步術曰并兩斜而半之以乘正從若廣又可半正從若廣以乘并畝法而一并而半之者以盈補虚也今有箕田舌廣二十步踵濶五步正從三十步問為田幾何答曰一畝一百三十五步又有箕田舌廣一百一十七步踵廣五十步正從一百三十五步問為田幾何答曰四十六畝二百三十二步半術曰并踵舌而半之以乘正從畝法而一中分箕田則為兩斜田故其術相似又可并踵舌半正從以乘之今有圓田周三十步徑十步淳風等按術意以周三徑一為率周三十步合徑十步今依密率合徑九步十一分步之六問為田幾何答曰七十五步此于徽術當為田七十步一百五十七分步之一百三淳風等按依密率為田七十一步二十二分步之一十三今有圎田周一百八十一步徑六十步三分步之一淳風等按周三徑一周一百八十一步徑六十步三分步之一依宻率徑五十七步二十二分步之一十三問為田幾何答曰十一畝九十步十二分步之一此于徽術當為田十畝二百八步三百一十四分步之一百一十三淳風等按依密率當為田十畝二百五步八十八分步之八十七術曰半周半徑相乘得積步按半周為從半徑為廣故廣從相乘為積步也假令圎徑二尺圎中容六觚之一面案六觚原本訛作六弧攷六角形其平面亦有六八角形其平面亦有八古人謂之六觚八觚若截圎形為六古人謂之觚背具弧即圎周不得云圎中容六弧之一面後或言弧或言觚義各不同原本觚皆訛作弧遂䝉混不可通今並改正與圎徑之半其數均等合徑率一而外周率三也案劉徽以周三徑一乃六觚之率圎内容六觚其觚面適為六弧之弦圎周大于六觚之周為六弧背與六弧弦之差其説非圗莫顯今補圗附于後又按為圎以六觚之一面乘一弧半徑案一弧二字衍當刪二因而六之案此句有訛舛當改云三之上衍二因而三字得十二觚之幂若又割之次以十二觚之一面乘一弧之半面案一弧之三字亦衍當刪四因而六之案此句亦有訛舛當云六之上衍四因而三字則得二十四觚之幂割之彌細所失彌少割之又割以至于不可割則與圎周合體而無所失矣觚面之外又有餘徑以面乘徑則幂出觚矣若夫觚之細者與圎合體則表無餘徑表無餘徑則幂不外出矣以一面乘半徑觚而裁之每輒自倍故以半周乘半徑而為圎幂此一周徑謂至然之數非周三徑之一率也周三者從其六觚之環耳以推圎規多少之較案較原本訛作覺今改正乃弓之與弦也然世傳此法莫肯精覈學者踵古習其謬失不有明據辯之斯難凡物類形象不圎則方方圎之率誠著于近則雖逺可知也由此言之其用博矣謹按圎驗更造密率恐空設法數昧而難譬故置諸檢括謹詳其記注焉割六觚以為十二觚術曰置圎徑二尺半之為一尺即圎裏觚之面也案觚之而原本訛作弦之面後觚之半面訛作弧之半面今改正令半徑一尺為弦案原本訛作為弧今改正半面五寸為句為之求股以句幂二十五寸減弦幂餘七十五寸開方除之下至秒忽又一退法求其㣲數㣲數無各知以為分子以下為分母約作五分忽之二故得股八寸六分六釐二秒五忽五分忽之二案二秒原本訛作二絲今改正以減半徑餘一寸三分三釐九毫七秒四忽五分忽之三謂之小句案此下原本衍小句知半面五寸之句九字觚之半面又謂之小股為之求弦其幂二千六百七十九億四千九百一十九萬三千四百四十五忽餘分棄之案此句原本訛作全分并之攷弦幂五忽之下尚有一六餘分無所謂全分也當是傳寫舛誤遂不可通後數條皆云餘分棄之令據以改正開方除之即十二觚之一面也割十二觚以為二十四觚術曰亦令半徑為弦半面為句為之求股置上下弦幂四而一得六百六十九億八千七百二十九萬八千三百六十一忽餘分棄之即句幂也以減弦幂其餘開方除之得股六寸六分五釐九毫二秒五忽五分忽之四以減半徑餘三分四釐七秒四忽五分忽之一謂之小句觚之半面又謂之小股為之求小弦其幂六百八十一億四千八百三十四萬九千四百六十六忽餘分棄之開方除之即二十四觚之一面也割二十四觚以為四十八觚術曰亦令半徑為弦半面為句為之求股置上下弦幂四而一得一百七十億三千七百八萬七千三百六十六忽餘分棄之即句幂也以減弦幂其餘開方除之得股九寸九分一釐四毫四秒四忽五分忽之四以減半徑餘八釐五毫五秒五忽五分忽之一謂之小句觚之半面又謂之小股為之求小弦其幂七百七十一億一千二十七萬八千八百一十三忽餘分棄之開方除之得小弦一寸三分八毫六忽餘分棄之即四十八觚之一面以半徑一尺乘之又以二十四乘之得幂三萬一千三百九十三億四千四百萬忽以百億除之得幂三百一十三寸六百二十五分寸之五百八十四即九十六觚之幂也割四十八觚以為六十六觚術曰亦令半徑為弦半面為句為之求股置次上弦幂四而一得四十二億七千七百五十六萬九千七百三忽餘分棄之即句幂也以減弦幂其餘開方除之得股九寸九分七釐八毫五秒八忽十分忽之九以減半徑餘二釐一毫四秒一忽十分忽之一謂之小句觚之半面又謂之小股為之求小弦其幂四十二億八千二百一十五萬四千一十二忽餘分棄之開方除之得小弦六分五釐四毫三秒八忽餘分棄之即九十六觚之一面以半徑一尺乘之又以四十八乘之得幂三萬一千四百一十億二千四百萬忽以百億除之得幂三百一十四寸六百二十五分寸之六十四即一百九十二觚之幂也以九十六觚之幂減之餘六百二十五分寸之一百五謂之差幂倍之為分寸之二百一十為分寸者蒙上省文謂六百二十五分寸之二百一十也即九十六觚之外弧田所謂以弦乘矢之凡幂也案弧田下原本衍九千六字今刪加此幂于九十六觚之幂得三百一十四寸六百二十五分寸之一百六十九則出圎之表矣故還就一百九十二觚之全幂三百一十四寸以為圎幂之定率而棄其餘分以半徑一尺除圎幂倍之得六尺二寸分分即周數令徑自乘為方幂四百寸與圎幂相折圎幂得一百五十七為率方幂得二百為率方幂二百其中容圎幂一百五十七也圎率猶為㣲少按弧田圗令方中容圎圎中容方内方合外之半半然則圎幂一百五十七其中容方幂一百也案一百原本訛作二百今改正又令徑二尺與周六尺二寸八分相約周得一百五十七徑得五十則其相與之率也周率猶為㣲少也晉武庫中漢時王莽作銅斛其銘曰律嘉量斛内方尺而圎其外庣旁九釐五毫幂一百六十二寸深一尺積一千六百二十寸容十斗以此術求之得幂一百六十一尺有奇其數相近矣此術㣲少而斛差幂六百二十五分寸之一百五以十二觚之幂為率消息當取此分寸之三十六案取此分寸亦䝉上省文謂六百二十五分寸之三十六也以増于一百九十二觚之幂以為圎幂三百一十四寸二十五分寸之四置徑自乘之方幂四百寸令與圎幂通相約圓幂三千九百二十七方幂得五千是為率方幂五千中容圎幂三千九百二十七圎幂三千九百二十七中容方幂二千五百也以半徑一尺除圓幂三百一十四寸二十五分寸之四倍之得六尺二寸八分二十五分寸之八即周數也全徑二尺與周數通相約徑得一千二百五十周得三千九百二十七即其相與之率若此者葢盡其纎微矣舉而用之上法仍約耳當求一千五百三十六觚之一面得三千七十二觚之幂而裁其㣲分數亦宜然重其驗耳淳風等按舊術求圎皆以周三徑一為率若用之求圎周之數則周少徑多用之求其六觚之田乃與此率合㑹耳何則假令六觚之田觚間各一尺為面自然從角至角其徑二尺可知案二尺原本訛作一尺今改正此則周六徑二與周三徑一已合恐此猶為難曉今更引物為喻設令刻物作圭形者六枚枚别三面皆長一尺攢此六物悉使鋭頭向裏則成六觚之周角徑亦皆一尺更從觚角外畔圍繞為規則六觚之徑盡達規矣當面徑短不至外規若以徑言之則為規六尺徑三尺面徑皆一尺案此三句有舛誤當云若以言觚言之則為周六尺徑二尺面皆一尺言觚二字訛作徑周訛作規二訛作三面字下又衍徑字遂不可通面徑股不至外畔定無二尺可知故周三徑一之率于圎周乃是徑多周少徑一周三理非精密葢術從簡要舉大綱畧而言之劉徽特以為疎遂改張其率但周徑相乘數難契合徽雖出斯一法終不能究其纎毫也祖沖之以其不精就中更推其數今者修撰攈摭諸家攷其是非沖之為密故顯之于徽術之下冀學者知所裁焉案沖之密率較徽率為密其約率較徽率為踈淳風等所稱宻率皆約率以之譏徽似誤又術曰周徑相乘四而一此周與上觚同耳周徑相乘各當一半而今周徑兩全案原本兩訛作田今改正故兩母相乘為四以報除之于徽術以五十乘周一百五十七而一即徑也以一百五十七乘徑五十而一即周也新術徑率猶當㣲少據周以求徑則失之長據徑以求周則失之短諸據見徑以求幂者皆失之于㣲少據周以求幂者皆失之于㣲多淳風等按依密率以七乘周二十二而一即徑以二十二乘徑七而一即周依術求之即得

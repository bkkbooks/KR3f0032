front:
  text: 九章算術音義
  hash: sha256:621f12934068ba6ef780d2d609de0412c4a745c49724d2f1511e28a4d20c7d4e
body:
  text: 唐李籍撰序九九之術食律切術者其所述也前漢梅福傳臣聞齊桓之時有以九九見者桓公不逆欲以致大也師古曰九九算術若今九章五曹之輩隋書經籍志九九算術二卷楊淑撰九數色具切即九章是也以算言之故曰九數以篇言之故曰九章周官保氏教國子以六藝一曰禮二曰樂三曰射四曰馭五曰書六曰數鄭康成注云九數方田粟米差分少廣商功均輸方程贏不足旁要今有重差夕桀句股案周禮疏曰云今有重差句股也者此漢法增之馬氏注以為今有重差夕桀夕桀亦是算術之名與鄭異據疏所言鄭注惟云今有重差句股也夕桀二字乃馬注賈公彦後始竄入鄭注内此所引與今本周禮注同葢訛舛已久矣隋書律厯志云一曰方田以御田疇界域二曰粟米以御交質變易三曰衰分以御貴賤稟税四曰少廣以御積幂方圓五曰商功以御功程積實六曰均輸以御逺近勞費七曰盈朒以御隠雜互見八曰方程以御錯糅正負九曰句股以御髙深廣逺隸首郎計切世本曰黄帝時隸首作數探賾上吐南切下士革切賾者含蓄含蓄者探之可及故易曰探賾索隠上色白切下於謹切隠者隠匿隠匿者索之可得故易曰索隠重差上直容切下楚佳切重復也差不齊也重差句股名也率所律切數相與也又音律約數也可度徒各切揆也考論盧敦切孤離吕支切九章第一方田徒年切田者圍周之以為疆横從之以為理平夷著見興作利養之地也方田者田之正也諸田不等以為為正故曰方田以御牛倨切理也田疇直留切耕治之田也界域雨逼切疆也廣如字濶也從即容切長也幾何上居豈切下如字幾何數之疑也相乘食陵切登也登之使其數多隋書曰乘以散之案此引隋書乘以散之後又引隋書除以散之考之隋書亦然扵乘除之義適相反乘乃合其數當云乘以聚之除乃分數當云除以散之此該諸分為言最謂通之以衍而多聚謂約之使專而少焉淳風竝如字李淳風岐州雍人幼爽秀通羣書明步天厯算正觀初與傅仁均争厯法議者多附淳風故以將仕郎直太史局制渾天儀詆摭前世得失著法象書七篇上之擢承務郎遷太常博士改太史丞與諸儒修書遷為令于占侯吉凶若節契然當世術家意有鬼神相之非學習可致終不能測也以勞封昌樂縣男奉詔與算博士梁述㫑教王真儒等是正五曹孫子等書刋定注解立于學官九章即其一也畆法莫厚切司馬法六尺為步步百為畆秦孝公之制二百四十步為一畆除之直魚切去也去之使其少隋書曰除以聚之案聚非除之義蓋指約分諸術而言一頃去穎切百畆也約分於略切約者欲其不煩分之為數煩則難用設有言四分之二者煩而言之則分為八分之四約而言之則二分之一也雖則異辭至于為數亦同歸耳副置上敷救切别下陟吏切設也别設算算位有所分也合分古沓切合分者欲其不離數非一端分無定準分子雜互羣母參差粗細既殊理難從一故齊其衆分同其羣母分可相并故曰合分參差上楚金切下楚宜切不齊也三相參為參兩相差為差觿音攜所以解結詩曰童子佩攜減分古斬切減損也減分者欲其其餘諸分子母數各不同以少減多欲知餘幾以餘為實故曰減分課分苦卧切校也欲知其相多分各異名理不齊一校其相多之數故曰課分平分符兵切均也平分者欲減多増少而至于均諸分參差欲令齊等減彼之多増此之少故曰平分副并畀政切兼也别兼算位有所合也經分如字釋名曰經者徑也經分欲欲徑求一人而至于徑自合分已下皆于諸分相齊此乃徑求一人之分以人數分所分故曰經分下經率同乘分如字乘分者欲知其所積分母相乘為法子相乘為積故曰乘分自合分已下獨乘言田而皆列于方田者欲其學數者不可後也故説算者以謂為術者先治諸分能治諸分則數學之能事盡矣大廣田竝如字初術有全步而無餘分次術有餘分而無全步此術先見全步復有餘分可以廣兼三術故曰大廣田圭田古攜切圭田者其形上鋭有如圭然白虎通曰圭者上鋭象物皆生見於上也箕田居之切箕田者有舌有踵其形哆侈有如箕然詩曰哆兮侈兮成是南箕圓田王權切圓田之率有三一曰古率周三徑一是也二曰徽率周一百五十七徑五十是也三曰密率周二十二徑七是也為算之術有四一曰半周半徑相乘得積步二曰周徑相乘四而一三曰徑自相乘三之四而一四曰周自相乘十二而一徽術許歸切徽術以五十乘周一百五十七而一即徑以一百五十七乘徑五十而一即周此率本于劉徽故曰徽術密率美畢切密率以七乘周二十二而一即徑以二十二乘徑七而一即周此率本於宋南徐州從事史祖沖之沖之以圓徑一億為一丈圓周盈數三丈一尺四寸一分五釐九毫二秒七忽朒數三丈一尺四寸一分五釐九毫二秒六忽正數在盈朒二限之間密率圓徑一百一十三圓周三百五十五約率圓徑七周二十二此乃率之最密也秒忽上亡沼切下呼骨切忽者數之始也一蠶所吐謂之忽孫子算術云蠶所生吐絲為忽十忽為秒十秒為毫十毫為釐為釐為分億於力切十萬曰億萬者物數也以人之億數為足以勝物數故也或曰萬萬曰億黄帝為法數有十等及其用也乃有三焉十等者謂億兆京垓秭壤溝澗正載也三等者謂上中下之數也下數者十十變之若言十萬曰億十億曰兆十兆曰京中數者萬萬變之若言萬萬曰億萬萬億曰兆萬萬兆曰京上數者數窮則變若言萬萬曰億億億曰兆兆兆曰京詩云不稼不穡胡取禾三百億兮毛氏曰萬萬曰億鄭氏曰十萬曰億據如此言則鄭用下數毛用中數也嘉量音亮周禮考工記㮚氏為量鬴深尺内方尺而圓其外其實一鬴其臋一寸其實一豆其耳三寸其實一升重一鈞其聲中黄鍾㮣而不税其銘曰時文思索允臻其極嘉量既成以觀四國永啟厥後兹器維則春秋左氏傳曰齊舊四量豆區鬴鍾四升曰豆各自其四以登於鬴六斗四升也鬴十則鍾六十四斗也鄭康成以為方尺積千寸比九章粟米法少二升八十一分升之二十二祖沖之以算術考之積凡一千五百六十二寸半方尺而圓其外減旁一釐八毫其徑一尺四寸一分四釐七秒二忽有竒而深尺即古斛之制也王莽作銅斛名曰律嘉量其意葢本于此銅斛之法方尺而圓其外旁有庣焉其上為斛其下為斗左耳為升右耳為合龠其狀似爵以縻爵禄上三下二參天兩地圓而函方左一右二隂陽之象也圓象規其重二鈞備氣物之數各萬有一千五百二十也聲中黄鍾始於黄鍾而反覆焉其斛銘曰律嘉量斛方尺而圓外庣旁九釐五毫幂百六十二寸深一尺積一千六百二十寸容十斗祖沖之以圓率考之此斛當徑一尺四寸三分六釐一毫九秒二忽庣旁一分九毫有竒劉歆庣旁少一釐四毫有竒歆數術不精之所致也魏陳留王景元四年劉徽注九章商功曰當今大司農斛圓徑一尺三寸五分五釐深一尺積一千四百四十一寸十分寸之三王莽銅斛于今尺為深九寸五分五釐徑一尺三寸六分八釐七毫以術計之于今斛為容九斗七升四合有竒此魏斛大而尺長王莽斛小而尺短也庣吐雕切不滿之貌也竒居宜切餘數也攈摭上居運切下之石切攈摭取拾也攈或作捃􅀈􅀈當作宛字之誤也宛田者中央隆髙爾雅曰宛中宛邱又曰邱上有邱為宛邱皆中央隆髙之義也孤田户呉切弧田者有弧有矢如弧之形環田户闗切環田者有肉有好如環之形爾雅曰肉好若一謂之環或作鐶九章第二粟米上相玉切下莫禮切粟者禾之未舂米者糓實之無殻粟者米之率也諸米不等以粟為率故曰粟米交質陟利切又如字變易羊益切糲米盧達切麤也凡粟五斗得糲米三斗故粟率五十而糲率三十粺米傍卦切精于糲也凡粟五斗得粺米二斗七升故粟率五十而粺率二十七詩曰彼疏斯粺鄭康成注云米之率糲十粺九糳八侍御七糳米音作精于粺也凡粟五斗得糳米二斗四升故粟率二十四春秋左氏傳曰粢食不糳俗作鑿御米牛倨切精于糳也供王膳之米也蔡邕獨斷曰所進曰御御者進也凡衣服加于身飲食入于口皆曰御小䵂大䵂音敵麥屑也細曰小䵂麤曰大䵂菽音叔大豆也荅都合切小豆也豉是義切鹽䜴也廣雅云苦李作豉飱音孫説文曰餔也糱魚列切麯糱也説文曰米牙瓴甓上音靈下扶厯切甎也箇古賀切數也數竹曰箇縑古甜切説文曰并絲繒也鈞居勻切三十斤也銖音殊八銖為錙二十四銖為兩翭音侯説文曰羽本也數羽稱其本猶數草木稱其根株也榦古按切榦莖也一本作簳九章第三衰分楚宜切衰差也以差而平分故曰衰分稟筆錦切供榖曰稟或作廩非是大夫上如字下甫無切爵名也夫以智率人者也大夫則以智率人之大者也不更古衡切爵名也次大夫取其不與戌更簪褭上側吟切下奴了切爵名次不更取其纓冠乘馬上造音皂爵名也次簪褭取其為造士而居上公士竝如字爵名也次上造取其為士而在公爵數色具切爵數者謂大夫五不更四簪褭三上造二公士一也墨子號令篇以爵級為賜然則戰國之初有此名也償之市羊切還也北鄉算蘇貫切算者計口出錢漢律人出一算一算百二十錢賈人與奴婢倍算傜音遥役也耗呼到切減也乾古寒切燥也保音寶傭也如所謂酒家保貸吐代切以物假人也九章第四少廣上書沼切不多也下古莽切闊也廣少從多截從之多益廣之少故曰少廣積幂上資昔切下莫狄切積者聚也衆數聚居之稱幂者覆也方面單布之名積幂之義不同如此半博漫切物中分也凡言半者以二為分母言太半少半者以三為分母約省所景切折法㫖熱切折者屈而有降意折法即退位也内子如字入也既以分母通之必入其分子故曰内子所謂齊同以通之也又音納中行户剛切列也下行同中徑故官切丸即立圓也牟合上莫浮切下胡閤切㮚氏力質切㮚氏鑄量之官也一本作粟為渾胡昆切祖暅之古鄧切暅之字景鑠沖之之子也少傳家業究極精㣲亦有巧思入神之妙般倕無以過也當其詣㣲之時雷霆不能入嘗行遇僕射徐勉以頭觸之勉呼乃悟父所改何承厯厯時尚未行梁天監初暅之更修之于是始行焉位至大舟卿昭晣音哲明也咍哂上呼開切下式忍切笑也九章第五商功式羊切商度也以度其功庸故曰商功穿地昌緣切掘地也凡穿地四尺為壤五尺為堅三尺壤如兩切壤謂息土書曰厥土惟白壤堅古賢切堅謂築土詩曰築之登登墟苦虚切墟謂穿坑垣音園墉也隄都奚切防也俗作堤溝古侯切釋名曰田間之水曰溝溝搆也縱横相交搆壍七豓切長于溝也水之遶城者渠强如切長于壍也水之通運者袤莫侯切袤長也礫郎擊切釋名曰小石曰礫堢壔上音寳小城也下音島以土擁木也方亭特丁切釋名曰亭停也人所停集也方亭者其積之形如亭之方者圓亭亦然方錐職誰切方錐者其積之形如錐之方者圓錐亦然壍堵當古切壍堵壍上疊也以立方一邪解得二壍堵其積居立方二分之一將一壍堵邪解得一陽馬一鼈臑求壍堵之積以廣長相乘又以高乘之二而一陽馬莫下切陽馬之形方錐一隅也今以四柱屋隅為陽馬以立方一邪解得三陽馬其積居立方三分之一將一陽馬邪解得二鼈臑求陽馬之積以廣長相乘又以髙乗之三而一鼈臑那到切臂節也鼈臑之積半陽馬其形有似鼈肘故以名云以立方一邪解得六鼈臑其積居立方六分之一求鼈臑之積以廣長相乗又以髙乗之六而一臑或作腝非是羡除上以淺切下直魚切羡延也除道也羡除乃隧道也其所穿地上平下邪似兩鼈臑夾一壍堵即羡除之形求其積并三廣以深乗之又以長乗之六而一芻甍上測隅切刈草也俗作蒭下莫耕切屈棟也芻甍之形似屈葢上苫也求其積倍下長上長從之又以廣乗之又以髙乗之六而一正解方亭兩邉合之即其形也芻童徒紅切如倒置砑石求其積倍上長并入下長以上廣乗之又倍下長并入上長以下廣乗之并二位以髙乗之六而一曲池盤池冥谷皆同術曲池邱玉切盤池薄官切冥谷莫經切冥谷之形如正置砑石棚薄耕切踟蹰上直離切下直誅切行不進也載輸上作代切下式朱切一籠力董切委粟於詭切積也程粟直城切課也程粟一斛積二千七百寸米一斛積一千六百二十寸菽荅麻麥一斛積二千四百三十寸此據精麤為率使價齊而不等其器之積寸也以米斛為正則同于漢志孫子算術曰六粟為圭十圭為抄十抄為撮十撮為勺十勺為合應劭曰圭者自然之形隂陽之始四圭為撮孟康曰六十四黍為圭漢志曰量者龠合升斗斛也所以量多少也本起于黄鍾之龠用度數審其容以子榖秬中者千有二百實其龠以井水準其㮣十龠為合十合為升十升為斗十斗為斛而五量嘉矣圓囷去倫切倉圓曰囷九章第六均輸式朱切均平也輸委也以均平其輸委故曰均輸勞費芳未切耗也乗䋲證切數車曰乗一本作量衰出楚危切次也不齊等也管子曰相地衰征薄塞上補各切迫也下先代切邉也薄或作博非是輩之補妹切配也俗作軰僦即就切賃也傭餘封切賃也重車直隴切輕對也舂書容切世本曰雍父作舂吕氏春秋曰赤冀作舂程傅張戀切傳郵絡盧各切惡烏各切不善也金箠之累切策也四間古閑切中間也錐行户剛切錐行衰者下多上少如立錐之形鳧防無切野鴨也牝瓦毗忍切牡瓦莫厚切矯矢居夭切説文曰揉箭箝也俗作撟假田古雅切借也發方伐切伐也詩曰駿發爾私耕古莖切犁也詩曰亦服爾耕耰種音憂覆種也孟子曰播種而耰之九章第七盈不足以成切盈者滿也不足者虚也滿虚相推以求其適故曰盈不足朒女六切不足也或作朏非是璡將鄰切美石次玉曰璡一本作準適足施隻切恰也桶他孔切瓠胡誤切𤓰屬也蔓無販切𤓰蔓也醇酒常倫切厚酒也行酒胡剛切市酒也和漆如字又胡卧切易油羊葢切交易也惡田烏各切不善也駑馬音奴字林曰駘也之蜀賈音古商賈一本作價返府逺切還也九章第八方程直成切方者左右也程者課率也左右課率總統羣物故曰方程錯糅女救切雜也正負上之盛切下房久切本數為切非本數為負正與正同名負與負同名同名相除則異名者相益異名相除則同名者相益一正一負相反而相為用術之至也秉兵永切一禾為秉稱昌孕切正斤兩也俗作秤課苦卧切程也衡户庚切權衡也武馬莫下切武馬戎馬也戎馬言武馬者猶曲禮謂戎車為武車也取其健猛而善行阪府逺切不平也俗作坂借資者切從人假物也引余忍切引重也易曰引重致逺綆古杏切汲水索令力正切官名也從者疾用切隨也庖薄交切恢演上苦囘切大也下以淺切廣也九章第九句股上古侯切下公户切句短面月股長面也短長相推以求其弦故曰句股圍之兩非切周也纏持碾切纏繞物也俗作纏葛長直良切葭古牙切説文曰葦之未秀者閫苦本切門限也折常列切斷也抵都禮切磨邑莫禾切參倉含切俗作参横户盲切從横也九章算術音義九章算術後序九章算經九卷周公之遺書而漢丞相張蒼之所刪補也算數之書凡數十家獨以九章為經之首以其九數之法無所不備諸家立術雖有變通推其本意皆自此出而且知後人無以易周漢之舊也自唐有國用之以取士本朝崇寧亦立于學官故前世算數之學相望有人自衣冠南渡以來此學既廢非獨好之者寡而九章正經亦幾泯没無傳矣近世民間之本題之曰黄帝九章豈以為為隸首之所作歟名以不當雖有細草類皆簡捷殘闕懵于本原無有劉徽李淳風之舊注者古人之意不復可見每為慨嘆慶元庚申之夏余在都城與太史局同知算造楊忠輔徳之論厯因從其家得古本九章乃汴都之故書今秘館所定著亦從此本寫以送官者也謹按晉志劉徽所注九章實魏之景元四年觀其序文以謂折理以辭解體用圖又造重差于勾股之下辭乃令之注文其圖至唐猶在今則亡矣重差之法今之海島算經是也又李淳風之注見于唐志凡九卷而今之盈不足方程之篇咸闕淳風注文意者此書嵗久傳録不無錯漏猶幸有此存者今此乃是合劉李二注而為一書云其年六月一日乙酉迪功郎新隆興府靖安縣主簿括蒼鮑澣之仲祺謹書

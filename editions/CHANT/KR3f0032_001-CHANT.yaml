body:
  text: 方田今有田廣十五步從十六步問為田幾何荅曰一畝又有田廣十二步從十四步問為田幾何荅曰一百六十八步方田術曰廣從步數相乘得積步以畝法二百四十步除之即畝數百畝為一頃今有田廣一里從一里問為田幾何荅曰三頃七十五畝又有田廣二里從三里問為田幾何荅曰二十二頃五十畝里田術曰廣從里數相乘得積里以三百七十五乘之即畝數今有十八分之十二問約之得幾何荅曰三分之二又有九十一分之四十九問約之得幾何荅曰十三分之七約分術曰可半者半之不可半者副置分母子之數以少減多更相減損求其等也以等數約之今有三分之一五分之二問合之得幾何荅曰十五分之十一又有三分之二七分之四九分之五問合之得幾何荅曰得一六十三分之五十又有二分之一三分之二四分之三五分之四問合之得幾何荅曰得二六十分之四十三合分術曰母互乘子并以為實母相乘為法實如法而一不滿法者以法命之其母同者直相從之今有九分之八減其五分之一問餘幾何荅曰四十五分之三十一又有四分之三減其三分之一問餘幾何荅曰十二分之五減分術曰母互乘子以少減多餘為實母相乘為法實如法而一今有八分之五二十五分之十六問孰多多幾何荅曰二十五分之十六多多二百分之三又有九分之八七分之六問孰多多幾何荅曰九分之八多多六十三分之二又有二十一分之八五十分之十七問孰多多幾何荅曰二十一分之八多多一千五十分之四十三課分術曰母互乘子以少減多餘為實母相乘為法實如法而一即相多也今有三分之一三分之二四分之三問減多益少各幾何而平荅曰減四分之三者二三分之二者一并以益三分之一而各平於十二分之七又有二分之一三分之二四分之三問減多益少各幾何而平荅曰減三分之二者一四分之三者四并以益二分之一而各平於三十六分之二十三平分術曰母互乘子副并為平實母相乘為法以列數乘未并者各自為列實亦以列數乘法以平實減列實餘約之為所減并所減以益於少以法命平實各得其平今有七人分八錢三分錢之一問人得幾何荅曰人得一錢二十一分錢之四又有三人三分人之一分六錢三分錢之一四分錢之三問人得幾何荅曰人得二錢八分錢之一經分術曰以人數為法錢數為實實如法而一有分者通之重有分者同而通之今有田廣七分步之四從五分步之三問為田幾何荅曰三十五分步之十二又有田廣九分步之七從十一分步之九問為田幾何荅曰十一分步之七又有田廣五分步之四從九分步之五問為田幾何荅曰九分步之四乘分術曰母相乘為法子相乘為實實如法而一今有田廣三步三分步之一從五步五分步之二問為田幾何荅曰十八步又有田廣七步四分步之三從十五步九分步之五問為田幾何荅曰一百二十步九分步之五又有田廣十八步七分步之五從二十三步十一分步之六問為田幾何荅曰一畝二百步十一分步之七大廣田術曰分母各乘其全分子從之相乘為實分母相乘為法實如法而一今有圭田廣十二步正從二十一步問為田幾何荅曰一百二十六步又有圭田廣五步二分步之一從八步三分步之二問為田幾何荅曰二十三步六分步之五術曰半廣以乘正從今有邪田一頭廣三十步一頭廣四十二步正從六十四步問為田幾何荅曰九畝一百四十四步又有邪田正廣六十五步一畔從一百步一畔從七十二步問為田幾何荅曰二十三畝七十步術曰并兩邪而半之以乘正從若廣又可半正從若廣以乘并畝法而一今有箕田舌廣二十步踵廣五步正從三十步問為田幾何荅曰一畝一百三十五步又有箕田舌廣一百一十七步踵廣五十步正從一百三十五步問為田幾何荅曰四十六畝二百三十二步半術曰并踵舌而半之以乘正從畝法而一今有圓田周三十步徑十步問為田幾何荅曰七十五步又有圓田周一百八十一步徑六十步三分步之一問為田幾何荅曰十一畝九十步十二分步之一術曰半周半徑相乘得積步又術曰周徑相乘四而一又術曰徑自相乘三之四而一又術曰周自相乘十二而一今有宛田下周三十步徑十六步問為田幾何荅曰一百二十步又有宛田下周九十九步徑五十一步問為田幾何荅曰五畝六十二步四分步之一術曰以徑乘周四而一今有弧田弦三十步矢十五步問為田幾何荅曰一畝九十七步半又有弧田弦七十八步二分步之一矢十三步九分步之七問為田幾何荅曰二畝一百五十五步八十一分步之五十六術曰以弦乘矢矢又自乘并之二而一今有環田中周九十二步外周一百二十二步徑五步問為田幾何荅曰二畝五十五步又有環田中周六十二步四分步之三外周一百一十三步二分步之一徑十二步三分步之二問為田幾何荅曰四畝一百五十六步四分步之一術曰并中外周而半之以徑乘之為積步密率術曰置中外周步數分母子各居其下母互乘子分母相乘通全步內分子并而半之又可以中周減外周餘半之以益中周徑亦通分內子以乘周為實分母相乘為法除之為積步餘積步之分等數約之以畝法除之即畝數也

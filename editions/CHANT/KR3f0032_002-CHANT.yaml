body:
  text: 粟米粟米之法粟率五十糲米三十粺米二十七𥽿米二十四御米二十一小䵂十三半大䵂五十四糲飯七十五粺飯五十四𥽿飯四十八御飯四十二菽荅麻麥各四十五稻六十豉六十三飱九十熟菽一百三半糵一百七十五今有術曰以所有數乘所求率為實以所有率為法實如法而一今有粟一斗欲為糲米問得幾何荅曰為糲米六升術曰以粟求糲米三之五而一今有粟二斗一升欲為粺米問得幾何荅曰為粺米一斗一升五十分升之十七術曰以粟求粺米二十七之五十而一今有粟四斗五升欲為𥽿米問得幾何荅曰為𥽿米二斗一升五分升之三術曰以粟求𥽿米十二之二十五而一今有粟七斗九升欲為御米問得幾何荅曰為御米三斗三升五十分升之九術曰以粟求御米二十一之五十而一今有粟一斗欲為小䵂問得幾何荅曰為小䵂二升一十分升之七術曰以粟求小䵂二十七之百而一今有粟九斗八升欲為大䵂問得幾何荅曰為大䵂一十斗五升二十五分升之二十一術曰以粟求大䵂二十七之二十五而一今有粟二斗三升欲為糲飯問得幾何荅曰為糲飯三斗四升半術曰以粟求糲飯三之二而一今有粟三斗六升欲為粺飯問得幾何荅曰為粺飯三斗八升二十五分升之二十二術曰以粟求粺飯二十七之二十五而一今有粟八斗六升欲為𥽿飯問得幾何荅曰為𥽿飯八斗二升二十五分升之一十四術曰以粟求𥽿飯二十四之二十五而一今有粟九斗八升欲為御飯問得幾何荅曰為御飯八斗二升二十五分升之八術曰以粟求御飯二十一之二十五而一今有粟三斗少半升欲為菽問得幾何荅曰為菽二斗七升一十分升之三今有粟四斗一升太半升欲為荅問得幾何荅曰為荅三斗七升半今有粟五斗太半升欲為麻問得幾何荅曰為麻四斗五升五分升之三今有粟一十斗八升五分升之二欲為麥問得幾何荅曰為麥九斗七升二十五分升之一十四術曰以粟求菽荅麻麥皆九之十而一今有粟七斗五升七分升之四欲為稻問得幾何荅曰為稻九斗三十五分升之二十四術曰以粟求稻六之五而一今有粟七斗八升欲為豉問得幾何荅曰為豉九斗八升二十五分升之七術曰以粟求豉六十三之五十而一今有粟五斗五升欲為飱問得幾何荅曰為飱九斗九升術曰以粟求飱九之五而一今有粟四斗欲為熟菽問得幾何荅曰為熟菽八斗二升五分升之四術曰以粟求熟菽二百七之百而一今有粟二斗欲為糵問得幾何荅曰為糵七斗術曰以粟求糵七之二而一今有糲米十五斗五升五分升之二欲為粟問得幾何荅曰為粟二十五斗九升術曰以糲米求粟五之三而一今有粺米二斗欲為粟問得幾何荅曰為粟三斗七升二十七分升之一術曰以粺米求粟五十之二十七而一今有𥽿米三斗少半升欲為粟問得幾何荅曰為粟六斗三升三十六分升之七術曰以𥽿米求粟二十五之十二而一今有御米十四斗欲為粟問得幾何荅曰為粟三十三斗三升少半升術曰以御米求粟五十之二十一而一今有稻一十二斗六升一十五分升之一十四欲為粟問得幾何荅曰為粟一十斗五升九分升之七術曰以稻求粟五之六而一今有糲米一十九斗二升七分升之一欲為粺米問得幾何荅曰為粺米一十七斗二升一十四分升之一十三術曰以糲米求粺米九之十而一今有糲米六斗四升五分升之三欲為糲飯問得幾何荅曰為糲飯一十六斗一升半術曰以糲米求糲飯五之二而一今有糲飯七斗六升七分升之四欲為飱問得幾何荅曰為飱九斗一升三十五分升之三十一術曰以糲飯求飱六之五而一今有菽一斗欲為熟菽問得幾何荅曰為熟菽二斗三升術曰以菽求熟菽二十三之十而一今有菽二斗欲為豉問得幾何荅曰為豉二斗八升術曰以菽求豉七之五而一今有麥八斗六升七分升之三欲為小䵂問得幾何荅曰為小䵂二斗五升一十四分升之一十三術曰以麥求小䵂三之十而一今有麥一斗欲為大䵂問得幾何荅曰為大䵂一斗二升術曰以麥求大䵂六之五而一今有出錢一百六十買瓴甓十八枚問枚幾何荅曰一枚八錢九分錢之八今有出錢一萬三千五百買竹二千三百五十箇問箇幾何荅曰一箇五錢四十七分錢之三十五經率術曰以所買率為法所出錢數為實實如法得一錢今有出錢五千七百八十五買漆一斛六斗七升太半升欲斗率之問斗幾何荅曰一斗三百四十五錢五百三分錢之一十五今有出錢七百二十買縑一匹二丈一尺欲丈率之問丈幾何荅曰一丈一百一十八錢六十一分錢之二今有出錢二千三百七十買布九匹二丈七尺欲匹率之問匹幾何荅曰一匹二百四十四錢一百二十九分錢之一百二十四今有出錢一萬三千六百七十買絲一石二鈞一十七斤欲石率之問石幾何荅曰一石八千三百二十六錢一百九十七分錢之一百七十八經率術曰以所求率乘錢數為實以所買率為法實如法得一今有出錢五百七十六買竹七十八箇欲其大小率之問各幾何荅曰其四十八箇箇七錢其三十箇箇八錢今有出錢一千一百二十買絲一石二鈞十八斤欲其貴賤斤率之問各幾何荅曰其二鈞八斤斤五錢其一石一十斤斤六錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤石率之問各幾何荅曰其一鈞九兩一十二銖石八千五十一錢其一石一鈞二十七斤九兩一十七銖石八千五十二錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤鈞率之問各幾何荅曰其七斤一十兩九銖鈞二千一十二錢其一石二鈞二十斤八兩二十銖鈞二千一十三錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤斤率之問各幾何荅曰其一石二鈞七斤十兩四銖斤六十七錢其二十斤九兩一銖斤六十八錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤兩率之問各幾何荅曰其一石一鈞一十七斤一十四兩一銖兩四錢其一鈞一十斤五兩四銖兩五錢其率術曰各置所買石鈞斤兩以為法以所率錢數為實實如法而一不滿法者反以實減法法賤實貴其求石鈞斤兩以積銖各除法實各得其積數餘各為銖今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤銖率之問各幾何荅曰其一鈞二十斤六兩十一銖五銖一錢其一石一鈞七斤一十二兩一十八銖六銖一錢今有出錢六百二十買羽二千一百翭欲其貴賤率之問各幾何荅曰其一千一百四十翭三翭一錢其九百六十翭四翭一錢今有出錢九百八十買矢簳五千八百二十枚欲其貴賤率之問各幾何荅曰其三百枚五枚一錢其五千五百二十枚六枚一錢反其率術曰以錢數為法所率為實實如法而一不滿法者反以實減法法少實多二物各以所得多少之數乘法實即物數

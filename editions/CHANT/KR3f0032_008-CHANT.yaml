body:
  text: 方程今有上禾三秉中禾二秉下禾一秉實三十九斗上禾二秉中禾三秉下禾一秉實三十四斗上禾一秉中禾二秉下禾三秉實二十六斗問上中下禾實一秉各幾何荅曰上禾一秉九斗四分斗之一中禾一秉四斗四分斗之一下禾一秉二斗四分斗之三方程術曰置上禾三秉中禾二秉下禾一秉實三十九斗於右方中左禾列如右方以右行上禾徧乘中行而以直除又乘其次亦以直除然以中行中禾不盡者徧乘左行而以直除左方下禾不盡者上為法下為實實即下禾之實求中禾以法乘中行下實而除下禾之實餘如中禾秉數而一即中禾之實求上禾亦以法乘右行下實而除下禾中禾之實餘如上禾秉數而一即上禾之實實皆如法各得一斗今有上禾七秉損實一斗益之下禾二秉而實一十斗下禾八秉益實一斗與上禾二秉而實一十斗問上下禾實一秉各幾何荅曰上禾一秉實一斗五十二分斗之一十八下禾一秉實五十二分斗之四十一術曰如方程損之曰益益之曰損損實一斗者其實過一十斗也益實一斗者其實不滿一十斗也今有上禾二秉中禾三秉下禾四秉實皆不滿斗上取中中取下下取上各一秉而實滿斗問上中下禾實一秉各幾何荅曰上禾一秉實二十五分斗之九中禾一秉實二十五分斗之七下禾一秉實二十五分斗之四術曰如方程各置所取以正負術入之正負術曰同名相除異名相益正無入負之負無入正之其異名相除同名相益正無入正之負無入負之今有上禾五秉損實一斗一升當下禾七秉上禾七秉損實二斗五升當下禾五秉問上下禾實一秉各幾何荅曰上禾一秉五升下禾一秉二升術曰如方程置上禾五秉正下禾七秉負損實一斗一升正次置上禾七秉正下禾五秉負損實二斗五升正以正負術入之今有上禾六秉損實一斗八升當下禾一十秉下禾一十五秉損實五升當上禾五秉問上下禾實一秉各幾何荅曰上禾一秉實八升下禾一秉實三升術曰如方程置上禾六秉正下禾一十秉負損實一斗八升正次上禾五秉負下禾一十五秉正損實五升正以正負術入之今有上禾三秉益實六斗當下禾一十秉下禾五秉益實一斗當上禾二秉問上下禾實一秉各幾何荅曰上禾一秉實八斗下禾一秉實三斗術曰如方程置上禾三秉正下禾一十秉負益實六斗負次置上禾二秉負下禾五秉正益實一斗負以正負術入之今有牛五羊二直金十兩牛二羊五直金八兩問牛羊各直金幾何荅曰牛一直金一兩二十一分兩之一十三羊一直金二十一分兩之二十術曰如方程今有賣牛二羊五以買一十三豕有餘錢一千賣牛三豕三以買九羊錢適足賣羊六豕八以買五牛錢不足六百問牛羊豕價各幾何荅曰牛價一千二百羊價五百豕價三百術曰如方程置牛二羊五正豕一十三負餘錢數正次牛三正羊九負豕三正次牛五負羊六正豕八正不足錢負以正負術入之今有五雀六燕集稱之衡雀俱重燕俱輕一雀一燕交而處衡適平并雀燕重一斤問雀燕一枚各重幾何荅曰雀重一兩一十九分兩之一十三燕重一兩一十九分兩之五術曰如方程交易質之各重八兩今有甲乙二人持錢不知其數甲得乙半而錢五十乙得甲太半而亦錢五十問甲乙持錢各幾何荅曰甲持三十七錢半乙持二十五錢術曰如方程損益之今有二馬一牛價過一萬如半馬之價一馬二牛價不滿一萬如半牛之價問牛馬價各幾何荅曰馬價五千四百五十四錢一十一分錢之六牛價一千八百一十八錢一十一分錢之二術曰如方程損益之今有武馬一匹中馬二匹下馬三匹皆載四十石至阪皆不能上武馬借中馬一匹中馬借下馬一匹下馬借武馬一匹乃皆上問武中下馬一匹各力引幾何荅曰武馬一匹力引二十二石七分石之六中馬一匹力引一十七石七分石之一下馬一匹力引五石七分石之五術曰如方程各置所借以正負術入之今有五家共井甲二綆不足如乙一綆乙三綆不足如丙一綆丙四綆不足如丁一綆丁五綆不足如戊一綆戊六綆不足如甲一綆各得所不足一綆皆逮問井深綆長各幾何荅曰井深七丈二尺一寸甲綆長二丈六尺五寸乙綆長一丈九尺一寸丙綆長一丈四尺八寸丁綆長一丈二尺九寸戊綆長七尺六寸術曰如方程以正負術入之今有白禾二步青禾三步黃禾四步黑禾五步實各不滿斗白取青黃青取黃黑黃取黑白黑取白青各一步而實滿斗問白青黃黑禾實一步各幾何荅曰白禾一步實一百一十一分斗之三十三青禾一步實一百一十一分斗之二十八黃禾一步實一百一十一分斗之一十七黑禾一步實一百一十一分斗之一十術曰如方程各置所取以正負術入之今有甲禾二秉乙禾三秉丙禾四秉重皆過於石甲二重如乙一乙三重如丙一丙四重如甲一問甲乙丙禾一秉各重幾何荅曰甲禾一秉重二十三分石之一十七乙禾一秉重二十三分石之一十一丙禾一秉重二十三分石之一十術曰如方程置重過於石之物為負以正負術入之今有令一人吏五人從者十人食雞十令十人吏一人從者五人食雞八令五人吏十人從者一人食雞六問令吏從者食雞各幾何荅曰令一人食一百二十二分雞之四十五吏一人食一百二十二分雞之四十一從者一人食一百二十二分雞之九十七術曰如方程以正負術入之今有五羊四犬三雞二兔直錢一千四百九十六四羊二犬六雞三兔直錢一千一百七十五三羊一犬七雞五兔直錢九百五十八二羊三犬五雞一兔直錢八百六十一問羊犬雞兔價各幾何荅曰羊價一百七十七犬價一百二十一雞價二十三兔價二十九術曰如方程以正負術入之今有麻九斗麥七斗菽三斗荅二斗黍五斗直錢一百四十麻七斗麥六斗菽四斗荅五斗黍三斗直錢一百二十八麻三斗麥五斗菽七斗荅六斗黍四斗直錢一百一十六麻二斗麥五斗菽三斗荅九斗黍四斗直錢一百一十二麻一斗麥三斗菽二斗荅八斗黍五斗直錢九十五問一斗直幾何荅曰麻一斗七錢麥一斗四錢菽一斗三錢荅一斗五錢黍一斗六錢術曰如方程以正負術入之

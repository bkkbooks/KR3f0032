  text: 九章算術卷七算經十書之二
  hash: sha256:aa63a5a2ba63ee8918f12021bb3aef7e56864037b2b0674c4153fbb25c2a804e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0032_SBCK_007-1a}
body:
  text: 魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勅注釋盈不足以御隱雜互見今有共買物人出八盈三人出七不足四問人數物價各幾何荅曰七人物價五十三今有共買鷄人出九盈十一人出六不足十六問人數鷄價各幾何苔曰九人鷄價七十今有共買璡人出半盈四人出少半不足三問人數璡價各幾何荅曰四十二人璡價十七今有共買牛七家共出一百九十不足三百三十九家共出二百七十盈三十問家數牛價各幾何荅曰一百二十六家牛價三千七百五十按此術并盈不足者爲衆家之差故以爲實置所出率各以家數除之各得一家所出率以少減多者得一家之差以除卽家數以出率乘之減盈故得牛價也盈不足按盈者謂之朓不足者謂之朒所出率謂之假令盈朒維乘兩設者欲爲齊同之意術曰盈不足相與同共買物者置所出率盈不足各居其下令維乘所出率并以爲實并盈不足爲法據共買物人出八盈三人出七不足四齊其假令同其盈朒盈朒俱十二通計齊則不盈不朒之正數故可并以爲實并盈不足爲法齊之三十二者是四假令有盈十二齊之二十一者是三假令亦朒十二并七假令合爲一實故并三四爲法有分者通之若兩設有分者齊其子同其母此問兩設俱見零分故齊其子同其母副置所出率以少減多餘以約法實實爲物價法爲人數令下維乘上訖以同約之不可約故以乘同之所出率以少減多者餘謂之設差以爲少設則并盈朒是爲定實故以少設約法則爲人數約實則爲物價盈朒當與少設相通不可徧約亦當分母乘設差爲約法實其一術曰并盈不足爲實以所出率以少減多餘爲法實如法得一人以所出率乘之減盈增不足卽物價此術意謂盈不足爲衆人之差以所出率以少減多餘爲一人之差以一人之差約衆人之差故得人數也今有共買金人出四百盈三千四百人出三百盈一百問人數金價各幾何荅曰三十三人金價九千八百今有共買羊人出五不足四十五人出七不足三問人數羊價各幾何荅曰二十一人羊價一百五十兩盈兩不足術曰兩盈兩不足相與同共買物者置所出率盈不足各居其下令維乘所出率以少減多餘爲實兩盈兩不足以少減多餘爲法有分者通之副置所出率以少減多餘以約法實實爲物價法爲人數按此術兩盈者兩設皆逾於正數兩不足者兩設皆不足於正數其所以變化則兩不足亦猶兩盈而或有勢同而情違者當其爲實俱令不足其相乘減則遺其所不足焉故其餘所以爲實者無朒數以損焉葢出而有餘兩盈兩設皆逾於正數假令與共買物人出八盈三人出九盈十齊其假令同其兩盈兩盈俱三十舉齊則兼去其餘所以爲實者無盈數兩盈以少減多餘爲法齊之八十者是十假令而凡盈三十是三以十齊之齊之二十七者是三假令而凡盈三十是十以三齊之兩盈共十三以三減十餘七假令爲一實故令以三減十餘七爲法所出率以少減多餘謂之設差因設差爲少設則兩盈之差是爲定實故以少設約法則爲人數約實則得物價其一術曰置所出率以少減多餘爲法兩盈兩不足以少減多餘爲實實如法而一得人數以所出率乘之減盈増不足卽物價置所出率以少減多得一人之差兩盈兩不足相減餘爲衆人之差故以一人之差除之得人數以所出率乘之減盈增不足卽物價今有共買豕人出一百盈一百人出九十適足問人數豕價各幾何荅曰一十人豕價九百今有共買犬人出五不足九十人出五十適足問人數犬價各幾何荅曰二人犬價一百盈適足不足適足術曰以盈及不足之數爲實置所出率以少減多餘爲法實如法得一人其求物價者以適足乘人數得物價盈不足數爲實者數單見卽衆人差故以爲實所出率以少減多者餘卽一人差故以爲法以除衆人差得人數以適足乘人數卽得物價也此術意謂所出率以少減多者餘是一人不足之差不足數爲衆人之差以一人差約之故得人之數也今有米在十斗桶中不知其數滿中添粟而舂之得米七斗問故米幾何荅曰二斗五升術曰以盈不足術求之假令故米二斗不足二升令之三斗有餘二升按桶受一斛若使故米二斗須添粟八斗以滿之八斗得糲米四斗八升課於七斗是爲不足二升若使故米三斗須添粟七斗以滿之七斗得糲米四斗二升課於七斗是爲有餘二升以盈不足維乘假令之數者欲爲齊同之意實如法卽得故米斗數乃不盈不朒之正數也今有垣高九尺瓜生其上蔓日長七寸瓠生其下蔓日長一尺問幾何日相逢瓜瓠各長幾何荅曰五日十七分日之五瓜長三尺七寸十七分寸之一瓠長五尺二寸十七分寸之十六術曰假令五日不足五寸令之六日有餘一尺二寸按假令五日不足五寸者瓜生五日下垂蔓三尺五寸􅉚生五日上延蔓五尺課於九尺之垣是爲不足五寸令之六日有餘一尺二寸者若使瓜生六日下垂蔓四尺二寸􅉚生六日上延蔓六尺課於九尺之垣是爲有餘一尺二寸以盈不足維乘假令之數者欲爲齊同之意實如法而一卽設差不盈不朒之正數卽得日數以瓜瓠一日之長乘之故各得其長之數也今有蒲生一日長三尺莞生一日長一尺蒲生日自半莞生日自倍問幾何日而長等荅曰二日十三分日之六各長四尺八寸十三分寸之六術曰假令二日不足一尺五寸令之三日有餘一尺七寸半按假令二日不足一尺五寸者蒲生二日長四尺五寸莞生二日長三尺是爲未相及一尺五寸故曰不足令之三日有餘一尺七寸半者蒲增前七寸半莞增前四尺是爲過一尺七寸半故日有餘以盈不足乘除之又以後一日所長各乘日分子如日分母而一者各得日分子之長也故各增二長卽得其數今有垣厚五尺兩鼠對穿大鼠日一尺小鼠亦日一尺大鼠日自倍小鼠日自半問幾何日相逢各穿幾何荅曰二日十七分日之二大鼠穿三尺四寸十七分寸之十二小鼠穿一尺五寸十七分寸之五術曰假令二日不足五寸令之三日有餘三尺七寸半大鼠日倍二日合穿三尺小鼠日自半合穿一尺五寸并大鼠所穿合尺五寸課於垣厚五尺是爲不足五寸令之三日大鼠穿得七尺小鼠穿得一尺七寸半并之以減垣厚五尺有餘三尺七寸半以盈不足術求之卽得以後一日所穿乘日分子如日分母而一卽各得日分子之中所穿故各増二日定穿卽合所問也今有醇酒一斗􅀡錢五十行酒一斗􅀡錢一十今將錢三十得酒二斗問醇行酒各得幾何荅曰醇酒二升半行酒一斗七升半術曰假令醇酒五升行酒一斗五升有餘一十令之醇酒二升行酒一斗八升不足二據醇酒五升􅀡錢二十五行酒一斗五升􅀡錢十五課於三十是爲有餘十據醇酒二升􅀡錢一十行酒一斗八升􅀡錢一十八課於三十是爲不足二以盈不足術求之此問已有重說及其齊同之意也今有大器五小器一容三斛大器一小器五容二斛問大小器各容幾何荅曰大器容二十四分斛之十三小器二十四分斛之七術曰假令大器五斗小器亦五斗盈十斗令之大器五斗五升小器二斗五升不足二斗按大器容五斗大器五容二斛五斗以減三斛餘五斗卽小器一所容故曰小器亦五斗小器五容二斛五斗大器一合爲三斛課於兩斛乃多十斗令之大器五斗五升大器五合容二斛七斗五升以減三斛餘二斗五升卽小器一所容故曰小器二斗五升大器一容五斗五升小器五合容一斛二斗五升合爲一斛八斗課於二斛少二斗故曰不足二斗以盈不足維乘之各并爲實并盈不足爲法除之今有漆三得油四油四和漆五今有漆三斗欲令分以易油還自和餘漆問出漆得油和漆各幾何荅曰出漆一斗一升四分升之一得油一斗五升和漆一斗八升四分升之三術曰假令出漆九升不足六升令之出漆一斗二升有餘二升按此術三斗之漆出九升得油一斗二升可和漆一斗五升餘有二斗一升則六升無油可和故曰不足六升令之出漆一斗二升則易得油一斗六升可和漆二斗於三斗之中已出一斗二升餘有一斗八升見在油合和得漆二斗則是有餘二升以盈不足維乘之爲實并盈不足爲法實如法而一得出漆升數求油及和漆者四五各爲所求率四三各爲所有率而今有之卽得也今有玉方一寸重七兩石方一寸重六兩今有石立方三寸中有玉并重十一斤問玉石重各幾何荅曰玉十四寸重六斤二兩石十三寸重四斤十四兩術曰假令皆玉多十三兩令之皆石不足十四兩不足爲玉多爲石各以一寸之重乘之得玉石之積重立方三寸是一􅆕之方計積二十七寸玉方一寸重七兩石方一寸重六兩是爲玉石重差一兩假令皆玉合有一百八十九兩課於十一斤有餘十三兩玉重而石輕故有此多卽二十七寸之中有十三寸寸損一兩則以爲石重故言多爲石言多之數出於石以爲玉假令皆石合有一百六十二兩課於十一斤少十四兩故曰不足此不足卽以重爲輕故令減少數於石重卽二十七寸之中有十四寸寸增一兩則以爲玉重也今有善田一畝價三百惡田七畝價五百今并買一頃價錢一萬問善惡田各幾何荅曰善田十二畝半惡田八十七畝半術曰假令善田二十畝惡田八十畝多一千七百一十四錢七分錢之二令之善田十畝惡田九十畝不足五百七十一錢七分錢之三按善田二十畝􅀡錢六千惡田八十畝􅀡錢五千七百一十四七分錢之二謂於一萬是多一千七百一十四錢七分錢之二令之善田十畝􅀡錢三千惡田九十畝􅀡錢六千四百二十八七分錢之四課於一萬是爲不足五百七十一錢七分錢之三以盈不足術求之也今有黃金九枚白銀十一枚稱之重適等交易其一金輕十三兩問金銀一枚各重幾何荅曰金重二斤三兩十八銖銀重一斤十三兩六銖術曰假令黃金三斤白銀二斤十一分斤之五不足四十九於右行令之黃金二斤白銀一斤十一分斤之七多十五於左行以分母各乘其行内之數以盈不足維乘所出率并以爲實并盈不足爲法實如法得黃金重分母乘法以除得銀重約之得分也按此術假令黃金九白銀十一俱重二十七斤金九約之得三斤銀十一約之得二斤十一分斤之五各爲金銀一枚重數就金重二十七斤之中減一金之重以益銀銀重二十七斤之中減一銀之重以益金則金重二十六斤十一分斤之五銀重二十七斤十一分斤之六以少減多則金輕十七兩十一分兩之五課於十三兩多四兩十一分兩之五通分内子言之是爲不足四十九又令之黃金九一枚重二斤九枚重十八斤白銀十一亦合重十八斤也乃以十一除之得一枚一斤十一分斤之七爲銀一枚之重數今就金重十八斤之中減一枚金以益銀復減一枚銀以益金則金重十七斤十一分斤之七銀重十八斤十一分斤之四以少減多卽金輕十一分斤之八課於十三兩少一兩十一分兩之四通分内子言之是爲多十五以盈不足術求之實如法得金重分母乘法以除者謂銀兩分母同須通法而後乃除得銀重餘皆約之者術省故也今有良馬與駑馬發長安至齊齊去長安三千里良馬初日行一百九十三里日增十三里駑馬初日行九十七里日減半里良馬先至齊復還迎駑馬問幾何日相逢及各行幾何荅曰十五日一百九十一分日之一百三十五而相逢良馬行四千五百三十四里一百九十一分里之四十六駑馬行一千四百六十五里一百九十一分里之一百四十五術曰假令十五日不足三百三十七里半令之十六日多一百四十里以盈不足維乘假令之數并而爲實并盈不足爲法實如法而一得日數不盡者以等數除之而命分求良馬行者十四乘益疾里數而半之加良馬初日之行里數以乘日分子如日分母而一所得及其不盡而命分加於前良馬凡行里數卽得求駑馬行者以十四乘半里以減駑馬初日之行里數餘以并初日之行又半之乘十五日得駑馬十五日之凡行又以十五日乘半里以減駑馬初日之行餘以乘日分子如日分母而一所得加前里卽駑馬定行里數其奇半里者爲半法以半法增殘分卽得其不盡者而命分按令十五日不足三百三十七里半者據良馬十五日凡行四千二百六十里除先去齊三千里定還迎駑馬一千二百六十里駑馬凡十五日凡行一千四百二里半并良駑二馬所行得二千六百六十二里半課於三千里少三百三十七里半故曰不足令之十六日多一百四十里者據良馬十六日凡行四千六百四十八里先除去齊三千里定還迎駑馬一千六百四十八里駑馬十六日凡行一千四百九十二里并良駑二馬所行得三千一百四十里課於三千里餘有一百四十里故謂之多也以盈不足維乘假令之數并而爲實并盈不足爲法實如法而一得日數者卽設差不盈不朒之正數以二馬初日所行里乘十五日爲十五日平行數求初末益疾減遲之數者并一與十四以十四乘而半之爲中平之積又令益疾減遲里數乘之各爲減益之中平里故各減益平行數得十五日定行里若求後一日以十六日之定行里數乘日分子如日分母而一各得日分子之定行里數故各并十五日定行里卽得其駑馬奇半里者法爲全里之分故破半里爲半法以增殘分卽合所問也今有人持錢之蜀賈利十三初返歸一萬四千次返歸一萬三千次返歸一萬二千次返歸一萬一千後返歸一萬凡五返歸錢本利俱盡問本持錢及利各幾何荅曰本三萬四百六十八錢三十七萬一千二百九十三分錢之八萬四千八百七十六利二萬九千五百三十一錢三十七萬一千二百九十三分錢之二十八萬六千四百一十七術曰假令本錢三萬不足一千七百三十八錢半令之四萬多三萬五千三百九十錢八分按假令本錢三萬并利爲三萬九千除初返歸留餘加利爲三萬二千五百除二返歸留餘又加利爲二萬五千三百五十除第三返歸留餘又加利爲一萬七千三百五十五除第四返歸留餘又加利爲八千二百六十一錢半除第五返歸留合一萬錢不足一千七百三十八錢半若使本錢四萬并利爲五萬二千除初返歸留餘加利爲四萬九千四百除第二返歸留餘又加利爲四萬七千三百二十除第三返歸留餘又加利爲四萬五千九百一十六除第四返歸留餘又加利爲四萬五千三百九十錢八分除第五返歸留合一萬餘三萬五千三百九十錢八分故曰多又術置後返歸一萬以十乘之十三而一卽後所持之本加一萬一千又以十乘之十三而一卽第四返之本加一萬二千又以十乘之十三而一卽第三返之本加一萬三千又以十乘之十三而一卽第二返之本加一萬四千又以十乘之十三而一卽初持之本并五返之錢以減之卽利也九章算術卷七終九章算術卷七訂訛算經十書之二休寧戴震東原副置所出率以少減多餘以約法實實爲物價法爲人數此術前列四問本通爲一徽注辭不達意據第二問人出九盈十一人出六不足十六以十六互乘九得一百四十四以十一互乘六得六十六并之二百一十爲實所謂相與同共買物者置所出率盈不足各居其下令維乘所出率并以爲實也盈十一及不足十六并之二十七爲法所謂幷盈不足爲法也於出九減出六餘三以三約實二百一十得價七十以三約法二十七得九人所謂副置所出率以少減多餘以約法實實爲物價法爲人數也其第一問所出率相減餘一則法實無庸約故維乘并之徑得物價并盈不足徑得人數偶省一算耳第三問人出半盈四人出少半不足三半卽二分之一少半卽三分之一也又卽爲二人共出一盈四三人共出一不足三以二分通三之一得二以三分通二之一得三是齊其子也二分三分相乘得六是同其母也以盈四互乘二得八以不足三互乘三得九并之十七爲實是盈不足維乘所出率并以爲實也盈四及不足三并而爲七以分母相乘所得六通而齊之得四十二爲法是并盈不足爲法也二三相減餘一以約法實亦無庸約故徑得物價人數第四問七家共出一百九十不足三百三十九家共出二百七十盈三十以九家互乘一百九十得一千七百一十以七家互乘二百七十得一千八百九十猶之齊其子也七家九家相乘得六十三猶之同其母也以盈三十互乘一千七百一十得五萬一千三百以不足三百三十互乘一千八百九十得六十二萬三千七百并之六十七萬五千爲實是盈不足維乘所出率并以爲實也盈三十及不足三百三十并而爲三百六十以六十三通而齊之得二萬二千六百八十爲法是并盈不足爲法也於一千八百九十減一千七百一十餘一百八十以一百八十約實六十七萬五千得價三千七百五十以一百八十約法二萬二千六百八十得一百二十六家是副置所出率以少減多餘以約法實也三四兩問皆所謂有分者通之也按此術兩盈者兩設皆逾於正數兩不足者兩設皆不足於正數其所以變化則兩不足亦猶兩盈而或有勢同而情違者當其爲實俱令不足其相乘減則遺其所不足焉故其餘所以爲實者無朒數以損焉葢出而有餘兩盈兩設皆逾於正數以上訛舛不可通術曰以盈不足術求之假令故米二斗不足二升令之三斗有餘二升此下有脫文當云以盈不足維乘假令之數并爲實并盈不足爲法實如法而一得故米斗數術曰假令五日不足五寸令之六日有餘一尺二寸此下有脫文當云以盈不足維乘假令之數并爲實并盈不足爲法實如法而一得日數術曰假令二日不足一尺五寸令之三日有餘一尺七寸半此下有脫文當云以盈不足維乘假令之數并爲實并盈不足爲法實如法而一得日數不盡者等數約之而命分以後一日所長乘日分子如日分母而一各增二長爲二物共長齊等之數術曰假令醇酒五升行酒一斗五升有餘一十令之醇酒二升行酒一斗八升不足二此下有脫文當云各以盈不足維乘之并爲實并盈不足爲法實如法而一得二酒之數術曰假令一十五日不足三百三十七里半令之一十六日多一百四十里以盈不足維乘假令之數并而爲實并盈不足爲法實如法而一得日數不盡者以等數除之而命分此下有脫文當云求二馬各行里數以一十五日初末之行并而半之一十五乘之又以後一日之定行乘日分子日分母爲法而一各加於前破半里爲半法以入殘分求良馬行者一十四乘益疾里數而半之加良馬初日之行里數此下有脫文當云以乘一十五日得一十五日之凡行又以一十五日乘益疾里數加良馬初日之行

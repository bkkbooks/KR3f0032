front:
  text: 九章算術卷二訂訛補圖算經十書之二
  hash: sha256:e5ec69472fe26f5c0265bd3e95a94e8c056f35d8fb46ab00ca4afebee29643a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0032_SBCK_003-1a}
body:
  text: 休寧戴震東原粟率五十糲米三十粺米二十七糳米二十四御米二十一詩大雅鄭箋云米之率糲十粺九糳八侍御七疏云九章粟米之法粟率五十糲米三十粺二十七糳二十四御二十一言粟五升爲糲米三升已下則米漸細故數益少按其率出錢六百二十買羽二千一百翭反之當二百四十錢一錢四翭其三百八十錢一錢三翭已上舛誤不可通參考上注當云按其率錢多物少反之錢少物多出錢六百二十買羽二千一百翭當以除羽得三實餘二百四十是謂三翭復可增一翭然則實餘之數卽是多者之錢故曰實多本以六百二十錢爲法今以多者減之則其餘三百八十悉是少者之錢故曰法少也二百四十錢一錢四翭乘得九百六十其三百八十錢一錢三翭乘得一千一百四十九章算術卷三算經十書之二魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勅注釋衰分以御貴賤禀稅衰分衰分差也術曰各置列衰列衰相與率也重疊則可約副并爲法以所分乘未并者各自爲實法集而衰别數本一也今以所分乘上别以下集除之一乘一除適足相消故所分猶存且各應率而别也於今有術列衰各爲所求率副并爲所有率所分爲所有數又以經分言之假令甲家三人乙家二人丙家一人并六人共分十二爲人得二也欲復作逐家者則當列置人數以一人所得乘之今此術先乗而後除也實如法而一不滿法者以法命之今有大夫不更簪褭上造公士凡五人共獵得五鹿欲以爵次分之問各得幾何荅曰大夫得一鹿三分鹿之二不更得一鹿三分鹿之一簪褭得一鹿上造得三分鹿之二公士得三分鹿之一術曰列置爵數各自爲衰爵數者謂大夫五不更四簪褭三上造二公士一也墨子號令篇以爵級爲賜然則戰國之初有此名也今有術列衰各爲所求率副并爲所有率今有鹿數爲所有數而今有之卽得副并爲法以五鹿乘未并者各自爲實實如法得一鹿今有牛馬羊食人苗苗主責之粟五斗羊主日我羊食半馬馬主日我馬食半牛今欲衰償之問各出幾何荅曰牛主出二斗八升七分升之四馬主出一斗四升七分升之二羊主出七升七分升之一術曰置牛四馬二羊一各自爲列衰副并爲法以五斗乘未并者各自爲實實如法得一斗臣淳風等謹按此術問意羊食半馬馬食半牛是謂四羊當一牛二羊當一馬今術置羊一馬二牛四者通其率以爲列衰今有甲持錢五百六十乙持錢三百五十丙持錢一百八十凡三人俱出關關稅百錢欲以錢數多少衰出之問各幾何荅曰甲出五十一錢一百九分錢之四十一乙出三十二錢一百九分錢之一十二丙出一十六錢一百九分錢之五十六術曰各置錢數爲列衰副并爲法以百錢乘未并者各自爲實實如法得一錢臣淳風等謹按此術甲乙丙持錢數以爲列衰副并爲所有率未并者各爲所求率百錢爲所有數而今有之卽得今有女子善織日自倍五日織五尺問日織幾何荅曰初日織一寸三十一分寸之十九次日織三寸三十一分寸之七次日織六寸三十一分寸之十四次日織一尺二寸三十一分寸之二十八次日織二尺五寸三十一分寸之二十五術曰置一二四八十六爲列衰副并爲法以五尺乘未并者各自爲實實如法得一尺今有北鄉算八千七百五十八西鄉算七千二百三十六南鄉算八千三百五十六凡三鄉發傜三百七十八人欲以算數多少衰出之問各幾何荅曰北鄉遣一百三十五人一萬二千一百七十五分人之一萬一千六百二十七西鄉遣一百一十二人一萬二千一百七十五分人之四千四南鄉遣一百二十九人一萬二千一百七十五分人之八千七百九術曰各置算數爲列衰臣淳風等謹按三鄉算數約可半者爲列衰副并爲法以所發傜人數乘未并者各自爲實實如法得一人按此術今有之義也今有禀粟大夫不更簪褭上造公士凡五人一十五斗今有大夫一人後來亦當禀五斗倉無粟欲以衰出之問各幾何荅曰大夫出一斗四分斗之一不更出一斗􅆪褭出四分斗之三上造出四分斗之二公士出四分斗之一術曰各置所禀粟斛斗數爵次均之以爲列衰副并而加後來大夫亦五斗得二十以爲法以五斗乘未并者各自爲實實如法得一斗禀前五人十五斗者大夫得五斗不更得四斗簪褭得三斗上造得二斗公士得一斗欲令五人各依所得粟多少減與後來大夫卽與前來大夫同據前來大夫已得五斗故言亦也各以所得斗數爲衰并得十五而加後來大夫亦五斗凡二十爲法也是爲六人共出五斗後來大夫亦俱損折今有術副并爲所有率未并者各爲所求率五斗爲所有數而今有之卽得今有禀粟五斛五人分之欲令三人得三二人得二問各幾何荅曰三人人得一斛一斗五升十三分升之五二人人得七斗六升十三分升之十二術曰置三人人三二人人二爲列衰副并爲法以五斛乘未并者各自爲實實如法得一斛返衰以爵次言之大夫五不更四欲令高爵得多者當使大夫一人受五分不更一人受四分人數爲母分數爲子母同則子齊齊卽衰也故上衰分宜以五四爲列焉今此令高爵出少則當使大夫五人共出一人分不更四人共出一人分故謂之返衰人數不同則分數不齊當令母互乘子母互乘子則動者爲不動者衰也亦可先同其母各以分母約其子爲返衰副并爲法以所分乘未并者各自爲實實如法而一術曰列置衰而令相乘動者爲不動者衰今有大夫不更簪褭上造公士凡五人共出百錢欲令高爵出少以次漸多問各幾何荅曰大夫出八錢一百三十七分錢之一百四不更出一十錢一百三十七分錢之一百三十簪褭出一十四錢一百三十七分錢之八十二上造出二十一錢一百三十七分錢之一百二十三公士出四十三錢一百三十七分錢之一百九術曰置爵數各自爲衰而返衰之副并爲法以百錢乘未并者各自爲實實如法得一錢今有甲持粟三升乙持糲米三升丙持糲飯三升欲令合而分之問各幾何荅曰甲二升一十分升之七乙四升一十分升之五丙一升一十分升之八術日以粟率五十糲米率三十糲飯率七十五爲衰而返衰之副并爲法以九升乘未并者各自爲實實如法得一升按此術三人所持升數雖等論其本率精麤不同米率雖少令最得多飯率雖多返使得少故令返之使精得多而麤得少於今有術副并爲所有率未并者各爲所求率九升爲所有數而今有之卽得今有絲一斤價􅀡二百四十今有錢一千三百二十八問得絲幾何荅曰五斤八兩一十二銖五分銖之四術曰以一斤價數爲法以一斤乘今有錢數爲實實如法得絲數按此術今有之義以一斤價爲所有率一斤爲所求率今有錢爲所有數而今有之卽得今有絲一斤價􅀡三百四十五今有絲七兩一十二銖問得錢幾何荅曰一百六十一錢三十二分錢之二十三術曰以一斤銖數爲法以一斤價數乘七兩一十二銖爲實實如法得錢數按此術亦今有之義以絲一斤銖數爲所有率價錢爲所求率今有絲爲所有數而今有之卽得今有縑一丈價􅀡一百二十八今有縑一匹九尺五寸問得錢幾何荅曰六百三十三錢五分錢之三術曰以一丈寸數爲法以價錢數乘今有縑寸數爲實實如法得錢數臣淳風等謹按此術亦今有之義以縑一丈寸數爲所有率價錢爲所求率今有縑寸數爲所有數而今有之卽得今有布一匹價􅀡一百二十五今有布二丈七尺問得錢幾何荅曰八十四錢八分錢之三術曰以一匹尺數爲法今有布尺數乘價錢爲實實如法得錢數按此術亦今有之義以一匹尺數爲所有率價錢爲所求率今有布爲所有數今有之卽得今有素一匹一丈價􅀡六百二十五今有錢五百問得素幾何荅曰得素一匹術日以價􅀡爲法以一匹一丈尺數乘今有錢數爲實實如法得素數按此術亦今有之義以價錢爲所有率五丈尺數爲所求率今有錢爲所有數今有之卽得今有與人絲一十四斤約得縑一十斤今與人絲四十五斤八兩問得縑幾何荅曰三十二斤八兩術曰以一十四斤兩數爲法以一十斤乘今有絲兩數爲實實如法得縑數此術亦今有之義以一十四斤兩數爲所有率一十斤爲所求率今有絲爲所有數今有之卽得今有絲一斤耗七兩今有絲二十三斤五兩問耗幾何荅曰一百六十三兩四銖半術曰以一斤展十六兩爲法以七兩乘今有絲兩數爲實實如法得耗數按此術亦今有之義以一斤爲十六兩爲所有率七兩爲所求率今有絲爲所有數而今有之卽得今有生絲三十斤乾之耗三斤十二兩今有乾絲一十二斤問生絲幾何荅曰一十三斤一十一兩十銖七分銖之二術曰置生絲兩數除耗數餘以爲法餘四百二十兩卽乾絲率三十斤乘乾絲兩數爲實實如法得生絲數凡所謂率者細則俱細麤則俱麤兩數相推而已故品物不同如上縑絲之比得相與乘焉三十斤凡四百八十兩今生絲率四百八十兩乾絲率四百二十兩則其數相通可俱爲銖可俱爲兩可俱爲斤無所歸滯也若然宜以所有乾絲斤數乘生絲兩數爲實今斤兩錯互而亦同歸者使乾絲以兩數爲率生絲以斤數爲率譬之異類亦各有一定之勢臣淳風等謹按此術置生絲兩數除耗數餘卽乾絲之率於今有術爲所有率三十斤爲所求率乾絲兩數爲所有數凡所謂率者細則俱細麤則俱麤今以斤乘兩者乾絲卽以兩數爲率生絲卽以斤數爲率譬之異物各有一定之率也今有田一畝收粟六升太半升今有田一頃二十六畝一百五十九步問收粟幾何荅曰八斛四斗四升一十二分升之五術曰以畝二百四十步爲法以六升太半升乘今有田積步爲實實如法得粟數按此術亦今有之義以一畝步數爲所有率六升太半升爲所求率今有田積步爲所有數而今有之卽得今有取保一歲價錢二千五百今先取一千二百問當作日幾何荅曰一百六十九日二十五分日之二十三術曰以價錢爲法以一歲三百五十四日乘先取錢數爲實實如法得日數按此術亦今有之義以價爲所有率一歲日數爲所求率取錢爲所有數而今有之卽得今有貸人千錢月息三十今有貸人七百五十錢九日歸之問息幾何荅曰六錢四分錢之三術曰以月三十日乘千錢爲法以三十日乘千錢爲法者得三萬是爲貸人錢三萬一日息三十也以息三十乘今所貸錢數又以九日乘之爲實實如法得一錢以九日乘今所貸錢爲今一日所有錢於今有術爲所有數息三十爲所求率三萬錢爲所有率此又可以一月三十日約息三十錢爲十分一日以乘今一日所有錢爲實千錢爲法爲率者當等之於一也故三十日或可乘本或可約息皆所以等之也

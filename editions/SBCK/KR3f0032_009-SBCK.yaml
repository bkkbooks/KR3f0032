  text: 九章算術卷九算經十書之二
  hash: sha256:db05b9aa3b71a546126f08f208107f4f746c10cd80ed9fe83ea9e7577e989c39
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0032_SBCK_009-1a}
body:
  text: 魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勅注釋句股以御高深廣遠今有句三尺股四尺問爲􅁌幾何荅曰五尺今有􅁌五尺句三尺問爲股幾何荅曰四尺今有股四尺􅁌五尺問爲句幾何荅曰三尺句股短面日句長面日股相與結角日􅁌句短其股股短其􅁌將以施於諸率故先具此術以見其源也術曰句股各自乘并而開方除之卽􅁌句自乘爲朱方股自乘爲靑方令出入相補各從其類因就其餘不移動也合成􅁌方之幂開方除之卽􅁌也又股自乘以減􅁌自乘其餘開方除之卽句臣淳風等謹按此術以句股幂合成􅁌幂句方於内則句短於股令股自乘以減􅁌自乘餘者卽句幂也故開方除之卽句也又句自乘以減􅁌自乘其餘開方除之卽股句股幂合以成􅁌幂令去其一則餘在者皆可得而知之今有圓材徑二尺五寸欲爲方版令厚七寸問廣幾何荅曰二尺四寸五分術曰令徑二尺五寸自乘以七寸自乘減之其餘開方除之卽廣此以圓徑二尺五寸爲􅁌版厚七寸爲句所求廣爲股也今有木長二丈圍之三尺葛生其下􅅶木七周上與木齊問葛長幾何荅曰二丈九尺術曰以七周乘三圍爲股木長爲句爲之求􅁌􅁌者葛之長據圍廣木長求葛之長其形葛卷裏袤以筆管靑線宛轉有似葛之􅅶木解而觀之則每周之間自有相間成句股􅁌則其間木長爲股圍之爲句葛長爲􅁌􅁌七周乘三圍是并合衆句以爲一句則句長而股短故術以木長謂之句圍之謂之股言之倒互句與股求􅁌亦如前圖句三自乘爲朱幂股四自乘爲靑幂合朱靑二十五爲􅁌五自乘幂出上第一圖句股幂合爲􅁌幂明矣然二幂之數謂倒在於􅁌幂之中而已可更相裏者則成方幂其居表者則成矩幂二表裏形訛而數均又按此圖句幂之矩靑卷白表是其幂以股􅁌差爲廣股􅁌并爲袤而股幂方其裏股幂之矩靑卷白表是其幂以句􅁌差爲廣句􅁌并爲袤而句幂方其裏是故差之與并用除之短長互相乘也今有池方一丈葭生其中央出水一尺引葭赴岸適與岸齊問水深葭長各幾何荅曰水深一丈二尺葭長一丈三尺術曰半池方自乘此以池方半之得五尺爲句水深爲股葭長爲􅁌以句及股􅁌差求股􅁌故令句自乘先見矩幂也以出水一尺自乘減之出水者股􅁌差減此差幂於矩幂餘爲倍股􅁌差乘股長之矩幂餘倍出水除之卽得水深倍差爲矩幂之廣水深是股欲先見葭長者出水一尺自乘以加於半池方自乘倍出水除之卽得令此幂得出水一尺爲袤故爲矩而得葭長也加出水數得葭長臣淳風等謹按此葭本出水一尺旣見水深故加出水尺數而得葭長也今有立木繫索其末委地三尺引索郤行去本八尺而索盡問索長幾何荅曰一丈二尺二十一分尺之一術曰以去本自乘此以去本八尺爲句所求索者􅁌也引而索盡與開門去閫者句及股􅁌差求股􅁌同一術去本自乘者先張矩幂令如委數而一委地者股􅁌差也以除矩幂卽是股􅁌并也所得加委地數而半之卽索長子不可半者倍其母加差於并則成兩索長故又半之其減差於并而半之得木長也今有垣高一丈倚木於垣高與垣齊引木郤行一尺其木至地問木幾何荅曰五丈五寸術曰以垣高十尺自乘如郤行尺數而一所得以加郤行尺數而半之卽木長數此以垣高一丈爲句所求倚木者爲􅁌引郤行一尺爲股􅁌差其爲術之意與繫索問同也今有圓材埋在壁中不知大小以鐻鐻之深一寸鐻道長一尺問徑幾何荅曰材徑二尺六寸術曰半鐻道自乘此術以鐻道一尺爲句材徑爲􅁌鐻深一寸爲股􅁌差之一半故鐻長亦半之也臣淳風等謹按下鐻深得一寸爲半股􅁌差注云爲股􅁌差者鐻道也如深寸而一以深寸增之卽材徑亦以半增之如上術去本當半之今此皆同半差不復半也今有開門去閫一尺不合二寸問門廣幾何荅曰一丈一寸術曰以去閫一尺自乘所得以不合二寸半之而一所得增不合之半卽得門廣此去閫一尺爲句門廣爲股不合二寸以半之得一寸爲股􅁌差求􅁌故當半之今卽以兩􅁌爲廣數故不復半之也今有戸高多於廣六尺八寸兩隅相去適一丈問戸高廣各幾何荅曰廣二尺八寸高九尺六寸術曰令一丈自乘爲實半相多令自乘倍之減實半其餘以開方除之所得減相多之半卽戸廣加相多之半卽戸高令戸廣爲句高爲股兩隅相去一丈爲􅁌高多於廣六尺八寸爲句股差按圖爲位􅁌幂適滿萬寸倍之減句股差幂開方除之其所得卽高廣并數以差減并而半之卽戸廣加相多之數卽戸高也今此術先求其半一丈自乘爲朱幂四黃幂一半差自乘又倍之爲黃幂四分之二減實半其餘有朱幂二黃幂四分之一其於大方棄四分之三適得四分之一故開方除之得高廣并數之半減差半得廣加得戸高又按此圖幂句股并自乘加差幂爲兩􅁌幂半之開方得􅁌今倍􅁌幂減差幂求句股并葢先見其􅁌然後知其句與股也句股適等者并而自乘卽爲兩􅁌幂皆各爲方先見其􅁌然後知其句與股者倍􅁌幂卽爲句股適等者并而自乘之幂半相多自乘倍之又半股并自乘亦倍之合爲􅁌幂其無差數者句股各自乘并之爲實與句股相乘倍之爲實皆開方得􅁌􅁌幂半之爲實開方卽得句股及股長句短同源而分流焉假令句股各五􅁌幂五十開方除之得七尺有餘一不盡假令􅁌十其幂有百半之爲句股二幂各得五十當亦不可開故曰圓三徑一方五斜七雖不正得盡理亦可言相近耳其句股合而自乘之幂令􅁌自乘倍之爲兩􅁌幂以減之其餘開方除之爲句股差加差於合而半之爲股減差於合而半之爲句股􅁌卽高廣袤其出此圖也其倍􅁌爲廣袤合矩句卽爲幂得廣卽句股差其矩句之幂倍爲從法開之亦句股差其餘以句股幂減半其餘差爲從法開方除之卽句也今有戸不知高廣竿不知長短橫之不出四尺從之不出二尺邪之適出問戸高廣袤各幾何荅曰廣六尺高八尺衺一丈術曰從橫不出相乘倍而開方除之所得加從不出卽戸廣此以戸廣爲句戸高爲股戸袤爲􅁌凡并句股之幂卽爲􅁌幂或矩於表或方於裏連之者舉表矩而方之又從句方裏令爲靑矩之表未滿黃方满此方則兩端之亷重於隅中各以股􅁌差爲廣句􅁌差爲袤故兩端差相乘又倍之則成黄方之幂開方除之得黃方之面其外之靑知亦以股􅁌差爲廣故以股􅁌差加之則爲句也加橫不出卽戸高兩不出加之得戸袤今有竹高一丈末折抵地去本三尺問折者高幾何荅曰四尺二十分尺之十一術曰以去本自乘此去本三尺爲句折之餘高爲股末折抵地爲􅁌以句及股􅁌并求股故先令句自乘見矩幂令如高而一竹高一丈爲股􅁌并以除此幂得差所得以減竹高而半其餘卽折者之高也此術與繫索者之類更相反覆也亦可如上術令高自乘爲股􅁌并幂去本自乘爲矩幂減之餘爲實倍高爲法則得折之高數也今有二人同所立甲行率七乙行率三乙東行甲南行十步而邪東北與乙會問甲乙行各幾行荅曰乙東行十步半甲邪行十四步半及之術曰令七自乘三亦自乘并而半之以爲甲邪行率邪行率減於七自乘餘爲南行率以三乘七爲乙東行率此以南行爲句東行爲股邪行爲􅁌句􅁌并七欲知􅁌者當以股自乘爲幂如并而一所得爲句􅁌差加差於并而半之爲􅁌以􅁌減差餘爲句如是或有分當通而約之乃定術以句􅁌并爲分母差爲分子故令句􅁌并自乘爲朱黄相連之方股自乘爲靑幂之矩令其矩引之􅀡加損同之以句􅁌并爲袤差爲廣其圖大體以兩􅁌爲袤句􅁌并爲廣引黃斷其半爲􅁌率七自乘者句􅁌并之率故􅁌減之餘爲句率同立處是中停也列用率皆句􅁌并爲袤􅁌與句各爲之廣故亦以股率同其袤也置南行十步以甲邪行率乘之副置十步以乙東行率乘之各自爲實實如南行率而一各得行數南行十步者所有見句求見􅁌股故以􅁌股率如句率而一今有句五步股十二步問句中容方幾何荅曰方三步十七分步之九術曰并句股爲法句股相乘爲實實如法而一得方一步句股相乘爲朱靑黃幂各二令黃幂連於下隅朱靑各以類合共成修幂中方黃爲廣并句股爲袤故并句股爲法幂圖方在句中則方之兩亷各自成小句股而其相與之勢不失本率也句面之小股股面之小句從横相連合而成中方令股爲中方率并句股爲廣率據見句五步而今有之得中方也復令句爲中方率以并句股爲袤率據股十二步而今有之則中方又可知此則雖不效而法實有法由生矣不容圓率以今有衰分言之可以見之也今有句八步股十五步問句中容圓徑幾何荅曰六步術曰八步爲句十五步爲股爲之求􅁌三位并之爲法以句乘股倍之爲實實如法得徑一步句股相乘爲圖之本體朱靑黃幂各二則倍之爲各四可用畫於小􅁓分裁邪正之會令顛倒相補各以􅀋合成脩幂圓徑爲廣并句股􅁌爲袤故并句股􅁌以爲法又以圖之大體言之股中靑必令立規於橫廣句股又邪三徑均而復連規從橫量度句股必合而成小方矣又畫中􅁌以觀其會則句股之中成小句股􅁌者四句面之小股股面之小句皆小方之面皆圓徑之半其數故可衰以句股􅁌爲列衰副并爲法以小句乘未并者各自爲實實如法而一得句面之小股可知也以股乘列衰爲實則得股面之小句可知言雖異矣及其所以成法之實則同歸矣則圓徑又可以句乘之差并句􅁌差減股爲圓徑又􅁌減句股并餘爲圓徑以句􅁌差乘股􅁌差而倍之開方除之亦圓徑也今有邑方二百步各中開門出東門十五步有木問出南門幾何步而見木荅曰六百六十六步太半步術曰出東門步數爲法以句率爲法也半邑方自乘爲實實如法得一步此以出東門十五步爲句率東門南至隅一百步爲股率南門東至隅一百步爲見句步欲以見句求股以爲出南門數正合半邑方自乘者股率當乘見句此二者數同也今有邑東西七里南北九里各中開門出東門十五里有木問出南門幾何步而見木荅曰三百一十五步術曰東門南至隅步數以乘南門東至隅步數爲實以木去門步數爲法實如法而一此以東門南至隅四里半爲句率出東門十五里爲股率南門東至隅三里半爲見股所問出南門卽見股之句爲術之意與上同也今有邑方不知大小各中開門出北門三十步有木出西門七百五十步見木問邑方幾何荅曰一里術曰令兩出門步數相乘因而四之爲實開方除之卽得邑方按前術半邑方自乘出東門步數除之卽出南門步數今兩出門相乘爲半方邑自乘居一隅之積分因而四之卽得四隅之積分故以爲實開方除之卽邑方也今有邑方不知大小各中開門出北門二十步有木出南門十四步折而西行一千七百七十五步見木問邑方幾何荅曰二百五十步術曰以出北門步數乘西行步數倍之爲實此以折而西行爲股自木至邑南十四步爲句以出北門二十步爲句率北門至西隅爲股率卽半廣數故以出北門句率乘西行股得半廣股率乘句之幂然此幂居半以西故又倍之合半以東也并出南門步數爲從法開方除之卽邑方此術之幂東西廣如邑方南北自木盡邑南十四步爲袤合南北步數爲廣袤差故連并兩步數爲從法以爲隅外之幂也今有邑方十里各中開門甲乙俱從邑中央而出乙東出甲南出出門不知步數邪向東門磨邑適與乙會率甲行五乙行三問甲乙行各幾何荅曰甲出南門八百步邪東北行四千八百八十七步半及乙乙東行四千三百一十二步半術曰令五自乘三亦自乘并而半之爲邪行率邪行率減於五自乘者餘爲南行率以三乘五爲乙東行率求三率之意與上甲乙同置邑方半之以南行率乘之如東行率而一卽得出南門步數邑半方自南門至東隅五里以爲小股求出南門步數爲小股之句以東行爲股率南行爲句率故置邑方半之以南行句率乘之如股率而一以增邑方半卽南行半邑者謂從邑心中停也置南行步求􅁌者以邪行率乘之求東者以東行率乘之各自爲實實如南行率得一步此術與上甲乙同有木去人不知遠近立四表相去各一丈令左兩表與所望參相􅀡從後右表望之入前右表三寸問木去人幾何荅曰三十三丈三尺三寸少半寸術曰令一丈自乘爲實以三寸爲法實如法而一此以入前右表三寸爲句率右兩表相去一丈爲股率左右兩表相去一丈爲見句所問木去人者見句之股股率當乘見句此二率俱一丈故曰自乘以三寸爲法實如法得一寸有山居木西不知其高山去木五十三里木高九丈五尺人立木東三里望木末適與山峯斜平人目高七尺問山高幾何荅曰一百六十四丈九尺六寸太半寸術曰置木高減人目高七尺餘以乘五十三里爲實以人去木三里爲法實如法而一所得加木高卽山高此術句股之義以木高減人目高七尺餘有八丈八尺爲句率去人目三里爲股率山去木五十三里爲見股以句率乘見股如股率而一得句加木之高故爲山高也今有井徑五尺不知其深立五尺木於井上從木末望水岸入徑四寸問井深幾何荅曰五丈七尺五寸術曰置井徑五尺以入徑四寸減之餘以乘立木五尺爲實以入徑四寸爲法實如法得一寸此以入徑四寸爲句率立木五尺爲股率井徑四尺六寸爲見句問井深者見句之股也九章算術卷之九終錢唐莫濰校字大淸乾隆三十八年癸巳秋闕里孔氏依汲古閣影宋刻本重雕秘書省九章算術一部共九冊元豐七年九月日校定降授宣德郎秘書省校書郞臣葉祖洽上進校定承議郎行秘書省校書郎臣王仲脩校定朝奉郎行秘書省校書郎臣錢長􅀸奉議郎守秘書郞丞臣韓宗古朝請郎試秘書少監臣趙彦若元豐七年九月二十八日進呈奉御寶批宐依已校定鏤板朝奉郎祕書丞上騎都尉賜緋魚袋臣韓治朝散郎試祕書少監上騎都尉賜緋魚袋臣顧臨朝議大夫守祕書少監上䕶軍賜紫金魚袋臣劉攽中大夫守尙書右丞䕶軍東平郡開國侯食邑貳千叁百戸賜紫金魚袋臣呂大防通議大夫守尙書左丞上柱國平原郡開國公食邑貳千捌百戸食實封伍伯戸臣李淸臣正議大夫守中書侍郞上柱國馮翊郡開國公食邑貳千叁百戸食實封伍伯戸臣張璪正議大夫守門下侍郎上柱國南陽郡開國公食邑貳千壹百戸食實封壹阡戸臣韓維金紫光祿大夫守尙書右僕射兼中書侍郎上柱國東平郡開國公食邑六千二百戸食實封壹阡玖伯戸臣呂公著正議大夫守尙書左僕射兼門下侍郎上柱國河内郡開國公食邑四千一百戸食實封壹阡伍伯戸臣司馬光九章算術卷九訂訛補圖算經十書之二休寧戴震東原句股􅁌互求圖注云句自乘爲朱方股自乘爲靑方令出入相補合成􅁌方之幂又李淳風等釋云句方於内則句短於股據此則劉徽注此章舊有圖而缺今並按注補圖據圍廣木長求葛之長其形葛卷裏袤以筆管靑線宛轉有似葛之􅅶木解而觀之則每周之閒自有相閒成句股􅁌則其閒木長爲股圍之爲句葛長爲􅁌􅁌七周乘三圍是并合衆句以爲一句則句長而股短故術以木長謂之句圍之謂之股言之倒互句與股求􅁌亦如前圖句三自乘爲朱幂股四自乘爲靑幂合朱靑二十五爲􅁌五自乘幂出上第一圖句股幂合爲􅁌幂明矣然二幂之數謂倒在於􅁌幂之中而已可更相裏者則成方幂其居表者則成矩幂二表裏形訛而數均又按此圖句幂之矩靑卷白表是其幂以句股􅁌差爲廣股􅁌并爲袤而股幂方其裏股幂之矩靑卷白表是其幂以句􅁌差爲廣句􅁌并爲袤而句幂方其裏是故差之與并用除之短長互相乘也據趙君􅀸注周髀算經云凡并句股之實卽成􅁌實或矩於外或方於内形詭而量均體殊而數齊句實之矩以股􅁌差爲廣股􅁌并爲袤而股實方其裏股實之矩以句􅁌差爲廣句􅁌并爲袤而句實方其裏君􅀸漢人此注葢用其說而傳寫失真加以後人竄改遂不可通句股差句股并與􅁌互求之圖據注意滿大方卽句股并自乘之幂有朱幂八黃幂一内小方卽􅁌實有朱幂四黃幂一倍􅁌實滿外大方而多一黃幂於􅁌實内減黃幂四分之二半其餘適得外大方四分之一朱幂者句股積也黃幂之面卽句股差股實之矩圖趙君􅀸云股實之矩以句􅁌差爲廣句􅁌并爲袤而句實方其裏劉注用句􅁌差句􅁌并與句股􅁌互求本此句實之矩圖趙君􅀸云句實之矩以股􅁌差爲廣股􅁌并爲袤而股實方其裏劉注用股􅁌差股􅁌并與句股􅁌互求本此臣淳風等謹按下鐻深得一寸爲半股􅁌差注云爲股􅁌差者鐻道也案此言下鐻深得一寸爲半股􅁌差卽注所謂鐻深一寸爲股􅁌差之一半也更綴注云爲股􅁌差者鐻道也十字舛誤不可通據割圓術鐻深一寸卽可爲股􅁌差半鐻道五寸爲句材半徑爲􅁌若以此言之尤合術意股􅁌卽高廣袤其出此圖也其倍􅁌爲廣袤合矩句卽爲幂得廣卽句股差股􅁌卽高廣袤以下訛舛據趙君􅀸注周髀算經云其倍􅁌爲廣袤合而令句股見者自乘其爲實四實以減之開其餘所得爲差以差減合半其餘爲廣減廣於􅁌卽所求也此注似用其說而傳寫舛訛後人又妄加改竄遂不可通就君􅀸說考之倍􅁌自乘得􅁌實四内有句實股實各四減四句實餘卽四股實開之得倍股減四股實餘卽四句實開之得倍句所謂開其餘所得爲差也減倍股於倍􅁌半其餘爲股􅁌差減倍句於倍􅁌半其餘爲句􅁌差所謂以差減合半其餘爲廣也減股􅁌差於􅁌卽股減句􅁌差於􅁌卽句所謂減廣於􅁌卽所求也凡股􅁌差爲廣股􅁌并爲袤其幂卽句幂句􅁌差爲廣句􅁌并爲袤其幂卽股幂合廣袤皆成倍􅁌故曰倍􅁌爲廣袤合而倍句倍股卽廣袤差其矩句之幂倍爲從法開之亦句股差其餘以句股幂減半其餘差爲從法開方除之卽句也據趙君􅀸云減矩句之實於􅁌實開其餘卽股倍股在兩邊爲從法開矩句之角卽股􅁌差減矩股之實於􅁌實開其餘卽句倍句在兩邊爲從法開矩股之角卽句􅁌差此注亦用其說而殘缺失次遂不可通句實廣袤合圖據注意句實以股􅁌差爲廣股􅁌并爲袤廣袤合亦卽倍􅁌減四句實於倍􅁌自乘之幂餘爲四股實開方得倍股卽句實之廣袤差也股實廣袤合圖據注意倍􅁌自乘之幂容句實股實各四股實以句􅁌差爲廣句􅁌并爲袤廣袤合卽倍􅁌減四股實於倍􅁌自乘之幂餘爲四句實開方得倍句卽股實之廣袤差也句􅁌差股􅁌差求句股􅁌之圖句􅁌差乘股􅁌差倍之爲兩亷其幂與黃方相等故開方除之得黃方之面加股􅁌差卽句加句􅁌差卽股加兩差卽􅁌術曰令七自乘三亦自乘并而半之以爲甲邪行率邪行率減於七自乘餘爲南行率以三乘七爲乙東行率據問意甲行率七者設句􅁌并七也乙行率三者設股三也術令七自乘三亦自乘并而半之爲甲邪行率者句􅁌并自乘加股自乘半之卽􅁌乘句􅁌并所得數以爲􅁌率邪行率減於七自乘餘爲南行率者句􅁌并自乘減􅁌乘句􅁌并餘卽句乘句􅁌并所得數以爲句率􅁌率句率皆通之以句􅁌并則股三亦以乘句􅁌并七乃爲股率句股􅁌三率皆句􅁌并通句股􅁌所得數然則七自乘卽句􅁌并之率三自乘卽句􅁌差之率合差於并而半之爲􅁌減􅁌於并爲句其義一而已矣股與句􅁌并求句􅁌之圖據注意句􅁌并自乘加股自乘成長方以兩􅁌爲袤句􅁌并爲廣故半之爲􅁌率減股自乘於􅁌率餘爲句率股自乘之矩損上橫幂益於下以句􅁌并爲袤差爲廣句股相乘爲朱靑黃幂各二令黃幂連於下隅朱靑各以類合共成修幂中方黃爲廣并句股爲袤故并句股爲法幂圖方在句中則方之兩亷各自成小句股而其相與之勢不失本率也句面之小股股面之小句從橫相連合而成中方令股爲中方率并句股爲廣率據見句五步而今有之得中方也復令句爲中方率以并句股爲袤率據股一十二步而今有之則中方又可知此則雖不效而法實有法由生矣此十三字舛誤據上以粟米章今有術及衰分章列衰之意解此術大小句股互求并句股卽所有率中方率卽所求率見句見股卽所有數於事雖不同而意相倣效實術所由生也注意當是如此句股容方圖據注意句股相乘得兩黄幂兩朱幂兩靑幂令黃幂從黄幂朱幂從朱幂靑幂從靑幂兩朱在上兩黄在中兩靑合而横之在下則句股并爲幂容方之面爲廣其朱幂靑幂各成小股皆如大句股本率互求句股相乘爲圖之本體朱靑黄幂各二則倍之爲各四可用畫於小􅁓分裁邪正之會令顛倒相補各以類合成修幂圓徑爲廣並句股􅁌爲袤故并句股􅁌以爲法又以圖之大體言之股中靑必令立規於橫廣句股又邪三徑均而復連規此二十一字舛誤據容圓之徑卽減􅁌於句股并之餘也取半徑規之又以半徑減句股其餘并之適爲􅁌如是截句股􅁌各爲二三半徑均而復連於規之中央注意葢以此爲言而殘缺失次遂不可通從橫量度句股必合而成小方矣又畫中􅁌以觀其會則句股之中成小句股􅁌四者句面之小股股面之小句皆小方之面皆圓徑之半其數故可衰以句股􅁌爲列衰副并爲法以小句乘未并者各自爲實實如法而一得句面之小股可知也以股乘列衰爲實則得股面之小句可知以小句乘未并者至此訛舛不可通或後人妄加改竄又援衰分章之文入於此遂漫無辨别當是言令股爲列衰以見句乘之爲實實如法而一則句面之小股可知也令句爲列衰以見股乘之爲實實如法而一則股面之小句可知此在粟米章卽今有術以所求率乘所有數所有率除之古算家謂之異乘同除注以解大小句股互求句率股率謂所有率及所求率見句或見股爲所有數不可以見句乘句率見股乘股率也言雖異矣及其所以成法之實則同歸矣則圓徑又可以句乘之差并此句亦訛舛當云則又可以股􅁌差減句爲圓徑句􅁌差減股爲圓徑此下有脫文當補云句􅁌差股􅁌差并之以減􅁌餘爲圓徑據術意句股相乘半之爲句股積有朱靑黃幂各一則倍之有朱靑黃幂各四截朱靑幂各成小句股者二令倒順相補各成小長方合四朱四靑四黃而成大長方以容圓半徑爲廣并句股􅁌爲袤九章之術乃算術之鼻祖囊括後賢胥不能度越範圍焉猶六經之臨百氏也周官保氏九數鄭君以九章之方田粟米衰分少廣商功均輸方程嬴不足旁要釋之綴曰今有重差夕桀句股也錢曉徵學士以爲夕桀乃互椉之脫誤良然蓋九章句股篇末有望遠度高測深七術或析之名曰九章重差互椉卽方程術所謂維椉是也句股卽旁要疏所云今九章以句股替旁要旁要云者不必實有是形可自旁假設以要取之祖冲之謂之綴術疏又引馬氏融注今有重差夕桀馬氏不連及句股者以句股替旁要故不重舉劉徽序云漢張蒼耿壽昌因舊文遺殘各稱刪補故校其目與古或異而所論多近語所謂目與古異者則句股替旁要是也至唐王孝通云校其條目頗與古術不合則妄而敢矣夫古今豈有異術哉劉徽因其有望遠諸術遂造重差綴於句股之下卽今海島算引而申之觸類而長之事之宜也舊有圖今缺余友休寧東原戴先生補之今分附諸篇之末亦猶劉徽之綴重差於句股焉乾隆癸巳闕里孔繼涵識於京師壽雲簃之敏事齋九章算術卷九終

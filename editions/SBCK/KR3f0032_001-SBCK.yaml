  text: 九章算術卷第一算經十書之二
  hash: sha256:f8c958153c9c9961ce0b59803650999637d28f99c4217e64cd13cc044e94d9f8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0032_SBCK_001-1a}
body:
  text: 魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勅注釋方田以御田疇界域今有田廣十五步從十六步問爲田幾何荅曰一畝又有田廣十二步從十四步問爲田幾何荅曰一百六十八步圖從十四廣十二方田術曰廣從步數相乘得積步此積謂田􅇈凡廣從相乘謂之􅇈臣淳風等謹按經云廣從相乘得積步注云廣從相乘謂之􅇈觀斯注意積􅇈義同以理推之固當不爾何則􅇈是方􅆕單布之名積乃衆數聚居之稱循名責實二者全殊雖欲同之竊恐不可今以凡言􅇈者據廣從之一方其言積者舉衆步之都數經云相乘得積步卽是都數之明文注云謂之爲􅇈全乖積步之本意此注前云積謂田􅇈於理得通復云謂之爲􅇈䌓而不當今者注釋存善去非略爲科􅂤遺諸後學以畝法二百四十步除之卽畝數百畝爲一頃臣淳風等謹按此爲篇端故特舉頃畝二法餘術不復言者從此可知一畝之田廣十五步從而疏之令爲十五行卽每行廣一步而從十六步又横而截之令爲十六行卽毎行廣一步而從十五步此卽從疏横截之步各自爲方凡有二百四十步爲一畝之地步數正同以此言之卽廣從相乘得積步驗矣二百四十步者畝法也百畝者頃法也故以除之卽得今有田廣一里從一里問爲田幾何荅曰三頃七十五畝又有田廣二里從三里問爲田幾何荅曰二十二頃五十畝里田術曰廣從里數相乘得積里以三百七十五乘之卽畝數按此術廣從里數相乘得積里故方里之中有三頃七十五畝故以乘之卽得畝數也今有十八分之十二問約之得幾何荅曰三分之二又有九十一分之四十九問約之得幾何荅曰十三分之七約分按約分者物之數量不可悉全必以分言之分之爲數䌓則難用設有四分之二者繁而言之亦可爲八分之四約而言之則二分之一也雖則異辭至於爲數亦同歸爾法實相推動有參差故爲術者先治諸分術曰可半者半之不可半者副置分母子之數以少減多更相減損求其等也以等數約之等數約之卽除也其所以相減者皆等數之重疊故以等數約之今有三分之一五分之二問合之得幾何荅曰十五分之十一又有三分之二七分之四九分之五問合之得幾何荅曰得一六十三分之五十又有二分之一三分之二四分之三五分之四問合之得幾何荅曰得二六十分之四十三合分臣淳風等謹按合分者數非一端分無定凖諸分子雜互羣母參差麄細既殊理難從一故齊其衆分同其羣母令可相并故曰合分術曰母互乘子并以爲實母相乘爲法母互乘子約而言之者其分麄繁而言之者其分細雖則麄細有殊然其實一也衆分錯雜非細不㑹乗而散之所以通之通之則可并也凡母互乘子謂之齊羣母相乘謂之同同者相與通同共一母也齊者子與母齊勢不可失本數也方以類聚物以羣分數同類者無遠數異類者無近遠而通體者雖異位而相從也近而殊形者雖同列而相違也然則齊同之術要矣錯綜度數動之則諧其猶佩觽解結無往而不理焉乘以散之約以聚之齊同以通之此其算之綱紀乎其一術者可令母除爲率率乘子爲齊實如法而一不滿法者以法命之今欲求其實故齊其子又同其母令如母而一其餘以等數約之卽得所謂同法爲母實餘爲子皆從此例其母同者􅀡相從之今有九分之八減其五分之一問餘幾何荅曰四十五分之三十一又有四分之三減其三分之一問餘幾何荅曰十二分之五減分臣淳風等謹按諸分子母數各不同以少減多欲知餘幾減餘爲實故曰減分術曰母互乘子以少減多餘爲實母相乘爲法實如法而一母互乘子者知以齊其子也以少減多者齊故可相減也母相乘爲法者同其母也母同子齊故如母而一卽得今有八分之五二十五分之十六問孰多多幾何荅曰二十五分之十六多多二百分之三又有九分之八七分之六問孰多多幾何荅曰九分之八多多六十三分之二又有二十一分之八五十分之十七問孰多多幾何荅曰二十一分之八多多一千五十分之四十三課分臣淳風等謹按分各異名理不齊一校其相多之數故曰課分也術曰母互乘子以少減多餘爲實母相乗爲法實如法而一卽相多也臣淳風等謹按此術母互乘子以少分減多分多與減分義同唯相多之數意共減分有異減分知求其餘數有幾課分知以其餘數相多也今有三分之一三分之二四分之三問減多益少各幾何而平荅曰減四分之三者二三分之二者一并以益三分之一而各平於十二分之七又有二分之一三分之二四分之三問減多益少各幾何而平荅曰減三分之二者一四分之三者四并以益二分之一而各平於三十六分之二十三平分臣淳風等謹按平分者諸分參差欲令齊等減彼之多增此之少故曰平分也術曰母互乘子齊其子也副并爲平實臣淳風等謹按母互乘子副并爲平實者定此平實立限衆子所當損益如限爲平母相乘爲法母相乘爲法者亦齊其子又同其母以列數乘未并者各自爲列實亦以列數乘法此當副并列數爲平實若然則重有分故反以列數乘同齊臣淳風等謹按問云所平之分多少不定或三或二列位無常平三知置位三重平二知置位二重凡此之例一凖平分不可預定多少故􅀡云列數而已以平實減列實餘約之爲所減并所減以益於少以法命平實各得其平今有七人分八錢三分錢之一問人得幾何荅曰人得一錢二十一分錢之四又有三人三分人之一分六錢三分錢之一四分錢之三問人得幾何荅曰人得二錢八分錢之一經分臣淳風等謹按經分者自合分已下皆與諸分相齊此乃􅀡求一人之分以人數分所分故曰經分也術曰以人數爲法錢數爲實實如法而一有分者通之母互乘子者齊其子母相乘者同其母以母通之者分母乘全內子乘散全則爲積分積分則與分子相通故可令相從凡數相與者謂之率率者自相與通有分則可散分重疊則約也等除法實相與率也故散分者必令兩分母相乘法實也重有分者同而通之又以法分母乘實實分母乘法此謂法實俱有分故令分母各乘全分內子又令分母互乘上下今有田廣七分步之四從五分步之三問爲田幾何荅曰三十五分步之十二又有田廣九分步之七從十一分步之九問爲田幾何荅曰十一分步之七又有田廣五分步之四從九分步之五問爲田幾何荅曰九分步之四乘分臣淳風等謹按乘分者分母相乘爲法子相乘爲實故曰乘分術曰母相乘爲法子相乘爲實實如法而一凡實不滿法者乃有母子之名若有分以乘其實而長之則亦滿法乃爲全耳又以子有所乘故母當報除報除者實如法而一也今子相乘則母各當報除因令分母相乘而連除也此田有廣從難以廣諭設有問者曰馬二十匹􅀡金十二斤今賣馬二十匹三十五人分之人得幾何荅曰三十五分斤之十二其爲之也當如經分術以十二斤金爲實三十五人爲法設更言馬五匹􅀡金三斤今賣四匹七人分之人得幾何荅曰人得三十五分斤之十二其爲之也當齊其金人之數皆合初問入於經分矣然則分子相乘爲實者猶齊其金也母相乘爲法者猶齊其人也同其母爲二十馬無事於同但欲求齊而已又馬五匹􅀡金三斤完全之率分而言之則爲一匹􅀡金五分斤之三七人賣四馬一人賣七分馬之四分子與人交互相生所從言之異而計數則三術同歸也今有田廣三步三分步之一從五步五分步之二問爲田幾何荅曰十八步又有田廣七步四分步之三從十五步九分步之五問爲田幾何荅曰一百二十步九分步之五又有田廣十八步七分步之五從二十三步十一分步之六問爲田幾何荅曰一畝二百步十一分步之七大廣田臣淳風等謹按大廣田者初術􅀡有全步而無餘分次術空有餘分而無全步此術先見全步復有餘分可以廣兼三術故曰大廣術曰分母各乘其全分子從之分母各乘其全分子從之者通全步內分子如此則母子皆爲實矣相乘爲實分母相乘爲法猶乘分也實如法而一今爲術廣從俱有分當各自通其分命母入者還須出之故令分母相乘爲法而連除之今有圭田廣十二步正從二十一步問爲田幾何荅曰一百二十六步又有圭田廣五步二分步之一從八步三分步之二問爲田幾何荅曰二十三步六分步之五術曰半廣以乘正從半廣者以盈補虚爲􅀡田也亦可半正從以乘廣按半廣乘從以取中平之數故廣從相乘爲積步畝法除之卽得也今有邪田一頭廣三十步一頭廣四十二步正從六十四步問爲田幾何荅曰九畝一百四十四步又有邪田正廣六十五步一畔從一百步一畔從七十二步問爲田幾何荅曰二十三畝七十步術曰并兩邪而半之以乘正從若廣又可半正從若廣以乘并畝法而一并而半之者以盈補虚也今有箕田舌廣二十步踵廣五步正從三十步問爲田幾何荅曰一畝一百三十五步又有箕田舌廣一百一十七步踵廣五十步正從一百三十五步問爲田幾何荅曰四十六畝二百三十二步半術曰并踵舌而半之以乘正從畝法而一中分箕田則爲兩邪田故其術相似又可并踵舌半正從以乘之今有圓田周三十步徑十步臣淳風等謹按術意以周三徑一爲率周三十步合徑十步今依密率合徑九步十一分步之六問爲田幾何荅曰七十五步此於徽術當爲田七十一步一百五十七分步之一百三臣淳風等謹依密率爲田七十一步二十二分步之一十三又有圓田周一百八十一步徑六十步三分步之一臣淳風等謹按周三徑一周一百八十一步徑六十步三分步之一依密率徑五十七步二十二分步之一十三問爲田幾何荅曰十一畝九十步十二分步之一此於徽術當爲田十畝二百八步三百一十四分步之一百一十三臣淳風等謹依密率當爲田十畝二百五步八十八分步之八十七術曰半周半徑相乘得積步按半周爲從半徑爲廣故廣從相乘爲積步也假令圓徑二尺圓中容六觚之一􅆕與圓徑之半其數均等合徑率一而外周率三也又按爲圖以六觚之一􅆕乘半徑二因而六之得十二觚之􅇈若又割之次以十二觚之一􅆕乘一觚之半徑四因而六之則得二十四觚之􅇈割之彌細所失彌少割之又割以至於不可割則與圓周合體而無所失矣觚􅆕之外又有餘徑以􅆕乘徑則􅇈出觚表若夫觚之細者與圓合體則表無餘徑表無餘徑則􅇈不外出矣以一􅆕乘半徑觚而裁之每輒自倍故以半周乘半徑而爲圓􅇈此以周徑謂至然之數非周三徑一之率也周三者從其六觚之環耳以推圓規多少之較乃弓之與弦也然世傳此法莫肯精覈學者踵古習其謬失不有明據辯之斯難凡物類形象不圓則方方圓之率誠著於近則雖遠可知也由此言之其用博矣謹按圓驗更造密率恐空設法數昧而難譬故置諸撿括謹詳其記注焉割六觚以爲十二觚術曰置圓徑二尺半之爲一尺卽圓裏六觚之􅆕也令半徑一尺爲􅁌半􅆕五寸爲句爲之求股以句􅇈二十五寸減􅁌􅇈餘七十五寸開方除之下至秒忽又一退法求其微數微數無名者以爲分子以下爲分母約作五分忽之二故得股八寸六分六釐二秒五忽五分忽之二以減半徑餘一寸三分三釐九毫九秒四忽五分忽之三謂之小句觚之半􅆕又謂之小股爲之求􅁌其􅇈二千六百七十九億四千九百一十九萬三千四百四十五忽餘分弃之開方除之卽十二觚之一􅆕也割十二觚以爲二十四觚術曰亦令半徑爲􅁌半􅆕爲句爲之求股置上小􅁌􅇈四而一得六百六十九億八千七百二十九萬八千三百六十一忽餘分棄之卽句􅇈也以減􅁌􅇈其餘開方除之得股九寸六分五釐九毫二秒五忽五分忽之四以減半徑餘三分四釐七秒四忽五分忽之一謂之小句觚之半􅆕又謂之小股爲之求小􅁌其􅇈六百八十一億四千八百三十四萬九千四百六十六忽餘分棄之開方除之卽二十四觚之一􅆕也割二十四觚以爲四十八觚術曰亦令半徑爲􅁌半􅆕爲句爲之求股置上小􅁌􅇈四而一得一百七十億三千七百八萬七千三百六十六忽餘分棄之卽句􅇈也以減􅁌􅇈其餘開方除之得股九寸九分一釐四毫四秒四忽五分忽之四以減半徑餘八釐五毫五秒五忽五分忽之一謂之小句觚之半􅆕又謂之小股爲之求小􅁌其􅇈一百七十一億一十二十七萬八千八百一十三忽餘分棄之開方除之得小􅁌一寸三分八毫六忽餘分棄之卽四十八觚之一􅆕以半徑一尺乘之又以二十四乘之得􅇈三萬一千三百九十三億四千四百萬忽以百億除之得􅇈三百一十三寸六百二十五分寸之五百八十四卽九十六觚之􅇈也割四十八觚以爲九十六觚術曰亦令半徑爲􅁌半􅆕爲句爲之求股置次上􅁌􅇈四而一得四十二億七千七百五十六萬九千七百三忽餘分棄之則句􅇈也以減􅁌􅇈其餘開方除之得股九寸九分七釐八毫五秒八忽十分忽之九以減半徑餘二釐一毫四秒一忽十分忽之一謂之小句觚之半􅆕又謂之小股爲之求小􅁌其􅇈四十二億八千二百一十五萬四千一十二忽餘分棄之開方除之得小􅁌六分五釐四毫三秒八忽餘分棄之卽九十六觚之一􅆕以半徑一尺乘之又以四十八乗之得􅇈三萬一千四百一十億二千四百萬忽以百億除之得􅇈三百一十四寸六百二十五分寸之六十四卽一百九十二觚之􅇈也以九十六觚之􅇈減之餘六百二十五分寸之一百五謂之差􅇈倍之爲分寸之二百一十卽九十六觚之外弧田九十六所謂以􅁌乘矢之凡􅇈也加此􅇈於九十六觚之􅇈得三百一十四寸六百二十五分寸之一百六十九則出於圓之表矣故還就一百九十二觚之全􅇈三百一十四寸以爲圓􅇈之定率而棄其餘分以半徑一尺除圓􅇈倍之得六尺二寸八分卽周數令徑自乘爲方􅇈四百寸與圓􅇈相折圓􅇈得一百五十七爲率方􅇈得二百爲率方􅇈二百其中容圓􅇈一百五十七也圓率猶爲微少按弧田圖令方中容圓圓中容方内方合外方之半然則圓􅇈一百五十七其中容方􅇈一百也又令徑二尺與周六尺二寸八分相約周得一百五十七徑得五十則其相與之率也周率猶爲微少也晉武庫中漢時王莽作銅斛其銘曰律嘉量斛內方尺而圓其外庣旁九釐五毫􅇈一百六十二寸深一尺積一千六百二十寸容十斗以此術求之得􅇈一百六十一寸有奇其數相近矣此術微少而斛差􅇈六百二十五分寸之一百五以十二觚之􅇈爲率消息當取此分寸之三十六以增於一百九十二觚之􅇈以爲圓􅇈三百一十四寸二十五分寸之四置徑自乘之方􅇈四百寸令與圓􅇈通相約圓􅇈三千九百二十七方􅇈得五千是爲率方􅇈五千中容圓􅇈三千九百二十七圓􅇈三千九百二十七中容方􅇈二千五百也以半徑一尺除圓􅇈三百一十四寸二十五分寸之四倍之得六尺二寸八分二十五分寸之八卽周數也全徑二尺與周數通相約徑得一千二百五十周得三千九百二十七卽其相與之率若此者蓋盡其纖微矣舉而用之上法仍約耳當求一千五百三十六觚之一􅆕得三千七十二觚之􅇈而裁其微分數亦宜然重其驗耳臣淳風等謹按舊術求圓皆以周三徑一爲率若用之求圓周之數則周少徑多用之求其六觚之田乃與此率合會耳何則假令六觚之田觚閒各一尺爲􅆕自然從角至角其徑二尺可知此則周六徑二與周三徑一已合恐此猶以難曉今更引物爲喻設令刻物作圭形者六枚枚别三􅆕皆長一尺攢此六物悉使鋭頭向裏則成六觚之周角徑亦皆一尺更從觚角外畔圍繞爲規則六觚之徑盡達規矣當􅆕徑短不至外規若以六觚言之則爲周六尺徑二尺􅆕皆一尺􅆕徑股不至外畔定無二尺可知故周三徑一之率於圓周乃是徑多周少徑一周三理非精密蓋術從􅂤要舉大綱略而言之劉徽特以爲疎遂乃改張其率但周徑相乘數難契合徽雖出斯一法終不能究其纖毫也祖沖之以其不精就中更推其數今者修撰攈摭諸家考其是非冲之爲密故顯之於徽術之下冀學者之所裁焉又術曰周徑相乘四而一此周與上觚同耳周徑相乘各當以半而今周徑兩全故兩母相乘爲四以報除之於徽術以五十乘周一百五十七而一卽徑也以一百五十七乘徑五十而一卽周也新術徑率猶當微少據周以求徑則失之長據徑以求周則失之短諸據見徑以求􅇈者皆失之於微少據周以求􅇈者皆失之於微多臣淳風等謹依密率以七乘周二十二而一卽徑以二十二乘徑七而一卽周依術求之卽得又術曰徑自相乘三之四而一按圓徑自乘爲外方三之四而一者是爲圓居外方四分之三也若令六觚之一􅆕乘半徑其􅇈卽外方四分之一也因而三之卽亦居外方四分之三也是爲圓裏十二觚之􅇈耳取以爲圓失之於微少於徽新術當徑自乘又以一百五十七乘之二百而一臣淳風等謹按密率令徑自乘以十一乘之十四而一卽圓􅇈也又術曰周自相乘十二而一六觚之周其於圓徑三與一也故六觚之周自相乘爲􅇈若圓徑自乘者九方九方凡爲十二觚者十有二故曰十二而一卽十二觚之􅇈也今此令周自乘非但若爲圓徑自乘者九方而已然則十二而一所得又非十二觚之類也若欲以爲圓􅇈失之於多矣以六觚之周十二而一可也於徽新術􅀡令圓周自乘又以二十五乘之三百一十四而一得圓􅇈其率三百一十四者周自乘之􅇈也置周數六尺二寸八分令自乘得􅇈三十九萬四千三百八十四分又置圓􅇈三萬一千四百分皆以一千二百五十六約之得此率臣淳風等謹按方􅆕自乘卽得其積圓周求其􅇈股率乃通但此術所求用三一爲率圓田正法半周及半徑以相乘今乃用全周自乘故須以十二爲母何者據全周而求半周則須以二爲法就全周而求半徑復假六以除之是二六相乘除周自乘之數依密率以七乘之八十八而一今有宛田下周三十步徑十六步問爲田幾何荅曰一百二十步又有宛田下周九十九步徑五十一步問爲田幾何荅曰五畝六十二步四分步之一術曰以徑乘周四而一此術不驗故推方錐以見其形假令方錐下方六尺高四尺四尺爲股下方之半三尺爲句正􅆕邪爲􅁌􅁌五尺也令句􅁌相乘四因之得六十尺卽方錐四􅆕見者之􅇈若令其中容圓錐圓錐見􅇈與方錐見􅇈其率猶方􅇈之與圓􅇈也按方錐下六尺則方周二十四尺以五尺乘而半之則亦方錐之見􅇈故求圓錐之數折徑以乘下周之半卽圓錐之􅇈也今宛田上徑圓穹而與圓錐同術則􅇈失之於少矣然其術難用故略舉大較施之大廣田也求圓錐之􅇈猶求圓田之􅇈也今用兩全相乘故以四爲法除之亦如圓田矣開立圓術說圓方諸率甚備可以驗此今有弧田􅁌三十步矢十五步問爲田幾何荅曰一畝九十七步半又有弧田􅁌七十八步二分步之一矢十三步九分步之七問爲田幾何荅曰二畝一百五十五步八十一分步之五十六術曰以􅁌乘矢矢又自乘并之二而一方中之圓圓裏十二觚之􅇈合外方之􅇈四分之三也方中合外方之半則朱實合外方四分之一也弧田半圓之􅇈也故依半圓之體而爲之術以􅁌乘矢而半之則爲黄􅇈矢自乘而半之爲二青􅇈青黃相連爲弧體弧體法當應規令觚􅆕不至外畔失之於少矣圓田舊術以周三徑一爲率俱得十二觚之􅇈亦失之於少也與此相似指驗半圓之弧耳若不滿半圓者益復疎闊宜依句股鋸圓材之術以弧􅁌爲鋸道長以矢爲句深而求其徑旣知圓徑則弧可割分也割之者半弧田之􅁌以爲股其矢爲句爲之求􅁌卽小弧之􅁌也以半小弧之􅁌爲句半圓徑爲弧爲之求股以減半徑其餘卽小􅁌之矢也割之又割使至極細但舉􅁌矢相乘之數則必近密率矣然於算數差繁必欲有所㝷究也若但度田取其大數舊術爲約耳今有環田中周九十二步外周一百二十二步徑五步此欲令與周三徑一之率相應故言徑五步也據中外周以徽術言之當徑四步一百五十七分步之一百二十二也臣淳風等謹按依密率合徑四步二十二分步之十七問爲田幾何荅曰二畝五十五步於徽術當爲田二畝三十一步一百五十七分步之二十三臣淳風等謹依密率爲田二畝三十步二十二分步之十五又有環田中周六十二步四分步之三外周一百一十三步二分步之一徑十二步三分步之二此田環而不通匝故徑十二步三分步之二若據上周求徑者此徑失之於多過周三徑一之率蓋爲疎矣於徽術當徑八步六百二十八分步之五十一臣淳風等謹按依周三徑一考之合徑八步二十四分步之一十一依密率合徑八步一百七十六分步之一十三問爲田幾何荅曰四畝一百五十六步四分步之一於徽術當爲田二畝二百三十二步五千二十四分步之七百八十七也依周三徑一爲田三畝二十五步六十四分步之二十五臣淳風等謹按密率爲田二畝二百三十一步一千四百八分步之七百一十七也術曰并中外周而半之以徑乘之爲積步此田截齊中外之周周則爲長并而半之者亦以盈補虚也此可令中外周各自爲圓田以中圓減外圓餘則環實也按此術置中外周步數於上分母子於下母乘子者爲中外周俱有餘分故以互乘齊其子母相乘同其母子齊母同故通全步內分子并而半之者以盈補虚得中平之周周則爲從徑則爲廣故廣從相乘而得其積旣合分母還須分母出之故令周徑分母相乘而連除之卽得積步不盡以等數除之而命分以畝法除積步得畝數也密率術曰置中外周步數分母子各居其下母互乘子分母相乘通全步內分子并而半之又可以中周減外周餘半之以益中周徑亦通分內子以乘周爲實分母相乘爲法除之爲積步餘積步之分等數約之以畝法除之卽畝數也九章算術卷一九章算術卷一訂訛補圖算經十書之二休寧戴震東原臣淳風等謹按母互乘子副并爲平實者定此平實立限衆子所當損益如限爲平據首問第二數母三第三數母四互乘第一數子一得十二第一數母三第三數母四互乘第二數子二得二十四第一第二數母各三互乘第三數子三得二十七并之共六十三爲平實母三三相乘又與四乘得三十六爲法列數凡三卽以三乘十二得三十六乘二十四得七十二乘二十七得八十一爲列實亦以三乘法三十六得一百八平實六十三減列實三十六少二十七減七十二餘九減八十一餘十八約之九爲一則十八爲二而二十七爲三平實六十三爲七法一百八爲十二命爲十二分之七設以十二作三數三分之一則四也三分之二則八也四分之三則九也定平實七立限八減一九減二皆七所減之一二益於四亦七損多益少適如其限故云定此平實立限又云如限爲平原本立訛作主如訛作知遂不可通按半周爲從半徑爲廣故廣從相乘爲積步也假令圓徑二尺圓中容六觚之一面六觚原本訛作六弧考六角形其平而亦有六八角形其平面亦有八古人謂之六觚八觚若截圓形爲六古人謂之弧背其弧卽圓周不得云圓中容六弧之一面後或言弧或言觚義各不同原本觚皆訛作弧遂􅀩混不可通圓內容六觚之圖以九十六觚之幂減之餘六百二十五分寸之以百五謂之差幂倍之爲分寸之二百一十爲分寸者􅀩上省文謂六百二十五分寸之二百一十也以此術求之得幂一百六十一寸有奇其數相近矣此術微少而斛差幂六百二十五分寸之一百五以十二觚之幂爲率消息當取此分寸之三十六取此分寸亦􅀩上省文謂六百二十五分寸之三十六也臣淳風等謹按依密率以七乘周二十二而一卽徑以二十二乘徑七而一卽周依術求之卽

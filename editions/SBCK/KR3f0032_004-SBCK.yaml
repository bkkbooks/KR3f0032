body:
  text: 魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勅注釋少廣以御積􅇈方圓少廣臣淳風等謹按一畝之田廣一步長二百四十步今欲截取其從少以益其廣故曰少廣術曰置全步及分母子以最下分母徧乘諸分子及全步臣淳風等謹按以分母乘全步者通其分也以母乘子者齊其子也各以其母除其子置之於左命通分者又以分母徧乘諸分子及已通者皆通而同之并之爲法臣淳風等謹按諸子悉通故可并之爲法亦不宜用合分術列數尤多若用乘則算數至䌓故别制此術從省約置所求步數以全步積分乘之爲實此以田廣爲法以畝積步爲實法有分者當同其母齊其子以同乘法實而并齊於法今以分母乘全步及子子如母而一竝以并全法則法實俱長意亦等也故如法而一得從步數實如法而一得從步今有田廣一步半求田一畝問從幾何荅曰一百六十步術曰下有半是二分之一以一爲二半爲一并之得三爲法置田二百四十步亦以一爲二乘之爲實實如法得從步今有田廣一步半三分步之一求田一畝問從幾何荅曰一百三十步一十一分步之一十術曰下有三分以一爲六半爲三三分之一爲二并之得一十一爲法置田二百四十步亦以一爲六乘之爲實實如法得從歩今有田廣一步半三分步之一四分步之一求田一畝問從幾何荅曰一百一十五步五分步之一術曰下有四分以一爲一十二半爲六三分之一爲四四分之一爲三并之得二十五以爲法置田二百四十步亦以一爲一十二乘之爲實實如法而一得從步今有田廣一步半三分步之一四分步之一五分步之一求田一畝問從幾何荅曰一百五步一百三十七分步之一十五術曰下有五分以一爲六十半爲三十三分之一爲二十四分之一爲一十五五分之一爲一十二并之得一百三十七以爲法置田二百四十步亦以一爲六十乘之爲實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一求田一畝問從幾何荅曰九十七步四十九分步之四十七術曰下有六分以一爲一百二十半爲六十三分之一爲四十四分之一爲三十五分之一爲二十四六分之一爲二十并之得二百九十四以爲法置田二百四十歩亦以一爲一百二十乘之爲實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一求田一畝問從幾何荅曰九十二步一百二十一分步之六十八術曰下有七分以一爲四百二十半爲二百一十三分之一爲一百四十四分之一爲一百五五分之一爲八十四六分之一爲七十七分之一爲六十并之得一千八十九以爲法置田二百四十步亦以一爲四百二十乘之爲實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一八分步之一求田一畝問從幾何荅曰八十八步七百六十一分步之二百三十二術曰下有八分以一爲八百四十半爲四百二十三分之一爲二百八十四分之一爲二百一十五分之一爲一百六十八六分之一爲一百四十七分之一爲一百二十八分之一爲一百五并之得二千二百八十三以爲法置田二百四十步亦以一爲八百四十乘之爲實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一八分步之一九分步之一求田一畝問從幾何荅曰八十四步七千一百二十九分步之五千九百六十四術曰下有九分以一爲二千五百二十半爲一千二百六十三分之一爲八百四十四分之一爲六百三十五分之一爲五百四六分之一爲四百二十七分之一爲三百六十八分之一爲三百一十五九分之一爲二百八十并之得七千一百二十九以爲法置田二百四十步亦以一爲二千五百二十乘之爲實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一八分步之一九分步之一十分步之一求田一畝問從幾何荅曰八十一步七千三百八十一分步之六千九百三十九術曰下有一十分以一爲二千五百二十半爲一千二百六十三分之一爲八百四十四分之一爲六百三十五分之一爲五百四六分之一爲四百二十七分之一爲三百六十八分之一爲三百一十五九分之一爲二百八十十分之一爲二百五十二并之得七千三百八十一以爲法置田二百四十步亦以一爲二千五百二十乘之爲實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一八分步之一九分步之一十分步之一十一分步之一求田一畝問從幾何荅曰七十九步八萬三千七百一十一分步之三萬九千六百三十一術曰下有一十一分以一爲二萬七千七百二十半爲一萬三千八百六十三分之一爲九千二百四十四分之一爲六千九百三十五分之一爲五千五百四十四六分之一爲四千六百二十七分之一爲三千九百六十八分之一爲三千四百六十五九分之一爲三千八十一十分之一爲二千七百七十二一十一分之一爲二千五百二十并之得八萬三千七百一十一以爲法置田二百四十步亦以一爲二萬七千七百二十乘之爲實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一八分步之一九分步之一十分步之一十一分步之一十二分步之一求田一畝問從幾何荅曰七十七步八萬六千二十一分步之二萬九千一百八十三術曰下有一十二分以一爲八萬三千一百六十半爲四萬一千五百八十三分之一爲二萬七千七百二十四分之一爲二萬七百九十五分之一爲一萬六千六百三十二六分之一爲一萬三千八百六十七分之一爲一萬一千八百八十八分之一爲一萬三百九十五九分之一爲九千二百四十一十分之一爲八千三百一十六十一分之一爲七千五百六十十二分之一爲六千九百三十并之得二十五萬八千六十三以爲法置田二百四十步亦以一爲八萬三千一百六十乘之爲實實如法得從步臣淳風等謹按凡爲術之意約省爲善宜云下有一十二分以一爲二萬七千七百二十半爲一萬三千八百六十三分之一爲九千二百四十四分之一爲六千九百三十五分之一爲五千五百四十四六分之一爲四千六百二十七分之一爲三千九百六十八分之一爲三千四百六十五九分之一爲三千八十十分之一爲二千七百七十二十一分之一爲二千五百二十十二分之一爲二千三百一十并之得八萬六千二十一以爲法置田二百四十步亦以一爲二萬七千七百二十乘之以爲實實如法得從步其術亦得知不繁也今有積五萬五千二百二十五步問爲方幾何荅曰二百三十五步又有積二萬五千二百八十一步問爲方幾何荅曰一百五十九步又有積七萬一千八百二十四步問爲方幾何荅曰二百六十八步又有積五十六萬四千七百五十二步四分步之一問爲方幾何荅曰七百五十一步半又有積三十九億七千二百一十五萬六百二十五步問爲方幾何荅曰六萬三千二十五步開方求方􅇈之一面也術曰置積爲實借一算步之超一等言百之面十也言萬之面百也議所得以一乘所借一算爲法而以除先得黃甲之面上下相命是自乘而除也除已倍法爲定法倍之者豫張兩面朱􅇈定袤以待復除故曰定法其復除折法而下欲除朱􅇈者本當副置所得成方倍之爲定法以折議乘而以除如是當復步之而止乃得相命故使就上折下復置借算步之如初以復議一乘之欲除朱􅇈之角黃乙之􅇈其意如初之所得也所得副以加定法以除以所得副從定法再以黄乙之面加定法者是則張兩青􅇈之袤復除折下如前若開之不盡者爲不可開當以面命之術或有以借算加定法而命分者雖麤相近不可用也凡開積爲方方之自乘當還復其積分令不加借算而命分則常微少其加借算而命分則又微多其數不可得而定故惟以面命之爲不失耳譬猶以三除十以其餘爲三分之一而復其數可舉不以面命之加定法如前求其微數微數無名者以爲分子其一退以十爲母其再退以百爲母退之彌下其分彌細則朱􅇈雖有所乘之數不足言之也若實有分者通分內子爲定實乃開之訖開其母報除臣淳風等謹按分母可開者竝通之積先合二母旣開之後一母尚存故開分母求一母爲法以報除也若母不可開者又以母再乘定實乃開之訖令如母而一臣淳風等謹按分母不可開者本一母也又以母乘之乃合二母旣開之後亦一母存焉故令如母而一得全面也又按此術開方者求方􅇈之一面也借一算者假借一算空有列位之名而無除積之實方隅得面是故借算列之於下也步之超一等者方十自乘其積有百方百自乘其積有萬故超位至百而言十至萬而言百也議所得以一乘所借一算爲法而以除者先得黃甲之面以方爲積者兩相乘故開方除之還令兩面上下相命是自乘而除之也除已倍法爲定法者實積未盡當復更除故豫張兩面朱􅇈定袤以待復除故曰定除也其復除折法而下者欲除朱􅇈本當副置所得成方倍之爲定法以折議乘之而以除如是當復步之而止乃得相命故使就上折之而下也復置借算步之如初以復議一乘之所得副以加定法以除者欲除朱􅇈之角黃乙之􅇈以所得副從定法者再以黃乙之􅇈加定法是則張兩青􅇈之袤故如前開之卽合所問今有積一千五百一十八步四分步之三問爲圓周幾何荅曰一百三十五步於徽術當周一百三十八步一十分步之一臣淳風等謹按此依密率爲周一百三十八步五十分步之九又有積三百步問爲圓周幾何荅曰六十步於徽術當周六十一步五十分步之十九臣淳風等謹按依密率爲周六十一步一百分步之四十一開圓術曰置積步數以十二乘之以開方除之卽得周此術以周三徑一爲率與舊圓田術相返覆也於徽術以三百一十四乘積如二十五而一所得開方除之卽周也開方除之卽徑是爲據見􅇈以求周猶失之於微少其以二百乘積一百五十七而一開方除之卽徑猶失之於微多臣淳風等謹按此注於徽術求周之法其中不用開方除之卽徑六字今本有者衍賸也依密率八十八乘之七而一按周三徑一之率假令周六徑二半周半徑相乘得􅇈三周六自乘得三十六俱以等數除􅇈得一周之數十二也其積本周自乘合以一乘之十二而一得積三也術爲一乘不長故以十二而一得此積今還原置此積三以十二乘之復其本周自乘之數凡物自乘開方除之復其本數故開方除之卽周今有積一百八十六萬八百六十七尺此尺謂立方之尺也凡物有高深而言積者曰立方問爲立方幾何荅曰一百二十三尺今有積一千九百五十三尺八分尺之一問爲立方幾何荅曰一十二尺半今有積六萬三千四百一尺五百一十二分尺之四百四十七問爲立方幾何荅曰三十九尺八分尺之七又有積一百九十三萬七千五百四十一尺二十七分尺之一十七問爲立方幾何荅曰一百二十四尺太半尺開立方立方適等求其一面也術曰置積爲實借一算步之超二等言千之面十言百萬之面百議所得以再乘所借一算爲法而除之再乘者亦求爲方􅇈以上議命而除之則立方等也除已三之爲定法爲當復除故豫張三面以定方􅇈爲定法也復除折而下復除者三面方􅇈以皆自乘之數須得折議定其厚薄爾開平􅇈者方百之面十開立􅇈者方千之面十據定法已有成方之􅇈故復除當以千爲百折下一等也以三乘所得數置中行設三亷之定長復借一算置下行欲以爲隅方立方等未有定數且置一算定其位步之中超一下超二位上方法長自乘而一折中亷法但有長故降一等下隅法無面長故又降一等也復置議以一乘中爲三亷備􅇈也再乘下令隅自乘爲方􅇈也皆副以加定法以定法除三面三亷一隅皆已有􅇈以上議命之而除去三袤之厚也除已倍下并中從定法凡再以中三以下加定法者三亷各當以兩面之􅇈連於兩方之面一隅連於三亷之端以待復除也言不盡意解此要當以棊乃得明耳復除折下如前開之不盡者亦爲不可開術亦有以定法命分者不如故􅇈開方以微數爲分也若積有分者通分內子爲定實定實乃開之訖開其母以報除臣淳風等按分母可開者竝通之積先合三母旣開之後一母尙存故開分母求一母爲法以報除也若母不可開者又以母再乘定實乃開之訖令如母而一臣淳風等謹按分母不可開者本一母也又以母再乘之今合三母旣開之後一母猶存故令如母而一得全面也按開立方者立方適等求其一面之數也借一算步之超二等者立方求積方再自乘就積開之故超二位言千之面十言百萬之面百也議所得以再乘所借一算爲法而以除者求爲方􅇈以議命之而除則立方等也除已三之爲定法者爲積未盡當復更除故豫張三面已定方􅇈爲定法也復除折而下者三面方􅇈皆已有自乘之數須得折議定其厚薄據開平方百之面十其開立方卽千之面十而定法已有成方之􅇈故復除之當以千爲百折卞一等也以三乘所得數置中行者設三亷之定長也復借一算置下行者欲以爲隅方立方等未有數且置一算定其位也步之中超一下超二者上方法長自乘而一折中亷法但有長故降一等下隅法無面長故又降一等也復置議以一乘中者爲三亷借􅇈也再乘下者當令隅自乘爲方􅇈也皆副以加定法以定法除者三面三亷一隅皆已有􅇈以上議命之而除去三袤之厚也除已倍下併中從定法者三亷各當以兩面之􅇈連於兩方之面一隅連於三亷之端以待復除也其開之不盡者折下如前開方卽合所問有分者通分內子開之訖開其母以報除可開者並通之積先合三母旣開之後一母尙存故開分母者求一母爲法以報除若母不可開者又以母再乘定實乃開之訖令如母而一分母不可開者本一母又以母再乘今合三母旣開之後亦一母尙存故令如母而一得全面也今有積四千五百尺亦謂立方之尺也問爲立圓徑幾何荅曰二十尺依密率立圓徑二十八尺計積四千一百九十尺二十一分尺之一十又有積一萬六千四百四十八億六千六百四十三萬七千五百尺問爲立圓徑幾何荅曰一萬四千三百尺依密率爲徑一萬四千六百四十三尺四分尺之三開立圓術曰置積尺數以十六乘之九而一所得開立方除之卽丸徑立圓卽丸也爲術者蓋依周三徑一之率令圓􅇈居方􅇈四分之三圓囷居立方亦四分之三更令圓囷爲方率十二爲丸率九丸居圓囷又四分之三也置四分自乘得十六三分自乘得九故丸居立方十六分之九也故以十六乘積九而一得立方之積丸徑與立方等故開立方而除得徑也然此意非也何以驗之取立方棊八枚皆令立方一寸積之爲立方二寸規之爲圓囷徑二寸高二寸又復橫規之則其形有似牟合方蓋矣八棊皆似陽馬圓然也按合蓋者方率也丸居其中卽圓率也推此言之謂夫圓囷爲方率豈不闕哉以周三徑一爲圓率則圓􅇈傷少令圓囷爲方率則丸積傷多互相通補是以丸與十六之率偶與實相近而丸猶傷多耳觀立方之內合蓋之外雖衰殺有漸而多少不掩判合總結方圓相􅅶濃纖詭互不可等正欲陋形措意懼失正理敢不闕疑以俟能言者黃金方寸重十六兩金丸徑寸重九兩率生於此未曾驗也周官考工記㮚氏爲量改煎金錫則不耗不耗然後權之權之然後凖之凖之然後量之言錬金使極精而後分之則可以爲率也令丸徑自乘三而一開方除之卽丸中之立方也假令丸中立方五尺五尺爲句句自乘􅇈二十五尺倍之得五十尺以爲股􅇈謂平面方五尺之􅁌也以此􅁌􅇈爲股亦以五尺爲句并句股􅇈得七十五尺是爲大􅁌􅇈開方除之則大􅁌可知也大􅁌則中立方之長邪邪卽丸徑也故中立方自乘之􅇈於丸徑自乘之􅇈三分之一也令大􅁌還乘其􅇈卽丸外立方之積也大􅁌􅇈開之不盡令其􅇈七十五再自乘之爲面命得外立方積四十二萬一千八百七十五尺之面又令中立方五尺自乘又以方乘之得積一百二十五尺一百二十五尺自乘爲面命得積一萬五千六百二十五尺之面皆以六百二十五約之外立方積六百七十五尺之面中立方積二十五尺之面也張衡算又謂立方爲質立圓爲渾衡言質之與中外之渾六百七十五尺之面開方除之不足一謂外質積二十六也內渾二十五之面謂積五尺也今徽令質言中渾渾又言質則二質相與之率猶衡二渾相與之率也衡蓋亦先二質之率推以言渾之率也衡又言質六十四之面渾二十五之面質復言渾謂居質八分之五也又云方八之面圓六之面圓渾相推知其復以圓囷爲方率渾爲圓率也失之遠矣衡說之自然欲恊其陰陽奇耦之說而不顧疎密矣雖有文辭斯亂道破義病也置外質積二十六以九乘之十六而一得積一十四尺八分之五卽質中之渾也以分母乘全內子得一百一十七又置內質積五以分母乘之得四十是爲質居渾一百一十七分之四十而渾率猶爲傷多也假令方二尺方四面并得八尺也謂之方周其中令圓徑與方等亦二尺也丸半徑以乘圓周之半卽圓􅇈也半方以乘方周之半卽方􅇈也然則方周知方􅇈之率也圓周知圓􅇈之率也按如衡術方周率八之面圓周率五之面也令方周六十四尺之面卽圓周四十尺之面也又令徑一尺方周四尺自乘得十六尺之面是爲圓周率十二之面而徑率一之面也衡亦以周三徑一之率爲非是故更著此法然增周太多過其實矣臣淳風等謹按祖暅之謂劉徽張衡二人皆以圓囷爲方率丸爲圓率乃設新法祖暅之開立圓術日以二十一乘積十一而一開立方除之卽立圓徑其意何也取立方棊一枚令立樞於左後之下隅從規去其右上之亷又合而横規之去其前上之亷右前之亷於是立方之棊分而爲四規內棊一謂之內棊規外棊三謂之外棊規更合四棊復橫斷之以句股言之令餘高爲句內棊斷上方爲股本方之數其􅁌也句股之法以句􅇈減􅁌􅇈則餘爲股􅇈若令餘高自乘減本方之􅇈餘卽內減棊斷上方之􅇈也本方之􅇈卽外四棊之斷上􅇈然則餘高自乘卽外三棊之斷上􅇈矣不問高卑勢皆然也然固有所歸同而塗殊者爾而乃控遠以演類借况以析㣲按陽馬方高數參等者列而立之横截去上則高自乘與斷上􅇈數亦等焉夫疊棊成立積緣􅇈勢旣同則積不容異由此觀之規之外三棊旁蹙爲一卽一陽馬也三分立方則陽馬居一內棊居二可知矣合八小方成一大方合八內棊成一合蓋內棊居小方三分之二則合蓋居立方亦三分之二較然驗矣置三分之二以圓􅇈率三乘之如方􅇈率四而一約而定之以爲丸率故曰丸居立方三分之一也等數旣密心亦昭晰張衡放舊貽哂於後劉徽循故未暇校新夫豈難哉抑未之思也依密率立此圓積本以圓徑再自乘十一乘之二十一而一約此積今欲求其本積故以二十一乘之十一而一凡物再自乘開立方除之復其本數故立方除之卽丸徑也九章算術卷四祖暅之開立圓術曰以二十一乘積十一而一開立方除之卽立圓徑其意何也取立方棊一枚令立樞於左後之下隅從規去其右上之廉又合而橫規之去其前上之廉右前之廉於是立方之棊分而爲四規內棊一謂之內棊規外棊三謂之外棊更合四棊復横斷之以句股言之令餘高爲句內棊斷上方爲股本方之數其􅁌也句股之法以句幂減􅁌幂則餘爲股幂若令餘高自乘減本方之幂餘卽內減棊斷上方之幂也本方之幂卽外四棊之斷上幂然則餘高自乘卽外三棊之斷上幂矣不問高卑勢皆然也以上借立方棊以論立圓而所言僅及句股􅁌與平幂不足見圓術當有脫誤故曰丸居立方三分之一也此句舛誤據上言置三分之二以三乘之如四而一乃丸居立方二分之一非三分之一况以上眀祖氏圓術其率乃丸居立方二十一分之十一下云圓徑再自乘十一乘之如二十一而一是也若二分之一於祖氏術不恊矣又祖氏方幂率十四圓幂率十一亦不得用方幂四圓幂三之疎率以解祖氏說自祖暅之開立方圓術曰至此似因傳寫旣訛後人妄加􅇡改遂不可通今考立方與圓囷猶之平方與平圓也其率亦方積十四圓囷積十一而丸居圓囷三分之二與十四分之十一通之分母乘

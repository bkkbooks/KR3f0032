分母可開者竝通之積先合二母既開之後一母尚存故開分母求一母爲法以報除也若母不可開者又以母乘定實乃開之訖令如母而一臣淳風等謹按分母不可開者本一母也又以母乘之乃合二母既開之後亦一母存焉故令一母而一得全面也又按此術開方者求方冪之面也借一筭者假借一筭空有列位之名而無除積之實方隅得面是故借筭列之於下步之超一等者方十自乘其積有百方百自乘其積有萬故超位至百而言十至萬而言百議所得以一乘所借筭爲法而以除者先得黄甲之面以方爲積者兩相乘故開方除之還令兩面上下相命是自乘而除之除已倍法爲定法者實積未盡當復更除故豫張兩面朱冪袤以待復除故曰定法其復除折法而下者欲除朱冪本當副置所得成方倍之爲定法以折議乘之而以除如是當復步之而止乃得相命故使就上折之而下復置借筭步之如初以復議一乘之所得副以加定法以定法除者欲除朱冪之角黄乙之冪以所得副從定法者再以黄乙之面加定法是則張兩青冪之袤故如前開之即合所問今有積一千五百一十八步四分步之三問爲圓周幾何荅曰一百三十五步於徽術當周一百三十八步一十分步之一臣淳風等謹按此依密率爲周一百三十八步五十分步之九又有積三百步問爲圓周幾何荅曰六十步於徽術當周六十一步五十分步之十九臣淳風等謹按依密率爲周六十一步一百分步之四十一開圓術曰置積步數以十二乘之以開方除之即得周此術以周三徑一爲率與舊圓田術相返覆也於徽術以三百一十四乘積如二十五而一所得開方除之即周也開方除之即徑是爲據見冪以求周猶失之於微少其以二百乘積一百五十七而一開方除之即徑猶失之於微多臣淳風等謹按此注於徽術求周之法其中不用開方除之即徑六字今本有者衍賸也依密率八十八乘之七而一按周三徑一之率假令周六徑二半周半徑相乘得冪三周六自乘得三十六俱以等數除冪得一周之數十二也其積本周自乘合以一乘之十二而一得積三也術爲一乘不長故以十二而一得此積今還元置此積三以十二乘之者復其本周自乘之數凡物自乘開方除之復其本數故開方除之即周今有積一百八十六萬八百六十七尺此尺謂立方之尺也凡物有高深而言積者曰立方問爲立方幾何荅曰一百二十三尺又有積一千九百五十三尺八分尺之一問爲立方幾何荅曰一十二尺半又有積六萬三千四百一尺五百一十二分尺之四百四十七問爲立方幾何荅曰三十九尺八分尺之七又有積一百九十三萬七千五百四十一尺二十七分尺之一十七問爲立方幾何荅曰一百二十四尺太半尺開立方立方適等求其一面也術曰置積爲實借一筭步之超二等言千之面十言百萬之面百議所得以再乘所借一筭爲法而除之再乘者亦求爲方冪以上議命而除之則立方等也除已三之爲定法爲當復除故豫張三面以定方冪爲定法也復除折而下復除者三面方冪以皆自乘之數須得折議定其厚薄爾開平冪者方百之面十開立冪者方千之面十據定法已有成方之冪故復除當以千爲百折下一等也以三乘所得數置中行設三廉之定長復借一筭置下行欲以爲隅方立方等未有定數且置一筭定其位步之中超一下超二等上方法長自乘而一折中廉法但有長故降一等下隅法無面長故又降一等也復置議以一乘中爲三廉備冪也再乘下令隅自乘爲方冪也皆副以加定法以定除三面三廉一隅皆已有冪以上議命之而除去三冪之厚也除已倍下并中從定法凡再以中三以下加定法者三廉各當以兩面之冪連於兩方之面一隅連於三廉之端以待復除也言不盡意解此要當以棊乃得明耳復除折下如前開之不盡者亦爲不可開術亦有以定法命分者不如故冪開方以微數爲分也若積有分者通分内子爲定實定實乃開之訖開其母以報除臣淳風等按分母可開者竝通之積先合三母既開之後一母尚存故開分母求一母爲法以報除也若母不可開者又以母再乘定實乃開之訖令如母而一臣淳風等謹按分母不開者本一母也又以母再乘之令合三母既開之後一母猶存故令一母而一得全面也按開立方知立方適等求其一面之數借一筭步之超二等者但立方求積方再自乘就積開之故超二等言千之面十言百萬之面百議所得以再乘所借筭爲法而以除知求爲方冪以議命之而除則立方等也除已三之爲定法爲積未盡當復更除故豫張三面已定方冪爲定法復除折而下知三面方冪皆已有自乘之數須得折議定其厚薄據開平方百之面十其開立方即千之面十而定法已有成方之冪故復除之者當以千爲百折下一等以三乘所得數置中行者設三廉之定長復借一筭置下行者者欲以爲隅方立方等未有數且置一筭定其位也步之中超一下超二者上方法長自乘而一折中廉法但有長故降一等下隅法無面長故又降一等復置議以一乘中者爲三廉備冪再乘下當令隅自乘爲方冪皆副以加定法以定法除者三面三廉一隅皆已有冪以上議命之而除去三冪之厚除已倍下并中從定法者三廉各當以兩面之冪連於兩方之面一隅連於三廉之端以待復除其開之不盡者折下如前開方即合所問有分者通分内子開之訖開其母以報除可開者以通之積先合三母既開之後一母尚存故開分母者求一母爲法以報除若母不可開者又以母再乘定實乃開之訖令如母而一分母不可開者本一母又以母再乘令合三母既開之後亦一母尚存故令如母而一得全面也今有積四千五百尺亦謂立方之尺也問爲立圓徑幾何荅曰二十尺依密率立圓徑二十尺计積四千一百九十尺二十一分尺之一十又有積一萬六千四百四十八億六千六百四十三萬七千五百尺問爲立圓徑幾何荅曰一萬四千三百尺依密率爲徑一萬四千六百四十三尺四分尺之三開立圓術曰置積尺數以十六乘之九而一所得開立方除之即立圓徑立圓即丸也爲術者蓋依周三徑一之率令圓冪居方冪四分之三圓囷居立方亦四分之三更令圓囷爲方率十二爲丸率九丸居圓囷又四分之三也置四分自乘得十六三分自乘得九故丸居立方十六分之九也故以十六乘積九而一得立方之積丸徑與立方等故開立方而除得徑也然此意非也何以驗之取立方棊八枚皆令立方一寸積之爲立方二寸規之爲圓囷徑二寸高二寸又復横因之則其形有似牟合方蓋矣八棊皆似陽馬圓然也按合蓋者方率也丸居其中即圓率也推此言之謂夫圓囷爲方率豈不闕哉以周三徑一爲圓率則圓冪傷少令圓囷爲方率則丸積傷多互相通補是以九與十六之率偶與實相近而丸猶傷多耳觀立方之内合蓋之外雖衰殺有漸而多少不掩判合總結方圓相纏濃纖詭互不可等正欲陋形措意懼失正理敢不闕疑以俟能言者黄金方寸重十六兩金丸徑寸重九兩率生於此未曾驗也周官考工記㮚氏爲量改煎金錫則不耗不耗然後權之權之然後準之準之然後量之言鍊金使極精而後分之則可以爲率也令丸徑自乘三而一開方除之即丸中之立方也假令丸中立方五尺五尺爲句句自乘冪二十五尺倍之得五十尺以爲弦冪謂平面方五尺之弦也以此弦爲股亦以五尺爲句并句股冪得七十五尺是爲大弦冪開方除之則大弦可知也大弦則中立方之長邪邪即丸徑也故中立方自乘之冪於丸徑自乘之冪三分之一也令大弦還乘其冪即丸外立方之積也大弦冪開之不盡令其冪七十五再自乘之爲面命得外立方積四十二萬一千八百七十五尺之面又令中立方五尺自乘又以方乘之得積一百二十五尺一百二十五尺自乘爲面命得積一萬五千六百二十五尺之面皆以六百二十五約之外立方積六百七十五尺之面中立方積二十五尺之面也張衡筭又謂立方爲質立圓爲渾衡言質之與中外之渾六百七十五尺之面開方除之不足一謂外渾積二十六也内渾二十五之面謂積五尺也今徽令質言中渾渾又言質則二質相與之率猶衡二渾相與之率也衡蓋亦先二質之率推以言渾之率也衡又言質六十四之面渾二十五之面質復言渾謂居質八分之五也又云方八之面圓五之面圓渾相推知其復以圓囷爲方率渾爲圓率也失之遠矣衡説之自然欲恊其陰陽奇耦之説而不顧疎密矣雖有文辭斯亂道破義病也置外質積二十六以九乘之十六而一得積十四尺八分尺之五即質中之渾也以分母乘全内子得一百一十七又置内質積五以分母乘之得四十是爲質居渾一百一十七分之四十而渾率猶爲傷多也假令方二尺方四面并得八尺也謂之方周其中令圓徑與方等亦二尺也圓半徑以乘圓周之半即圓冪也半方以乘方周之半即方冪也然則方周知方冪之率也圓周知圓冪之率也按如衡術方周率八之面圓周率五之面也令方周六十四尺之面即圓周四十尺之面也又令徑二尺自乘得徑四尺之面是爲圓周率一十之面而徑率一之面也衡亦以周三徑一之率爲非是故更著此法然增周太多過其實矣臣淳風等謹按祖暅之謂劉徽張衡二人皆以圓囷爲方率丸爲圓率乃設新法祖暅之開立圓術曰以二乘積開立方除之即立圓徑其意何也取立方棊一枚令立樞於左後之下隅從規去其右上之廉又合而横規之去其前上之廉於是立方之棊分而爲四規内棊一謂之内棊規外棊三謂之外棊規更合四棊復横斷之以句股言之令餘高爲句内棊斷上方爲股本方之數其弦也句股之法以句冪減弦冪則餘爲股冪若令餘高自乘減本方之冪餘即内棊斷上方之冪也本方之冪即此四棊之斷上冪然則餘高自乘即外三棊之斷上冪矣不問高卑勢皆然也然固有所歸同而塗殊者爾而乃控遠以演類借况以析微按陽馬方高數参等者倒而立之横截去上則高自乘與斷上冪數亦等焉夫疊棊成立積緣冪勢既同則積不容異由此觀之規之外三棊旁蹙爲一即一陽馬也三分立方則陽馬居一内棊居二可知矣合八小方成一大方合八内棊成一合蓋内棊居小方三分之二則合蓋居立方亦三分之二較然驗矣置三分之二以圓冪率三乘之如方冪率四而一約而定之以爲丸率故曰丸居立方二分之一也等數既密心亦昭晣張衡放舊貽哂於後劉徽循故未暇校新夫豈難哉抑未之思也依密率此立圓積本以圓徑再自乘十一乘之二十一而一約此積今欲求其本積故以二十一乘之十一而一凡物再自乘開立方除之復其本數故立方除之即丸徑也九章算術卷第五魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋商功以御功程積實今有穿地積一萬尺問爲堅壤各幾何荅曰爲堅七千五百尺爲壤一萬二千五百尺術曰穿地四爲壤五壤謂息土爲堅三堅謂築土爲墟四墟謂穿坑此皆其常率以穿地求壤五之求堅三之皆四而一今有術也以壤求穿四之求堅三之皆五而一以堅求穿四之求壤五之皆三而一臣淳風等謹按此術竝今有之義也重張穿地積一萬尺爲所有數堅率三壤率五各爲所求率穿率四爲所有率而今有之即得城垣隄溝壍渠皆同術術曰并上下廣而半之損廣補狹以高若深乘之又以袤乘之即積尺按此術并上下廣而半之者以盈補虛得中平之廣以高若深乘之得一頭之立冪又以袤乘之者得立實之積故爲積尺今有城下廣四丈上廣二丈高五丈袤一百二十六丈五尺問積幾何荅曰一百八十九萬七千五百尺今有垣下廣三尺上廣二尺高一丈二尺袤二十二丈五尺八寸問積幾何荅曰六千七百七十四尺今有隄下廣二丈上廣八尺高四尺袤一十二丈七尺問積幾何荅曰七千一百一十二尺冬程人功四百四十四尺問用徒幾何荅曰一十六人一百一十一分人之二術曰以積尺爲實程功尺數爲法實如法而一即用徒人數今有溝上廣一丈五尺下廣一丈深五尺袤七丈問積幾何荅曰四千三百七十五尺春程人功七百六十六尺并出土功五分之一定功六百一十二尺五分尺之四問用徒幾何荅曰七人三千六十四分人之四百二十七術曰置本人功去其五分之一餘爲法去其五分之一者謂以四乘五除也以溝積尺爲實實如法而一得用徒人數按此術置本人功去其五分之一者謂以四乘之五而一除去出土之功取其定功乃通分内子以爲法以分母乘溝積尺爲實者法裏有分實裏通之故實如法而一即用徒人數此以一人之積尺除其衆尺故用徒人數不盡者等數約之而命分也今有壍上廣一丈六尺三寸下廣一丈深六尺三寸袤一十三丈二尺一寸問積幾何荅曰一萬九百四十三尺八寸八寸者謂穿地方尺深八寸此積餘有方尺中二分四釐五毫棄之貴欲從易非其常定也夏程人功八百七十一尺并出土功五分之一沙礫水石之功作太半定功二百三十二尺一十五分尺之四問用徒幾何荅曰四十七人三千四百八十四分人之四百九術曰置本人功去其出土功五分之一又去沙礫水石之功太半餘爲法以壍積尺爲實實如法而一即用徒人數按此術置本人功去其出土功五分之一者謂以四乘五除又去沙礫水石作太半者一乘三除存其少半取其定功乃通分内子以爲法以分母乘壍積尺爲實者爲法裏有分實裏通之故實如法而一即用徒人數不盡者等數約之而命分也今有穿渠上廣一丈八尺下廣三尺六寸深一丈八尺袤五萬一千八百二十四尺問積幾何荅曰一千七萬四千五百八十五尺六寸秋程人功三百尺問用徒幾何荅曰三萬三千五百八十二人功内少一十四尺四寸一千人先到問當受袤幾何荅曰一百五十四丈三尺二寸八十一分寸之八術曰以一人功尺數乘先到人數爲實以一千人一日功爲實并渠上下廣而半之以深乘之爲法以渠廣深之立實爲法實如法得袤尺今有方堢壔堢者堢城也壔音丁老切又音纛謂以土擁木也方一丈六尺高一丈五尺問積幾何荅曰三千八百四千尺術曰方自乘以高乘之即積尺今有圓堢壔周四丈八尺高一丈一尺問積幾何荅曰二千一百一十二尺於徽術當積二千一十七尺一百五十七分尺之一百三十一臣淳風等謹按依密率積二千一十六尺術曰周自相乘以高乘之十二而一此章諸術亦以周三徑一爲率皆非也於徽術當以周自乘以高乘之又以二十五乘之三百一十四而一此之圓冪亦如圓田之冪也求冪亦如圓田而以高乘冪也臣淳風等謹按依密率以七乘之八十八而一今有方亭下方五丈上方四丈高五丈問積幾何荅曰一十萬一千六百六十六尺太半尺術曰上下方相乘又各自乘并之以高乘之三而一此章有壍堵陽馬皆合而成立方蓋説筭者乃立棊三品以效高深之積假令方亭上方一尺下方三尺高一尺其用棊也中央立方一四面壍堵四四角陽馬四上下方相乘爲三尺以高乘之約積三尺是爲得中央立方一四面壍堵各一下方自乘爲九以高乘之得積九尺是爲中央立方一四面壍堵各二四角陽馬各三也上方自乘以高乘之得積一尺又爲中央立方一凡三品棊皆一而爲三故三而一得積尺用棊之數立方三壍堵陽馬各十二凡二十七棊十三更差次之而成方亭者三驗矣爲術又可令方差自乘以高乘之三而一即四陽馬也上下方相乘以高乘之即中央立方及四面壍堵也并之以爲方亭積數也今有圓亭下周三丈上周二丈高一丈問積幾何荅曰五百二十七尺九分尺之七於徽術當積五百四尺四百七十一分尺之一百一十六也按密率爲積五百三尺三十三分尺之二十六術曰上下周相乘又各自乘并之以高乘之三十六而一此術周三徑一之義合以三除上下周各爲上下徑以相乘又各自乘并以高乘之三而一爲方亭之積假令三約上下周俱不盡還通之即各爲上下徑令上下徑相乘又各自乘并以高乘之爲三方亭之積分此合分母三相乘得九爲法除之又三而一得方亭之積從方亭求圓亭之積亦猶方冪中求圓冪乃令圓率三乘之方率四而一得圓亭之積前求方亭之積乃以三而一今求圓亭之積亦合三乘之二母既同故相準折惟以方率四乘分母九得三十六而連除之於徽術當上下周相乘又各自乘并以高乘之又二十五乘之九百四十二而一此圓亭四角圆殺比於方亭二百分之一百五十七爲術之意先作方亭三而一則此據上下徑爲之者當又以一百五十七乘之六百而一也今據周爲之若於圓堢壔又以二十五乘之三百一十四而一則先得三圓亭矣故以三百一十四爲九百四十二而一并除之臣淳風等謹按依密率以七乘之二百六十四而一今有方錐下方二丈七尺高二丈九尺問積幾何荅曰七千四十七尺術曰下方自乘以高乘之三而一按此術假令方錐下方二尺高一尺即四陽馬如術爲之用十二陽馬成三方錐故三而一得方錐也今有圓錐下周三丈五尺高五丈一尺問積幾何荅曰一千七百三十五尺一十二分尺之五於徽術當積一千六百五十八尺三百一十四分尺之十三依密率爲積一千六百五十六尺八十八分尺之四十七術曰下周自乘以高乘之三十六而一按此術圓錐下周以爲方錐下方方錐下方今自乘以高乘之令三而一得大方錐之積大錐方之積合十二圓矣今求一圓復合十二除之故令三乘十二得三十六而連除於徽術當下周自乘以高乘之又以二十五乘之九百四十二而一圓錐比於方錐亦二百分之一百五十七令徑自乘者亦當以一百五十七乘之六百而一其説如圓亭也臣淳風等謹按依密率以七乘之二百六十四而一今有壍堵下廣二丈袤一十八丈六尺高二丈五尺問積幾何荅曰四萬六千五百尺術曰廣袤相乘以高乘之二而一邪解立方得兩壍堵雖復隨方亦爲壍堵故二而一此則合所規棊推其物體蓋爲壍上疊也其形如城而無上廣與所規棊形異而同實未聞所以名之爲壍堵之説也今有陽馬廣五尺袤七尺高八尺問積幾何荅曰九十三尺少半尺術曰廣袤相乘以高乘之三而一按此術陽馬之形方錐一隅也今謂四柱屋隅爲陽馬假令廣袤各一尺高一尺相乘之得立方積一尺邪解立方得兩壍堵邪解壍堵其一爲陽馬一爲鼈臑陽馬居二鼈臑居一不易之率也合兩鼈臑成一陽馬合三陽馬而成一立方故三而一驗之以棊其形露矣悉割陽馬凡爲六鼈臑觀其割分則體勢互通蓋易了也其棊或脩短或廣狹立方不等者亦割分以爲六鼈臑其形不悉相似然見數同積實均也鼈臑殊形陽馬異體然陽馬異體則不可純合不纯合則難爲之矣何則按邪解方棊以爲壍堵者必當以半爲分邪解壍堵以爲陽馬者亦必當以半爲分一從一横耳設爲陽馬爲分内鼈臑爲分外棊雖或隨脩短廣狹猶有此分常率知殊形異體亦同也者以此而已其使鼈臑廣袤高各二尺用壍堵鼈臑之棊各二皆用赤棊又使陽馬之廣袤高各二尺用立方之棊一壍堵陽馬之棊各二皆用黑棊棊之赤黑接爲壍堵廣袤高各二尺於是中效其廣袤又中分其高令赤黑壍堵各自適當一方高一尺方一尺每二分鼈臑則一陽馬也其餘兩端各積本體合成一方焉是爲别種而方者率居三通其體而方者率居一雖方隨棊改而固有常然之勢也按餘數具而可知者有一二分之别即一二之爲率定矣其於理也豈虛矣若爲數而窮之置餘廣袤高之數各半之則四分之三又可知也半之彌少其餘彌細至細曰微微則無形由是言之安取餘哉數而求窮之者謂以情推不用籌算鼈臑之物不同器用陽馬之形或隨脩短廣狹然不有鼈臑無以審陽馬之數不有陽馬無以知錐亭之類功實之主也今有鼈臑下廣五尺無袤上袤四尺無廣高七尺問積幾何荅曰二十三尺少半尺術曰廣袤相乘以高乘之六而一按此術臑者臂骨也或曰半陽馬其形有似鼈肘故以名云中破陽馬得兩鼈臑鼈臑之見數即陽馬之半數數同而實據半故云六而一即得今有羡除下廣六尺上廣一丈深三尺末廣八尺無深袤七尺問積幾何荅曰八十四尺術曰并三廣以深乘之又以袤乘之六而一按此術羡除實隧道也其所穿地上平下邪似兩鼈臑夾一壍堵即羡除之形假令用此棊上廣三尺深一尺下廣一尺末廣一尺無深袤一尺下廣末廣皆壍堵之廣上廣者两鼈臑與一壍堵相連之廣也以深袤乘得積五尺鼈臑居二壍堵居三其於本棊皆一爲六故六而一合四陽馬以爲方錐邪畫方錐之底亦令爲中方就中方削而上合全爲中方錐之半於是陽馬之棊悉中解矣中錐離而爲四鼈臑焉故外錐之半亦爲四鼈臑雖背正異形與常所謂鼈臑參不相似實則同也所云夾壍堵者中錐之鼈臑也凡壍堵上袤短者連陽馬也下袤短者與鼈臑連也上下兩袤相等知亦與鼈臑連也并三广以高袤乘六而一皆其積也今此羡除之廣即壍堵之袤也按此本是三廣不等即與鼈臑連者别而言之中央壍堵廣六尺高三尺袤七尺末廣之兩旁各一小鼈臑皆與壍堵等令小鼈臑居裏大鼈臑居表則大鼈臑皆出隨方錐下廣二尺袤六尺高七尺分取其半則爲袤三尺以高廣乘之三而一即半錐之積也邪解半錐得此兩大鼈臑求其積亦當六而一合於常率矣按陽馬之棊兩邪棊底方當其方也不問旁角而割之相半可知也推此上連無成不方故方錐與陽馬同實角而割之者相半之勢此大小鼈臑可知更相表裏但體有背正也今有芻甍下廣三丈袤四丈上袤二丈無廣高一丈問積幾何荅曰五千尺術曰倍下袤上袤從之以廣乘之又以高乘之六而一推明義理者舊説云凡積芻有上下廣曰童甍謂其屋蓋之茨也是故甍之下廣袤與童之上廣袤等正斬方亭兩邊合之即芻甍之形也假令下廣二尺袤三尺上袤一尺無廣高一尺其用棊也中央壍堵二兩端陽馬各二倍下袤上袤從之爲七尺以廣乘之得冪十四尺陽馬之冪各居二壍堵之冪各居三以高乘之得積十四尺其於本棊也皆一而爲六故六而一即得亦可令上下袤差乘廣以高乘之三而一即四陽馬也下廣乘之上袤而半之高乘之即二壍堵并之以爲甍積也芻童曲池盤池冥谷皆同術術曰倍上袤下袤從之亦倍下袤上袤從之各以其廣乘之并以高若深乘之皆六而一按此術假令芻童上廣一尺袤二尺下廣三尺袤四尺高一尺其用棊也中央立方二四面壍堵六四角陽馬四倍下袤爲八上袤從之爲十以高廣乘之得積三十尺是爲得中央立方各三兩端壍堵各四兩旁壍堵各六四角陽馬亦各六復倍上袤下袤從之爲八以高廣乘之得積八尺是爲得中央立方亦各三兩端壍堵各二并兩旁三品棊皆一而爲六故六而一即得爲術又可令上下廣袤差相乘以高乘之三而一亦四陽馬上下廣袤互相乘并而半之以高乘之即四面六壍堵與二立方并之爲芻童積又可令上下廣袤互相乘而半之上下廣袤又各自乘并以高乘之三而一即得也其曲池者并上中外周而半之以爲上袤亦并下中外周而半之以爲下袤此池環而不通匝形如盤虵而曲之亦云周者謂如委穀依垣之周耳引而伸之周爲袤求袤之意環田也今有芻童下廣二丈袤三丈上廣三丈袤四丈高三丈問積幾何荅曰二萬六千五百尺今有曲池上中周二丈外周四丈廣一丈下中周一丈四尺外周二丈四尺廣五尺深一丈問積幾何荅曰一千八百八十三尺三寸少半寸今有盤池上廣六丈袤八丈下廣四丈袤六丈深二丈問積幾何荅曰七萬六百六十六尺太半尺負土往來七十步其二十步上下棚除棚除二當平道五踟蹰之間十加一載輸之間三十步定一返一百四十步土籠積一尺六寸秋程人功行五十九里半問人到積尺及用徒各幾何荅曰人到二百四尺用徒三百四十六人一百五十三分人之六十二術曰以一籠積尺乘程行步數爲實往來上下棚除二當平道五棚閣除邪道有上下之難故使二當五也置定往來步數十加一及載輸之間三十步以爲法除之所得即一人所到尺按此術棚閣除邪道有上下之難故使二當五置定往來步數十加一及載輸之間三十步是爲往來一返凡用一百四十步於今有術爲所有行率籠積一尺六寸爲所求到土率程行五十九里半爲所有數而今有之即人到尺數以所到約積尺即用徒人數者此一人之積除其衆積尺故得用徒人數爲術又可令往來一返所用之步約程行爲返數乘籠積爲一人所到以此術與今有術相返覆則乘除之或先後意各有所在而同歸耳以所到約積尺即用徒人數今有冥谷上廣二丈袤七丈下廣八尺袤四丈深六丈五尺問積幾何荅曰五萬二千尺載土往來二百步載輸之間一里程行五十八里六人共車車載三十四尺七寸問人到積尺及用徒各幾何荅曰人到二百一尺五十分尺之十三用徒二百五十八人一萬六十三分人之三千七百四十六術曰以一車積尺乘程行步數爲實置今往來步數加載輸之間一里以車六人乘之爲法除之所得即一人所到尺按此術今有之義以載輸及往來并得五百步爲所有行率車載三十四尺七寸爲所求到土率程行五十八里通之爲步爲所有數而今有之所得則一車所到欲得人到者當以六人除之即得術有分故亦更令乘法而并除者亦用以車尺數以爲一人到土率六人乘五百步爲行率也又亦可五百步爲行率令六人約車積尺數爲一人到土率以負土術入之入之者亦可求返數也要取其會通而已術恐有分故令乘法而并除以所到約積尺即用徒人數者以一人所到積尺除其衆積故得用徒人數也以所到約積尺即用徒人數今有委粟平地下周一十二丈高二丈問積及爲粟幾何荅曰積八千尺於徽術當積七千六百四十三尺一百五十七分尺之四十九臣淳風等謹依密率爲積七千六百三十六尺十一分尺之四爲粟二千九百六十二斛二十七分斛之二十六於徽術當粟二千八百三十斛一千四百一十三分斛之一千二百一十臣淳風等謹依密率爲粟二千八百二十八斛九十九分斛之二十八今有委菽依垣下周三丈高七尺問積及爲菽各幾何荅曰積三百五十尺依徽術當積三百三十四尺四百七十一分尺之一百八十六也臣淳風等謹依密率爲積三百三十四尺十一分尺之一爲菽一百四十四斛二百四十三分斛之八依徽術當菽一百三十七斛一萬二千七百一十七分斛之七千七百七十一臣淳風等謹依密率爲菽一百三十七斛八百九十一分斛之四百三十三今有委米依垣内角下周八尺高五尺問積及爲米各幾何荅曰積三十五尺九分尺之五於徽術當積三十三尺四百七十一分尺之四百五十七臣淳風等謹依密率當積三十三尺三十三分尺之三十一爲米二十一斛七百二十九分斛之六百九十一於徽術當米二十斛三萬八千一百五十一分斛之三萬六千九百八十臣淳風等謹依密率爲米二十斛二千六百七十三分斛之二千五百四十委粟術曰下周自乘以高乘之三十六而一此猶圓錐也於徽術亦當下周自乘以高乘之又以二十五乘之九百四十二而一也其依垣者居圓錐之半也十八而一於徽術當令此下周自乘以高乘之又以二十五乘之四百七十一而一依垣之周半於全周其自乘之冪居全周自乘之冪四分之一故半全周之法以爲法也其依垣内角者角隅也居圓錐四分之一也九而一於徽術當令此下周自乘而倍之以高乘之又以二十五乘之四百七十一而一依隅之周半於依垣其自乘之冪居依垣自乘之冪四分之一當半依垣之法以爲法法不可半故倍其實又此術亦用周三徑一之率假令以三除周得徑若不盡通分内子即爲徑之積分令自乘以高乘之爲三方錐之積分母自相乘得九爲法又當三而一約方錐之積從方錐中求圆錐之積亦猶方冪求圓冪乃當三乘之四而一得圓錐之積前求方錐積乃合三而一今求圓錐之積復合三乘之二母既同故相準折惟以四乘分母九得三十六而連除圓錐之積其圓錐之積與平地聚粟同故三十六而一臣淳風等謹依密率以七乘之其平地者二百六十四而一依垣者一百三十二而一依隅者六十六而一也程粟一斛積二尺七寸二尺七寸者謂方一尺深二尺七寸凡積二千七百寸其米一斛積一尺六寸五分寸之一謂積一千六百二十寸其菽荅麻麥一斛皆二尺四寸十分寸之三謂積二千四百三十寸此爲以精麄爲率而不等其槩也粟率五米率三故米一斛於粟一斛五分之三菽荅麻麥亦如本率云故謂此三量器爲槩而皆不合於今斛當今大司農斛圓徑一尺三寸五分五釐正深一尺於徽術爲積一千四百四十一寸排成餘分又有十分寸之三王莽銅斛於今尺爲深九寸五分五釐徑一尺三寸六分八釐七毫以徽術計之於今斛爲容九斗七升四合有奇周官考工記㮚氏爲量深一尺内方一尺而圓外其實一鬴於徽術此圓積一千五百七十寸左氏傳曰齊舊四量豆區釜鍾四升曰豆各自其四以登於釜釜十則鍾鍾六斛四斗釜六斗四升方一尺深一尺其積一千寸若此方積容六斗四升則通外圓積成旁容十斗四合一龠五分龠之三也以數相乘之則斛之制方一尺而圓其外庣旁一釐七毫冪一百五十六寸四分寸之一深一尺積一千五百六十二寸半容十斗王莽銅斛與漢書律曆志所論斛同今有穿地袤一丈六尺深一丈上廣六尺爲垣積五百七十六尺問穿地下廣幾何荅曰三尺五分尺之三術曰置垣積尺四之爲實穿地四爲堅三垣堅也以堅求穿地當四之三而一也以深袤相乘爲深袤之立實也又三之爲法以深袤乘之立實除垣積則阬廣又三之者與堅率并除之所得倍之阬有兩廣先并而半之即爲廣狹之中平令先得其中平故又倍之知兩廣全也減上廣餘即下廣按此術穿地四爲堅三垣即堅也今以堅求穿地當四乘之三而一深袤相乘者爲深袤立冪以深袤立冪除積即阬廣又三之爲法與堅率并除所得倍之者爲阬有兩廣先并而半之爲中平之廣今此得中平之廣故倍之還爲兩廣并故減上廣餘即下廣也今有倉廣三丈袤四丈五尺容粟一萬斛問高幾何荅曰二丈術曰置粟一萬斛積尺爲實廣袤相乘爲法實如法而一得高尺以廣袤之冪除積故得高按此術本以廣袤相乘以高乘之得此積今還元置此廣袤相乘爲法除之故得高也今有圓囷圓囷廩也亦云圓囤也高一丈三尺三寸少半寸容米二千斛問周幾何荅曰五丈四尺於徽術當周五丈五尺二寸二十分寸之九臣淳風等謹按依密率爲周五丈五尺一百分尺之二十七術曰置米積尺此積猶圓堢壔之積以十二乘之令高而一所得開方除之即周於徽術當置米積尺以三百一十四乘之爲實二十五乘囷高爲法所得開方除之即周也此亦據見冪以求周失之於微少也晋武庫中有漢時王莽所作銅斛其篆書字題斛旁云律嘉量斛方一尺而圓其外庣旁九釐五毫冪一百六十二寸深一尺積一千六百二十寸容十斗及斛底云律嘉量斗方尺而圓其外庣旁九釐五毫冪一尺六寸二分深一寸積一百六十二寸容一斗合龠皆有文字升居斛旁合龠在斛耳上後有讚文與今律曆志同亦魏晋所常用今粗疏王莽銅斛文字尺寸分數然不盡得升合勺之文字按此術本周自相乘以高乘之十二而一得此積今還元置此積以十二乘之令高而一即復本周自乘之數凡物自乘開方除之復其本數故開方除之即得也臣淳風等謹按依密率以八十八乘之爲實七乘囷高爲法實如法而一開方除之即周也九章算術卷第六魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋均輸以御遠近勞費今有均輸粟甲縣一萬户行道八日乙縣九千五百户行道十日丙縣一萬二千三百五十户行道十三日丁縣一萬二千二百户行道二十日各到輸所凡四縣賦當輸二十五萬斛用車一萬乘欲以道里遠近户數多少衰出之問粟車各幾何荅曰甲縣粟八萬三千一百斛車三千三百二十四乘乙縣粟六萬三千一百七十五斛車二千五百二十七乘丙縣粟六萬三千一百七十五斛車二千五百二十七乘丁縣粟四萬五百五十斛車一千六百二十二乘術曰令縣户數各如其本行道日數而一以爲衰按此均輸猶均運也令户率出車以行道日數爲均發粟爲輸據甲行道八日因使八户共出一車乙行道十日因使十户共出一車計其在道則皆户一日出一車故可爲均平之率也臣淳風等謹按縣户有多少之差行道有遠近之異欲其均等故各令行道日數約户爲衰行道多者少其户行道少者多其户故各令約户爲衰以八日約除甲縣得一百二十五乙丙各九十五丁六十一於今有術副并爲所有率未并者各爲所求率以賦粟車數爲所有數而今有之各得車數一旬除乙十三除丙各得九十五二旬除丁得六十一也甲衰一百二十五乙丙衰各九十五丁衰六十一副并爲法以赋粟車數乘未并者各自爲實衰分科率實如法得一車各置所當出車以其行道日數乘之如户數而一得率户用車二日四十七分日之三十一故謂之均求此户以率當各計車之衰分也有分者上下輩之輩配也車牛人之數不可分裂推少就多均賦之宜今按甲分既少宜從於乙滿法除之有餘從丙丁分又少亦宜就丙除之適盡加乙丙各一上下輩益以少從多也以二十五斛乘車數即粟數今有均輸卒甲縣一千二百人薄塞乙縣一千五百五十人行道一日丙縣一千二百八十人行道二日丁縣九百九十人行道三日戊縣一千七百五十人行道五日凡五縣賦輸卒一月一千二百人欲以遠近人數多少衰出之問縣各幾何荅曰甲縣二百二十九人乙縣二百八十六人丙縣二百二十八人丁縣一百七十一人戊縣二百八十六人術曰令縣卒各如其居所及行道日數而一以爲衰按此亦以日數爲均發卒爲輸甲無行道日但以居所三十日爲率言欲爲均平之率者當使甲三十人而出一人乙三十一人而出一人出一人者計役則皆一人一日是以可爲均平之率甲衰四乙衰五丙衰四丁衰三戊衰五副并爲法以人數乘未并者各自爲實實如法而一爲衰於今有術副并爲所有率未并者各爲所求率以賦卒人數爲所有數此術以别考則意同以廣異聞故存之也各置所當出人數以其居所及行道日數乘之如縣人數而一得率人役五日七分日之五有分者上下輩之輩配也今按丁分最少宜就戊除不從乙者丁近戊故也滿法除之有餘從乙丙分又少亦就乙除有餘從甲除之適盡從甲丙二分其數正等二者於乙遠近皆同不以甲從乙者方以下從上也今有均賦粟甲縣二萬五百二十户粟一斛二十錢自輸其縣乙縣一萬二千三百一十二户粟一斛一十錢至輸所二百里丙縣七千一百八十二户粟一斛一十二錢至輸所一百五十里丁縣一萬三千三百三十八户粟一斛一十七錢至輸所二百五十里戊縣五千一百三十户粟一斛一十三錢至輸所一百五十里凡五縣賦輸粟一萬斛一車載二十五斛與僦一里一錢欲以縣户賦粟令費勞等問縣各粟幾何荅曰甲縣三千五百七十一斛二千八百七十三分斛之五百一十七乙縣二千三百八十斛二千八百七十三分斛之二千二百六十丙縣一千三百八十八斛二千八百七十三分斛之二千二百七十六丁縣一千七百一十九斛二千八百七十三分斛之一千三百一十三戊縣九百三十九斛二千八百七十三分斛之二千二百五十三術曰以一里僦價乘至輸所里此以出錢爲均也問者曰一車載二十五斛與僦一里一錢一錢即一里僦價也以乘里數者欲知僦一車到輸所所用錢也甲自輸其縣則無取僦價也以一車二十五斛除之欲知僦一斛所用錢加一斛粟價則致一斛之費加一斛之價於一斛僦直即凡輸粟取僦錢也甲一斛之費二十乙丙各十八丁二十七戊十九也各以約其户數爲衰言使甲二十户共出一斛乙丙十八户共出一斛計其所費則皆户一錢故可爲均賦之率也計經賦之率既有户算之率亦有遠近貴賤之率此二率者各自相與通通則甲二十乙十二丙七丁十三戊五一斛之費謂之錢率錢率約户率者則錢爲母户爲子子不齊令母互乘爲齊則衰也若其不然以一斛之費約户數取衰竝有分當通分内子約之於算甚繁此一章皆相與通功共率略相依似以上二率下一率亦可放此從其簡易而已又以分言之使甲一户出二十分斛之一乙一户出十八分斛之一各以户數乘之亦可得一縣凡所當輸俱爲衰也乘之者乘其子母報除之以此觀之則以一斛之費約户數者其意不異矣然則可置一斛之費而返衰之約户以乘户率爲衰也合分注曰母除爲率率乘子爲齊返衰注曰先同其母各以分母約其子爲返衰以施其率爲算既約且不妨處下也甲衰一千二十六乙衰六百八十四丙衰三百九十九丁衰四百九十四戊衰二百七十副并爲法所賦粟乘未并者各自爲實實如法得一各置所當出粟以其一斛之費乘之如户數而一得率户出三錢二千八百七十三分錢之一千三百八十一按此以出錢爲均問者曰一車載二十五斛與僦一里一錢一錢即一里僦價也以乘里數者欲知僦一車到輸所用錢甲自輸其縣則無取僦之價以一車二十五斛除之者欲知僦一斛所用錢加一斛之價於一斛僦直即凡輸粟取僦錢甲一斛之費二十乙丙各十八丁二十七戊一十九各以約其户爲衰甲衰一千二十六乙衰六百八十四丙衰三百九十九丁衰四百九十四戊衰二百七十言使甲二十户共出一斛乙丙十八户共出一斛計其所費則皆户一錢故可爲均賦之率也於今有術副并爲所有率未并者各爲所求率赋粟一萬斛爲所有數此今有衰分之義也今有均賦粟甲縣四萬二千算粟一斛二十自輸其縣乙縣三萬四千二百七十二算粟一斛一十八傭價一日一十錢到輸所七十里丙縣一萬九千三百二十八算粟一斛一十六傭價一日五錢到輸所一百四十里丁縣一萬七千七百算粟一斛一十四傭價一日五錢到輸所一百七十五里戊縣二萬三千四十算粟一斛一十二傭價一日五錢到輸所二百一十里己縣一萬九千一百三十六算粟一斛一十傭價一日五錢到輸所二百八十里凡六縣賦粟六萬斛皆輸甲縣六人共車車載二十五斛重車日行五十里空車日行七十里載輸之間各一日粟有貴賤傭各别價以算出錢令費勞等問縣各粟幾何荅曰甲縣一萬八千九百四十七斛一百三十三分斛之四十九乙縣一萬八百二十七斛一百三十三分斛之九丙縣七千二百一十八斛一百三十三分斛之六丁縣六千七百六十六斛一百三十三分斛之一百二十二戊縣九千二十二斛一百三十三分斛之七十四己縣七千二百一十八斛一百三十三分斛之六術曰以車程行空重相乘爲法并空重以乘道里各自爲實實如法得一日按此術重往空還一輸再行道也置空行一里用七十分日之一重行一里用五十分日之一齊而同之空重行一里之路往返用一百七十五分日之六完言之者一百七十五里之路往返用六日也故并空重者齊其子也空重相乘者同其母也於今有術至輸所里爲所有數六爲所求率一百七十五爲所有率而今有之即各得輸所用日也加載輸各一日故得凡日也而以六人乘之欲知致一車用人也又以傭價乘之欲知致車人傭直幾錢以二十五斛除之欲知致一斛之傭直也加一斛粟價即致一斛之費加一斛之價於致一斛之傭直即凡輸一斛粟取傭所用錢各以約其算數爲衰今按甲衰四十二乙衰二十四丙衰十六丁衰十五戊衰二十己衰十六於今有術副并爲所有率未并者各自爲所求率所賦粟爲所有數此今有衰分之義也副并爲法以所賦粟乘未并者各自爲實實如法得一斛各置所當出粟以其一斛之費乘之如算數而一得率算出九錢一百三十三分錢之三又載輸之間各一日者即二日也今有粟七斗三人分舂之一人爲糲米一人爲粺米一人爲糳米令米數等問取粟爲米各幾何荅曰糲米取粟二斗一百二十一分斗之一十粺米取粟二斗一百二十一分斗之三十八糳米取粟二斗一百二十一分斗之七十三爲米各一斗六百五分斗之一百五十一術曰列置糲米三十粺米二十七糳米二十四而返衰之此先約三率糲爲十粺爲九糳爲八欲令米等者其取粟糲率十分之一粺率九分之一糳率八分之一當齊其子故曰返衰也臣淳風等謹按米有精粗之異粟有多少之差據率粺糳少而糲多用粟則粺糳多而糲少米若依本率之分粟當倍率故今返衰之使精者取多而粗者得少副并爲法以七斗乘未并者各自爲取粟實實如法得一斗於今有術副并爲所有率未并者各爲所求率粟七斗爲所有數而今有之故各得取粟也若求米等者以本率各乘定所取粟爲實以粟率五十爲法實如法得一斗若徑求爲米等數者置糲米三用粟五粺米二十七用粟五十糳米十二用粟二十五齊其粟同其米并齊爲法以七斗乘同爲實所得即爲米斗數今有人當稟粟二斛倉無粟欲與米一菽二以當所稟粟問各幾何荅曰米五斗一升七分升之三菽一斛二升七分升之六術曰置米一菽二求爲粟之數并之得三九分之八以爲法亦置米一菽二而以粟二斛乘之各自爲實實如法得一斛臣淳風等謹按置粟率五乘米一米率三除之得一三分之二即是米一之粟也粟率十以乘菽二菽率九除之得二九分之二即是菽二之粟也并全得三齊子并之得二十四同母得二十七約之得九分之八故云并之得三九分之八米一菽二當粟三九分之八此其粟率也於今有術米一菽二皆爲所求率當粟三九分之八爲所有率粟二斛爲所有數凡言率者當相與通之則爲米九菽十八當粟三十五也亦有置米一菽二求其爲粟之率以爲列衰副并爲法以粟乘列衰爲實所得即米一菽二所求粟也以米菽本率而今有之即合所問今有取傭負鹽二斛行一百里與錢四十今負鹽一斛七斗三升少半升行八十里問與錢幾何荅曰二十七錢一十五分錢之一十一術曰置鹽二斛升數以一百里乘之爲法按此術以負鹽二斛升數乘所行一百里得二萬里是爲負鹽一升行二萬里得錢四十於今有術爲所有率以四十錢乘今負鹽升數又以八十里乘之爲實實如法得一錢以今負鹽升數乘所行里今負鹽一升凡所行里也於今有術以所有數四十錢爲所求率也衰分章貸人千錢與此同今有負籠重一石行百步五十返今負籠重一石一十七斤行七十六步問返幾何荅曰五十七返二千六百三分返之一千六百二十九術曰以今所行步數乘今籠重斤數爲法此法謂負一斤一返所行之積步也故籠重斤數乘故步又以返數乘之爲實實如法得一返按此法負一斤一返所行之積步此實者一斤一日所行之積步故以一返之課除終日之程即是返數也臣淳風等謹按此術所行步多者得返少所行步少者得返多然則故所行者今返率也故令所得返乘今返之率爲實而以故返之率爲法今有術也按此負籠又有輕重於是爲術者因令重者得返少輕者得返多故又因其率以乘法實者重今有之義也然此意非也按此籠雖輕而行有限籠過重則人力遺力有遺而術無窮人行有限而籠輕重不等使其有限之力隨彼無窮之變故知此術率乖理也若故所行有空行返數設以問者當因其所負以爲返率则今返之數可得而知也假令空行一日六十里負重一斛行四十里減重一斗進二里半負重二斗以下與空行同今負籠重六斗往還行一百步問返幾何荅曰一百五十返術曰置重行率加十里以里法通之爲實以一返之步爲法實如法而一即得也今有程傳委輸空車日行七十里重車日行五十里今載太倉粟輸上林五日三返問太倉去上林幾何荅曰四十八里一十八分里之一十一術曰并空重里數以三返乘之爲法令空重相乘又以五日乘之爲實實如法得一里此亦如上術率一百七十五里之路往返用六日也於今有術則五日爲所有數一百七十五里爲所求率六日爲所有率以此所得則三返之路今求一返當以三約之因令乘法而并除也爲術亦可各置空重行一里用日之率以爲列衰副并爲法以五日乘列衰爲實實如法所得即各空重行日數也各以一日所行以乘爲凡日所行三返約之爲上林去太倉之數按此術重往空還一輸再還道置空行一里用七十分日之一重行一里用五十分日之一齊而同之空重行一里之路往返用一百七十五分日之六完言之者一百七十五里之路往返用六日故并空重者并齊也空重相乘者同其母也於今有術五日爲所有數一百七十五爲所求率六爲所有率以此所得則三返之路今求一返者當以三約之故令乘法而并除亦當約之也今有絡絲一斤爲練絲一十二兩練絲一斤爲青絲一斤一十二銖今有青絲一斤問本絡絲幾何荅曰一斤四兩一十六銖三十三分铢之一十六術曰以練絲十二兩乘青絲一斤一十二銖爲法以青絲一斤铢數乘練絲一斤兩數又以絡絲一斤乘爲實實如法得一斤按練絲一斤爲青絲一斤十二銖此練率三百八十四青率三百九十六也又絡絲一斤爲練絲十二兩此絡率十六練率十二也置今有青絲一斤以練率三百八十四乘之爲實實如青絲率三百九十六而一所得青絲一斤練絲之數也又以絡率十六乘之所得爲實以練率十二爲法所得即練絲用絡絲之數也是謂重今有也雖各有率不問中間故令後實乘前實後法乘前法而并除也故以練絲兩數爲實青絲銖數爲法一曰又置絡絲一斤兩數與練絲十二兩約之絡得四練得三此其相與之率又置練絲一斤銖數與青絲一斤一十二銖約之練得三十二青得三十三亦其相與之率齊其青絲絡絲同其二練絡得一百二十八青得九十九練得九十六即三率悉通矣今有青絲一斤爲所有數絡絲一百二十八爲所求率青絲九十九爲所有率爲率之意猶此但不先約諸率耳凡率錯互不通者皆積齊同用之放此雖四五轉不異也言同其二練者以明三率之相與通耳於術無以異也又一術今有青絲一斤銖數乘練絲一斤兩數爲實以青絲一斤一十二銖爲法所得即用練絲兩數以絡絲一斤乘所得爲實以練絲十二兩爲法所得即用絡絲斤數也今有惡粟二十斗舂之得糲米九斗今欲求粺米一十斗問惡粟幾何荅曰二十四斗六升八十一分升之七十四術曰置糲米九斗以九乘之爲法亦置粺米十斗以十乘之又以惡粟二十斗乘之爲實實如法得一斗按此術置今有求粺米十斗以糲米率十乘之如粺率九而一即粺化爲糲又以惡粟率二十乘之如糲率九而一即糲亦化爲惡粟矣此亦重今有之義爲術之意猶絡絲也雖各有率不問中間故令後實乘前實後法乘前法而并除之也今有善行者行一百步不善行者行六十步今不善行者先行一百步善行者追之問幾何步及之荅曰二百五十步術曰置善行者一百步減不善行者六十步餘四十步以爲法以善行者之一百步乘不善行者先行一百步爲實實如法得一步按此術以六十步減一百步餘四十步即不善行者先行率也善行者行一百步追及率約之追及率得五先行率得二於今有術不善行者先行一百步爲所有數五爲所求率二爲所有率而今有之得追及步也今有不善行者先行一十里善行者追之一百里先至不善行者二十里問善行者幾何里及之荅曰三十三里少半里術曰置不善行者先行一十里以善行者先至二十里增之以爲法以不善行者先行一十里乘善行者一百里爲實實如法得一里按此術不善行者既先行一十里後不及二十里并之得三十里也謂之先行率善行者一百里爲追及率約之先行率得三三爲所有率而今有之即得也其意如上術也今有兔先走一百步犬追之二百五十步不及三十步而止問犬不止復行幾何步及之荅曰一百七步七分步之一術曰置兔先走一百步以犬走不及三十步減之餘爲法以不及三十步乘犬追步數爲實實如法得一步按此術以不及三十步減先走一百步餘七十步爲兔先走率犬行二百五十步爲追及率約之先走率得七追及率得二十五於今有術不及三十步爲所有數二十五爲所求率七爲所有率而今有之即得也今有人持金十二斤出關關税之十分而取一今關取金二斤償錢五千問金一斤值錢幾何荅曰六千二百五十術曰以一十乘二斤以十二斤減之餘爲法以一十乘五千爲實實如法得一錢按此術置十二斤以一乘之十而一得一斤五分斤之一即所當税者也減二斤餘即關取盈金以盈除所償錢即金直也今術既以十二斤爲所税則是以十爲母故以十乘二斤及所償錢通其率於今有術五千錢爲所有數十爲所求率八爲所有率而今有之即得也今有客馬日行三百里客去忘持衣日已三分之一主人乃覺持衣追及與之而還至家視日四分之三問主人馬不休日行幾何荅曰七百八十里術曰置四分日之三除三分日之一按此術置四分日之三除三分日之一者除其減也減之餘有十二分之五即是主人追客還用日率也半其餘以爲法去其還存其往率之者子不可半故倍母二十四分之五是爲主人與客均行用日之率也副置法增三分日之一法二十四分之五者主人往追用日之分也三分之一者客去主人未覺之前獨行用日之分也并連此數得二十四分日之十三則主人追及前用日之分也是爲客用日率也然則主人用日率者客馬行率也客用日率者主人馬行率也母同則子齊是爲客馬行率五主人馬行率十三於今有術三百里爲所有數十三爲所求率五爲所有率而今有之即得也以三百里乘之爲實實如法得主人馬一日行欲知主人追客所行里者以三百里乘客用日分子十三以母二十四而一得一百六十二里半以此乘客馬與主人均行日分母二十四如客馬與主人均行用日分子五而一亦得主人馬一日行七百八十里也今有金箠長五尺斬本一尺重四斤斬末一尺重二斤問次一尺各重幾何荅曰末一尺重二斤次一尺重二斤八兩次一尺重三斤次一尺重三斤八兩次一尺重四斤術曰令末重減本重餘即差率也又置本重以四間乘之爲下第一衰副置以差率減之每尺各自爲衰按此術五尺有四間者有四差也今本末相減餘即四差之凡數也以四約之即得每尺之差以差數減本重餘即次尺之重也爲術所置如是而已今此率以四爲母故令母乘本爲衰通其率也亦可置末重以四間乘之爲上第一衰以差重率加之爲次下衰也副置下第一衰以爲法以本重四斤徧乘列衰各自爲實實如法得一斤以下第一衰爲法以本重乘其分母之數而又返此率乘本重爲實一乘一除勢無損益故惟本存焉衆衰相推爲率則其餘可知也亦可副置末衰爲法而以末重二斤乘列衰爲實此雖迂迴然是其舊故就新而言之也今有五人分五錢令上二人所得與下三人等問各得幾何荅曰甲得一錢六分錢之二乙得一錢六分錢之一丙得一錢丁得六分錢之五戊得六分錢之四術曰置錢錐行衰按此術錐行者謂如立錐初一次二次三次四次五各均爲一列者也并上二人爲九并下三人爲六六少於九三數不得等但以五四三二一爲率也以三均加焉副并爲法以所分錢乘未并者各自爲實實如法得一錢此問者令上二人與下三人等上下部差一人其差三均加上部則得二三均加下部則得三三上下部猶差一人差得三以通於本率即上下部等也於今有術副并爲所有率未并者各爲所求率五錢爲所有數而今有之即得等耳假令七人分七錢欲令上二人與下五人等則上下部差三人并上部爲十三下部爲十五下多上少下不足減上當以上下部列差而後均減乃合所問耳此可放下術令上二人分二錢半爲上率令下三人分二錢半爲下率上下二率以少減多餘爲實置二人三人各半之減五人餘爲法實如法得一錢即衰相去也下衰率六分之五者丁所得錢數也今有竹九節下三節容四升上四節容三升問中間二節欲均容各多少荅曰下初一升六十六分升之二十九次一升六十六分升之二十二次一升六十六分升之一十五次一升六十六分升之八次一升六十六分升之一次六十六分升之六十次六十六分升之五十三次六十六分升之四十六次六十六分升之三十九術曰以下三節分四升爲下率以上四節分三升爲上率此二率者各其平率也上下率以少減多餘爲實按此上下節各分所容爲率者各其平率上下以少減多者餘爲中間五節半之凡差故以爲實也置四節三節各半之以減九節餘爲法實如法得一升即衰相去也按此術上下節所容已定之節中間相去節數也實者中間五節半之凡差也故實如法而一則每節之差也下率一升少半升者下第二節容也一升少半升者下三節通分四升之平率平率即爲中分節之容也今有鳧起南海七日至北海雁起北海九日至南海今鳧雁俱起問何日相逢荅曰三日十六分日之十五術曰并日數爲法日數相乘爲實實如法得一日按此術置鳧七日一至雁九日一至齊其至同其日定六十三日鳧九至雁七至今鳧雁俱起而問相逢者是爲共至并齊以除同即得相逢日故并日數爲法者并齊之意日數相乘爲實者猶以同爲實也一曰鳧飛日行七分至之一雁飛日行九分至之一齊而同之鳧飛定日行六十三分至之九雁飛定日行六十三分至之七是爲南北海相去六十三分鳧日行九分雁日行七分也并鳧雁一日所行以除南北相去而得相逢日也今有甲發長安五日至齊乙發齊七日至長安今乙發已先二日甲乃發長安問幾何日相逢荅曰二日十二分日之一術曰并五日七日以爲法按此術并五日七日爲法者猶并齊爲法置甲五日一至乙七日一至齊而同之定三十五日甲七至乙五至并之爲十二至者用三十五日也謂甲乙與發之率耳然則日化爲至當除日故以爲法也以乙先發二日減七日減七日者言甲乙俱發今以發爲始發之端於本道里則餘分也餘以乘甲日數爲實七者長安去齊之率也五者後發相去之率也今問後發故舍七用五以乘甲五日爲二十五日言甲七至乙五至更相去用此二十五日也實如法得一日一日甲行五分至之一乙行七分至之一齊而同之甲定日行三十五分至之七乙定日行三十五分至之五是爲齊去長安三十五分甲日行七分乙日行五分也今乙先行發二日已行十分餘相去二十五分故減乙二日餘令相乘爲二十五分今有一人一日爲牝瓦三十八枚一人一日爲牡瓦七十六枚今令一人一日作瓦牝牡相半問成瓦幾何荅曰二十五枚少半枚術曰并牝牡爲法牝牡相乘爲實實如法得一枚此意猶與鳧雁同術牝牡瓦相并猶如鳧雁日飛相并也按此術并牝牡爲法者并齊之意牝牡相乘爲實者猶以同爲實也故實如法即得也今有一人一日矯矢五十一人一日羽矢三十一人一日筈矢十五今令一人一日自矯羽筈問成矢幾何荅曰八矢少半矢術曰矯矢五十用徒一人羽矢五十用徒一人太半人筈矢五十用徒三人少半人并之得六人以爲法以五十矢爲實實如法得一矢按此術言成矢五十用徒六人一日工也此同工共作猶鳧雁共至之類亦以同爲實并齊爲法可令矢互乘一人爲齊矢相乘爲同今先令同於五十矢矢同則徒齊其歸一也以此術爲鳧雁者當雁飛九日而一至鳧飛九日而一至七分至之二并之得二至七分至之二以爲法以九日爲實實如法而一得一人日成矢之數也今有假田初假之歲三畝一錢明年四畝一錢後年五畝一錢凡三歲得一百問田幾何荅曰一頃二十七畝四十七分畝之三十一術曰置畝數及錢數令畝數互乘錢數并以爲法畝數相乘又以百錢乘之爲實實如法得一畝按此術令畝互乘錢者齊其錢畝數相乘者同其畝同於六十則初假之歲得錢二十明年得錢十五後年得錢十二也凡三歲得錢一百爲所有數同畝爲所求率四十七錢爲所有率今有之即得也齊其錢同其母亦如鳧雁術也於今有術百錢爲所有數同畝爲所求率并齊爲所有率臣淳風等按假田六十畝初歲得錢二十明年得錢十五後年得錢十二并之得錢四十七是爲得田六十畝三歲所假於今有術百錢爲所有數六十畝爲所求率四十七爲所有率而今有之即合問也今有程耕一人一日發七畝一人一日耕三畝一人一日耰種五畝今令一人一日自發耕耰種之問治田幾何荅曰一畝一百一十四步七十一分步之六十六術曰置發耕耰畝數令互乘人數并以爲法畝數相乘爲實實如法得一畝此猶鳧雁術也臣淳風等謹按此術亦發耕耰種畝數互乘人者齊其人畝數相乘者同其畝故并齊爲法以同爲實計田一百五畝發用十五人耕用三十五人種用二十一人并之得七十一工治得一百五畝故以爲實而一人一日所治故以人數爲法除之即得也今有池五渠注之其一渠開之少半日一滿次一日一滿次二日半一滿次三日一滿次五日一滿今皆决之問幾何日滿池荅曰七十四分日之十五術曰各置渠一日滿池之數并以爲法按此術其一渠少半日滿者是一日三滿也次一日一滿次二日半滿者是一日五分滿之二也次三日滿者是一日三分滿之一也次五日滿者是一日五分滿之一也并之得四滿十五分滿之十四也以一日爲實實如法得一日此猶矯矢之術也先令同於一日日同則滿齊自鳧雁至此其爲同齊有二術焉可隨率宜也其一術各置日數及滿數令日互相乘滿并以爲法日數相乘爲實實如法得一日亦如鳧雁術也按此其一渠少半日滿池者是一日三滿池也次一日一滿次二日半滿者是五日再滿次三日一滿次五日一滿此謂列置日數於右行及滿數於左行以日互乘滿者齊其滿日數相乘者同其日滿齊而日同故并齊以除同即得也今有人持米出三關外關三而取一中關五而取一内關七而取一餘米五斗問本持米幾何荅曰十斗九升八分升之三術曰置米五斗以所税者三之五之七之爲實以餘不税者二四六相互乘爲法實如法得一斗此亦重今有也所税者謂今所當税之定三五七皆爲所求率二四六皆爲所有率置今有餘米五斗以七乘之六而一即内關未税之本米也又以五乘之四而一即中關未税之本米也又以三乘之二而一即外關未税之本米也今從末求本不問中間故令中率轉相乘而同之亦如絡絲術又一術外關三而取一則其餘本米三分之二也求外關所税之餘則當置一二分乘之三而一欲知中關以四乘之五而一欲知内關以六乘之七而一凡餘分者乘其母子以三五七相乘得一百五爲分母二四六相乘得四十八爲分子約而言之則是餘米於本所持三十五分之十六也於今有術餘米五斗爲所有數分母三十五爲所求率分子十六爲所有率也今有人持金出五關前關二而税一次關三而税一次關四而税一次關五而税一次關六而税一并五關所税適重一斤問本持金幾何荅曰一斤三兩四銖五分銖之四術曰置一斤通所税者以乘之爲實亦通其不税者以減所通餘爲法實如法得一斤此意猶上術也置一斤通所税者謂令二三四五六相乘爲分母七百二十也通其所不税者謂令所税之餘一二三四五相乘爲分子一百二十也約而言之是爲餘金於本所持六分之一也以子減母凡五關所税六分之五也於今有術所税一斤爲所有數分母六爲所求率分子五爲所有率此亦重今有之義又雖各有率不問中間故令中率轉相乘而連除之即得也置一以爲持金之本率以税率乘之除之則其率亦成積分也九章算術卷第七魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋盈不足以御隠雜互見今有共買物人出八盈三人出七不足四問人數物價各幾何荅曰七人物價五十三今有共買雞人出九盈一十一人出六不足十六問人數雞價各幾何荅曰九人雞價七十今有共買璡人出半盈四人出少半不足三問人數璡價各幾何荅曰四十二人璡價十七注云若兩設有分者齊其子同其母此問兩設俱見零分故齊其子同其母又云令下維乘上訖以同約之不可約故以乘同之今有共買牛七家共出一百九十不足三百三十九家共出二百七十盈三十問家數牛價各幾何荅曰一百二十六家牛價三千七百五十按此術并盈不足者爲衆家之差故以爲實置所出率各以家數除之各得一家所出率以少減多者得一家之差以除即家數以出率乘之減盈增不足故得牛價也盈不足按盈者謂之朓不足者謂之朒所出率謂之假令術曰置所出率盈不足各居其下令維乘所出率并以爲實并盈不足爲法實如法而一盈朒維乘兩設者欲爲同齊之意據共買物人出八盈三人出七不足四齊其假令同其盈朒盈朒俱十二通計齊則不盈不朒之正數故可并之爲實并盈不足爲法齊之三十二者是四假令有盈十二齊之二十一者是三假令亦朒十二并七假令合爲一實故并三四爲法有分者通之若兩設有分者齊其子同其母令下維乘上訖以同約之不可約故以乘同之盈不足相與同其買物者置所出率以少減多餘以約法實實爲物價法爲人數所出率以少減多者餘謂之設差以爲少設則并盈朒是爲定實故以少設約定實則法爲人數適足之實故爲物價盈朒當與少設相通不可徧約亦當分母乘設差爲約法實其一術曰并盈不足爲實以所出率以少減多餘爲法實如法得一人以所出率乘之減盈增不足即物價此術意謂盈不足爲衆人之差以所出率以少減多餘爲一人之差以一人之差約衆人之差故得人數也今有共買金人出四百盈三千四百人出三百盈一百問人數金價各幾何荅曰三十三人金價九千八百今有共買羊人出五不足四十五人出七不足三問人數羊價各幾何荅曰二十一人羊價一百五十兩盈兩不足術曰置所出率盈不足各居其下令維乘所出率以少減多餘爲實兩盈兩不足以少減多餘爲法實如法而一有分者通之兩盈兩不足相與同其買物者置所出率以少減多餘以約法實實爲物價法爲人數按此術兩不足者兩設皆不足於正數其所以變化猶兩盈而或有勢同而情違者當其爲實俱令不足維乘相減則遺其所不足焉故其餘所以爲實者無朒數以損焉蓋出而有餘兩盈兩設皆逾於正數假令與共買物人出八盈三人出九盈十齊其假令同其兩盈兩盈俱三十舉齊則兼去其餘所以爲實者無盈數兩盈以少減多餘爲法齊之八十者是十假令而凡盈三十者是十以三之齊之二十七者是三假令而凡盈三十者是三以十之今假令兩盈共十三以三減十餘七爲一實故令以三減十餘七爲法所出率以少減多餘謂之設差因設差爲少設則兩盈之差是爲定實故以少設約法得人數約實即得金數其一術曰置所出率以少減多餘爲法兩盈兩不足以少減多餘爲實實如法而一得人數以所出率乘之減盈增不足即物價置所出率以少減多得一人之差兩盈兩不足相減爲衆人之差故以一人之差除之得人數以所出率乘之減盈增不足即物價今有共買犬人出五不足九十人出五十適足問人數犬價各幾何荅曰二人犬價一百今有共買豕人出一百盈一百人出九十適足問人數豕價各幾何荅曰一十人豕價九百盈適足不足適足術曰以盈及不足之數爲實置所出率以少減多餘爲法實如法得一人其求物價者以適足乘人數得物價此術意謂以所出率以少減多者餘是一人不足之差不足數爲衆人之差以一人差約之故得人之數也以盈及不足數爲實者數單見即衆人差故以爲實所出率以少減多即一人差故以爲法以除衆人差得人數以適足乘人數即得物價也今有米在十斗桶中不知其數滿中添粟而舂之得米七斗問故米幾何荅曰二斗五升術曰以盈不足術求之假令故米二斗不足二升令之三斗有餘二升按桶受一斛若使故米二斗須添粟八斗以滿之八斗得糲米四斗八升課於七斗是爲不足二升若使故米三斗須添粟七斗以滿之七斗得糲米四斗二升課於七斗是爲有餘二升以盈不足維乘假令之數者欲爲齊同之意爲齊同者齊其假令同其盈朒通計齊即不盈不朒之正數故可以并之爲實并盈不足爲法實如法即得故米斗數乃不盈不朒之正數也今有垣高九尺瓜生其上蔓日長七寸瓠生其下蔓日長一尺問幾何日相逢瓜瓠各長幾何荅曰五日十七分日之五瓜長三尺七寸一十七分寸之一瓠長五尺二寸一十七分寸之一十六術曰假令五日不足五寸令之六日有餘一尺二寸按假令五日不足五寸者瓜生五日下垂蔓三尺五寸瓠生五日上延蔓五尺課於九尺之垣是爲不足五寸令之六日有餘一尺二寸者若使瓜生六日下垂蔓四尺二寸瓠生六日上延蔓六尺课於九尺之垣是爲有餘一尺二寸以盈不足維乘假令之數者欲爲齊同之意齊其假令同其盈朒通計齊即不盈不朒之正數故可以并以爲實并盈不足爲法實如法而一即設差不盈不朒之正數即得日數以瓜瓠一日之長乘之故各得其長之數也今有蒲生一日長三尺莞生一日長一尺蒲生日自半莞生日自倍問幾何日而長等荅曰二日十三分日之六各長四尺八寸一十三分寸之六術曰假令二日不足一尺五寸令之三日有餘一尺七寸半按假令二日不足一尺五寸者蒲生二日長四尺五寸莞生二日長三尺是爲未相及一尺五寸故曰不足令之三日有餘一尺七寸半者蒲增前七寸半莞增前四尺是爲過一尺七寸半故曰有餘以盈不足乘除之又以後一日所長各乘日分子如日分母而一者各得日分子之長也故各增二日定長即得其數今有醇酒一斗直钱五十行酒一斗直錢一十今將錢三十得酒二斗問醇行酒各得幾何荅曰醇酒二升半行酒一斗七升半術曰假令醇酒五升行酒一斗五升有餘一十令之醇酒二升行酒一斗八升不足二據醇酒五升直錢二十五行酒一斗五升直錢一十五課於三十是爲有餘十據醇酒二升直錢一十行酒一斗八升直錢一十八課於三十是爲不足二以盈不足術求之此問已有重設及其齊同之意也今有大器五小器一容三斛大器一小器五容二斛問大小器各容幾何荅曰大器容二十四分斛之十三小器容二十四分斛之七術曰假令大器五斗小器亦五斗盈一十斗令之大器五斗五升小器二斗五升不足二斗按大器容五斗大器五容二斛五斗以減三斛餘五斗即小器一所容故曰小器亦五斗小器五容二斛五斗大器一合爲三斛課於兩斛乃多十斗令之大器五斗五升大器五合容二斛七斗五升以減三斛餘二斗五升即小器一所容故曰小器二斗五升大器一容五斗五升小器五合容一斛二斗五升合爲一斛八斗課於二斛少二斗故曰不足二斗以盈不足維乘除之今有漆三得油四油四和漆五今有漆三斗欲令分以易油還自和餘漆問出漆得油和漆各幾何荅曰出漆一斗一升四分升之一得油一斗五升和漆一斗八升四分升之三術曰假令出漆九升不足六升令之出漆一斗二升有餘二升按此術三斗之漆出九升得油一斗二升可和漆一斗五升餘有二斗一升則六升無油可和故曰不足六升令之出漆一斗二升則易得油一斗六升可和漆二斗於三斗之中已出一斗二升餘有一斗八升見在油合和得漆二斗則是有餘二升以盈不足維乘之爲實并盈不足爲法實如法而一得出漆升數求油及和漆者四五各爲所求率三四各爲所有率而今有之即得也今有玉方一寸重七兩石方一寸重六兩今有石立方三寸中有玉并重十一斤問玉石重各幾何荅曰玉一十四寸重六斤二兩石一十三寸重四斤一十四兩術曰假令皆玉多十三兩令之皆石不足一十四兩不足爲玉多爲石各以一寸之重乘之得玉石之積重立方三寸是一面之方計積二十七寸玉方一寸重七兩石方一寸重六兩是爲玉石重差一兩假令皆玉合有一百八十九兩課於一十一斤有餘一十三兩玉重而石輕故有此多即二十七寸之中有十三寸寸損一兩則以爲石重故言多爲石言多之數出於石以爲玉假令皆石合有一百六十二兩課於十一斤少十四兩故曰不足此不足即以重爲輕故令減少數於并重即二十七寸之中有十四寸寸增一兩也今有善田一畝價三百惡田七畝價五百今并買一頃價錢一萬問善惡田各幾何荅曰善田一十二畝半惡田八十七畝半術曰假令善田二十畝惡田八十畝多一千七百一十四錢七分錢之二令之善田一十畝惡田九十畝不足五百七十一錢七分錢之三按善田二十畝直錢六千惡田八十畝直錢五千七百一十四七分錢之二課於一萬是多一千七百一十四七分錢之二令之善田十畝直錢三千惡田九十畝直錢六千四百二十八七分錢之四课於一萬是爲不足五百七十一七分錢之三以盈不足術求之也今有黄金九枚白銀一十一枚稱之重適等交易其一金輕十三兩問金銀一枚各重幾何荅曰金重二斤三兩一十八銖銀重一斤一十三兩六銖術曰假令黄金三斤白銀二斤一十一分斤之五不足四十九於右行令之黄金二斤白銀一斤一十一分斤之七多一十五於左行以分母各乘其行内之數以盈不足維乘所出率并以爲實并盈不足爲法實如法得黄金重分母乘法以除得銀重約之得分也按此術假令黄金九白銀一十一俱重二十七斤金九約之得三斤銀一十一約之得二斤一十一分斤之五各爲金銀一枚重數就金重二十七斤之中減一金之重以益銀銀重二十七斤之中減一銀之重以益金則金重二十六斤一十一分斤之五銀重二十七斤一十一分斤之六以少減多則金輕一十七兩一十一分兩之五課於一十三兩多四兩一十一分兩之五通分内子言之是爲不足四十九又令之黄金九一枚重二斤九枚重一十八斤白銀一十一亦合重一十八斤也乃以一十一除之得一斤一十一分斤之七爲銀一枚之重數今就金重一十八斤之中減一枚金以益銀復減一枚銀以益金則金重一十七斤一十一分斤之七銀重一十八斤一十一分斤之四以少減多即金輕一十一分斤之八課於一十三兩少一兩一十一分兩之四通分内子言之是爲多一十五以盈不足爲之如法得金重分母乘法以除者爲銀兩分母故同之須通法而後乃除得銀重餘皆約之者術省故也今有良馬與駑馬發長安至齊齊去長安三千里良馬初日行一百九十三里日增一十三里駑馬初日行九十七里日減半里良馬先至齊復還迎駑馬問幾何日相逢及各行幾何荅曰一十五日一百九十一分日之一百三十五而相逢良馬行四千五百三十四里一百九十一分里之四十六駑馬行一千四百六十五里一百九十一分里之一百四十五術曰假令十五日不足三百三十七里半令之十六日多一百四十里以盈不足維乘假令之數并而爲實并盈不足爲法實如法而一得日數不盡者以等數除之而命分求良馬行者十四乘益疾里數而半之加良馬初日之行里數以乘十五日得良馬十五日之凡行又以十五日乘益疾里數加良馬初日之行以乘日分子如日分母而一所得加前良馬凡行里數即得其不盡而命分求駑馬行者以十四乘半里又半之以減駑馬初日之行里數以乘十五日得駑馬十五日之凡行又以十五日乘半里以減駑馬初日之行餘以乘日分子如日分母而一所得加前里即駑馬定行里數其奇半里者爲半法以半法增殘分即得其不盡者而命分按令十五日不足三百三十七里半者據良馬十五日凡行四千二百六十里除先去齊三千里定還迎駑馬一千二百六十里駑馬十五日凡行一千四百二里半并良駑二馬所行得二千六百六十二里半課於三千里少三百三十七里半故曰不足令之十六日多一百四十里者據良馬十六日凡行四千六百四十八里除先去齊三千里定還迎駑馬一千六百四十八里駑馬十六日凡行一千四百九十二里并良駑二馬所行得三千一百四十里課於三千里餘有一百四十里故謂之多也以盈不足之實如法而一得日數者即設差不盈不朒之正數以二馬初日所行里乘十五日爲一十五日平行數求初末益疾減遲之數者并一與十四以十四乘而半之爲中平之積又令益疾減遲里數乘之各爲減益之中平里故各減益平行數得一十五日定行里若求後一日以十六日之定行里數乘日分子如日分母而一各得日分子之定行里數故各并十五日定行里即得其駑馬奇半里者法爲全里之分故破半里爲半法以增殘分即合所問也今有人持錢之蜀賈利十三初返歸一萬四千次返歸一萬三千次返歸一萬二千次返歸一萬一千後返歸一萬凡五返歸錢本利俱盡問本持錢及利各幾何荅曰本三萬四百六十八錢三十七萬一千二百九十三分錢之八萬四千八百七十六利二萬九千五百三十一錢三十七萬一千二百九十三分錢之二十八萬六千四百一十七術曰假令本錢三萬不足一千七百三十八錢半令之四萬多三萬五千三百九十錢八分按假令本錢三萬并利爲三萬九千除初返歸留餘加利爲三萬二千五百除二返歸留餘又加利爲二萬五千三百五十除第三返歸留餘又加利爲一萬七千三百五十五除第四返歸留餘又加利爲八千二百六十一錢半除第五返歸留合一萬錢不足一千七百三十八錢半若使本錢四萬并利爲五萬二千除初返歸留餘加利爲四萬九千四百除第二返歸留餘又加利爲四萬七千三百二十除第三返歸留餘又加利爲四萬五千九百一十六除第四返歸留餘又加利爲四萬五千三百九十錢八分除第五返歸留合一萬餘三萬五千三百九十錢八分故曰多又術置後返歸一萬以十乘之十三而一即後所持之本加一萬一千又以十乘之十三而一即第四返之本加一萬二千又以十乘之十三而一即第三返之本加一萬三千又以十乘之十三而一即第二返之本加一萬四千又以十乘之十三而一即初持之本并五返之錢以減之即利也今有垣厚五尺兩鼠對穿大鼠日一尺小鼠亦日一尺大鼠日自倍小鼠日自半問幾何日相逢各穿幾何荅曰二日一十七分日之二大鼠穿三尺四寸十七分寸之一十二小鼠穿一尺五寸十七分寸之五術曰假令二日不足五寸令之三日有餘三尺七寸半大鼠日自倍二日合穿三尺小鼠日自半合穿一尺五寸并大鼠所穿合四尺五寸課於垣厚五尺是爲不足五寸令之三日大鼠穿得七尺小鼠穿得一尺七寸半并之以減垣厚五尺有餘三尺七寸半以盈不足術求之即得以後一日所穿乘日分子如日分母而一即各得日分子之中所穿故各增二日定穿即合所問也九章算術卷第八魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋方程以御錯糅正負今有上禾三秉中禾二秉下禾一秉實三十九斗上禾二秉中禾三秉下禾一秉實三十四斗上禾一秉中禾二秉下禾三秉實二十六斗問上中下禾實一秉各幾何荅曰上禾一秉九斗四分斗之一中禾一秉四斗四分斗之一下禾一秉二斗四分斗之三方程程課程也羣物總雜各列有數總言其實令每行爲率二物者再程三物者三程皆如物數程之竝列爲行故謂之方程行之左右無所同存且爲有所據而言耳此都術也以空言難曉故特繫之禾以决之又列中左行如右行也術曰置上禾三秉中禾二秉下禾一秉實三十九斗於右方中左禾列如右方以右行上禾徧乘中行而以直除爲術之意令少行減多行反覆相減則頭位必先盡上無一位則此行亦闕一物矣然而舉率以相減不害餘數之課也若消去頭位則下去一物之實如是叠令左右行相減審其正負則可得而知先令右行上禾乘中行爲齊同之意爲齊同者謂中行直減右行也從簡易雖不言齊同以齊同之意觀之其義然矣又乘其次亦以直除復去左行首然以中行中禾不盡者徧乘左行而以直除亦令兩行相去行之中禾也左方下禾不盡者上爲法下爲實實即下禾之實上中禾皆去故餘數是下禾實非但一秉欲約衆秉之實當以禾秉數爲法列此以下禾之秉數乘兩行以直除則下禾之位皆决矣各以其餘一位之秉除其下實即計數矣用算繁而不省所以别爲法約也然猶不如自用其舊廣異法也求中禾以法乘中行下實而除下禾之實此謂中兩禾實下禾一秉實數先見將中秉求中禾其列實以減下實而左方下禾雖去一秉以法爲母於率不通故先以法乘其通而同之俱令法爲母而除下禾實以下禾先見之實令乘下禾秉數即得下禾一位之列實減於下實則其數是中禾之實也餘如中禾秉數而一即中禾之實餘中禾一位之實也故以一位秉數約之乃得一秉之實也求上禾亦以法乘右行下實而除下禾中禾之實此右行三禾共實合三位之實故以二位秉數約之乃得一秉之實今中下禾之實其數竝見令乘右行之禾秉以減之故亦如前各求列實以減下實也餘如上禾秉數而一即上禾之實實皆如法各得一斗三實同用不滿法者以法命之母實皆當約之今有上禾七秉損實一斗益之下禾二秉而實一十斗下禾八秉益實一斗與上禾二秉而實一十斗問上下禾實一秉各幾何荅曰上禾一秉實一斗五十二分斗之一十八下禾一秉實五十二分斗之四十一術曰如方程損之曰益益之曰損問者之辭雖今按實云上禾七秉下禾二秉實一十一斗上禾二秉下禾八秉實九斗也損之曰益言損一斗餘當一十斗今欲全其實當加所損也益之曰損言益實以一斗乃滿一十斗今欲知本實當減所加即得也損實一斗者其實過一十斗也益實一斗者其實不满一十斗也重諭損益數者各以損益之數損益之也今有上禾二秉中禾三秉下禾四秉實皆不滿斗上取中中取下下取上各一秉而實滿斗問上中下禾實一秉各幾何荅曰上禾一秉實二十五分斗之九中禾一秉實二十五分斗之七下禾一秉實二十五分斗之四術曰如方程各置所取置上禾二秉爲右行之上中禾三秉爲中行之中下禾四秉爲左行之下所取一秉及實一斗各從其位諸行相借取之物皆依此例以正負術入之正負術曰今兩算得失相反要令正負以名之正算赤負算黑否則以邪正爲異方程自有赤黑相取法實數相推求之術而其并減之勢不得廣通故使赤黑相消奪之於算或減或益同行異位殊爲二品各有并減之差見於下焉著此二條特繫之禾以成此二條之意故赤黑相雜足以定上下之程減益雖殊足以通左右之數差實雖分足以應同異之率然則其正無入以負之負無入以正之其率不妄也同名相除此謂以赤除赤以黑除黑行求相減者爲去頭位也然則頭位同名者當用此條頭位異名者當用下條異名相益益行減行當各以其類矣其異名者非其類也非其類者猶無對也非所得減也故赤用黑對則除黑無對則除黑黑用赤對則除赤無對則除赤赤黑并於本數此爲相益之皆所以爲消奪消奪之與減益成一實也術本取要必除行首至於他位不嫌多少故或令相減或令相并理無同異而一也正無入負之負無入正之無入爲無對也無所得減則使消奪者居位也其當以列實或減下實而行中正負雜者亦用此條此條者同名減實異名益實正無入負之負無入正之也其異名相除同名相益正無入正之負無入負之此條異名相除爲例故亦與上條互取凡正負所以記其同異使二品互相取而已矣言負者未必負於少言正者未必正於多故每一行之中雖復赤黑異算無傷然則可得使頭位常相與異名此條之實兼通矣遂以二條反覆一率觀其每與上下互相取位則隨算而言耳猶一術也又本設諸行欲因成數以相去耳故其多少無限令上下相命而已若以正負相減如數有舊增法者每行可均之不但數物左右之也今有上禾五秉損實一斗一升當下禾七秉上禾七秉損實二斗五升當下禾五秉問上下禾實一秉各幾何荅曰上禾一秉五升下禾一秉二升術曰如方程置上禾五秉正下禾七秉負損實一斗一升正言上禾五秉之實多減其一斗一升餘是與下禾七秉相當數也故互其算令相折除以一斗一升爲差爲差者上禾之餘實也次置上禾七秉正下禾五秉負損實二斗五升正以正負術入之按正負之術本設列行物程之數不限多少必令與實上下相次而以每行各自爲率然而或減或益同行異位殊爲二品各自并減之差見於下也今有上禾六秉損實一斗八升當下禾一十秉下禾一十五秉損實五升當上禾五秉問上下禾實一秉各幾何荅曰上禾一秉實八升下禾一秉實三升術曰如方程置上禾六秉正下禾一十秉負損實一斗八升正次上禾五秉負下禾一十五秉正損實五升正以正負術入之言上禾六秉之實多減損其一斗八升餘是與下禾十秉相當之數故亦互其算而以一斗八升爲差實差實者上禾之餘實今有上禾三秉益實六斗當下禾一十秉下禾五秉益實一斗當上禾二秉問上下禾實一秉各幾何荅曰上禾一秉實八斗下禾一秉實三斗術曰如方程置上禾三秉正下禾一十秉負益實六斗負次置上禾二秉負下禾五秉正益實一斗負以正負術入之言上禾三秉之實少益其六斗然後於下禾十秉相當也故亦互其算而以六斗爲差實差實者下禾之餘實今有牛五羊二直金十兩牛二羊五直金八兩問牛羊各直金幾何荅曰牛一直金一兩二十一分兩之一十三羊一直金二十一分兩之二十術曰如方程假令爲同齊頭位爲牛當相乘右行定更置牛十羊四直金二十兩左行牛十羊二十五直金四十兩牛數等同金多二十兩者羊差二十一使之然也以少行減多行則牛數盡惟羊與直金之數見可得而知也以小推大雖四五行不異也今有賣牛二羊五以買一十三豕有餘錢一千賣牛三豕三以買九羊錢適足賣六羊八豕以買五牛錢不足六百問牛羊豕價各幾何荅曰牛價一千二百羊價五百豕價三百術曰如方程置牛二羊五正豕一十三負餘錢數正次牛三正羊九負豕三正次五牛負六羊正八豕正不足錢負以正負術入之此中行買賣相折錢適足故但互買賣算而已故下無錢直也設欲以此行如方程法先令二牛徧乘中行而以右行直除之是故終於下實虛缺矣故注曰正無實負負無實正方爲類也方將以别實加適足之數與實物作實盈不足章黄金白銀與此相當假令黄金九白銀一十一稱之重適等交易其一金輕十三兩問金銀一枚各重幾何與此同今有五雀六燕集稱之衡雀俱重燕俱輕一雀一燕交而處衡適平并雀燕重一斤問雀燕一枚各重幾何荅曰雀重一兩一十九分兩之一十三燕重一兩一十九分兩之五術曰如方程交易質之各重八兩此四雀一燕與一雀五燕衡適平并重一斤故各八兩列兩行程數左行頭位其數有一者令右行徧除亦可令於左行而取其法實於左左行數多以右行取其數左頭位減盡中下位算當燕與實右行不動左上空中法下實即每枚當重宜可知也按此四雀一燕與一雀五燕其重等是三雀四燕重相當雀率重四燕率重三也諸再程之率皆可異術求也即其數也今有甲乙二人持錢不知其數甲得乙半而錢五十乙得甲太半而亦錢五十問甲乙持錢各幾何荅曰甲持三十七錢半乙持二十五錢術曰如方程損益之此問者言一甲半乙而五十太半甲一乙亦五十也各以分母乘其全内子行定二甲一乙而錢一百二甲三乙而錢一百五十於是乃如方程諸物有分者放此今有二馬一牛價過一萬如半馬之價一馬二牛價不滿一萬如半牛之價問牛馬價各幾何荅曰馬價五千四百五十四錢一十一分錢之六牛價一千八百一十八錢一十一分錢之二術曰如方程損益之此一馬半與一牛價直一萬也二牛半與一馬亦直一萬也一馬半與一牛直錢一萬通分内子右行爲三馬二牛直錢二萬二牛半與一馬直錢一萬通分内子左行爲二馬五牛直錢二萬也今有武馬一匹中馬二匹下馬三匹皆載四十石至阪皆不能上武馬借中馬一匹中馬借下馬一匹下馬借武馬一匹乃皆上問武中下馬一匹各力引幾何荅曰武馬一匹力引二十二石七分石之六中馬一匹力引一十七石七分石之一下馬一匹力引五石七分石之五術曰如方程各置所借以正負術入之今有五家共井甲二綆不足如乙一鯁乙三綆不足以丙一綆丙四綆不足以丁一綆丁五綆不足以戊一綆戊六綆不足以甲一綆如各得所不足一綆皆逮問井深綆長各幾何荅曰井深七丈二尺一寸甲綆長二丈六尺五寸乙綆长一丈九尺一寸丙綆長一丈四尺八寸丁綆長一丈二尺九寸戊綆長七尺六寸術曰如方程以正負術入之此率初如方程爲之名各一逮井其後法得七百二十一實七十六是爲七百二十一綆而七十六逮井并用逮之數以法除實者而戊一綆逮井之數定逮七百二十一分之七十六是故七百二十一爲井深七十六爲戊綆之長舉率以言之今有白禾二步青禾三步黄禾四步黑禾五步實各不滿斗白取青黄青取黄黑黄取黑白黑取白青各一步而實滿斗問白青黄黑禾實一步各幾何荅曰白禾一步實一百一十一分斗之三十三青禾一步實一百一十一分斗之二十八黄禾一步實一百一十一分斗之一十七黑禾一步實一百一十一分斗之一十術曰如方程各置所取以正負術入之今有甲禾二秉乙禾三秉丙禾四秉重皆過於石甲二重如乙一乙三重如丙一丙四重如甲一問甲乙丙禾一秉各重幾何荅曰甲禾一秉重二十三分石之一十七乙禾一秉重二十三分石之一十一丙禾一秉重二十三分石之一十術曰如方程置重過於石之物爲負此問者言甲禾二秉之重過於一石也其過者何云如乙一秉重矣互其算令相折除而一以石爲之差實差實者如甲禾餘實故置算相與同也以正負術入之此入頭位異名相除者正無入正之負無入負之也今有令一人吏五人從者一十人食雞一十令一十人吏一人從者五人食雞八令五人吏一十人從者一人食雞六問令吏從者食雞各幾何荅曰令一人食一百二十二分雞之四十五吏一人食一百二十二分雞之四十一從者一人食一百二十二分雞之九十七術曰如方程以正負術入之今有五羊四犬三雞二兔直錢一千四百九十六四羊二犬六雞三兔直錢一千一百七十五三羊一犬七雞五兔直錢九百五十八二羊三犬五雞一兔直錢八百六十一問羊犬雞兔價各幾何荅曰羊價一百七十七犬價一百二十一雞價二十三兔價二十九術曰如方程以正負術入之今有麻九斗麥七斗菽三斗荅二斗黍五斗直錢一百四十麻七斗麥六斗菽四斗荅五斗黍三斗直錢一百二十八麻三斗麥五斗菽七斗荅六斗黍四斗直錢一百一十六麻二斗麥五斗菽三斗荅九斗黍四斗直錢一百一十二麻一斗麥三斗菽二斗荅八斗黍五斗直錢九十五問一斗直幾何荅曰麻一斗七錢麥一斗四錢菽一斗三錢荅一斗五錢黍一斗六錢術曰如方程以正負術入之此麻麥與均輸少廣之章重衰積分皆爲大事其拙於精理徒按本術者或用算而布氈方好煩而喜誤曾不知其非反欲以多爲貴故其算也莫不闇於設通而專於一端至於此類苟務其成然或失之不可謂要約更有異術者庖丁解牛游刃理間故能歷久其刃如新夫數猶刃也易簡用之則動中庖丁之理故能和神愛刃速而寡尤凡九章爲大事按法皆不盡一百算也雖布算不多然足以算多世人多以方程爲難或盡布算之象在綴正負而已未暇以論其設動無方斯膠柱調瑟之類聊復恢演爲作新術著之於此將亦啟導疑意網羅道精豈傳之空言記其施用之例著策之數每舉一隅焉方程新術曰以正負術入之令左右相減先去下實又轉去物位則其求一行二物正負相借者是其相當之率又令二物與他行互相去取轉其二物相借之數即皆相當之率也各據二物相當之率對易其數即各當之率也更置成行及其下實各以其物本率今有之求其所同并以爲法其當相并而行中正負雜者同名相從異名相消餘以爲法以下置爲實實如法即合所問也一物各以本率今有之即皆合所問也率不通者齊之其一術曰置羣物通率爲列衰更置成行羣物之數各以其率乘之并以爲法其當相并而行中正負雜者同名相從異名相消餘爲法以成行下實乘列衰各自爲實實如法而一即得以舊術爲之凡應置五行今欲要約先置第三行減以第四行又減第五行次置第二行以第二行減第一行又減第四行去其頭位餘可半次置右行及第二行去其頭位次以右行去第四行頭位次以左行去第二行頭位次以第五行去第一行頭位次以第二行去第四行頭位餘可半以右行去第二行頭位以第二行去第四行頭位餘約之爲法實實如法而一得六即有黍價以法治第二行得荅價右行得菽價左行得麥價第三行麻價如此凡用七十七算以新術爲此先以第四行減第三行次以第三行去右行及第二行第四行下位又以減左行下位不足減乃止次以左行減第三行下位次以第三行去左行下位訖廢去第三行次以第四行去左行下位又以減右行下位次以右行去第二行及第四行下位次以第二行減第四行及左行頭位次以第四行減左行菽位不足減乃止次以左行減第二行頭位餘可再半次以第四行去左行及第二行頭位次以第二行去左行頭位餘約之上得五下得三是菽五當荅三次以左行去第二行菽位又以減第四行及右行菽位不足減乃止次以右行減第二行頭位不足減乃止次以第二行去右行頭位次以左行去右行頭位餘上得六下得五是爲荅六當黍五次以左行去右行荅位餘約之上爲二下爲一次以右行去第二行下位以第二行去第四行下位又以減左行下位次左行去第二行下位餘上得三下得四是爲麥三當菽四次以第二行減第四下位次以第四行去第二行下位餘上得四下得七是爲麻四當麥七是爲相當之率舉矣據麻四當麥七即麻價率七而麥價率四又麥三當菽四即爲麥價率四而菽價率三又菽五當荅三即爲菽價率三而荅價率五又荅六當黍五即爲荅價率五而黍價率六而率通矣更置第三行以第四行減之餘有麻一斗菽四斗正荅三斗負下實四正求其同爲麻之數以菽率三荅率五各乘其斗數如麻率七而一菽得一斗七分斗之五正荅得二斗七分斗之一負則菽荅化爲麻以并之令同名相從異名相消餘得定麻七分斗之四以爲法置四爲實而分母乘之實得二十八而分子化爲法矣以法除得七即麻一斗之價置麥率四菽率三荅率五黍率六皆以麻乘之各自爲實以麻率七爲法所得即各爲價亦可使置本行實與物同通之各以本率今有之求其本率所得并以爲法如此即無正負之異矣擇異同而已又可以一術爲之置五行通率爲麻七麥四菽三荅五黍六以爲列衰成行麻一斗菽四斗正荅三斗負各以其率乘之訖令同名相從異名相消餘爲法又置下實乘列衰所得各爲實此可以置約法則不復乘列衰各以列衰爲價如此則凡用一百二十四算也九章算術卷第九魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋句股以御高深廣遠今有句三尺股四尺問爲弦幾何荅曰五尺今有弦五尺句三尺問爲股幾何荅曰四尺今有股四尺弦五尺問爲句幾何荅曰三尺句股短面曰句長面曰股相與結角曰弦句短其股股短其弦將以施於諸率故先具此術以見其原也術曰句股各自乘并而開方除之即弦句自乘爲朱方股自乘爲青方令出入相補各從其類因就其餘不移動也合成弦方之冪開方除之即弦也又股自乘以減弦自乘其餘開方除之即句臣淳風等謹按此術以句股冪合成弦冪句方於内則句短於股令股自乘以減弦自乘餘者即句冪也故開方除之即句也又句自乘以減弦自乘其餘開方除之即股句股冪合以成弦冪令去其一則餘在者皆可得而知之今有圓材徑二尺五寸欲爲方版令厚七寸問廣幾何荅曰二尺四寸術曰令徑二尺五寸自乘以七寸自乘減之其餘開方除之即廣此以圓徑二尺五寸爲弦版厚七寸爲句所求廣爲股也今有木長二丈圍之三尺葛生其下纏木七周上與木齊問葛長幾何荅曰二丈九尺術曰以七周乘圍爲股木長爲句爲之求弦弦者葛之長據圍廣求從爲木長者其形葛卷裹袤以筆管青線宛轉有似葛之纏木解而觀之則每周之間自有相間成句股弦則其間葛長弦七周乘圍并合衆句以爲一句木長而股短術云木長謂之股言之倒句與股求弦亦無圍弦之自乘冪出上第一圖句股冪合爲弦冪明矣然二冪之數謂倒在於弦冪之中而已可更相表裏居裏者則成方冪其居表者則成矩冪二表裏形訛而數均又按此圖句冪之矩青卷白表是其冪以股弦差爲廣股弦并爲袤而股冪方其裏股冪之矩青卷白表是其冪以句弦差爲廣句弦并爲袤而句冪方其裏是故差之與并用除之短長互相乘也今有池方一丈葭生其中央出水一尺引葭赴岸適與岸齊問水深葭長各幾何荅曰水深一丈二尺葭長一丈三尺術曰半池方自乘此以池方半之得五尺爲句水深爲股葭長爲弦以句弦見股故令句自乘先見矩冪也以出水一尺自乘減之出水者股弦差減此差冪於矩冪則除之餘倍出水除之即得水深差爲矩冪之廣水深是股令此冪得出水一尺爲長故爲矩而得葭長也加出水數得葭長臣淳風等謹按此葭本出水一尺既見水深故加出水尺數而得葭長也今有立木繫索其末委地三尺引索卻行去本八尺而索盡問索長幾何荅曰一丈二尺六分尺之一術曰以去本自乘此以去本八尺爲句所求索者弦也引而索盡開門去閫者句及股弦差同一術去本自乘者先張矩冪令如委數而一委地者股弦差也以除矩冪即是股弦并也所得加委地數而半之即索長子不可半者倍其母加差者并則成兩長故又半之其減差者并而半之得木長也今有垣高一丈倚木於垣上與垣齊引木卻行一尺其木至地問木長幾何荅曰五丈五寸術曰以垣高一十尺自乘如卻行尺數而一所得以加卻行尺數而半之即木長數此以垣高一丈爲句所求倚木者爲弦引卻行一尺爲股弦差爲術之意與繫索問同也今有圓材埋在壁中不知大小以鐻鐻之深一寸鐻道長一尺問徑幾何荅曰材徑二尺六寸術曰半鐻道自乘此術以鐻道一尺爲句材徑爲弦鐻深一寸爲股弦差之一半鐻道長是半也臣淳風等謹按下鐻深得一寸爲半股弦差注云爲股弦差者鐻道也如深寸而一以深寸增之即材徑亦以半增之如上術本當半之今此皆同半故不復半也今有開門去閫一尺不合二寸問門廣幾何荅曰一丈一寸術曰以去閫一尺自乘所得以不合二寸半之而一所得增不合之半即得門廣此去閫一尺爲句半門廣爲弦不合二寸以半之得一寸爲股弦差求弦故當半之今次以兩弦爲廣數故不復半之也今有户高多於廣六尺八寸兩隅相去適一丈問户高廣各幾何荅曰廣二尺八寸高九尺六寸術曰令一丈自乘爲實半相多令自乘倍之減實半其餘以開方除之所得減相多之半即户廣加相多之半即户高令户廣爲句高爲股兩隅相去一丈爲弦高多於廣六尺八寸爲句股差按圖爲位弦冪適滿萬寸倍之減句股差冪開方除之其所得即高廣并數以差減并而半之即户廣加相多之數即户高也今此術先求其半一丈自乘爲朱冪四黄冪一半差自乘又倍之爲黄冪四分之二減實半其餘有朱冪二黄冪四分之一其於大方者四分之一故開方除之得高廣并數半半并數減差半得廣加得户高又按此圖冪句股相并冪而加其差冪亦減弦冪爲積蓋先見其弦然後知其句與股今適等自乘亦各爲方合爲弦冪令半相多而自乘倍之又半并自乘倍之亦合爲弦冪而差數無者此各自乘之而與相乘數各爲門實及股長句短同原而分流焉假令句股各五弦冪五十開方除之得七尺有餘一不盡假令弦十其冪有百半之爲句股二冪各得五十當亦不可開故曰圓三徑一方五斜七雖不正得盡理亦可言相近耳其句股合而自相乘之冪者令弦自乘倍之爲兩弦冪以減之其餘開方除之爲句股差加於合而半爲股減差於合而半之爲句句股弦即高廣衺其出此圖也其倍弦爲袤令矩句即爲冪得廣即句股差其矩句之冪倍句爲從法開之亦句股差以句股差冪減弦冪半其餘差爲從法開方除之即句也今有竹高一丈末折抵地去本三尺問折者高幾何荅曰四尺二十分尺之一十一術曰以去本自乘此去本三尺爲句折之餘高爲股以先令句自乘之冪令如高而一凡爲高一丈爲股弦并之以除此冪得差所得以減竹高而半餘即折者之高也此術與繫索之類更相反覆也亦可如上術令高自乘爲股弦并冪去本自乘爲矩冪減之餘爲實倍高爲法則得折之高數也今有二人同所立甲行率七乙行率三乙東行甲南行十步而邪東北與乙會問甲乙行各幾何荅曰乙東行一十步半甲邪行一十四步半及之術曰令七自乘三亦自乘并而半之以爲甲邪行率邪行率減於七自乘餘爲南行率以三乘七爲乙東行率此以南行爲句東行爲股邪行爲弦并句弦率七欲引者當以股率自乘爲冪如并而一所得爲句弦差率加并之半爲弦率以差率減餘爲句率如是或有分當通而約之乃定術以同使無分母故令句弦并自乘爲朱黄相連之方股自乘爲青幂之矩以句弦并爲袤差爲廣今有相引之直加損同上其圖大體以兩弦爲袤句弦并爲廣引横斷其半爲弦率列用率七自乘者句弦并之率故弦減之餘爲句率同立處是中停也皆句弦并爲率故亦以股率同其袤也置南行十步以甲邪行率乘之副置十步以乙東行率乘之各自爲實實如南行率而一各得行數南行十步者所有見句求見弦股故以弦股率乘如句率而一今有句五步股十二步問句中容方幾何荅曰方三步一十七分步之九術曰并句股爲法句股相乘爲實實如法而一得方一步句股相乘爲朱青黄冪各二令黄冪袤於隅中朱青各以其類令從其兩徑共成脩之冪中方黄爲廣并句股爲袤故并句股爲法冪圖方在句中則方之兩廉各自成小句股而其相與之勢不失本率也句面之小句股股面之小句股各并爲中方率令股爲中方率并句股爲率據見句五步而今有之得中方也復令句爲中方率以并句股爲率據見股十二步而今有之則中方又可知此則雖不效而法實有法由生矣下容圓率而似今有衰分言之可以見之也今有句八步股一十五步問句中容圓徑幾何荅曰六步術曰八步爲句十五步爲股爲之求弦三位并之爲法以句乘股倍之爲實實如法得徑一步句股相乘爲圖本體朱青黄冪各二倍之則爲各四可用畫於小紙分裁邪正之會令顛倒相補各以類合成脩冪圆徑爲廣并句股弦爲袤故并句股弦以爲法又以圓大體言之股中青必令立規於横廣句股又邪三徑均而復連規從横量度句股必合而成小方矣又畫中弦以觀除會則句股之面中央小句股弦句之小股股之小句皆小方之面皆圓徑之半其數故可衰以句股弦爲列衰副并爲法以句乘未并者各自爲實實如法而一得句面之小股可知也以股乘列衰爲實則得股面之小句可知言雖異矣及其所以成法之實則同歸矣則圓徑又可以表之差并句弦差減股爲圓徑又弦減句股并餘爲圓徑以句弦差乘股弦差而倍之開方除之亦圓徑也今有邑方二百步各中開門出東門一十五步有木問出南門幾何步而見木荅曰六百六十六步太半步術曰出東門步數爲法以句率爲法也半邑方自乘爲實實如法得一步此以出東門十五步爲句率東門南至隅一百步爲股率南門東至隅一百步爲見句步欲以見句求股以爲出南門數正合半邑方自乘者股率當乘見句此二者數同也今有邑東西七里南北九里各中開門出東門一十五里有木問出南門幾何步而見木荅曰三百一十五步術曰東門南至隅步數以乘南門東至隅步數爲實以木去門步數爲法實如法而一此以東門南至隅四里半爲句率出東門一十五里爲股率南門東至隅三里半爲見股所問出南門即見股之句爲術之意與上同也今有邑方不知大小各中開門出北門三十步有木出西門七百五十步見木問邑方幾何荅曰一里術曰令兩出門步數相乘因而四之爲實開方除之即得邑方按半邑方令半方自乘出門除之即步令二出門相乘故爲半方邑自乘居一隅之積分因而四之即得四隅之積分故爲實開方除即邑方也今有邑方不知大小各中開門出北門二十步有木出南門一十四步折而西行一千七百七十五步見木問邑方幾何荅曰二百五十步術曰以出北門步數乘西行步數倍之爲實此以折而西行爲股自木至邑南一十四步爲句以出北門二十步爲句率北門至西隅爲股率半廣數故以出北門乘折西行股以股率乘句之冪然此冪居半以西行故又倍之合東盡之也并出南北門步數爲從法開方除之即邑方此術之冪東西如邑方南北自木盡邑南十四步之冪各南北步爲廣邑方爲袤故連兩廣爲從法并以爲隅外之冪也今有邑方一十里各中開門甲乙俱從邑中央而出乙東出甲南出出門不知步數邪向東北磨邑隅適與乙會率甲行五乙行三問甲乙行各幾何荅曰甲出南門八百步邪東北行四千八百八十七步半及乙乙東行四千三百一十二步半術曰令五自乘三亦自乘并而半之爲邪行率邪行率減於五自乘者餘爲南行率以三乘五爲乙東行率求三率之意與上甲乙同置邑方半之以南行率乘之如東行率而一即得出南門步數今半方南門東至隅五里半邑者謂爲小股也求以爲出南門步數故置邑方半之以南行句率乘之如股率而一以增邑方半即南行半邑者謂從邑心中停也置南行步求弦者以邪行率乘之求東行者以東行率乘之各自爲實實如法南行率得一步此術與上甲乙同今有木去人不知遠近立四表相去各一丈令左兩表與所望參相直從後右表望之入前右表三寸問木去人幾何荅曰三十三丈三尺三寸少半寸術曰令一丈自乘爲實以三寸爲法實如法而一此以入前右表三寸爲句率右兩表相去一丈爲股率左右兩表相去一丈爲見句所問木去人者見句之股股率當乘見句此二率俱一丈故曰自乘之以三寸爲法實如法得一寸今有山居木西不知其高山去木五十三里木高九丈五尺人立木東三里望木末適與山峯斜平人目高七尺問山高幾何荅曰一百六十四丈九尺六寸太半寸術曰置木高減人目高七尺此以木高減人目高七尺餘有八丈八尺爲句率去人目三里爲股率山去木五十三里爲見股以求句加木之高故爲山高也餘以乘五十三里爲實以人去木三里爲法實如法而一所得加木高即山高此術句股之義今有井徑五尺不知其深立五尺木於井上從木末望水岸入徑四寸問井深幾何荅曰五丈七尺五寸術曰置井徑五尺以入徑四寸減之餘以乘立木五尺爲實以入徑四寸爲法實如法得一寸此以入徑四寸爲句率立木五尺爲股率井徑之餘四尺六寸爲見句問井深者見句之股也今有户不知高廣竿不知長短横之不出四尺從之不出二尺邪之適出問户高廣衺各幾何荅曰廣六尺高八尺衺一丈術曰從横不出相乘倍而開方除之所得加從不出即户廣此以户廣爲句户高爲股户衺爲弦凡句之在股或矩於表或方於裏連之者舉表矩而端之又從句方裏令爲青矩之表未滿黄方滿此方則兩端之邪重於隅中各以股弦差爲廣句弦差爲袤故兩端差相乘又倍之則成黄方之冪開方除之得黄方之面其外之青知亦以股弦差爲廣故以股弦差加則爲句也加横不出即户高兩不出加之得户衺

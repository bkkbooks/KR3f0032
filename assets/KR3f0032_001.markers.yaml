  - {type: variant, offset: 8216, length: 264, content: 升之九術曰以粟求御米二十一之五十而一今有粟一斗欲爲小䵂問得幾何荅曰爲小䵂二升一十分升之七術曰以粟求小䵂二十七之百而一臣淳風等謹按小䵂之率十三有半半者二爲母以二通之得二十七爲所求率又以母二通其粟率得一百爲所有率凡本率有分者須即乘除也他皆放此今有粟九斗八升欲爲大䵂問得幾何荅曰爲大䵂一十斗五升二十五分升之二十一術曰以粟求大䵂二十七之二十五而一臣淳風等謹按大䵂之率五十有四其可半故二十七之亦如粟求糳米半其二率今有粟二斗三升欲爲糲飯問得幾何荅曰爲糲飯三斗四升半術曰以粟求糲飯三之二而一臣淳風等謹按糲飯之率七十有五粟求糲飯合以此數乘之今以, SBCK: ''}

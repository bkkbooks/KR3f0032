  - {type: variant, offset: 6, length: 770, content: 注序昔在包犧氏始畫八卦以通神明之德以類萬物之情作九九之術以合六爻之變暨於黄帝神而化之引而伸之於是建曆紀協律吕用稽道原然後兩儀四象精微之氣可得而效焉記稱隸首作數其詳未之聞也按周公制禮而有九數九數之流則九章是矣往者暴秦焚書經術散壞自時厥後漢北平侯張蒼大司農中丞耿壽昌皆以善算命世蒼等因舊文之遺殘各稱删補故校其目則與古或異而所論者多近語也徽幼習九章長再詳覽觀陰陽之割裂總算術之根源探賾之暇遂悟其意是以敢竭頑魯采其所見爲之作注事類相推各有攸歸故枝條雖分而同本幹知發其一端而已又所析理以辭解體用圖庶亦約而能周通而不黷覽之者思過半矣且算在六藝古者以賓興賢能教習國子雖曰九數其能窮纖入微探測無方至於以法相傳亦猶規矩度量可得而共非特難爲也當今好之者寡故世雖多通才逹學而未必能綜於此耳周官大司徒職夏至日中立八尺之表其景尺有五寸謂之地中説云南戴日下萬五千里夫云爾者以術推之按九章立四表望遠及因木望山之術皆端旁互見無有超邈若斯之類然則蒼等爲術猶未足以博盡羣數也徽尋九數有重差之名原其指趣乃所以施於此也凡望極高測絕深而兼知其遠者必用重差句股則必以重差爲率故曰重差也立兩表於洛陽之城令高八尺南北各盡平地同日度其正中之景以景差爲法表高乘表間爲實實如法而一所得加表高即日去地也以南表之景乘表間爲實實如法而一即爲從南表至南戴日下也以南戴日下及日去地爲句股爲之求弦即日去人也以徑寸之筩南望日日滿筩空則定筩之長短以爲股率以筩徑爲句率日去人之數爲大股大股之句即日徑也雖夫圆穹之象猶曰可度又况泰山之高與江海之廣哉徽以爲今之史籍且略舉天地之物考論厥數載之於志以闡世術之美輒造重差并爲注解以究古人之意綴於句股之下度高者重表測深者累矩孤離者三望離而又旁求者四望觸類而長之則雖幽遐詭伏靡所不入博物君子詳而覽焉九章算術九章算術南宋本永樂大典本作九章算經今依東漢光和大司農斛銘文及戴震校本下同, SBCK: ''}
  - {type: variant, offset: 6, length: 229, content: 注序昔在包犧氏始畫八卦以通神明之德以類萬物之情作九九之術以合六爻之變暨於黄帝神而化之引而伸之於是建曆紀協律吕用稽道原然後兩儀四象精微之氣可得而效焉記稱隸首作數其詳未之聞也按周公制禮而有九數九數之流則九章是矣往者暴秦焚書經術散壞自時厥後漢北平侯張蒼大司農中丞耿壽昌皆以善算命世蒼等因舊文之遺殘各稱删補故校其目則與古或異而所論者多近語也徽幼習九章長再詳覽觀陰陽之割裂總算術之根源探賾之暇遂悟其意是以敢竭頑魯采其所見爲之作注事類相推各有攸歸故枝條雖分而同本幹知發其, WYG: 卷}

  - {type: variant, offset: 18686, length: 4301, content: 俱以等數除冪得一周之數十二也其積本周自乘合以一乘之十二而一得積三也術爲一乘不長故以十二而一得此積今還元置此積三以十二乘之者復其本周自乘之數凡物自乘開方除之復其本數故開方除之即周今有積一百八十六萬八百六十七尺此尺謂立方之尺也凡物有高深而言積者曰立方問爲立方幾何荅曰一百二十三尺又有積一千九百五十三尺八分尺之一問爲立方幾何荅曰一十二尺半又有積六萬三千四百一尺五百一十二分尺之四百四十七問爲立方幾何荅曰三十九尺八分尺之七又有積一百九十三萬七千五百四十一尺二十七分尺之一十七問爲立方幾何荅曰一百二十四尺太半尺開立方立方適等求其一面也術曰置積爲實借一筭步之超二等言千之面十言百萬之面百議所得以再乘所借一筭爲法而除之再乘者亦求爲方冪以上議命而除之則立方等也除已三之爲定法爲當復除故豫張三面以定方冪爲定法也復除折而下復除者三面方冪以皆自乘之數須得折議定其厚薄爾開平冪者方百之面十開立冪者方千之面十據定法已有成方之冪故復除當以千爲百折下一等也以三乘所得數置中行設三廉之定長復借一筭置下行欲以爲隅方立方等未有定數且置一筭定其位步之中超一下超二等上方法長自乘而一折中廉法但有長故降一等下隅法無面長故又降一等也復置議以一乘中爲三廉備冪也再乘下令隅自乘爲方冪也皆副以加定法以定除三面三廉一隅皆已有冪以上議命之而除去三冪之厚也除已倍下并中從定法凡再以中三以下加定法者三廉各當以兩面之冪連於兩方之面一隅連於三廉之端以待復除也言不盡意解此要當以棊乃得明耳復除折下如前開之不盡者亦爲不可開術亦有以定法命分者不如故冪開方以微數爲分也若積有分者通分内子爲定實定實乃開之訖開其母以報除臣淳風等按分母可開者竝通之積先合三母既開之後一母尚存故開分母求一母爲法以報除也若母不可開者又以母再乘定實乃開之訖令如母而一臣淳風等謹按分母不開者本一母也又以母再乘之令合三母既開之後一母猶存故令一母而一得全面也按開立方知立方適等求其一面之數借一筭步之超二等者但立方求積方再自乘就積開之故超二等言千之面十言百萬之面百議所得以再乘所借筭爲法而以除知求爲方冪以議命之而除則立方等也除已三之爲定法爲積未盡當復更除故豫張三面已定方冪爲定法復除折而下知三面方冪皆已有自乘之數須得折議定其厚薄據開平方百之面十其開立方即千之面十而定法已有成方之冪故復除之者當以千爲百折下一等以三乘所得數置中行者設三廉之定長復借一筭置下行者者欲以爲隅方立方等未有數且置一筭定其位也步之中超一下超二者上方法長自乘而一折中廉法但有長故降一等下隅法無面長故又降一等復置議以一乘中者爲三廉備冪再乘下當令隅自乘爲方冪皆副以加定法以定法除者三面三廉一隅皆已有冪以上議命之而除去三冪之厚除已倍下并中從定法者三廉各當以兩面之冪連於兩方之面一隅連於三廉之端以待復除其開之不盡者折下如前開方即合所問有分者通分内子開之訖開其母以報除可開者以通之積先合三母既開之後一母尚存故開分母者求一母爲法以報除若母不可開者又以母再乘定實乃開之訖令如母而一分母不可開者本一母又以母再乘令合三母既開之後亦一母尚存故令如母而一得全面也今有積四千五百尺亦謂立方之尺也問爲立圓徑幾何荅曰二十尺依密率立圓徑二十尺计積四千一百九十尺二十一分尺之一十又有積一萬六千四百四十八億六千六百四十三萬七千五百尺問爲立圓徑幾何荅曰一萬四千三百尺依密率爲徑一萬四千六百四十三尺四分尺之三開立圓術曰置積尺數以十六乘之九而一所得開立方除之即立圓徑立圓即丸也爲術者蓋依周三徑一之率令圓冪居方冪四分之三圓囷居立方亦四分之三更令圓囷爲方率十二爲丸率九丸居圓囷又四分之三也置四分自乘得十六三分自乘得九故丸居立方十六分之九也故以十六乘積九而一得立方之積丸徑與立方等故開立方而除得徑也然此意非也何以驗之取立方棊八枚皆令立方一寸積之爲立方二寸規之爲圓囷徑二寸高二寸又復横因之則其形有似牟合方蓋矣八棊皆似陽馬圓然也按合蓋者方率也丸居其中即圓率也推此言之謂夫圓囷爲方率豈不闕哉以周三徑一爲圓率則圓冪傷少令圓囷爲方率則丸積傷多互相通補是以九與十六之率偶與實相近而丸猶傷多耳觀立方之内合蓋之外雖衰殺有漸而多少不掩判合總結方圓相纏濃纖詭互不可等正欲陋形措意懼失正理敢不闕疑以俟能言者黄金方寸重十六兩金丸徑寸重九兩率生於此未曾驗也周官考工記㮚氏爲量改煎金錫則不耗不耗然後權之權之然後準之準之然後量之言鍊金使極精而後分之則可以爲率也令丸徑自乘三而一開方除之即丸中之立方也假令丸中立方五尺五尺爲句句自乘冪二十五尺倍之得五十尺以爲弦冪謂平面方五尺之弦也以此弦爲股亦以五尺爲句并句股冪得七十五尺是爲大弦冪開方除之則大弦可知也大弦則中立方之長邪邪即丸徑也故中立方自乘之冪於丸徑自乘之冪三分之一也令大弦還乘其冪即丸外立方之積也大弦冪開之不盡令其冪七十五再自乘之爲面命得外立方積四十二萬一千八百七十五尺之面又令中立方五尺自乘又以方乘之得積一百二十五尺一百二十五尺自乘爲面命得積一萬五千六百二十五尺之面皆以六百二十五約之外立方積六百七十五尺之面中立方積二十五尺之面也張衡筭又謂立方爲質立圓爲渾衡言質之與中外之渾六百七十五尺之面開方除之不足一謂外渾積二十六也内渾二十五之面謂積五尺也今徽令質言中渾渾又言質則二質相與之率猶衡二渾相與之率也衡蓋亦先二質之率推以言渾之率也衡又言質六十四之面渾二十五之面質復言渾謂居質八分之五也又云方八之面圓五之面圓渾相推知其復以圓囷爲方率渾爲圓率也失之遠矣衡説之自然欲恊其陰陽奇耦之説而不顧疎密矣雖有文辭斯亂道破義病也置外質積二十六以九乘之十六而一得積十四尺八分尺之五即質中之渾也以分母乘全内子得一百一十七又置内質積五以分母乘之得四十是爲質居渾一百一十七分之四十而渾率猶爲傷多也假令方二尺方四面并得八尺也謂之方周其中令圓徑與方等亦二尺也圓半徑以乘圓周之半即圓冪也半方以乘方周之半即方冪也然則方周知方冪之率也圓周知圓冪之率也按如衡術方周率八之面圓周率五之面也令方周六十四尺之面即圓周四十尺之面也又令徑二尺自乘得徑四尺之面是爲圓周率一十之面而徑率一之面也衡亦以周三徑一之率爲非是故更著此法然增周太多過其實矣臣淳風等謹按祖暅之謂劉徽張衡二人皆以圓囷爲方率丸爲圓率乃設新法祖暅之開立圓術曰以二乘積開立方除之即立圓徑其意何也取立方棊一枚令立樞於左後之下隅從規去其右上之廉又合而横規之去其前上之廉於是立方之棊分而爲四規内棊一謂之内棊規外棊三謂之外棊規更合四棊復横斷之以句股言之令餘高爲句内棊斷上方爲股本方之數其弦也句股之法以句冪減弦冪則餘爲股冪若令餘高自乘減本方之冪餘即内棊斷上方之冪也本方之冪即此四棊之斷上冪然則餘高自乘即外三棊之斷上冪矣不問高卑勢皆然也然固有所歸同而塗殊者爾而乃控遠以演類借况以析微按陽馬方高數参等者倒而立之横截去上則高自乘與斷上冪數亦等焉夫疊棊成立積緣冪勢既同則積不容異由此觀之規之外三棊旁蹙爲一即一陽馬也三分立方則陽馬居一内棊居二可知矣合八小方成一大方合八内棊成一合蓋内棊居小方三分之二則合蓋居立方亦三分之二較然驗矣置三分之二以圓冪率三乘之如方冪率四而一約而定之以爲丸率故曰丸居立方二分之一也等數既密心亦昭晣張衡放舊貽哂於後劉徽循故未暇校新夫豈難哉抑未之思也依密率此立圓積本以圓徑再自乘十一乘之二十一而一約此積今欲求其本積故以二十一乘之十一而一凡物再自乘開立方除之復其本數故立方除之即丸徑也九章算術卷第五魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋商功以御功程積實今有穿地積一萬尺問爲堅壤各幾何荅曰爲堅七千五百尺爲壤一萬二千五百尺術曰穿地四爲壤五壤謂息土爲堅三堅謂築土爲墟四墟謂穿坑此皆其常率以穿地求壤五之求堅三之皆四而一今有術也以壤求穿四之求堅三之皆五而一以堅求穿四之求壤五之皆三而一臣淳風等謹按此術竝今有之義也重張穿地積一萬尺爲所有數堅率三壤率五各爲所求率穿率四爲所有率而今有之即得城垣隄溝壍渠皆同術術曰并上下廣而半之損廣補狹以高若深乘之又以袤乘之即積尺按此術并上下廣而半之者以盈補虛得中平之廣以高若深乘之得一頭之立冪又以袤乘之者得立實之積故爲積尺今有城下廣四丈上廣二丈高五丈袤一百二十六丈五尺問積幾何荅曰一百八十九萬七千五百尺今有垣下廣三尺上廣二尺高一丈二尺袤二十二丈五尺八寸問積幾何荅曰六千七百七十四尺今有隄下廣二丈上廣八尺高四尺袤一十二丈七尺問積幾何荅曰七千一百一十二尺冬程人功四百四十四尺問用徒幾何荅曰一十六人一百一十一分人之二術曰以積尺爲實程功尺數爲法實如法而一即用徒人數今有溝上廣一丈五尺下廣一丈深五尺袤七丈問積幾何荅曰四千三百七十五尺春程人功七百六十六尺并出土功五分之一定功六百一十二尺五分尺之四問用徒幾何荅曰七人三千六十四分人之四百二十七術曰置本人功去其五分之一餘爲法去其五分之一者謂以四乘五除也以溝積尺爲實實如法而一得用徒人數按此術置本人功去其五分之一者謂以四乘之五而一除去出土之功取其定功乃通分内子以爲法以分母乘溝積尺爲實者法裏有分實裏通之故實如法而一即用徒人數此以一人之積尺除其衆尺故用徒人數不盡者等數約之而命分也今有壍上廣一丈六尺三寸下廣一丈深六尺三寸袤一十三丈二尺一寸問積幾何荅曰一萬九百四十三尺八寸八寸者謂穿地方尺深八寸此積餘有方尺中二分四釐五毫棄之貴欲從易非其常定也夏程人功八百七十一尺并出土功五分之一沙礫水石之功作太半定功二百三十二尺一十五分尺之四問用徒幾何荅曰四十七人三千四百八十四分人之四百九術曰置本人功去其出土功五分之一又去沙礫水石之功太半餘爲法以壍積尺爲實實如法而一即用徒人數按此術置本人功去其出土功五分之一者謂以四乘五除又去沙礫水石作太半者一乘三除存其少半取其定功乃通分内子以爲法以分母乘壍積尺爲實者爲法裏有分實裏通之故實如法而一即用徒人數不盡者等數約之而命分也今有穿渠上廣一丈八尺下廣三尺
二萬一千八百七十五尺之面又令中立方五尺自乘又以方乘之得積一百二十五尺一百二十五尺自乘爲面命得積一萬五千六百二十五尺之面皆以六百二十五約之外立方積六百七十五尺之面中立方積二十五尺之面也張衡筭又謂立方爲質立圓爲渾衡言質之與中外之渾六百七十五尺之面開方除之不足一謂外渾積二十六也内渾二十五之面謂積五尺也今徽令質言中渾渾又言質則二質相與之率猶衡二渾相與之率也衡蓋亦先二質之率推以言渾之率也衡又言質六十四之面渾二十五之面質復言渾謂居質八分之五也又云方八之面圓五之面圓渾相推知其復以圓囷爲方率渾爲圓率也失之遠矣衡説之自然欲恊其陰陽奇耦之説而不顧疎密矣雖有文辭斯亂道破義病也置外質積二十六以九乘之十六而一得積十四尺八分尺之五即質中之渾也以分母乘全内子得一百一十七又置内質積五以分母乘之得四十是爲質居渾一百一十七分之四十而渾率猶爲傷多也假令方二尺方四面并得八尺也謂之方周其中令圓徑與方等亦二尺也圓半徑以乘圓周之半即圓冪也半方以乘方周之半即方冪也然則方周知方冪之率也圓周知圓冪之率也按如衡術方周率八之面圓周率五之面也令方周六十四尺之面即圓周四十尺之面也又令徑二尺自乘得徑四尺之面是爲圓周率一十之面而徑率一之面也衡亦以周三徑一之率爲非是故更著此法然增周太多過其實矣臣淳風等謹按祖暅之謂劉徽張衡二人皆以圓囷爲方率丸爲圓率乃設新法祖暅之開立圓術曰以二乘積開立方除之即立圓徑其意何也取立方棊一枚令立樞於左後之下隅從規去其右上之廉又合而横規之去其前上之廉於是立方之棊分而爲四規内棊一謂之内棊規外棊三謂之外棊規更合四棊復横斷之以句股言之令餘高爲句内棊斷上方爲股本方之數其弦也句股之法以句冪減弦冪則餘爲股冪若令餘高自乘減本方之冪餘即内棊斷上方之冪也本方之冪即此四棊之斷上冪然則餘高自乘即外三棊之斷上冪矣不問高卑勢皆然也然固有所歸同而塗殊者爾而乃控遠以演類借况以析微按陽馬方高數参等者倒而立之横截去上則高自乘與斷上冪數亦等焉夫疊棊成立積緣冪勢既同則積不容異由此觀之規之外三棊旁蹙爲一即一陽馬也三分立方則陽馬居一内棊居二可知矣合八小方成一大方合八内棊成一合蓋内棊居小方三分之二則合蓋居立方亦三分之二較然驗矣置三分之二以圓冪率三乘之如方冪率四而一約而定之以爲丸率故曰丸居立方二分之一也等數既密心亦昭晣張衡放舊貽哂於後劉徽循故未暇校新夫豈難哉抑未之思也依密率此立圓積本以圓徑再自乘十一乘之二十一而一約此積今欲求其本積故以二十一乘之十一而一凡物再自乘開立方除之復其本數故立方除之即丸徑也九章算術卷第五魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋商功以御功程積實今有穿地積一萬尺問爲堅壤各幾何荅曰爲堅七千五百尺爲壤一萬二千五百尺術曰穿地四爲壤五壤謂息土爲堅三堅謂築土爲墟四墟謂穿坑此皆其常率以穿地求壤五之求堅三之皆四而一今有術也以壤求穿四之求堅三之皆五而一以堅求穿四之求壤五之皆三而一臣淳風等謹按此術竝今有之義也重張穿地積一萬尺爲所有數堅率三壤率五各爲所求率穿率四爲所有率而今有之即得城垣隄溝壍渠皆同術術曰并上下廣而半之損廣補狹以高若深乘之又以袤乘之即積尺按此術并上下廣而半之者以盈補虛得中平之廣以高若深乘之得一頭之立冪又以袤乘之者得立實之積故爲積尺今有城下廣四丈上廣二丈高五丈袤一百二十六丈五尺問積幾何荅曰一百八十九萬七千五百尺今有垣下廣三尺上廣二尺高一丈二尺袤二十二丈五尺八寸問積幾何荅曰六千七百七十四尺今有隄下廣二丈上廣八尺高四尺袤一十二丈七尺問積幾何荅曰七千一百一十二尺冬程人功四百四十四尺問用徒幾何荅曰一十六人一百一十一分人之二術曰以積尺爲實程功尺數爲法實如法而一即用徒人數今有溝上廣一丈五尺下廣一丈深五尺袤七丈問積幾何荅曰四千三百七十五尺春程人功七百六十六尺并出土功五分之一定功六百一十二尺五分尺之四問用徒幾何荅曰七人三千六十四分人之四百二十七術曰置本人功去其五分之一餘爲法去其五分之一者謂以四乘五除也以溝積尺爲實實如法而一得用徒人數按此術置本人功去其五分之一者謂以四乘之五而一除去出土之功取其定功乃通分内子以爲法以分母乘溝積尺爲實者法裏有分實裏通之故實如法而一即用徒人數此以一人之積尺除其衆尺故用徒人數不盡者等數約之而命分也今有壍上廣一丈六尺三寸下廣一丈深六尺三寸袤一十三丈二尺一寸問積幾何荅曰一萬九百四十三尺八寸八寸者謂穿地方尺深八寸此積餘有方尺中二分四釐五毫棄之貴欲從易非其常定也夏程人功八百七十一尺并出土功五分之一沙礫水石之功作太半定功二百三十二尺一十五分尺之四問用徒幾何荅曰四十七人三千四百八十四分人之四百九術曰置本人功去其出土功五分之一又去沙礫水石之功太半餘爲法以壍積尺爲實實如法而一即用徒人數按此術置本人功去其出土功五分之一者謂以四乘五除又去沙礫水石作太半者一乘三除存其少半取其定功乃通分内子以爲法以分母乘壍積尺爲實者爲法裏有分實裏通之故實如法而一即用徒人數不盡者等數約之而命分也今有穿渠上廣一丈八尺下廣三尺
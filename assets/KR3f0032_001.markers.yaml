堵并之以爲甍積也芻童曲池盤池冥谷皆同術術曰倍上袤下袤從之亦倍下袤上袤從之各以其廣乘之并以高若深乘之皆六而一按此術假令芻童上廣一尺袤二尺下廣三尺袤四尺高一尺其用棊也中央立方二四面壍堵六四角陽馬四倍下袤爲八上袤從之爲十以高廣乘之得積三十尺是爲得中央立方各三兩端壍堵各四兩旁壍堵各六四角陽馬亦各六復倍上袤下袤從之爲八以高廣乘之得積八尺是爲得中央立方亦各三兩端壍堵各二并兩旁三品棊皆一而爲六故六而一即得爲術又可令上下廣袤差相乘以高乘之三而一亦四陽馬上下廣袤互相乘并而半之以高乘之即四面六壍堵與二立方并之爲芻童積又可令上下廣袤互相乘而半之上下廣袤又各自乘并以高乘之三而一即得也其曲池者并上中外周而半之以爲上袤亦并下中外周而半之以爲下袤此池環而不通匝形如盤虵而曲之亦云周者謂如委穀依垣之周耳引而伸之周爲袤求袤之意環田也今有芻童下廣二丈袤三丈上廣三丈袤四丈高三丈問積幾何荅曰二萬六千五百尺今有曲池上中周二丈外周四丈廣一丈下中周一丈四尺外周二丈四尺廣五尺深一丈問積幾何荅曰一千八百八十三尺三寸少半寸今有盤池上廣六丈袤八丈下廣四丈袤六丈深二丈問積幾何荅曰七萬六百六十六尺太半尺負土往來七十步其二十步上下棚除棚除二當平道五踟蹰之間十加一載輸之間三十步定一返一百四十步土籠積一尺六寸秋程人功行五十九里半問人到積尺及用徒各幾何荅曰人到二百四尺用徒三百四十六人一百五十三分人之六十二術曰以一籠積尺乘程行步數爲實往來上下棚除二當平道五棚閣除邪道有上下之難故使二當五也置定往來步數十加一及載輸之間三十步以爲法除之所得即一人所到尺按此術棚閣除邪道有上下之難故使二當五置定往來步數十加一及載輸之間三十步是爲往來一返凡用一百四十步於今有術爲所有行率籠積一尺六寸爲所求到土率程行五十九里半爲所有數而今有之即人到尺數以所到約積尺即用徒人數者此一人之積除其衆積尺故得用徒人數爲術又可令往來一返所用之步約程行爲返數乘籠積爲一人所到以此術與今有術相返覆則乘除之或先後意各有所在而同歸耳以所到約積尺即用徒人數今有冥谷上廣二丈袤七丈下廣八尺袤四丈深六丈五尺問積幾何荅曰五萬二千尺載土往來二百步載輸之間一里程行五十八里六人共車車載三十四尺七寸問人到積尺及用徒各幾何荅曰人到二百一尺五十分尺之十三用徒二百五十八人一萬六十三分人之三千七百四十六術曰以一車積尺乘程行步數爲實置今往來步數加載輸之間一里以車六人乘之爲法除之所得即一人所到尺按此術今有之義以載輸及往來并得五百步爲所有行率車載三十四尺七寸爲所求到土率程行五十八里通之爲步爲所有數而今有之所得則一車所到欲得人到者當以六人除之即得術有分故亦更令乘法而并除者亦用以車尺數以爲一人到土率六人乘五百步爲行率也又亦可五百步爲行率令六人約車積尺數爲一人到土率以負土術入之入之者亦可求返數也要取其會通而已術恐有分故令乘法而并除以所到約積尺即用徒人數者以一人所到積尺除其衆積故得用徒人數也以所到約積尺即用徒人數今有委粟平地下周一十二丈高二丈問積及爲粟幾何荅曰積八千尺於徽術當積七千六百四十三尺一百五十七分尺之四十九臣淳風等謹依密率爲積七千六百三十六尺十一分尺之四爲粟二千九百六十二斛二十七分斛之二十六於徽術當粟二千八百三十斛一千四百一十三分斛之一千二百一十臣淳風等謹依密率爲粟二千八百二十八斛九十九分斛之二十八今有委菽依垣下周三丈高七尺問積及爲菽各幾何荅曰積三百五十尺依徽術當積三百三十四尺四百七十一分尺之一百八十六也臣淳風等謹依密率爲積三百三十四尺十一分尺之一爲菽一百四十四斛二百四十三分斛之八依徽術當菽一百三十七斛一萬二千七百一十七分斛之七千七百七十一臣淳風等謹依密率爲菽一百三十七斛八百九十一分斛之四百三十三今有委米依垣内角下周八尺高五尺問積及爲米各幾何荅曰積三十五尺九分尺之五於徽術當積三十三尺四百七十一分尺之四百五十七臣淳風等謹依密率當積三十三尺三十三分尺之三十一爲米二十一斛七百二十九分斛之六百九十一於徽術當米二十斛三萬八千一百五十一分斛之三萬六千九百八十臣淳風等謹依密率爲米二十斛二千六百七十三分斛之二千五百四十委粟術曰下周自乘以高乘之三十六而一此猶圓錐也於徽術亦當下周自乘以高乘之又以二十五乘之九百四十二而一也其依垣者居圓錐之半也十八而一於徽術當令此下周自乘以高乘之又以二十五乘之四百七十一而一依垣之周半於全周其自乘之冪居全周自乘之冪四分之一故半全周之法以爲法也其依垣内角者角隅也居圓錐四分之一也九而一於徽術當令此下周自乘而倍之以高乘之又以二十五乘之四百七十一而一依隅之周半於依垣其自乘之冪居依垣自乘之冪四分之一當半依垣之法以爲法法不可半故倍其實又此術亦用周三徑一之率假令以三除周得徑若不盡通分内子即爲徑之積分令自乘以高乘之爲三方錐之積分母自相乘得九爲法又當三而一約方錐之積從方錐中求圆錐之積亦猶方冪求圓冪乃當三乘之四而一得圓錐之積前求方錐積乃合三而一今求圓錐之積復合三乘之二母既同故相準折惟以四乘分母九得三十六而連除圓錐之積其圓錐之積與平地聚粟同故三十六而一臣淳風等謹依密率以七乘之其平地者二百六十四而一依垣者一百三十二而一依隅者六十六而一也程粟一斛積二尺七寸二尺七寸者謂方一尺深二尺七寸凡積二千七百寸其米一斛積一尺六寸五分寸之一謂積一千六百二十寸其菽荅麻麥一斛皆二尺四寸十分寸之三謂積二千四百三十寸此爲以精麄爲率而不等其槩也粟率五米率三故米一斛於粟一斛五分之三菽荅麻麥亦如本率云故謂此三量器爲槩而皆不合於今斛當今大司農斛圓徑一尺三寸五分五釐正深一尺於徽術爲積一千四百四十一寸排成餘分又有十分寸之三王莽銅斛於今尺爲深九寸五分五釐徑一尺三寸六分八釐七毫以徽術計之於今斛爲容九斗七升四合有奇周官考工記㮚氏爲量深一尺内方一尺而圓外其實一鬴於徽術此圓積一千五百七十寸左氏傳曰齊舊四量豆區釜鍾四升曰豆各自其四以登於釜釜十則鍾鍾六斛四斗釜六斗四升方一尺深一尺其積一千寸若此方積容六斗四升則通外圓積成旁容十斗四合一龠五分龠之三也以數相乘之則斛之制方一尺而圓其外庣旁一釐七毫冪一百五十六寸四分寸之一深一尺積一千五百六十二寸半容十斗王莽銅斛與漢書律曆志所論斛同今有穿地袤一丈六尺深一丈上廣六尺爲垣積五百七十六尺問穿地下廣幾何荅曰三尺五分尺之三術曰置垣積尺四之爲實穿地四爲堅三垣堅也以堅求穿地當四之三而一也以深袤相乘爲深袤之立實也又三之爲法以深袤乘之立實除垣積則阬廣又三之者與堅率并除之所得倍之阬有兩廣先并而半之即爲廣狹之中平令先得其中平故又倍之知兩廣全也減上廣餘即下廣按此術穿地四爲堅三垣即堅也今以堅求穿地當四乘之三而一深袤相乘者爲深袤立冪以深袤立冪除積即阬廣又三之爲法與堅率并除所得倍之者爲阬有兩廣先并而半之爲中平之廣今此得中平之廣故倍之還爲兩廣并故減上廣餘即下廣也今有倉廣三丈袤四丈五尺容粟一萬斛問高幾何荅曰二丈術曰置粟一萬斛積尺爲實廣袤相乘爲法實如法而一得高尺以廣袤之冪除積故得高按此術本以廣袤相乘以高乘之得此積今還元置此廣袤相乘爲法除之故得高也今有圓囷圓囷廩也亦云圓囤也高一丈三尺三寸少半寸容米二千斛問周幾何荅曰五丈四尺於徽術當周五丈五尺二寸二十分寸之九臣淳風等謹按依密率爲周五丈五尺一百分尺之二十七術曰置米積尺此積猶圓堢壔之積以十二乘之令高而一所得開方除之即周於徽術當置米積尺以三百一十四乘之爲實二十五乘囷高爲法所得開方除之即周也此亦據見冪以求周失之於微少也晋武庫中有漢時王莽所作銅斛其篆書字題斛旁云律嘉量斛方一尺而圓其外庣旁九釐五毫冪一百六十二寸深一尺積一千六百二十寸容十斗及斛底云律嘉量斗方尺而圓其外庣旁九釐五毫冪一尺六寸二分深一寸積一百六十二寸容一斗合龠皆有文字升居斛旁合龠在斛耳上後有讚文與今律曆志同亦魏晋所常用今粗疏王莽銅斛文字尺寸分數然不盡得升合勺之文字按此術本周自相乘以高乘之十二而一得此積今還元置此積以十二乘之令高而一即復本周自乘之數凡物自乘開方除之復其本數故開方除之即得也臣淳風等謹按依密率以八十八乘之爲實七乘囷高爲法實如法而一開方除之即周也九章算術卷第六魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋均輸以御遠近勞費今有均輸粟甲縣一萬户行道八日乙縣九千五百户行道十日丙縣一萬二千三百五十户行道十三日丁縣一萬二千二百户行道二十日各到輸所凡四縣賦當輸二十五萬斛用車一萬乘欲以道里遠近户數多少衰出之問粟車各幾何荅曰甲縣粟八萬三千一百斛車三千三百二十四乘乙縣粟六萬三千一百七十五斛車二千五百二十七乘丙縣粟六萬三千一百七十五斛車二千五百二十七乘丁縣粟四萬五百五十斛車一千六百, krp: ''}

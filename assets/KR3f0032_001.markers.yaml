  - {type: variant, offset: 14148, length: 576, content: 義以價錢爲所有率五丈尺數爲所求率今有錢爲所有數今有之即得今有與人絲一十四斤約得縑一十斤今與人絲四十五斤八兩問得縑幾何荅曰三十二斤八兩術曰以一十四斤兩數爲法以一十斤乘今有絲兩數爲實實如法得縑數臣淳風等謹按此術亦今有之義以一十四斤兩數爲所有率一十斤爲所求率今有絲爲所有數今有之即得今有絲一斤耗七兩今有絲二十三斤五兩問耗幾何荅曰一百六十三兩四銖半術曰以一斤展十六兩爲法以七兩乘今有絲兩數爲實實如法得耗數臣淳風等謹按此術亦今有之義以一斤爲十六兩爲所有率七兩爲所求率今有絲爲所有數而今有之即得今有生絲三十斤乾之耗三斤十二兩今有乾絲一十二斤問生絲幾何荅曰一十三斤一十一兩十銖七分銖之二術曰置生絲兩數除耗數餘以爲法餘四百二十兩即乾絲率三十斤乘乾絲兩數爲實實如法得生絲數凡所得率知細則俱細麄则俱麄兩數相抱而已故品物不同如上縑絲之比相與率焉三十斤凡四百八十兩令生絲率四百八十兩令乾絲率四百二十兩則其數相通可俱爲銖可俱爲兩可俱爲斤無所歸滯也若然宜以所有乾絲斤數乘生絲兩數爲實今以斤兩錯互而亦同歸者使乾絲以兩數爲率生絲以斤數爲率譬之異類亦各有一定之勢臣淳風等謹按此術置生絲兩數除耗數餘即乾絲之率於今有術爲所有率三十斤爲所求率乾絲兩數爲所有數凡所謂率者細則俱細麄则俱麄今以斤乘兩知乾絲即以兩數爲率生絲即以斤數爲率譬之異物各有一定之率也今有田一畝收粟六升太半升今有田一頃二十六畝, SBCK: ''}

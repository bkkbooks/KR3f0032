  - {type: variant, offset: 32026, length: 6098, content: 求爲米等數者置糲米三用粟五粺米二十七用粟五十糳米十二用粟二十五齊其粟同其米并齊爲法以七斗乘同爲實所得即爲米斗數今有人當稟粟二斛倉無粟欲與米一菽二以當所稟粟問各幾何荅曰米五斗一升七分升之三菽一斛二升七分升之六術曰置米一菽二求爲粟之數并之得三九分之八以爲法亦置米一菽二而以粟二斛乘之各自爲實實如法得一斛臣淳風等謹按置粟率五乘米一米率三除之得一三分之二即是米一之粟也粟率十以乘菽二菽率九除之得二九分之二即是菽二之粟也并全得三齊子并之得二十四同母得二十七約之得九分之八故云并之得三九分之八米一菽二當粟三九分之八此其粟率也於今有術米一菽二皆爲所求率當粟三九分之八爲所有率粟二斛爲所有數凡言率者當相與通之則爲米九菽十八當粟三十五也亦有置米一菽二求其爲粟之率以爲列衰副并爲法以粟乘列衰爲實所得即米一菽二所求粟也以米菽本率而今有之即合所問今有取傭負鹽二斛行一百里與錢四十今負鹽一斛七斗三升少半升行八十里問與錢幾何荅曰二十七錢一十五分錢之一十一術曰置鹽二斛升數以一百里乘之爲法按此術以負鹽二斛升數乘所行一百里得二萬里是爲負鹽一升行二萬里得錢四十於今有術爲所有率以四十錢乘今負鹽升數又以八十里乘之爲實實如法得一錢以今負鹽升數乘所行里今負鹽一升凡所行里也於今有術以所有數四十錢爲所求率也衰分章貸人千錢與此同今有負籠重一石行百步五十返今負籠重一石一十七斤行七十六步問返幾何荅曰五十七返二千六百三分返之一千六百二十九術曰以今所行步數乘今籠重斤數爲法此法謂負一斤一返所行之積步也故籠重斤數乘故步又以返數乘之爲實實如法得一返按此法負一斤一返所行之積步此實者一斤一日所行之積步故以一返之課除終日之程即是返數也臣淳風等謹按此術所行步多者得返少所行步少者得返多然則故所行者今返率也故令所得返乘今返之率爲實而以故返之率爲法今有術也按此負籠又有輕重於是爲術者因令重者得返少輕者得返多故又因其率以乘法實者重今有之義也然此意非也按此籠雖輕而行有限籠過重則人力遺力有遺而術無窮人行有限而籠輕重不等使其有限之力隨彼無窮之變故知此術率乖理也若故所行有空行返數設以問者當因其所負以爲返率则今返之數可得而知也假令空行一日六十里負重一斛行四十里減重一斗進二里半負重二斗以下與空行同今負籠重六斗往還行一百步問返幾何荅曰一百五十返術曰置重行率加十里以里法通之爲實以一返之步爲法實如法而一即得也今有程傳委輸空車日行七十里重車日行五十里今載太倉粟輸上林五日三返問太倉去上林幾何荅曰四十八里一十八分里之一十一術曰并空重里數以三返乘之爲法令空重相乘又以五日乘之爲實實如法得一里此亦如上術率一百七十五里之路往返用六日也於今有術則五日爲所有數一百七十五里爲所求率六日爲所有率以此所得則三返之路今求一返當以三約之因令乘法而并除也爲術亦可各置空重行一里用日之率以爲列衰副并爲法以五日乘列衰爲實實如法所得即各空重行日數也各以一日所行以乘爲凡日所行三返約之爲上林去太倉之數按此術重往空還一輸再還道置空行一里用七十分日之一重行一里用五十分日之一齊而同之空重行一里之路往返用一百七十五分日之六完言之者一百七十五里之路往返用六日故并空重者并齊也空重相乘者同其母也於今有術五日爲所有數一百七十五爲所求率六爲所有率以此所得則三返之路今求一返者當以三約之故令乘法而并除亦當約之也今有絡絲一斤爲練絲一十二兩練絲一斤爲青絲一斤一十二銖今有青絲一斤問本絡絲幾何荅曰一斤四兩一十六銖三十三分铢之一十六術曰以練絲十二兩乘青絲一斤一十二銖爲法以青絲一斤铢數乘練絲一斤兩數又以絡絲一斤乘爲實實如法得一斤按練絲一斤爲青絲一斤十二銖此練率三百八十四青率三百九十六也又絡絲一斤爲練絲十二兩此絡率十六練率十二也置今有青絲一斤以練率三百八十四乘之爲實實如青絲率三百九十六而一所得青絲一斤練絲之數也又以絡率十六乘之所得爲實以練率十二爲法所得即練絲用絡絲之數也是謂重今有也雖各有率不問中間故令後實乘前實後法乘前法而并除也故以練絲兩數爲實青絲銖數爲法一曰又置絡絲一斤兩數與練絲十二兩約之絡得四練得三此其相與之率又置練絲一斤銖數與青絲一斤一十二銖約之練得三十二青得三十三亦其相與之率齊其青絲絡絲同其二練絡得一百二十八青得九十九練得九十六即三率悉通矣今有青絲一斤爲所有數絡絲一百二十八爲所求率青絲九十九爲所有率爲率之意猶此但不先約諸率耳凡率錯互不通者皆積齊同用之放此雖四五轉不異也言同其二練者以明三率之相與通耳於術無以異也又一術今有青絲一斤銖數乘練絲一斤兩數爲實以青絲一斤一十二銖爲法所得即用練絲兩數以絡絲一斤乘所得爲實以練絲十二兩爲法所得即用絡絲斤數也今有惡粟二十斗舂之得糲米九斗今欲求粺米一十斗問惡粟幾何荅曰二十四斗六升八十一分升之七十四術曰置糲米九斗以九乘之爲法亦置粺米十斗以十乘之又以惡粟二十斗乘之爲實實如法得一斗按此術置今有求粺米十斗以糲米率十乘之如粺率九而一即粺化爲糲又以惡粟率二十乘之如糲率九而一即糲亦化爲惡粟矣此亦重今有之義爲術之意猶絡絲也雖各有率不問中間故令後實乘前實後法乘前法而并除之也今有善行者行一百步不善行者行六十步今不善行者先行一百步善行者追之問幾何步及之荅曰二百五十步術曰置善行者一百步減不善行者六十步餘四十步以爲法以善行者之一百步乘不善行者先行一百步爲實實如法得一步按此術以六十步減一百步餘四十步即不善行者先行率也善行者行一百步追及率約之追及率得五先行率得二於今有術不善行者先行一百步爲所有數五爲所求率二爲所有率而今有之得追及步也今有不善行者先行一十里善行者追之一百里先至不善行者二十里問善行者幾何里及之荅曰三十三里少半里術曰置不善行者先行一十里以善行者先至二十里增之以爲法以不善行者先行一十里乘善行者一百里爲實實如法得一里按此術不善行者既先行一十里後不及二十里并之得三十里也謂之先行率善行者一百里爲追及率約之先行率得三三爲所有率而今有之即得也其意如上術也今有兔先走一百步犬追之二百五十步不及三十步而止問犬不止復行幾何步及之荅曰一百七步七分步之一術曰置兔先走一百步以犬走不及三十步減之餘爲法以不及三十步乘犬追步數爲實實如法得一步按此術以不及三十步減先走一百步餘七十步爲兔先走率犬行二百五十步爲追及率約之先走率得七追及率得二十五於今有術不及三十步爲所有數二十五爲所求率七爲所有率而今有之即得也今有人持金十二斤出關關税之十分而取一今關取金二斤償錢五千問金一斤值錢幾何荅曰六千二百五十術曰以一十乘二斤以十二斤減之餘爲法以一十乘五千爲實實如法得一錢按此術置十二斤以一乘之十而一得一斤五分斤之一即所當税者也減二斤餘即關取盈金以盈除所償錢即金直也今術既以十二斤爲所税則是以十爲母故以十乘二斤及所償錢通其率於今有術五千錢爲所有數十爲所求率八爲所有率而今有之即得也今有客馬日行三百里客去忘持衣日已三分之一主人乃覺持衣追及與之而還至家視日四分之三問主人馬不休日行幾何荅曰七百八十里術曰置四分日之三除三分日之一按此術置四分日之三除三分日之一者除其減也減之餘有十二分之五即是主人追客還用日率也半其餘以爲法去其還存其往率之者子不可半故倍母二十四分之五是爲主人與客均行用日之率也副置法增三分日之一法二十四分之五者主人往追用日之分也三分之一者客去主人未覺之前獨行用日之分也并連此數得二十四分日之十三則主人追及前用日之分也是爲客用日率也然則主人用日率者客馬行率也客用日率者主人馬行率也母同則子齊是爲客馬行率五主人馬行率十三於今有術三百里爲所有數十三爲所求率五爲所有率而今有之即得也以三百里乘之爲實實如法得主人馬一日行欲知主人追客所行里者以三百里乘客用日分子十三以母二十四而一得一百六十二里半以此乘客馬與主人均行日分母二十四如客馬與主人均行用日分子五而一亦得主人馬一日行七百八十里也今有金箠長五尺斬本一尺重四斤斬末一尺重二斤問次一尺各重幾何荅曰末一尺重二斤次一尺重二斤八兩次一尺重三斤次一尺重三斤八兩次一尺重四斤術曰令末重減本重餘即差率也又置本重以四間乘之爲下第一衰副置以差率減之每尺各自爲衰按此術五尺有四間者有四差也今本末相減餘即四差之凡數也以四約之即得每尺之差以差數減本重餘即次尺之重也爲術所置如是而已今此率以四爲母故令母乘本爲衰通其率也亦可置末重以四間乘之爲上第一衰以差重率加之爲次下衰也副置下第一衰以爲法以本重四斤徧乘列衰各自爲實實如法得一斤以下第一衰爲法以本重乘其分母之數而又返此率乘本重爲實一乘一除勢無損益故惟本存焉衆衰相推爲率則其餘可知也亦可副置末衰爲法而以末重二斤乘列衰爲實此雖迂迴然是其舊故就新而言之也今有五人分五錢令上二人所得與下三人等問各得幾何荅曰甲得一錢六分錢之二乙得一錢六分錢之一丙得一錢丁得六分錢之五戊得六分錢之四術曰置錢錐行衰按此術錐行者謂如立錐初一次二次三次四次五各均爲一列者也并上二人爲九并下三人爲六六少於九三數不得等但以五四三二一爲率也以三均加焉副并爲法以所分錢乘未并者各自爲實實如法得一錢此問者令上二人與下三人等上下部差一人其差三均加上部則得二三均加下部則得三三上下部猶差一人差得三以通於本率即上下部等也於今有術副并爲所有率未并者各爲所求率五錢爲所有數而今有之即得等耳假令七人分七錢欲令上二人與下五人等則上下部差三人并上部爲十三下部爲十五下多上少下不足減上當以上下部列差而後均減乃合所問耳此可放下術令上二人分二錢半爲上率令下三人分二錢半爲下率上下二率以少減多餘爲實置二人三人各半之減五人餘爲法實如法得一錢即衰相去也下衰率六分之五者丁所得錢數也今有竹九節下三節容四升上四節容三升問中間二節欲均容各多少荅曰下初一升六十六分升之二十九次一升六十六分升之二十二次一升六十六分升之一十五次一升六十六分升之八次一升六十六分升之一次六十六分升之六十次六十六分升之五十三次六十六分升之四十六次六十六分升之三十九術曰以下三節分四升爲下率以上四節分三升爲上率此二率者各其平率也上下率以少減多餘爲實按此上下節各分所容爲率者各其平率上下以少減多者餘爲中間五節半之凡差故以爲實也置四節三節各半之以減九節餘爲法實如法得一升即衰相去也按此術上下節所容已定之節中間相去節數也實者中間五節半之凡差也故實如法而一則每節之差也下率一升少半升者下第二節容也一升少半升者下三節通分四升之平率平率即爲中分節之容也今有鳧起南海七日至北海雁起北海九日至南海今鳧雁俱起問何日相逢荅曰三日十六分日之十五術曰并日數爲法日數相乘爲實實如法得一日按此術置鳧七日一至雁九日一至齊其至同其日定六十三日鳧九至雁七至今鳧雁俱起而問相逢者是爲共至并齊以除同即得相逢日故并日數爲法者并齊之意日數相乘爲實者猶以同爲實也一曰鳧飛日行七分至之一雁飛日行九分至之一齊而同之鳧飛定日行六十三分至之九雁飛定日行六十三分至之七是爲南北海相去六十三分鳧日行九分雁日行七分也并鳧雁一日所行以除南北相去而得相逢日也今有甲發長安五日至齊乙發齊七日至長安今乙發已先二日甲乃發長安問幾何日相逢荅曰二日十二分日之一術曰并五日七日以爲法按此術并五日七日爲法者猶并齊爲法置甲五日一至乙七日一至齊而同之定三十五日甲七至乙五至并之爲十二至者用三十五日也謂甲乙與發之率耳然則日化爲至當除日故以爲法也以乙先發二日減七日減七日者言甲乙俱發今以發爲始發之端於本道里則餘分也餘以乘甲日數爲實七者長安去齊之率也五者後發相去之率也今問後發故舍七用五以乘甲五日爲二十五日言甲七至乙五至更相去用此二十五日也實如法得一日一日甲行五分至之一乙行七分至之一齊而同之甲定日行三十五分至之七乙定日行三十五分至之五是爲齊去長安三十五分甲日行七分乙日行五分也今乙先行發二日已行十分餘相去二十五分故減乙二日餘令相乘爲二十五分今有一人一日爲牝瓦三十八枚一人一日爲牡瓦七十六枚今令一人一日作瓦牝牡相半問成瓦幾何荅曰二十五枚少半枚術曰并牝牡爲法牝牡相乘爲實實如法得一枚此意猶與鳧雁同術牝牡瓦相并猶如鳧雁日飛相并也按此術并牝牡爲法者并齊之意牝牡相乘爲實者猶以同爲實也故實如法即得也今有一人一日矯矢五十一人一日羽矢三十一人一日筈矢十五今令一人一日自矯羽筈問成矢幾何荅曰八矢少半矢術曰矯矢五十用徒一人羽矢五十用徒一人太半人筈矢五十用徒三人少半人并之得六人以爲法以五十矢爲實實如法得一矢按此術言成矢五十用徒六人一日工也此同工共作猶鳧雁共至之類亦以同爲實并齊爲法可令矢互乘一人爲齊矢相乘爲同今先令同於五十矢矢同則徒齊其歸一也以此術爲鳧雁者當雁飛九日而一至鳧飛九日而一至七分至之二并之得二至七分至之二以爲法以九日爲實實如法而一得一人日成矢之數也今有假田初假之歲三畝一錢明年四畝一錢後年五畝一錢凡三歲得一百問田幾何荅曰一頃二十七畝四十七分畝之三十一術曰置畝數及錢數令畝數互乘錢數并以爲法畝數相乘又以百錢乘之爲實實如法得一畝按此術令畝互乘錢者齊其錢畝數相乘者同其畝同於六十則初假之歲得錢二十明年得錢十五後年得錢十二也凡三歲得錢一百爲所有數同畝爲所求率四十七錢爲所有率今有之即得也齊其錢同其母亦如鳧雁術也於今有術百錢爲所有數同畝爲所求率并齊爲所有率臣淳風等按假田六十畝初歲得錢二十明年得錢十五後年得錢十二并之得錢四十七是爲得田六十畝三歲所假於今有術百錢爲所有數六十畝爲所求率四十七爲所有率而今有之即合問也今有程耕一人一日發七畝一人一日耕三畝一人一日耰種五畝今令一人一日自發耕耰種之問治田幾何荅曰一畝一百一十四步七十一分步之六十六術曰置發耕耰畝數令互乘人數并以爲法畝數相乘爲實實如法得一畝此猶鳧雁術也臣淳風等謹按此術亦發耕耰種畝數互乘人者齊其人畝數相乘者同其畝故并齊爲法以同爲實計田一百五畝發用十五人耕用三十五人種用二十一人并之得七十一工治得一百五畝故以爲實而一人一日所治故以人數爲法除之即得也今有池五渠注之其一渠開之少半日一滿次一日一滿次二日半一滿次三日一滿次五日一滿今皆决之問幾何日滿池荅曰七十四分日之十五術曰各置渠一日滿池之數并以爲法按此術其一渠少半日滿者是一日三滿也次一日一滿次二日半滿者是一日五分滿之二也次三日滿者是一日三分滿之一也次五日滿者是一日五分滿之一也并之得四滿十五分滿之十四也以一日爲實實如法得一日此猶矯矢之術也先令同於一日日同則滿齊自鳧雁至此其爲同齊有二術焉可隨率宜也其一術各置日數及滿數令日互相乘滿并以爲法日數相乘爲實實如法得一日亦如鳧雁術也按此其一渠少半日滿池者是一日三滿池也次一日一滿次二日半滿者是五日再滿次三日一滿次五日一滿此謂列置日數於右行及滿數於左行以日互乘滿者齊其滿日數相乘者同其日滿齊而日同故并齊以除同即得也今有人持米出三關外關三而取一中關五而取一内關七而取一餘米五斗問本持米幾何荅曰十斗九升八分升之三術曰置米五斗以所税者三之五之七之爲實以餘不税者二四六相互乘爲法實如法得一斗此亦重今有也所税者謂今所當
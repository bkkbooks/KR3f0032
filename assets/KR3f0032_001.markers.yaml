  - {type: variant, offset: 17587, length: 1096, content: 一面也術曰置積爲實借一筭步之超一等言百之面十也言萬之面百也議所得以一乘所借一筭爲法而以除先得黄甲之面上下相命是自乘而除也除已倍法爲定法倍之者豫張兩面朱冪定袤以待復除故曰定法其復除折法而下欲除朱冪者本當副置所得成方倍之爲定法以折議乘而以除如是當復步之而止乃得相命故使就上折下復置借筭步之如初以復議一乘之欲除朱冪之角黄乙之冪其意如初之所得也所得副以加定法以除以所得副從定法再以黄乙之面加定法者是則張兩青冪之袤復除折下如前若開之不盡者爲不可開當以面命之術或有以借筭加定法而命分者雖粗相近不可用也凡開積爲方方之自乘當還復其積分令不加借筭而命分則常微少其加借筭而命分則又微多其數不可得而定故惟以面命之爲不失耳譬猶以三除十以其餘爲三分之一而復其數可舉不以面命之加定法如前求其微數微數無名者以爲分子其一退以十爲母其再退以百爲母退之彌下其分彌細則朱冪雖有所棄之數不足言之也若實有分者通分内子爲定實乃開之訖開其母報除臣淳風等謹按分母可開者竝通之積先合二母既開之後一母尚存故開分母求一母爲法以報除也若母不可開者又以母乘定實乃開之訖令如母而一臣淳風等謹按分母不可開者本一母也又以母乘之乃合二母既開之後亦一母存焉故令一母而一得全面也又按此術開方者求方冪之面也借一筭者假借一筭空有列位之名而無除積之實方隅得面是故借筭列之於下步之超一等者方十自乘其積有百方百自乘其積有萬故超位至百而言十至萬而言百議所得以一乘所借筭爲法而以除者先得黄甲之面以方爲積者兩相乘故開方除之還令兩面上下相命是自乘而除之除已倍法爲定法者實積未盡當復更除故豫張兩面朱冪袤以待復除故曰定法其復除折法而下者欲除朱冪本當副置所得成方倍之爲定法以折議乘之而以除如是當復步之而止乃得相命故使就上折之而下復置借筭步之如初以復議一乘之所得副以加定法以定法除者欲除朱冪之角黄乙之冪以所得副從定法者再以黄乙之面加定法是則張兩青冪之袤故如前開之即合所問今有積一千五百一十八步四分步之三問爲圓周幾何荅曰一百三十五步於徽術當周一百三十八步一十分步之一臣淳風等謹按此依密率爲周一百三十八步五十分步之九又有積三百步問爲圓周幾何荅曰六十步於徽術當周六十一步五十分步之十九臣淳風等謹按依密率爲周六十一步一百分步之四十一開圓術曰置積步數以十二乘之以開方除之即得周此術以周三徑一爲率與舊圓田術相返覆也於徽術以三百一十四乘積如二十五而一所得開方除之即周也開方除之即徑是爲據見冪以求周猶失之於微少其以二百乘積一百五十七而一開方除之即徑猶失之於微多臣淳風等謹按此注於徽術求周之法其中不用開方除之即徑六字今本有者衍賸也依密率八十八乘之七而一按周三徑一之率假令周六徑二半周半徑相乘得冪三周六自乘得, SBCK: ''}

  - {type: variant, offset: 8482, length: 392, content: 二十有五約其二率所求之率得三所有之率得二故以三乘二除今有粟三斗六升欲爲粺飯問得幾何荅曰爲粺飯三斗八升二十五分升之二十二術曰以粟求粺飯二十七之二十五而一臣淳風等謹按此術與大䵂多同今有粟八斗六升欲爲糳飯問得幾何荅曰爲糳飯八斗二升二十五分升之一十四術曰以粟求糳飯二十四之二十五而一臣淳風等謹按糳飯率四十八此亦半二率而乘除今有粟九斗八升欲爲御飯問得幾何荅曰爲御飯八斗二升二十五分升之八術曰以粟求御飯二十一之二十五而一臣淳風等謹按此術半率亦與糳飯多同今有粟三斗少半升欲爲菽問得幾何荅曰爲菽二斗七升一十分升之三今有粟四斗一升太半升欲爲荅問得幾何荅曰爲荅三斗七升半今有粟五斗太半升欲爲麻問得幾何荅曰爲麻四斗五升五分升之三今有粟一十斗八升五分升之二欲爲麥問得幾何荅曰爲麥九斗七升二十五分升之一十四術曰以粟求菽荅麻麥皆九之十而一臣淳風等謹按四術率並四十五皆是爲粟所求俱合以此率乘其本粟術欲從省先以等數五, SBCK: ''}

  - {type: variant, offset: 38127, length: 1801, content: 凡餘分者乘其母子以三五七相乘得一百五爲分母二四六相乘得四十八爲分子約而言之則是餘米於本所持三十五分之十六也於今有術餘米五斗爲所有數分母三十五爲所求率分子十六爲所有率也今有人持金出五關前關二而税一次關三而税一次關四而税一次關五而税一次關六而税一并五關所税適重一斤問本持金幾何荅曰一斤三兩四銖五分銖之四術曰置一斤通所税者以乘之爲實亦通其不税者以減所通餘爲法實如法得一斤此意猶上術也置一斤通所税者謂令二三四五六相乘爲分母七百二十也通其所不税者謂令所税之餘一二三四五相乘爲分子一百二十也約而言之是爲餘金於本所持六分之一也以子減母凡五關所税六分之五也於今有術所税一斤爲所有數分母六爲所求率分子五爲所有率此亦重今有之義又雖各有率不問中間故令中率轉相乘而連除之即得也置一以爲持金之本率以税率乘之除之則其率亦成積分也九章算術卷第七魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋盈不足以御隠雜互見今有共買物人出八盈三人出七不足四問人數物價各幾何荅曰七人物價五十三今有共買雞人出九盈一十一人出六不足十六問人數雞價各幾何荅曰九人雞價七十今有共買璡人出半盈四人出少半不足三問人數璡價各幾何荅曰四十二人璡價十七注云若兩設有分者齊其子同其母此問兩設俱見零分故齊其子同其母又云令下維乘上訖以同約之不可約故以乘同之今有共買牛七家共出一百九十不足三百三十九家共出二百七十盈三十問家數牛價各幾何荅曰一百二十六家牛價三千七百五十按此術并盈不足者爲衆家之差故以爲實置所出率各以家數除之各得一家所出率以少減多者得一家之差以除即家數以出率乘之減盈增不足故得牛價也盈不足按盈者謂之朓不足者謂之朒所出率謂之假令術曰置所出率盈不足各居其下令維乘所出率并以爲實并盈不足爲法實如法而一盈朒維乘兩設者欲爲同齊之意據共買物人出八盈三人出七不足四齊其假令同其盈朒盈朒俱十二通計齊則不盈不朒之正數故可并之爲實并盈不足爲法齊之三十二者是四假令有盈十二齊之二十一者是三假令亦朒十二并七假令合爲一實故并三四爲法有分者通之若兩設有分者齊其子同其母令下維乘上訖以同約之不可約故以乘同之盈不足相與同其買物者置所出率以少減多餘以約法實實爲物價法爲人數所出率以少減多者餘謂之設差以爲少設則并盈朒是爲定實故以少設約定實則法爲人數適足之實故爲物價盈朒當與少設相通不可徧約亦當分母乘設差爲約法實其一術曰并盈不足爲實以所出率以少減多餘爲法實如法得一人以所出率乘之減盈增不足即物價此術意謂盈不足爲衆人之差以所出率以少減多餘爲一人之差以一人之差約衆人之差故得人數也今有共買金人出四百盈三千四百人出三百盈一百問人數金價各幾何荅曰三十三人金價九千八百今有共買羊人出五不足四十五人出七不足三問人數羊價各幾何荅曰二十一人羊價一百五十兩盈兩不足術曰置所出率盈不足各居其下令維乘所出率以少減多餘爲實兩盈兩不足以少減多餘爲法實如法而一有分者通之兩盈兩不足相與同其買物者置所出率以少減多餘以約法實實爲物價法爲人數按此術兩不足者兩設皆不足於正數其所以變化猶兩盈而或有勢同而情違者當其爲實俱令不足維乘相減則遺其所不足焉故其餘所以爲實者無朒數以損焉蓋出而有餘兩盈兩設皆逾於正數假令與共買物人出八盈三人出九盈十齊其假令同其兩盈兩盈俱三十舉齊則兼去其餘所以爲實者無盈數兩盈以少減多餘爲法齊之八十者是十假令而凡盈三十者是十以三之齊之二十七者是三假令而凡盈三十者是三以十之今假令兩盈共十三以三減十餘七爲一實故令以三減十餘七爲法所出率以少減多餘謂之設差因設差爲少設則兩盈之差是爲定實故以少設約法得人數約實即得金數其一術曰置所出率以少減多餘爲法兩盈兩不足以少減多餘爲實實如法而一得人數以所出率乘之減盈增不足即物價置所出率以少減多得一人之差兩盈兩不足相減爲衆人之差故以一人之差除之得人數以所出率乘之減盈增不足即物價今有共買犬人出五不足九十人出五十適足問人數犬價各幾何荅曰二人犬價一百今有共買豕人出一百盈一百人出九十適足問人數豕價各幾何荅曰一十人豕價九百盈適足不足適足術曰以盈及不足之數爲實置所出率以少減多餘爲法實如法得一人其求物價者以適足乘人數得物價此術意謂以所出率以少減多者餘是一人不足之差不足數爲衆人之差以一人差約之故得人之數也以盈及不足數爲實者數單見即衆人差故以爲實所出率以少減多即一人差故以爲法以除衆人差得人數以適足乘人數即得物價也今有米在十斗桶中不知其數滿中添粟而舂之得米七斗問故米幾何荅曰二斗五升術曰以盈不足, SBCK: 卽周依}

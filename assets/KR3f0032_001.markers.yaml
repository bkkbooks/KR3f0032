  - {type: variant, offset: 12878, length: 905, content: 二十以爲法以五斗乘未并者各自爲實實如法得一斗稟前五人十五斗者大夫得五斗不更得四斗簪褭得三斗上造得二斗公士得一斗欲令五人各依所得粟多少減與後來大夫即與前來大夫同據前來大夫已得五斗故言亦也各以所得斗數爲衰并得十五而加後來大夫亦五斗凡二十爲法也是爲六人共出五斗後來大夫亦俱損折今有術副并爲所有率未并者各爲所求率五斗爲所有數而今有之即得今有稟粟五斛五人分之欲令三人得三二人得二問各幾何荅曰三人人得一斛一斗五升十三分升之五二人人得七斗六升十三分升之十二術曰置三人人三二人人二爲列衰副并爲法以五斛乘未并者各自爲實實如法得一斛返衰以爵次言之大夫五不更四欲令高爵得多者當使大夫一人受五分不更一人受四分人數爲母分數爲子母同則子齊齊即衰也故上衰分宜以五四爲列焉今此令高爵出少則當使大夫五人共出一人分不更四人共出一人分故謂之返衰人數不同則分數不齊當令母互乘子母互乘子則動者爲不動者衰也亦可先同其母各以分母約其子爲返衰副并爲法以所分乘未并者各自爲實實如法而一術曰列置衰而令相乘動者爲不動者衰今有大夫不更簪褭上造公士凡五人共出百錢欲令高爵出少以次漸多問各幾何荅曰大夫出八錢一百三十七分錢之一百四不更出一十錢一百三十七分錢之一百三十簪褭出一十四錢一百三十七分錢之八十二上造出二十一錢一百三十七分錢之一百二十三公士出四十三錢一百三十七分錢之一百九術曰置爵數各自爲衰而返衰之副并爲法以百錢乘未并者各自爲實實如法得一錢今有甲持粟三升乙持糲米三升丙持糲飯三升欲令合而分之問各幾何荅曰甲二升一十分升之七乙四升一十分升之五丙一升一十分升之八術曰以粟率五十糲米率三十糲飯率七十五爲衰而返衰之副并爲法以九升乘未并者各自爲實實如法得一升按此術三人所持升數雖等論其本率精麄不同米率雖少令最得多飯率雖多返使得少故令返之使精得多而麄得少於今有術副并爲所有率未并者各爲所求率九升爲所有數而今有之即得今有絲一斤價直二百四十今有錢一千三百二十八問得絲幾何荅曰五斤八兩一十二銖五分銖之四術曰以一斤價數爲法以一斤乘今有錢數爲實實如法得絲數臣淳風等謹按此術今有之義以一斤價爲所有率一斤爲所求率今有錢爲所有數而今有之即得今有絲一斤價直三百四十五今有絲七兩一十二銖問得錢幾何荅曰, SBCK: 幂}

  - {type: variant, offset: 5685, length: 47941, content: 又術曰徑自相乘三之四而一按圓徑自乘爲外方三之四而一者是爲圓居外方四分之三分也若令六觚之一面乘半徑其冪即外方四分之一也因而三之即亦居外方四分之三也是爲圓裏十二觚之冪耳取以爲圓失之於微少於徽新術當徑自乘又以一百五十七乘之二百而一臣淳風等謹按密率令徑自乘以十一乘之十四而一即圓冪也又術曰周自相乘十二而一六觚之周其於圓徑三與一也故六觚之周自相乘爲冪若圓徑自乘者九方九方凡爲十二觚者十有二故曰十二而一即十二觚之冪也今此令周自乘非但若爲圓徑自乘者九方而已然則十二而一所得又非十二觚之類也若欲以爲圓冪失之於多矣以六觚之周十二而一可也於徽新術直令圓周自乘又以二十五乘之三百一十四而一得圓冪其率二十五者圓冪也三百一十四者周自乘之冪也置周數六尺二寸八分令自乘得冪三十九萬四千三百八十四分又置圓冪三萬一千四百分皆以一千二百五十六約之得此率臣淳風等謹按方面自乘即得其積圓周求其冪假率乃通但此術所求用三一爲率圓田正法半周及半徑以相乘今乃用全周自乘故須以十二爲母何者據全周而求半周則須以二爲法就全周而求半徑復假六以除之是二六相乘除周自乘之數依密率以七乘之八十八而一今有宛田下周三十步徑十六步問爲田幾何荅曰一百二十步又有宛田下周九十九步徑五十一步問爲田幾何荅曰五畝六十二步四分步之一術曰以徑乘周四而一此術不驗故推方錐以見其形假令方錐下方六尺高四尺四尺爲股下方之半三尺爲句正面邪爲弦弦五尺也令句弦相乘四因之得六十尺即方錐四面見者之冪若令其中容圓錐圓錐見冪與方錐見冪其率猶方冪之與圓冪也按方錐下六尺則方周二十四尺以五尺乘而半之則亦方錐之見冪故求圓錐之數折徑以乘下周之半即圓锥之冪也今宛田上徑圓穹而與圓錐同術則冪失之於少矣然其術難用故略舉大較施之大廣田也求圓錐之冪猶求圓田之冪也今用兩全相乘故以四爲法除之亦如圓田矣開立圓術説圓方諸率甚備可以驗此今有弧田弦三十步矢十五步問爲田幾何荅曰一畝九十七步半又有弧田弦七十八步二分步之一矢十三步九分步之七問爲田幾何荅曰二畝一百五十五步八十一分步之五十六術曰以弦乘矢矢又自乘并之二而一方中之圓圓裏十二觚之冪合外方之冪四分之三也中方合外方之半則朱青合外方四分之一也弧田半圓之冪也故依半圓之體而爲之術以弦乘矢而半之則爲黄冪矢自乘而半之爲二青冪青黄相連爲弧體弧體法當應規今觚面不至外畔失之於少矣圓田舊術以周三徑一爲率俱得十二觚之冪亦失之於少也與此相似指驗半圓之弧耳若不滿半圓者益復疎闊宜依句股鋸圓材之術以弧弦爲鋸道長以矢爲鋸深而求其徑既知圓徑則弧可割分也割之者半弧田之弦以爲股其矢爲句爲之求弦即小弧之弦也以半小弧之弦爲句半圓徑爲弦爲之求股以減半徑其餘即小弦之矢也割之又割使至極細但舉弦矢相乘之數則必近密率矣然於筭數差繁必欲有所尋究也若但度田取其大數舊術爲約耳今有環田中周九十二步外周一百二十二步徑五步此欲令與周三徑一之率相應故言徑五步也據中外周以徽術言之當徑四步一百五十七分步之一百二十二也臣淳風等謹按依密率合徑四步二十二分步之十七問爲田幾何荅曰二畝五十五步於徽術當爲田二畝三十一步一百五十七分步之二十三臣淳風等依密率爲田二畝三十步二十二分步之十五又有環田中周六十二步四分步之三外周一百一十三步二分步之一徑十二步三分步之二此田環而不通匝故徑十二步三分步之二若據上周求徑者此徑失之於多過周三徑一之率蓋爲疎矣於徽術當徑八步六百二十八分步之五十一臣淳風等謹按依周三徑一考之合徑八步二十四分步之一十一依密率合徑八步一百七十六分步之一十三問爲田幾何荅曰四畝一百五十六步四分步之一於徽術當爲田二畝二百三十二步五千二十四分步之七百八十七也依周三徑一爲田三畝二十五步六十四分步之二十五臣淳風等謹按密率爲田二畝二百三十一步一千四百八分步之七百一十七也術曰并中外周而半之以徑乘之爲積步此田截而中之周則爲長并而半之知亦以盈補虚也此可令中外周各自爲圓田以中圓減外圓餘則環實也密率術曰置中外周步數分母子各居其下母互乘子通全步内分子以中周減外周餘半之以益中周徑亦通分内子以乘周爲密實分母相乘爲法除之爲積步餘積步之分以畝法除之即畝數也按此術并中外周步數於上分母子於下母互乘子者爲中外周俱有分故以互乘齊其子母相乘同其母子齊母同故通全步内分子半之知以盈補虚得中平之周周則爲從徑則爲廣故廣從相乘而得其積既合分母還須分母出之故令周徑分母相乘而連除之即得積步不盡以等數除之而命分以畝法除積步得畝數也九章算術卷第二魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋粟米以御交質變易粟米之法凡此諸率相與大通其特相求各如本率可約者約之别術然也粟率五十糲米三十粺米二十七糳米二十四御米二十一小䵂十三半大䵂五十四糲飯七十五粺飯五十四糳飯四十八御飯四十二菽荅麻麥各四十五稻六十豉六十三飧九十熟菽一百三半糵一百七十五今有此都術也凡九數以爲篇名可以廣施諸率所謂告往而知來舉一隅而三隅反者也誠能分詭數之紛雜通彼此之否塞因物成率審辨名分平其偏頗齊其參差則終無不歸於此術也術曰以所有數乘所求率爲實以所有率爲法少者多之始一者數之母故爲率者必等之於一據粟率五糲率三是粟五而爲一糲米三而爲一也欲化粟爲米者粟當先本是一一者謂以五約之令五而爲一也訖乃以三乘之令一而爲三如是則率至於一以五爲三矣然先除後乘或有餘分故術反之又完言之知粟五升爲糲米三升分言之知粟一斗爲糲米五分斗之三以五爲母三爲子以粟求糲米者以子乘其母報除也然則所求之率常爲母也臣淳風等謹按宜云所求之率常爲子所有之率常爲母今乃云所求之率常爲母知脱錯也實如法而一今有粟一斗欲爲糲米問得幾何荅曰爲糲米六升術曰以粟求糲米三之五而一臣淳風等謹按都術以所求率乘所有數以所有率爲法此術以粟求米故粟爲所有數三是米率故三爲所求率五爲粟率故五爲所有率粟率五十米率三十退位求之故唯云三五也今有粟二斗一升欲爲粺米問得幾何荅曰爲粺米一斗一升五十分升之十七術曰以粟求粺米二十七之五十而一臣淳風等謹按粺米之率二十有七故直以二十七之五十而一也今有粟四斗五升欲爲糳米問得幾何荅曰爲糳米二斗一升五分升之三術曰以粟求糳米十二之二十五而一臣淳風等謹按糳米之率二十有四以爲率太繁故因而半之故半所求之率以乘所有之數所求之率既減半所有之率亦減半是故十二乘之二十五而一也今有粟七斗九升欲爲御米問得幾何荅曰爲御米三斗三升五十分升之九術曰以粟求御米二十一之五十而一今有粟一斗欲爲小䵂問得幾何荅曰爲小䵂二升一十分升之七術曰以粟求小䵂二十七之百而一臣淳風等謹按小䵂之率十三有半半者二爲母以二通之得二十七爲所求率又以母二通其粟率得一百爲所有率凡本率有分者須即乘除也他皆放此今有粟九斗八升欲爲大䵂問得幾何荅曰爲大䵂一十斗五升二十五分升之二十一術曰以粟求大䵂二十七之二十五而一臣淳風等謹按大䵂之率五十有四其可半故二十七之亦如粟求糳米半其二率今有粟二斗三升欲爲糲飯問得幾何荅曰爲糲飯三斗四升半術曰以粟求糲飯三之二而一臣淳風等謹按糲飯之率七十有五粟求糲飯合以此數乘之今以等數二十有五約其二率所求之率得三所有之率得二故以三乘二除今有粟三斗六升欲爲粺飯問得幾何荅曰爲粺飯三斗八升二十五分升之二十二術曰以粟求粺飯二十七之二十五而一臣淳風等謹按此術與大䵂多同今有粟八斗六升欲爲糳飯問得幾何荅曰爲糳飯八斗二升二十五分升之一十四術曰以粟求糳飯二十四之二十五而一臣淳風等謹按糳飯率四十八此亦半二率而乘除今有粟九斗八升欲爲御飯問得幾何荅曰爲御飯八斗二升二十五分升之八術曰以粟求御飯二十一之二十五而一臣淳風等謹按此術半率亦與糳飯多同今有粟三斗少半升欲爲菽問得幾何荅曰爲菽二斗七升一十分升之三今有粟四斗一升太半升欲爲荅問得幾何荅曰爲荅三斗七升半今有粟五斗太半升欲爲麻問得幾何荅曰爲麻四斗五升五分升之三今有粟一十斗八升五分升之二欲爲麥問得幾何荅曰爲麥九斗七升二十五分升之一十四術曰以粟求菽荅麻麥皆九之十而一臣淳風等謹按四術率並四十五皆是爲粟所求俱合以此率乘其本粟術欲從省先以等數五約之所求之率得九所有之率得十故九乘十除義由於此今有粟七斗五升七分升之四欲爲稻問得幾何荅曰爲稻九斗三十五分升之二十四術曰以粟求稻六之五而一臣淳風等謹按稻率六十亦約二率而乘除今有粟七斗八升欲爲豉問得幾何荅曰爲豉九斗八升二十五分升之七術曰以粟求豉六十三之五十而一今有粟五斗五升欲爲飧問得幾何荅曰爲飧九斗九升術曰以粟求飧九之五而一臣淳風等謹按飧率九十退位與求稻多同今有粟四斗欲爲熟菽問得幾何荅曰爲熟菽八斗二升五分升之四術曰以粟求熟菽二百七之百而一臣淳風等謹按熟菽之率一百三半半者其母二故以母二通之所求之率既被二乘所有之率隨而俱長故以二百七之百而一今有粟二斗欲爲糵問得幾何荅曰爲糵七斗術曰以粟求糵七之二而一臣淳風等謹按糵率一百七十有五合以此數乘其本粟術欲從省先以等數二十五約之所求之率得七所有之率得二故七乘二除今有糲米十五斗五升五分升之二欲爲粟問得幾何荅曰爲粟二十五斗九升術曰以糲米求粟五之三而一臣淳風等謹按上術以粟求米故粟爲所有數三爲所求率五爲所有率今此以米求粟故米爲所有數五爲所求率三爲所有率準都術求之各合其數以下所有反求多同皆準此今有粺米二斗欲爲粟問得幾何荅曰爲粟三斗七升二十七分升之一術曰以粺米求粟五十之二十七而一今有糳米三斗少半升欲爲粟問得幾何荅曰爲粟六斗三升三十六分升之七術曰以糳米求粟二十五之十二而一今有御米十四斗欲爲粟問得幾何荅曰爲粟三十三斗三升少半升術曰以御米求粟五十之二十一而一今有稻一十二斗六升一十五分升之一十四欲爲粟問得幾何荅曰爲粟一十斗五升九分升之七術曰以稻求粟五之六而一今有糲米一十九斗二升七分升之一欲爲粺米問得幾何荅曰爲粺米一十七斗二升一十四分升之一十三術曰以糲米求粺米九之十而一臣淳風等謹按粺率二十七合以此數乘糲米術欲從省先以等數三約之所求之率得九所有之率得十故九乘而十除今有糲米六斗四升五分升之三欲爲糲飯問得幾何荅曰爲糲飯一十六斗一升半術曰以糲米求糲飯五之二而一臣淳風等謹按糲飯之率七十有五宜以本糲米乘此率數術欲從省先以等數十五約之所求之率得五所有之率得二故五乘二除義由於此今有糲飯七斗六升七分升之四欲爲飧問得幾何荅曰爲飧九斗一升三十五分升之三十一術曰以糲飯求飧六之五而一臣淳風等謹按飧率九十爲糲饭所求宜以糲饭乘此率術欲從省先以等數十五約之所求之率得六所有之率得五以此故六乘五除也今有菽一斗欲爲熟菽問得幾何荅曰爲熟菽二斗三升術曰以菽求熟菽二十三之十而一臣淳風等謹按熟菽之率一百三半因其有半各以母二通之宜以菽數乘此率術欲從省先以等數九約之所求之率得一十一半所有之率得五也今有菽二斗欲爲豉問得幾何荅曰爲豉二斗八升術曰以菽求豉七之五而一臣淳風等謹按豉率六十三爲菽所求宜以菽乘此率術欲從省先以等數九約之所求之率得七而所有之率得五也今有麥八斗六升七分升之三欲爲小䵂問得幾何荅曰爲小䵂二斗五升一十四分升之一十三術曰以麥求小䵂三之十而一臣淳風等謹按小䵂之率十三半宜以母二通之以乘本麥之數術欲從省先以等數九約之所求之率得三所有之率得十也今有麥一斗欲爲大䵂問得幾何荅曰爲大䵂一斗二升術曰以麥求大䵂六之五而一臣淳風等謹按大䵂之率五十有四合以麥數乘此率術欲從省先以等數九約之所求之率得六所有之率得五也今有出錢一百六十買瓴甓十八枚瓴甓甎也問枚幾何荅曰一枚八錢九分錢之八今有出錢一萬三千五百買竹二千三百五十箇問箇幾何荅曰一箇五錢四十七分錢之三十五經率臣淳風等謹按今有之義以所求率乘所有數合以瓴甓一枚乘錢一百六十爲實但以一乘不長故不復乘是以徑將所買之率與所出之錢爲法實也又按此今有之義出錢爲所有數一枚爲所求率所買爲所有率而今有之即得所求數一乘不長故不復乘是以徑將所買之率爲法以所出之錢爲實故實如法得一枚錢不盡者等數而命分術曰以所買率爲法所出錢數爲實實如法得一錢今有出錢五千七百八十五買漆一斛六斗七升太半升欲斗率之問斗幾何荅曰一斗三百四十五錢五百三分錢之一十五今有出錢七百二十買縑一匹二丈一尺欲丈率之問丈幾何荅曰一丈一百一十八錢六十一分錢之二今有出錢二千三百七十買布九匹二丈七尺欲匹率之問匹幾何荅曰一匹二百四十四錢一百二十九分錢之一百二十四今有出錢一萬三千六百七十買絲一石二鈞一十七斤欲石率之問石幾何荅曰一石八千三百二十六錢一百九十七分錢之百七十八經率此術猶經分臣淳風等謹按今有之義錢爲所求率物爲所有數故以乘錢又以分母乘之爲實有分者通之所買通分内子爲所有率故以爲法實如法而一得錢數不盡而命分者因法爲母實餘爲子實見不滿故以命之術曰以所求率乘錢數爲實以所買率爲法實如法得一今有出錢五百七十六買竹七十八箇欲其大小率之問各幾何荅曰其四十八箇箇七錢其三十箇箇八錢今有出錢一千一百二十買絲一石二鈞十八斤欲其貴賤斤率之問各幾何荅曰其二鈞八斤斤五錢其一石一十斤斤六錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤石率之問各幾何荅曰其一鈞九兩一十二銖石八千五十一錢其一石一鈞二十七斤九兩一十七銖石八千五十五二錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤鈞率之問各幾何荅曰其七斤一十兩九銖鈞二千一十二錢其一石二鈞二十斤八兩二十銖鈞二千一十三錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤斤率之問各幾何荅曰其一石二鈞七斤十兩四銖斤六十七錢其二十斤九兩一銖斤六十八錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤兩率之問各幾何荅曰其一石一鈞一十七斤一十四兩一銖兩四錢其一鈞一十斤五兩四銖兩五錢其率其率知欲令無分術曰各置所買石鈞斤兩以爲法以所率乘錢數爲實實如法而一不滿法者反以實減法法賤實貴其求石鈞斤兩以積銖各除法實各得其積數餘各爲铢按出錢五百七十六買竹七十八箇以除錢得七實餘三十是爲三十箇復可增一錢然則實餘之數则是貴者之數故曰實貴也本以七十八箇爲法今以貴者減之則其餘悉是賤者之數故曰法賤也其求石鈞斤兩以積銖各除法實各得其積數餘各爲銖者謂石鈞斤兩積銖除實又以石鈞斤兩積銖除法餘各爲铢即合所問今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤铢率之問各幾何荅曰其一鈞二十斤六兩十一銖五銖一錢其一石一鈞七斤一十二兩一十八銖六銖一錢今有出錢六百二十買羽二千一百翭翭羽本也數羽稱其本猶數草木稱其根株欲其貴賤率之問各幾何荅曰其一千一百四十翭三翭一錢其九百六十翭四翭一錢今有出錢九百八十買矢簳五千八百二十枚欲其貴賤率之問各幾何荅曰其三百枚五枚一錢其五千五百二十枚六枚一錢反其率臣淳風等謹按其率者錢多物少反其率知錢少物多多少相反故曰反其率也術曰以錢數爲法所率爲實實如法而一不滿法者反以實減法法少實多二物各以所得多少之數乘法實即物數按其率出錢六百二十買羽二千一百翭反之當二百四十錢一錢四翭其三百八十錢一錢三翭是錢有二價物有貴賤故以羽乘錢反其率也臣淳風等謹按其率者以物數爲法錢數爲實反之者以錢數爲法物數爲實不滿法者實餘也當以餘物化爲錢矣法爲凡錢而今以化錢減之故曰反以實減法也法少者經分之所得故曰法少實多者餘分之所益故曰實多乘實宜以多乘法宜以少故曰各以所得多少之數乘法實即物數也九章算術卷第三魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋衰分以御貴賤稟税衰分衰分差也術曰各置列衰列衰相與率也重疊則可約副并爲法以所分乘未并者各自爲實法集而衰别數本一也今以所分乘上别以下集除之一乘一除適足相消故所分猶存且各應率而别也於今有術列衰各爲所求率副并爲所有率所分爲所有數又以經分言之假令甲家三人乙家二人丙家一人并六人共分十二爲人得二也欲復作逐家者則當列置人數以一人所得乘之今此術先乘而後除也實如法而一不滿法者以法命之今有大夫不更簪褭上造公士凡五人共獵得五鹿欲以爵次分之問各得幾何荅曰大夫得一鹿三分鹿之二不更得一鹿三分鹿之一簪褭得一鹿上造得三分鹿之二公士得三分鹿之一術曰列置爵數各自爲衰爵數者謂大夫五不更四簪褭三上造二公士一也墨子號令篇以爵級爲賜然則戰國之初有此名也今有術列衰各爲所求率副并爲所有率今有鹿數爲所有數而今有之即得副并爲法以五鹿乘未并者各自爲實實如法得一鹿今有牛馬羊食人苖苖主責之粟五斗羊主曰我羊食半馬馬主曰我馬食半牛今欲衰償之問各出幾何荅曰牛主出二斗八升七分升之四馬主出一斗四升七分升之二羊主出七升七分升之一術曰置牛四馬二羊一各自爲列衰副并爲法以五斗乘未并者各自爲實實如法得一斗臣淳風等謹按此術問意羊食半馬馬食半牛是謂四羊當一牛二羊當一馬今術置羊一馬二牛四者通其率以爲列衰今有甲持錢五百六十乙持錢三百五十丙持錢一百八十凡三人俱出關關税百錢欲以錢數多少衰出之問各幾何荅曰甲出五十一錢一百九分錢之四十一乙出三十二錢一百九分錢之一十二丙出一十六錢一百九分錢之五十六術曰各置錢數爲列衰副并爲法以百錢乘未并者各自爲實實如法得一錢臣淳風等謹按此術甲乙丙持錢數以爲列衰副并爲所有率未并者各爲所求率百錢爲所有數而今有之即得今有女子善織日自倍五日织五尺問日織幾何荅曰初日織一寸三十一分寸之十九次日織三寸三十一分寸之七次日織六寸三十一分寸之十四次日織一尺二寸三十一分寸之二十八次日織二尺五寸三十一分寸之二十五術曰置一二四八十六爲列衰副并爲法以五尺乘未并者各自爲實實如法得一尺今有北鄉筭八千七百五十八西鄉筭七千二百三十六南鄉筭八千三百五十六凡三鄉發傜三百七十八人欲以筭數多少衰出之問各幾何荅曰北鄉遣一百三十五人一萬二千一百七十五分人之一萬一千六百三十七西鄉遣一百一十二人一萬二千一百七十五分人之四千四南鄉遣一百二十九人一萬二千一百七十五分人之八千七百九術曰各置筭數爲列衰臣淳風等謹按三鄉筭數約可半者爲列衰副并爲法以所發傜人數乘未并者各自爲實實如法得一人按此術今有之義也今有稟粟大夫不更簪褭上造公士凡五人一十五斗今有大夫一人後來亦當稟五斗倉無粟欲以衰出之問各幾何荅曰大夫出一斗四分斗之一不更出一斗簪褭出四分斗之三上造出四分斗之二公士出四分斗之一術曰各置所稟粟斛斗數爵次均之以爲列衰副并而加後來大夫亦五斗得二十以爲法以五斗乘未并者各自爲實實如法得一斗稟前五人十五斗者大夫得五斗不更得四斗簪褭得三斗上造得二斗公士得一斗欲令五人各依所得粟多少減與後來大夫即與前來大夫同據前來大夫已得五斗故言亦也各以所得斗數爲衰并得十五而加後來大夫亦五斗凡二十爲法也是爲六人共出五斗後來大夫亦俱損折今有術副并爲所有率未并者各爲所求率五斗爲所有數而今有之即得今有稟粟五斛五人分之欲令三人得三二人得二問各幾何荅曰三人人得一斛一斗五升十三分升之五二人人得七斗六升十三分升之十二術曰置三人人三二人人二爲列衰副并爲法以五斛乘未并者各自爲實實如法得一斛返衰以爵次言之大夫五不更四欲令高爵得多者當使大夫一人受五分不更一人受四分人數爲母分數爲子母同則子齊齊即衰也故上衰分宜以五四爲列焉今此令高爵出少則當使大夫五人共出一人分不更四人共出一人分故謂之返衰人數不同則分數不齊當令母互乘子母互乘子則動者爲不動者衰也亦可先同其母各以分母約其子爲返衰副并爲法以所分乘未并者各自爲實實如法而一術曰列置衰而令相乘動者爲不動者衰今有大夫不更簪褭上造公士凡五人共出百錢欲令高爵出少以次漸多問各幾何荅曰大夫出八錢一百三十七分錢之一百四不更出一十錢一百三十七分錢之一百三十簪褭出一十四錢一百三十七分錢之八十二上造出二十一錢一百三十七分錢之一百二十三公士出四十三錢一百三十七分錢之一百九術曰置爵數各自爲衰而返衰之副并爲法以百錢乘未并者各自爲實實如法得一錢今有甲持粟三升乙持糲米三升丙持糲飯三升欲令合而分之問各幾何荅曰甲二升一十分升之七乙四升一十分升之五丙一升一十分升之八術曰以粟率五十糲米率三十糲飯率七十五爲衰而返衰之副并爲法以九升乘未并者各自爲實實如法得一升按此術三人所持升數雖等論其本率精麄不同米率雖少令最得多飯率雖多返使得少故令返之使精得多而麄得少於今有術副并爲所有率未并者各爲所求率九升爲所有數而今有之即得今有絲一斤價直二百四十今有錢一千三百二十八問得絲幾何荅曰五斤八兩一十二銖五分銖之四術曰以一斤價數爲法以一斤乘今有錢數爲實實如法得絲數臣淳風等謹按此術今有之義以一斤價爲所有率一斤爲所求率今有錢爲所有數而今有之即得今有絲一斤價直三百四十五今有絲七兩一十二銖問得錢幾何荅曰一百六十一錢三十二分錢之二十三術曰以一斤铢數爲法以一斤價數乘七兩一十二銖爲實實如法得錢數臣淳風等謹按此術亦今有之義以絲一斤銖數爲所有率價錢爲所求率今有絲爲所有數而今有之即得今有縑一丈價直一百二十八今有縑一匹九尺五寸問得錢幾何荅曰六百三十三錢五分錢之三術曰以一丈寸數爲法以價錢數乘今有縑寸數爲實實如法得錢數臣淳風等謹按此術亦今有之義以縑一丈寸數爲所有率價錢爲所求率今有縑寸數爲所有數而今有之即得今有布一匹價直一百二十五今有布二丈七尺問得錢幾何荅曰八十四錢八分錢之三術曰以一匹尺數爲法今有布尺數乘價錢爲實實如法得錢數臣淳風等謹按此術亦今有之義以一匹尺數爲所有率價錢爲所求率今有布爲所有數今有之即得今有素一匹一丈價直六百二十五今有錢五百問得素幾何荅曰得素一匹術曰以價直爲法以一匹一丈尺數乘今有錢數爲實實如法得素數臣淳風等謹按此術亦今有之義以價錢爲所有率五丈尺數爲所求率今有錢爲所有數今有之即得今有與人絲一十四斤約得縑一十斤今與人絲四十五斤八兩問得縑幾何荅曰三十二斤八兩術曰以一十四斤兩數爲法以一十斤乘今有絲兩數爲實實如法得縑數臣淳風等謹按此術亦今有之義以一十四斤兩數爲所有率一十斤爲所求率今有絲爲所有數今有之即得今有絲一斤耗七兩今有絲二十三斤五兩問耗幾何荅曰一百六十三兩四銖半術曰以一斤展十六兩爲法以七兩乘今有絲兩數爲實實如法得耗數臣淳風等謹按此術亦今有之義以一斤爲十六兩爲所有率七兩爲所求率今有絲爲所有數而今有之即得今有生絲三十斤乾之耗三斤十二兩今有乾絲一十二斤問生絲幾何荅曰一十三斤一十一兩十銖七分銖之二術曰置生絲兩數除耗數餘以爲法餘四百二十兩即乾絲率三十斤乘乾絲兩數爲實實如法得生絲數凡所得率知細則俱細麄则俱麄兩數相抱而已故品物不同如上縑絲之比相與率焉三十斤凡四百八十兩令生絲率四百八十兩令乾絲率四百二十兩則其數相通可俱爲銖可俱爲兩可俱爲斤無所歸滯也若然宜以所有乾絲斤數乘生絲兩數爲實今以斤兩錯互而亦同歸者使乾絲以兩數爲率生絲以斤數爲率譬之異類亦各有一定之勢臣淳風等謹按此術置生絲兩數除耗數餘即乾絲之率於今有術爲所有率三十斤爲所求率乾絲兩數爲所有數凡所謂率者細則俱細麄则俱麄今以斤乘兩知乾絲即以兩數爲率生絲即以斤數爲率譬之異物各有一定之率也今有田一畝收粟六升太半升今有田一頃二十六畝一百五十九步問收粟幾何荅曰八斛四斗四升一十二分升之五術曰以畝二百四十步爲法以六升太半升乘今有田積步爲實實如法得粟數臣淳風等謹按此術亦今有之義以一畝步數爲所有率六升太半升爲所求率今有田積步爲所有數而今有之即得今有取保一歲價錢二千五百今先取一千二百問當作日幾何荅曰一百六十九日二十五分日之二十三術曰以價錢爲法以一歲三百五十四日乘先取錢數爲實實如法得日數臣淳風等謹按此術亦今有之義以價爲所有率一歲日數爲所求率取錢爲所有數而今有之即得今有貸人千錢月息三十今有貸人七百五十錢九日歸之問息幾何荅曰六錢四分錢之三術曰以月三十日乘千錢爲法以三十日乘千錢爲法者得三萬是爲貸人錢三萬一日息三十也以息三十乘今所貸錢數又以九日乘之爲實實如法得一錢以九日乘今所貸錢爲今一日所有錢於今有術爲所有數息三十爲所求率三萬錢爲所有率此又可以一月三十日約息三十錢爲十分一日以乘今一日所有錢爲實千錢爲法爲率者當等之於一也故三十日或可乘本或可約息皆所以等之也九章算術卷第四魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋少廣以御積冪方圓少廣臣淳風等謹按一畝之田廣一步長二百四十步今欲截取其從少以益其廣故曰少廣術曰置全步及分母子以最下分母徧乘諸分子及全步臣淳風等謹按以分母乘全步者通其分也以母乘子者齊其子也各以其母除其子置之於左命通分者又以分母徧乘諸分子及已通者皆通而同之并之爲法臣淳風等謹按諸子悉通故可并之爲法亦宜用合分術列數尤多若用乘則筭數至繁故别制此術從省約置所求步數以全步積分乘之爲實此以田廣爲法一畝積步爲實法有分者當同其母齊其子以同乘法實而并齊於法今以分母乘全步及子子如母而一竝以并全法則法實俱長意亦等也故如法而一得從步數實如法而一得從步今有田廣一步半求田一畝問從幾何荅曰一百六十步術曰下有半是二分之一以一爲二半爲一并之得三爲法置田二百四十步亦以一爲二乘之爲實實如法得從步今有田廣一步半三分步之一求田一畝問從幾何荅曰一百三十步一十一分步之一十術曰下有三分以一爲六半爲三三分之一爲二并之得一十一以爲法置田二百四十步亦以一爲六乘之爲實實如法得從步今有田廣一步半三分步之一四分步之一求田一畝問從幾何荅曰一百一十五步五分步之一術曰下有四分以一
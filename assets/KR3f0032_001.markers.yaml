  - {type: variant, offset: 23000, length: 314, content: 之八十八而一今有方亭下方五丈上方四丈高五丈問積幾何荅曰一十萬一千六百六十六尺太半尺術曰上下方相乘又各自乘并之以高乘之三而一此章有壍堵陽馬皆合而成立方蓋説筭者乃立棊三品以效高深之積假令方亭上方一尺下方三尺高一尺其用棊也中央立方一四面壍堵四四角陽馬四上下方相乘爲三尺以高乘之約積三尺是爲得中央立方一四面壍堵各一下方自乘爲九以高乘之得積九尺是爲中央立方一四面壍堵各二四角陽馬各三也上方自乘以高乘之得積一尺又爲中央立方一凡三品棊皆一而爲三故三而一得積尺用棊之數立方三壍堵陽馬各十二凡二十七棊十三更差次之而成方亭者三驗矣爲術又可令方差自乘以高乘之三而一即四陽馬也上下方相乘以高乘之即中央立方及四面壍堵也并之以爲方亭積數也今有圓亭下周三丈上, SBCK: ''}

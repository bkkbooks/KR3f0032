  - {type: variant, offset: 39931, length: 13695, content: 假令故米二斗不足二升令之三斗有餘二升按桶受一斛若使故米二斗須添粟八斗以滿之八斗得糲米四斗八升課於七斗是爲不足二升若使故米三斗須添粟七斗以滿之七斗得糲米四斗二升課於七斗是爲有餘二升以盈不足維乘假令之數者欲爲齊同之意爲齊同者齊其假令同其盈朒通計齊即不盈不朒之正數故可以并之爲實并盈不足爲法實如法即得故米斗數乃不盈不朒之正數也今有垣高九尺瓜生其上蔓日長七寸瓠生其下蔓日長一尺問幾何日相逢瓜瓠各長幾何荅曰五日十七分日之五瓜長三尺七寸一十七分寸之一瓠長五尺二寸一十七分寸之一十六術曰假令五日不足五寸令之六日有餘一尺二寸按假令五日不足五寸者瓜生五日下垂蔓三尺五寸瓠生五日上延蔓五尺課於九尺之垣是爲不足五寸令之六日有餘一尺二寸者若使瓜生六日下垂蔓四尺二寸瓠生六日上延蔓六尺课於九尺之垣是爲有餘一尺二寸以盈不足維乘假令之數者欲爲齊同之意齊其假令同其盈朒通計齊即不盈不朒之正數故可以并以爲實并盈不足爲法實如法而一即設差不盈不朒之正數即得日數以瓜瓠一日之長乘之故各得其長之數也今有蒲生一日長三尺莞生一日長一尺蒲生日自半莞生日自倍問幾何日而長等荅曰二日十三分日之六各長四尺八寸一十三分寸之六術曰假令二日不足一尺五寸令之三日有餘一尺七寸半按假令二日不足一尺五寸者蒲生二日長四尺五寸莞生二日長三尺是爲未相及一尺五寸故曰不足令之三日有餘一尺七寸半者蒲增前七寸半莞增前四尺是爲過一尺七寸半故曰有餘以盈不足乘除之又以後一日所長各乘日分子如日分母而一者各得日分子之長也故各增二日定長即得其數今有醇酒一斗直钱五十行酒一斗直錢一十今將錢三十得酒二斗問醇行酒各得幾何荅曰醇酒二升半行酒一斗七升半術曰假令醇酒五升行酒一斗五升有餘一十令之醇酒二升行酒一斗八升不足二據醇酒五升直錢二十五行酒一斗五升直錢一十五課於三十是爲有餘十據醇酒二升直錢一十行酒一斗八升直錢一十八課於三十是爲不足二以盈不足術求之此問已有重設及其齊同之意也今有大器五小器一容三斛大器一小器五容二斛問大小器各容幾何荅曰大器容二十四分斛之十三小器容二十四分斛之七術曰假令大器五斗小器亦五斗盈一十斗令之大器五斗五升小器二斗五升不足二斗按大器容五斗大器五容二斛五斗以減三斛餘五斗即小器一所容故曰小器亦五斗小器五容二斛五斗大器一合爲三斛課於兩斛乃多十斗令之大器五斗五升大器五合容二斛七斗五升以減三斛餘二斗五升即小器一所容故曰小器二斗五升大器一容五斗五升小器五合容一斛二斗五升合爲一斛八斗課於二斛少二斗故曰不足二斗以盈不足維乘除之今有漆三得油四油四和漆五今有漆三斗欲令分以易油還自和餘漆問出漆得油和漆各幾何荅曰出漆一斗一升四分升之一得油一斗五升和漆一斗八升四分升之三術曰假令出漆九升不足六升令之出漆一斗二升有餘二升按此術三斗之漆出九升得油一斗二升可和漆一斗五升餘有二斗一升則六升無油可和故曰不足六升令之出漆一斗二升則易得油一斗六升可和漆二斗於三斗之中已出一斗二升餘有一斗八升見在油合和得漆二斗則是有餘二升以盈不足維乘之爲實并盈不足爲法實如法而一得出漆升數求油及和漆者四五各爲所求率三四各爲所有率而今有之即得也今有玉方一寸重七兩石方一寸重六兩今有石立方三寸中有玉并重十一斤問玉石重各幾何荅曰玉一十四寸重六斤二兩石一十三寸重四斤一十四兩術曰假令皆玉多十三兩令之皆石不足一十四兩不足爲玉多爲石各以一寸之重乘之得玉石之積重立方三寸是一面之方計積二十七寸玉方一寸重七兩石方一寸重六兩是爲玉石重差一兩假令皆玉合有一百八十九兩課於一十一斤有餘一十三兩玉重而石輕故有此多即二十七寸之中有十三寸寸損一兩則以爲石重故言多爲石言多之數出於石以爲玉假令皆石合有一百六十二兩課於十一斤少十四兩故曰不足此不足即以重爲輕故令減少數於并重即二十七寸之中有十四寸寸增一兩也今有善田一畝價三百惡田七畝價五百今并買一頃價錢一萬問善惡田各幾何荅曰善田一十二畝半惡田八十七畝半術曰假令善田二十畝惡田八十畝多一千七百一十四錢七分錢之二令之善田一十畝惡田九十畝不足五百七十一錢七分錢之三按善田二十畝直錢六千惡田八十畝直錢五千七百一十四七分錢之二課於一萬是多一千七百一十四七分錢之二令之善田十畝直錢三千惡田九十畝直錢六千四百二十八七分錢之四课於一萬是爲不足五百七十一七分錢之三以盈不足術求之也今有黄金九枚白銀一十一枚稱之重適等交易其一金輕十三兩問金銀一枚各重幾何荅曰金重二斤三兩一十八銖銀重一斤一十三兩六銖術曰假令黄金三斤白銀二斤一十一分斤之五不足四十九於右行令之黄金二斤白銀一斤一十一分斤之七多一十五於左行以分母各乘其行内之數以盈不足維乘所出率并以爲實并盈不足爲法實如法得黄金重分母乘法以除得銀重約之得分也按此術假令黄金九白銀一十一俱重二十七斤金九約之得三斤銀一十一約之得二斤一十一分斤之五各爲金銀一枚重數就金重二十七斤之中減一金之重以益銀銀重二十七斤之中減一銀之重以益金則金重二十六斤一十一分斤之五銀重二十七斤一十一分斤之六以少減多則金輕一十七兩一十一分兩之五課於一十三兩多四兩一十一分兩之五通分内子言之是爲不足四十九又令之黄金九一枚重二斤九枚重一十八斤白銀一十一亦合重一十八斤也乃以一十一除之得一斤一十一分斤之七爲銀一枚之重數今就金重一十八斤之中減一枚金以益銀復減一枚銀以益金則金重一十七斤一十一分斤之七銀重一十八斤一十一分斤之四以少減多即金輕一十一分斤之八課於一十三兩少一兩一十一分兩之四通分内子言之是爲多一十五以盈不足爲之如法得金重分母乘法以除者爲銀兩分母故同之須通法而後乃除得銀重餘皆約之者術省故也今有良馬與駑馬發長安至齊齊去長安三千里良馬初日行一百九十三里日增一十三里駑馬初日行九十七里日減半里良馬先至齊復還迎駑馬問幾何日相逢及各行幾何荅曰一十五日一百九十一分日之一百三十五而相逢良馬行四千五百三十四里一百九十一分里之四十六駑馬行一千四百六十五里一百九十一分里之一百四十五術曰假令十五日不足三百三十七里半令之十六日多一百四十里以盈不足維乘假令之數并而爲實并盈不足爲法實如法而一得日數不盡者以等數除之而命分求良馬行者十四乘益疾里數而半之加良馬初日之行里數以乘十五日得良馬十五日之凡行又以十五日乘益疾里數加良馬初日之行以乘日分子如日分母而一所得加前良馬凡行里數即得其不盡而命分求駑馬行者以十四乘半里又半之以減駑馬初日之行里數以乘十五日得駑馬十五日之凡行又以十五日乘半里以減駑馬初日之行餘以乘日分子如日分母而一所得加前里即駑馬定行里數其奇半里者爲半法以半法增殘分即得其不盡者而命分按令十五日不足三百三十七里半者據良馬十五日凡行四千二百六十里除先去齊三千里定還迎駑馬一千二百六十里駑馬十五日凡行一千四百二里半并良駑二馬所行得二千六百六十二里半課於三千里少三百三十七里半故曰不足令之十六日多一百四十里者據良馬十六日凡行四千六百四十八里除先去齊三千里定還迎駑馬一千六百四十八里駑馬十六日凡行一千四百九十二里并良駑二馬所行得三千一百四十里課於三千里餘有一百四十里故謂之多也以盈不足之實如法而一得日數者即設差不盈不朒之正數以二馬初日所行里乘十五日爲一十五日平行數求初末益疾減遲之數者并一與十四以十四乘而半之爲中平之積又令益疾減遲里數乘之各爲減益之中平里故各減益平行數得一十五日定行里若求後一日以十六日之定行里數乘日分子如日分母而一各得日分子之定行里數故各并十五日定行里即得其駑馬奇半里者法爲全里之分故破半里爲半法以增殘分即合所問也今有人持錢之蜀賈利十三初返歸一萬四千次返歸一萬三千次返歸一萬二千次返歸一萬一千後返歸一萬凡五返歸錢本利俱盡問本持錢及利各幾何荅曰本三萬四百六十八錢三十七萬一千二百九十三分錢之八萬四千八百七十六利二萬九千五百三十一錢三十七萬一千二百九十三分錢之二十八萬六千四百一十七術曰假令本錢三萬不足一千七百三十八錢半令之四萬多三萬五千三百九十錢八分按假令本錢三萬并利爲三萬九千除初返歸留餘加利爲三萬二千五百除二返歸留餘又加利爲二萬五千三百五十除第三返歸留餘又加利爲一萬七千三百五十五除第四返歸留餘又加利爲八千二百六十一錢半除第五返歸留合一萬錢不足一千七百三十八錢半若使本錢四萬并利爲五萬二千除初返歸留餘加利爲四萬九千四百除第二返歸留餘又加利爲四萬七千三百二十除第三返歸留餘又加利爲四萬五千九百一十六除第四返歸留餘又加利爲四萬五千三百九十錢八分除第五返歸留合一萬餘三萬五千三百九十錢八分故曰多又術置後返歸一萬以十乘之十三而一即後所持之本加一萬一千又以十乘之十三而一即第四返之本加一萬二千又以十乘之十三而一即第三返之本加一萬三千又以十乘之十三而一即第二返之本加一萬四千又以十乘之十三而一即初持之本并五返之錢以減之即利也今有垣厚五尺兩鼠對穿大鼠日一尺小鼠亦日一尺大鼠日自倍小鼠日自半問幾何日相逢各穿幾何荅曰二日一十七分日之二大鼠穿三尺四寸十七分寸之一十二小鼠穿一尺五寸十七分寸之五術曰假令二日不足五寸令之三日有餘三尺七寸半大鼠日自倍二日合穿三尺小鼠日自半合穿一尺五寸并大鼠所穿合四尺五寸課於垣厚五尺是爲不足五寸令之三日大鼠穿得七尺小鼠穿得一尺七寸半并之以減垣厚五尺有餘三尺七寸半以盈不足術求之即得以後一日所穿乘日分子如日分母而一即各得日分子之中所穿故各增二日定穿即合所問也九章算術卷第八魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋方程以御錯糅正負今有上禾三秉中禾二秉下禾一秉實三十九斗上禾二秉中禾三秉下禾一秉實三十四斗上禾一秉中禾二秉下禾三秉實二十六斗問上中下禾實一秉各幾何荅曰上禾一秉九斗四分斗之一中禾一秉四斗四分斗之一下禾一秉二斗四分斗之三方程程課程也羣物總雜各列有數總言其實令每行爲率二物者再程三物者三程皆如物數程之竝列爲行故謂之方程行之左右無所同存且爲有所據而言耳此都術也以空言難曉故特繫之禾以决之又列中左行如右行也術曰置上禾三秉中禾二秉下禾一秉實三十九斗於右方中左禾列如右方以右行上禾徧乘中行而以直除爲術之意令少行減多行反覆相減則頭位必先盡上無一位則此行亦闕一物矣然而舉率以相減不害餘數之課也若消去頭位則下去一物之實如是叠令左右行相減審其正負則可得而知先令右行上禾乘中行爲齊同之意爲齊同者謂中行直減右行也從簡易雖不言齊同以齊同之意觀之其義然矣又乘其次亦以直除復去左行首然以中行中禾不盡者徧乘左行而以直除亦令兩行相去行之中禾也左方下禾不盡者上爲法下爲實實即下禾之實上中禾皆去故餘數是下禾實非但一秉欲約衆秉之實當以禾秉數爲法列此以下禾之秉數乘兩行以直除則下禾之位皆决矣各以其餘一位之秉除其下實即計數矣用算繁而不省所以别爲法約也然猶不如自用其舊廣異法也求中禾以法乘中行下實而除下禾之實此謂中兩禾實下禾一秉實數先見將中秉求中禾其列實以減下實而左方下禾雖去一秉以法爲母於率不通故先以法乘其通而同之俱令法爲母而除下禾實以下禾先見之實令乘下禾秉數即得下禾一位之列實減於下實則其數是中禾之實也餘如中禾秉數而一即中禾之實餘中禾一位之實也故以一位秉數約之乃得一秉之實也求上禾亦以法乘右行下實而除下禾中禾之實此右行三禾共實合三位之實故以二位秉數約之乃得一秉之實今中下禾之實其數竝見令乘右行之禾秉以減之故亦如前各求列實以減下實也餘如上禾秉數而一即上禾之實實皆如法各得一斗三實同用不滿法者以法命之母實皆當約之今有上禾七秉損實一斗益之下禾二秉而實一十斗下禾八秉益實一斗與上禾二秉而實一十斗問上下禾實一秉各幾何荅曰上禾一秉實一斗五十二分斗之一十八下禾一秉實五十二分斗之四十一術曰如方程損之曰益益之曰損問者之辭雖今按實云上禾七秉下禾二秉實一十一斗上禾二秉下禾八秉實九斗也損之曰益言損一斗餘當一十斗今欲全其實當加所損也益之曰損言益實以一斗乃滿一十斗今欲知本實當減所加即得也損實一斗者其實過一十斗也益實一斗者其實不满一十斗也重諭損益數者各以損益之數損益之也今有上禾二秉中禾三秉下禾四秉實皆不滿斗上取中中取下下取上各一秉而實滿斗問上中下禾實一秉各幾何荅曰上禾一秉實二十五分斗之九中禾一秉實二十五分斗之七下禾一秉實二十五分斗之四術曰如方程各置所取置上禾二秉爲右行之上中禾三秉爲中行之中下禾四秉爲左行之下所取一秉及實一斗各從其位諸行相借取之物皆依此例以正負術入之正負術曰今兩算得失相反要令正負以名之正算赤負算黑否則以邪正爲異方程自有赤黑相取法實數相推求之術而其并減之勢不得廣通故使赤黑相消奪之於算或減或益同行異位殊爲二品各有并減之差見於下焉著此二條特繫之禾以成此二條之意故赤黑相雜足以定上下之程減益雖殊足以通左右之數差實雖分足以應同異之率然則其正無入以負之負無入以正之其率不妄也同名相除此謂以赤除赤以黑除黑行求相減者爲去頭位也然則頭位同名者當用此條頭位異名者當用下條異名相益益行減行當各以其類矣其異名者非其類也非其類者猶無對也非所得減也故赤用黑對則除黑無對則除黑黑用赤對則除赤無對則除赤赤黑并於本數此爲相益之皆所以爲消奪消奪之與減益成一實也術本取要必除行首至於他位不嫌多少故或令相減或令相并理無同異而一也正無入負之負無入正之無入爲無對也無所得減則使消奪者居位也其當以列實或減下實而行中正負雜者亦用此條此條者同名減實異名益實正無入負之負無入正之也其異名相除同名相益正無入正之負無入負之此條異名相除爲例故亦與上條互取凡正負所以記其同異使二品互相取而已矣言負者未必負於少言正者未必正於多故每一行之中雖復赤黑異算無傷然則可得使頭位常相與異名此條之實兼通矣遂以二條反覆一率觀其每與上下互相取位則隨算而言耳猶一術也又本設諸行欲因成數以相去耳故其多少無限令上下相命而已若以正負相減如數有舊增法者每行可均之不但數物左右之也今有上禾五秉損實一斗一升當下禾七秉上禾七秉損實二斗五升當下禾五秉問上下禾實一秉各幾何荅曰上禾一秉五升下禾一秉二升術曰如方程置上禾五秉正下禾七秉負損實一斗一升正言上禾五秉之實多減其一斗一升餘是與下禾七秉相當數也故互其算令相折除以一斗一升爲差爲差者上禾之餘實也次置上禾七秉正下禾五秉負損實二斗五升正以正負術入之按正負之術本設列行物程之數不限多少必令與實上下相次而以每行各自爲率然而或減或益同行異位殊爲二品各自并減之差見於下也今有上禾六秉損實一斗八升當下禾一十秉下禾一十五秉損實五升當上禾五秉問上下禾實一秉各幾何荅曰上禾一秉實八升下禾一秉實三升術曰如方程置上禾六秉正下禾一十秉負損實一斗八升正次上禾五秉負下禾一十五秉正損實五升正以正負術入之言上禾六秉之實多減損其一斗八升餘是與下禾十秉相當之數故亦互其算而以一斗八升爲差實差實者上禾之餘實今有上禾三秉益實六斗當下禾一十秉下禾五秉益實一斗當上禾二秉問上下禾實一秉各幾何荅曰上禾一秉實八斗下禾一秉實三斗術曰如方程置上禾三秉正下禾一十秉負益實六斗負次置上禾二秉負下禾五秉正益實一斗負以正負術入之言上禾三秉之實少益其六斗然後於下禾十秉相當也故亦互其算而以六斗爲差實差實者下禾之餘實今有牛五羊二直金十兩牛二羊五直金八兩問牛羊各直金幾何荅曰牛一直金一兩二十一分兩之一十三羊一直金二十一分兩之二十術曰如方程假令爲同齊頭位爲牛當相乘右行定更置牛十羊四直金二十兩左行牛十羊二十五直金四十兩牛數等同金多二十兩者羊差二十一使之然也以少行減多行則牛數盡惟羊與直金之數見可得而知也以小推大雖四五行不異也今有賣牛二羊五以買一十三豕有餘錢一千賣牛三豕三以買九羊錢適足賣六羊八豕以買五牛錢不足六百問牛羊豕價各幾何荅曰牛價一千二百羊價五百豕價三百術曰如方程置牛二羊五正豕一十三負餘錢數正次牛三正羊九負豕三正次五牛負六羊正八豕正不足錢負以正負術入之此中行買賣相折錢適足故但互買賣算而已故下無錢直也設欲以此行如方程法先令二牛徧乘中行而以右行直除之是故終於下實虛缺矣故注曰正無實負負無實正方爲類也方將以别實加適足之數與實物作實盈不足章黄金白銀與此相當假令黄金九白銀一十一稱之重適等交易其一金輕十三兩問金銀一枚各重幾何與此同今有五雀六燕集稱之衡雀俱重燕俱輕一雀一燕交而處衡適平并雀燕重一斤問雀燕一枚各重幾何荅曰雀重一兩一十九分兩之一十三燕重一兩一十九分兩之五術曰如方程交易質之各重八兩此四雀一燕與一雀五燕衡適平并重一斤故各八兩列兩行程數左行頭位其數有一者令右行徧除亦可令於左行而取其法實於左左行數多以右行取其數左頭位減盡中下位算當燕與實右行不動左上空中法下實即每枚當重宜可知也按此四雀一燕與一雀五燕其重等是三雀四燕重相當雀率重四燕率重三也諸再程之率皆可異術求也即其數也今有甲乙二人持錢不知其數甲得乙半而錢五十乙得甲太半而亦錢五十問甲乙持錢各幾何荅曰甲持三十七錢半乙持二十五錢術曰如方程損益之此問者言一甲半乙而五十太半甲一乙亦五十也各以分母乘其全内子行定二甲一乙而錢一百二甲三乙而錢一百五十於是乃如方程諸物有分者放此今有二馬一牛價過一萬如半馬之價一馬二牛價不滿一萬如半牛之價問牛馬價各幾何荅曰馬價五千四百五十四錢一十一分錢之六牛價一千八百一十八錢一十一分錢之二術曰如方程損益之此一馬半與一牛價直一萬也二牛半與一馬亦直一萬也一馬半與一牛直錢一萬通分内子右行爲三馬二牛直錢二萬二牛半與一馬直錢一萬通分内子左行爲二馬五牛直錢二萬也今有武馬一匹中馬二匹下馬三匹皆載四十石至阪皆不能上武馬借中馬一匹中馬借下馬一匹下馬借武馬一匹乃皆上問武中下馬一匹各力引幾何荅曰武馬一匹力引二十二石七分石之六中馬一匹力引一十七石七分石之一下馬一匹力引五石七分石之五術曰如方程各置所借以正負術入之今有五家共井甲二綆不足如乙一鯁乙三綆不足以丙一綆丙四綆不足以丁一綆丁五綆不足以戊一綆戊六綆不足以甲一綆如各得所不足一綆皆逮問井深綆長各幾何荅曰井深七丈二尺一寸甲綆長二丈六尺五寸乙綆长一丈九尺一寸丙綆長一丈四尺八寸丁綆長一丈二尺九寸戊綆長七尺六寸術曰如方程以正負術入之此率初如方程爲之名各一逮井其後法得七百二十一實七十六是爲七百二十一綆而七十六逮井并用逮之數以法除實者而戊一綆逮井之數定逮七百二十一分之七十六是故七百二十一爲井深七十六爲戊綆之長舉率以言之今有白禾二步青禾三步黄禾四步黑禾五步實各不滿斗白取青黄青取黄黑黄取黑白黑取白青各一步而實滿斗問白青黄黑禾實一步各幾何荅曰白禾一步實一百一十一分斗之三十三青禾一步實一百一十一分斗之二十八黄禾一步實一百一十一分斗之一十七黑禾一步實一百一十一分斗之一十術曰如方程各置所取以正負術入之今有甲禾二秉乙禾三秉丙禾四秉重皆過於石甲二重如乙一乙三重如丙一丙四重如甲一問甲乙丙禾一秉各重幾何荅曰甲禾一秉重二十三分石之一十七乙禾一秉重二十三分石之一十一丙禾一秉重二十三分石之一十術曰如方程置重過於石之物爲負此問者言甲禾二秉之重過於一石也其過者何云如乙一秉重矣互其算令相折除而一以石爲之差實差實者如甲禾餘實故置算相與同也以正負術入之此入頭位異名相除者正無入正之負無入負之也今有令一人吏五人從者一十人食雞一十令一十人吏一人從者五人食雞八令五人吏一十人從者一人食雞六問令吏從者食雞各幾何荅曰令一人食一百二十二分雞之四十五吏一人食一百二十二分雞之四十一從者一人食一百二十二分雞之九十七術曰如方程以正負術入之今有五羊四犬三雞二兔直錢一千四百九十六四羊二犬六雞三兔直錢一千一百七十五三羊一犬七雞五兔直錢九百五十八二羊三犬五雞一兔直錢八百六十一問羊犬雞兔價各幾何荅曰羊價一百七十七犬價一百二十一雞價二十三兔價二十九術曰如方程以正負術入之今有麻九斗麥七斗菽三斗荅二斗黍五斗直錢一百四十麻七斗麥六斗菽四斗荅五斗黍三斗直錢一百二十八麻三斗麥五斗菽七斗荅六斗黍四斗直錢一百一十六麻二斗麥五斗菽三斗荅九斗黍四斗直錢一百一十二麻一斗麥三斗菽二斗荅八斗黍五斗直錢九十五問一斗直幾何荅曰麻一斗七錢麥一斗四錢菽一斗三錢荅一斗五錢黍一斗六錢術曰如方程以正負術入之此麻麥與均輸少廣之章重衰積分皆爲大事其拙於精理徒按本術者或用算而布氈方好煩而喜誤曾不知其非反欲以多爲貴故其算也莫不闇於設通而專於一端至於此類苟務其成然或失之不可謂要約更有異術者庖丁解牛游刃理間故能歷久其刃如新夫數猶刃也易簡用之則動中庖丁之理故能和神愛刃速而寡尤凡九章爲大事按法皆不盡一百算也雖布算不多然足以算多世人多以方程爲難或盡布算之象在綴正負而已未暇以論其設動無方斯膠柱調瑟之類聊復恢演爲作新術著之於此將亦啟導疑意網羅道精豈傳之空言記其施用之例著策之數每舉一隅焉方程新術曰以正負術入之令左右相減先去下實又轉去物位則其求一行二物正負相借者是其相當之率又令二物與他行互相去取轉其二物相借之數即皆相當之率也各據二物相當之率對易其數即各當之率也更置成行及其下實各以其物本率今有之求其所同并以爲法其當相并而行中正負雜者同名相從異名相消餘以爲法以下置爲實實如法即合所問也一物各以本率今有之即皆合所問也率不通者齊之其一術曰置羣物通率爲列衰更置成行羣物之數各以其率乘之并以爲法其當相并而行中正負雜者同名相從異名相消餘爲法以成行下實乘列衰各自爲實實如法而一即得以舊術爲之凡應置五行今欲要約先置第三行減以第四行又減第五行次置第二行以第二行減第一行又減第四行去其頭位餘可半次置右行及第二行去其頭位次以右行去第四行頭位次以左行去第二行頭位次以第五行去第一行頭位次以第二行去第四行頭位餘可半以右行去第二行頭位以第二行去第四行頭位餘約之爲法實實如法而一得六即有黍價以法治第二行得荅價右行得菽價左行得麥價第三行麻價如此凡用七十七算以新術爲此先以第四行減第三行次以第三行去右行及第二行第四行下位又以減左行下位不足減乃止次以左行減第三行下位次以第三行去左行下位訖廢去第三行次以第四行去左行下位又以減右行下位次以右行去第二行及第四行下位次以第二行減第四行及左行頭位次以第四行減左行菽位不足減乃止次以左行減第二行頭位餘可再半次以第四行去左行及第二行頭位次以第二行去左行頭位餘約之上得五下得三是菽五當荅三次以左行去第二行菽位又以減第四行及右行菽位不足減乃止次以右行減第二行頭位不足減乃止次以第二行去右行頭位次以左行去右行頭位餘上得六下得五是爲荅六當黍五次以左行去右行荅位餘約之上爲二下爲一次以右行去第二行下位以第二行去第四行下位又以減左行下位次左行去第二行下位餘上得三下得四是爲麥三當菽四次以第二行減第四下位次以第四行去第二行下位餘上得四下得七是爲麻四當麥七是爲相當之率舉矣據麻四當麥七即麻價率七而麥價率四又麥三當菽四即爲麥價率四而菽價率三又菽五當荅三即爲菽價率三而荅價率五又荅六當黍五即爲荅價率五而黍價率六而率通矣更置第三行以第四行減之餘有麻一斗菽四斗正荅三斗負下實四正求其同爲麻之數以菽率三荅率五各乘其斗數如麻率七而一菽得一斗七分斗之五正荅得二斗七分斗之一負則菽荅化爲麻以并之令同名相從異名相消餘得定麻七分斗之四以爲法置四爲實而分母乘之實得二十八而分子化爲法矣以法除得七即麻一斗之價置麥率四菽率三荅率五黍率六皆以麻乘之各自爲實以麻率七爲法所得即各爲價亦可使置本行實與物同通之各以本率今有之求其本率所得并以爲法如此即無正負之異矣擇異同而已又可以一術爲之置五行通率爲麻七麥四菽三荅五黍六以爲列衰成行麻一斗菽四斗正荅三斗負各以其率乘之訖令同名相從異名相消餘爲法又置下實乘列衰所得各爲實此可以置約法則不復乘列衰各以列衰爲價如此則凡用一百二十四算也九章算術卷第九魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋句股以御高深廣遠今有句三尺股四尺問爲弦幾何荅曰五尺今有弦五尺句三尺問爲股幾何荅曰四尺今有股四尺弦五尺問爲句幾何荅曰三尺句股短面曰句長面曰股相與結角曰弦句短其股股短其弦將以施於諸率故先具此術以見其原也術曰句股各自乘并而開方除之即弦句自乘爲朱方股自乘爲青方令出入相補各從其類因就其餘不移動也合成弦方之冪開方除之即弦也又股自乘以減弦自乘其餘開方除之即句臣淳風等謹按此術以句股冪合成弦冪句方於内則句短於股令股自乘以減弦自乘餘者即句冪也故開方除之即句也又句自乘以減弦自乘其餘開方除之即股句股冪合以成弦冪令去其一則餘在者皆可得而知之今有圓材徑二尺五寸欲爲方版令厚七寸問廣幾何荅曰二尺四寸術曰令徑二尺五寸自乘以七寸自乘減之其餘開方除之即廣此以圓徑二尺五寸爲弦版厚七寸爲句所求廣爲股也今有木長二丈圍之三尺葛生其下纏木七周上與木齊問葛長幾何荅曰二丈九尺術曰以七周乘圍爲股木長爲句爲之求弦弦者葛之長據圍廣求從爲木長者其形葛卷裹袤以筆管青線宛轉有似葛之纏木解而觀之則每周之間自有相間成句股弦則其間葛長弦七周乘圍并合衆句以爲一句木長而股短術云木長謂之股言之倒句與股求弦亦無圍弦之自乘冪出上第一圖句股冪合爲弦冪明矣然二冪之數謂倒在於弦冪之中而已可更相表裏居裏者則成方冪其居表者則成矩冪二表裏形訛而數均又按此圖句冪之矩青卷白表是其冪以股弦差爲廣股弦并爲袤而股冪方其裏股冪之矩青卷白表是其冪以句弦差爲廣句弦并爲袤而句冪方其裏是故差之與并用除之短長互相乘也今有池方一丈葭生其中央出水一尺引葭赴岸適與岸齊問水深葭長各幾何荅曰水深一丈二尺葭長一丈三尺術曰半池方自乘此以池方半之得五尺爲句水深爲股葭長爲弦以句弦見股故令句自乘先見矩冪也以出水一尺自乘減之出水者股弦差減此差冪於矩冪則除之餘倍出水除之即得水深差爲矩冪之廣水深是股令此冪得出水一尺爲長故爲矩而得葭長也加出水數得葭長臣淳風等謹按此葭本出水一尺既見水深故加出水尺數而得葭長也今有立木繫索其末委地三尺引索卻行去本八尺而索盡問索長幾何荅曰一丈二尺六分尺之一術曰以去本自乘此以去本八尺爲句所求索者弦也引而索盡開門去閫者句及股弦差同一術去本自乘者先張矩冪令如委數而一委地者股弦差也以除矩冪即是股弦并也所得加委地數而半之即索長子不可半者倍其母加差者并則成兩長故又半之其減差者并而半之得木長也今有垣高一丈倚木於垣上與垣齊引木卻行一尺其木至地問木長幾何荅曰五丈五寸術曰以垣高一十尺自乘如卻行尺數而一所得以加卻行尺數而半之即木長數此以垣高一丈爲句所求倚木者爲弦引卻行一尺爲股弦差爲術之意與繫索問同也今有圓材埋在壁中不知大小以鐻鐻之深一寸鐻道長一尺問徑幾何荅曰材徑二尺六寸術曰半鐻道自乘此術以鐻道一尺爲句材徑爲弦鐻深一寸爲股弦差之一半鐻道長是半也臣淳風等謹按下鐻深得一寸爲半股弦差注云爲股弦差者鐻道也如深寸而一以深寸增之即材徑亦以半增之如上術本當半之今此皆同半故不復半也今有開門去閫一尺不合二寸問門廣幾何荅曰一丈一寸術曰以去閫一尺自乘所得以不合二寸半之而一所得增不合之半即得門廣此去閫一尺爲句半門廣爲弦不合二寸以半之得一寸爲股弦差求弦故當半之今次以兩弦爲廣數故不復半之也今有户高多於廣六尺八寸兩隅相去適一丈問户高廣各幾何荅曰廣二尺八寸高九尺六寸術曰令一丈自乘爲實半相多令自乘倍之減實半其餘以開方除之所得減相多之半即户廣加相多之半即户高令户廣爲句高爲股兩隅相去一丈爲弦高多於廣六尺八寸爲句股差按圖爲位弦冪適滿萬寸倍之減句股差冪開方除之其所得即高廣并數以差減并而半之即户廣加相多之數即户高也今此術先求其半一丈自乘爲朱冪四黄冪一半差自乘又倍之爲黄冪四分之二減實半其餘有朱冪二黄冪四分之一其於大方者四分之一故開方除之得高廣并數半半并數減差半得廣加得户高又按此圖冪句股相并冪而加其差冪亦減弦冪爲積蓋先見其弦然後知其句與股今適等自乘亦各爲方合爲弦冪令半相多而自乘倍之又半并自乘倍之亦合爲弦冪而差數無者此各自乘之而與相乘數各爲門實及股長句短同原而分流焉假令句股各五弦冪五十開方除之得七尺有餘一不盡假令弦十其冪有百半之爲句股二冪各得五十當亦不可開故曰圓三徑一方五斜七雖不正得盡理亦可言相近耳其句股合而自相乘之冪者令弦自乘倍之爲兩弦冪以減之其餘開方除之爲句股差加於合而半爲股減差於合而半之爲句句股弦即高廣衺其出此圖也其倍弦爲袤令矩句即爲冪得廣即句股差其矩句之冪倍句爲從法開之亦句股差以句股差冪減弦冪半其餘差爲從法開方除之即句也今有竹高一丈末折抵地去本三尺問折者高幾何荅曰四尺二十分尺之一十一術曰以去本自乘此去本三尺爲句折之餘高爲股以先令句自乘之冪令如高而一凡爲高一丈爲股弦并之以除此冪得差所得以減竹高而半餘即折者之高也此術與繫索之類更相反覆也亦可如上術令高自乘爲股弦并冪去本自乘爲矩冪減之餘爲實倍高爲法則得折之高數也今有二人同所立甲行率七乙行率三乙東行甲南行十步而邪東北與乙會問甲乙行各幾何荅曰乙東行一十步半甲邪行一十四步半及之術曰令七自乘三亦自乘并而半之以爲甲邪行率邪行率減於七自乘餘爲南行率以三乘七爲乙東行率此以南行爲句東行爲股邪行爲弦并句弦率七欲引者當以股率自乘爲冪如并而一所得爲句弦差率加并之半爲弦率以差率減餘爲句率如是或有分當通而約之乃定術以同使無分母故令句弦并自乘爲朱黄相連之方股自乘爲青幂之矩以句弦并爲袤差爲廣今有相引之直加損同上其圖大體以兩弦爲袤句弦并爲廣引横斷其半爲弦率列用率七自乘者句弦并之率故弦減之餘爲句率同立處是中停也皆句弦并爲率故亦以股率同其袤也置南行十步以甲邪行率乘之副置十步以乙東行率乘之各自爲實實如南行率而一各得行數南行十步者所有見句求見弦股故以弦股率乘如句率而一今有句五步股十二步問句中容方幾何荅曰方三步一十七分步之九術曰并句股爲法句股相乘爲實實如法而一得方一步句股相乘爲朱青黄冪各二令黄冪袤於隅中朱青各以其類令從其兩徑共成脩之冪中方黄爲廣并句股爲袤故并句股爲法冪圖方在句中則方之兩廉各自成小句股而其相與之勢不失本率也句面之小句股股面之小句股各并爲中方率令股爲中方率并句股爲率據見句五步而今有之得中方也復令句爲中方率以并句股爲率據見股十二步而今有之則中方又可知此則雖不效而法實有法由生矣下容圓率而似今有衰分言之可以見之也今有句八步股一十五步問句中容圓徑幾何荅曰六步術曰八步爲句十五步爲股爲之求弦三位并之爲法以句乘股倍之爲實實如法得徑一步句股相乘爲圖本體朱青黄冪各二倍之則爲各四可用畫於小紙分裁邪正之會令顛倒相補各以類合成脩冪圆徑爲廣并句股弦爲袤故并句股弦以爲法又以圓大體言之股中青必令立規於横廣句股又邪三徑均而復連規從横量度句股必合而成小方矣又畫中弦以觀除會則句股之面中央小句股弦句之小股股之小句皆小方之面皆圓徑之半其數故可衰以句股弦爲列衰副并爲法以句乘未并者各自爲實實如法而一得句面之小股可知也以股乘列衰爲實則得股面之小句可知言雖異矣及其所以成法之實則同歸矣則圓徑又可以表之差并句弦差減股爲圓徑又弦減句股并餘爲圓徑以句弦差乘股弦差而倍之開方除之亦圓徑也今有邑方二百步各中開門出東門一十五步有木問出南門幾何步而見木荅曰六百六十六步太半步術曰出東門步數爲法以句率爲法也半邑方自乘爲實實如法得一步此以出東門十五步爲句率東門南至隅一百步爲股率南門東至隅一百步爲見句步欲以見句求股以爲出南門數正合半邑方自乘者股率當乘見句此二者數同也今有邑東西七里南北九里各中開門出東門一十五里有木問出南門幾何步而見木荅曰三百一十五步術曰東門南至隅步數以乘南門東至隅步數爲實以木去門步數爲法實如法而一此以東門南至隅四里半爲句率出東門一十五里爲股率南門東至隅三里半爲見股所問出南門即見股之句爲術之意與上同也今有邑方不知大小各中開門出北門三十步有木出西門七百五十步見木問邑方幾何荅曰一里術曰令兩出門步數相乘因而四之爲實開方除之即得邑方按半邑方令半方自乘出門除之即步令二出門相乘故爲半方邑自乘居一隅之積分因而四之即得四隅之積分故爲實開方除即邑方也今有邑方不知大小各中開門出北門二十步有木出南門一十四步折而西行一千七百七十五步見木問邑方幾何荅曰二百五十步術曰以出北門步數乘西行步數倍之爲實此以折而西行爲股自木至邑南一十四步爲句以出北門二十步爲句率北門至西隅爲股率半廣數故以出北門乘折西行股以股率乘句之冪然此冪居半以西行故又倍之合東盡之也并出南北門步數爲從法開方除之即邑方此術之冪東西如邑方南北自木盡邑南十四步之冪各南北步爲廣邑方爲袤故連兩廣爲從法并以爲隅外之冪也今有邑方一十里各中開門甲乙俱從邑中央而出乙東出甲南出出門不知步數邪向東北磨邑隅適與乙會率甲行五乙行三問甲乙行各幾何荅曰甲出南門八百步邪東北行四千八百八十七步半及乙乙東行四千三百一十二步半術曰令五自乘三亦自乘并而半之爲邪行率邪行率減於五自乘者餘爲南行率以三乘五爲乙東行率求三率之意與上甲乙同置邑方半之以南行率乘之如東行率而一即得出南門步數今半方南門東至隅五里半邑者謂爲小股也求以爲出南門步數故置邑方半之以南行句率乘之如股率而一以增邑方半即南行半邑者謂從邑心中停也置南行步求弦者以邪行率乘之求東行者以東行率乘之各自爲實實如法南行率得一步此術與上甲乙同今有木去人不知遠近立四表相去各一丈令左兩表與所望參相直從後右表望之入前右表三寸問木去人幾何荅曰三十三丈三尺三寸少半寸術曰令一丈自乘爲實以三寸爲法實如法而一此以入前右表三寸爲句率右兩表相去一丈爲股率左右兩表相去一丈爲見句所問木去人者見句之股股率當乘見句此二率俱一丈故曰自乘之以三寸爲法實如法得一寸今有山居木西不知其高山去木五十三里木高九丈五尺人立木東三里望木末適與山峯斜平人目高七尺問山高幾何荅曰一百六十四丈九尺六寸太半寸術曰置木高減人目高七尺此以木高減人目高七尺餘有八丈八尺爲句率去人目三里爲股率山去木五十三里爲見股以求句加木之高故爲山高也餘以乘五十三里爲實以人去木三里爲法實如法而一所得加木高即山高此術句股之義今有井徑五尺不知其深立五尺木於井上從木末望水岸入徑四寸問井深幾何荅曰五丈七尺五寸術曰置井徑五尺以入徑四寸減之餘以乘立木五尺爲實以入徑四寸爲法實如法得一寸此以入徑四寸爲句率立木五尺爲股率井徑之餘四尺六寸爲見句問井深者見句之股也今有户不知高廣竿不知長短横之不出四尺從之不出二尺邪之適出問户高廣衺各幾何荅曰廣六尺高八尺衺一丈術曰從横不出相乘倍而開方除之所得加從不出即户廣此以户廣爲句户高爲股户衺爲弦凡句之在股或矩於表或方於裏連之者舉表矩而端之又從句方裏令爲青矩之表未滿黄方滿此方則兩端之邪重於隅中各以股弦差爲廣句弦差爲袤故兩端差相乘又倍之則成黄方之冪開方除之得黄方之面其外之青知亦以股弦差爲廣故以股弦差加則爲句也加横不出即户高兩不出加之得户衺, SBCK: 卽}

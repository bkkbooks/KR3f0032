  - {type: variant, offset: 23657, length: 5385, content: 一百五十七乘之六百而一也今據周爲之若於圓堢壔又以二十五乘之三百一十四而一則先得三圓亭矣故以三百一十四爲九百四十二而一并除之臣淳風等謹按依密率以七乘之二百六十四而一今有方錐下方二丈七尺高二丈九尺問積幾何荅曰七千四十七尺術曰下方自乘以高乘之三而一按此術假令方錐下方二尺高一尺即四陽馬如術爲之用十二陽馬成三方錐故三而一得方錐也今有圓錐下周三丈五尺高五丈一尺問積幾何荅曰一千七百三十五尺一十二分尺之五於徽術當積一千六百五十八尺三百一十四分尺之十三依密率爲積一千六百五十六尺八十八分尺之四十七術曰下周自乘以高乘之三十六而一按此術圓錐下周以爲方錐下方方錐下方今自乘以高乘之令三而一得大方錐之積大錐方之積合十二圓矣今求一圓復合十二除之故令三乘十二得三十六而連除於徽術當下周自乘以高乘之又以二十五乘之九百四十二而一圓錐比於方錐亦二百分之一百五十七令徑自乘者亦當以一百五十七乘之六百而一其説如圓亭也臣淳風等謹按依密率以七乘之二百六十四而一今有壍堵下廣二丈袤一十八丈六尺高二丈五尺問積幾何荅曰四萬六千五百尺術曰廣袤相乘以高乘之二而一邪解立方得兩壍堵雖復隨方亦爲壍堵故二而一此則合所規棊推其物體蓋爲壍上疊也其形如城而無上廣與所規棊形異而同實未聞所以名之爲壍堵之説也今有陽馬廣五尺袤七尺高八尺問積幾何荅曰九十三尺少半尺術曰廣袤相乘以高乘之三而一按此術陽馬之形方錐一隅也今謂四柱屋隅爲陽馬假令廣袤各一尺高一尺相乘之得立方積一尺邪解立方得兩壍堵邪解壍堵其一爲陽馬一爲鼈臑陽馬居二鼈臑居一不易之率也合兩鼈臑成一陽馬合三陽馬而成一立方故三而一驗之以棊其形露矣悉割陽馬凡爲六鼈臑觀其割分則體勢互通蓋易了也其棊或脩短或廣狹立方不等者亦割分以爲六鼈臑其形不悉相似然見數同積實均也鼈臑殊形陽馬異體然陽馬異體則不可純合不纯合則難爲之矣何則按邪解方棊以爲壍堵者必當以半爲分邪解壍堵以爲陽馬者亦必當以半爲分一從一横耳設爲陽馬爲分内鼈臑爲分外棊雖或隨脩短廣狹猶有此分常率知殊形異體亦同也者以此而已其使鼈臑廣袤高各二尺用壍堵鼈臑之棊各二皆用赤棊又使陽馬之廣袤高各二尺用立方之棊一壍堵陽馬之棊各二皆用黑棊棊之赤黑接爲壍堵廣袤高各二尺於是中效其廣袤又中分其高令赤黑壍堵各自適當一方高一尺方一尺每二分鼈臑則一陽馬也其餘兩端各積本體合成一方焉是爲别種而方者率居三通其體而方者率居一雖方隨棊改而固有常然之勢也按餘數具而可知者有一二分之别即一二之爲率定矣其於理也豈虛矣若爲數而窮之置餘廣袤高之數各半之則四分之三又可知也半之彌少其餘彌細至細曰微微則無形由是言之安取餘哉數而求窮之者謂以情推不用籌算鼈臑之物不同器用陽馬之形或隨脩短廣狹然不有鼈臑無以審陽馬之數不有陽馬無以知錐亭之類功實之主也今有鼈臑下廣五尺無袤上袤四尺無廣高七尺問積幾何荅曰二十三尺少半尺術曰廣袤相乘以高乘之六而一按此術臑者臂骨也或曰半陽馬其形有似鼈肘故以名云中破陽馬得兩鼈臑鼈臑之見數即陽馬之半數數同而實據半故云六而一即得今有羡除下廣六尺上廣一丈深三尺末廣八尺無深袤七尺問積幾何荅曰八十四尺術曰并三廣以深乘之又以袤乘之六而一按此術羡除實隧道也其所穿地上平下邪似兩鼈臑夾一壍堵即羡除之形假令用此棊上廣三尺深一尺下廣一尺末廣一尺無深袤一尺下廣末廣皆壍堵之廣上廣者两鼈臑與一壍堵相連之廣也以深袤乘得積五尺鼈臑居二壍堵居三其於本棊皆一爲六故六而一合四陽馬以爲方錐邪畫方錐之底亦令爲中方就中方削而上合全爲中方錐之半於是陽馬之棊悉中解矣中錐離而爲四鼈臑焉故外錐之半亦爲四鼈臑雖背正異形與常所謂鼈臑參不相似實則同也所云夾壍堵者中錐之鼈臑也凡壍堵上袤短者連陽馬也下袤短者與鼈臑連也上下兩袤相等知亦與鼈臑連也并三广以高袤乘六而一皆其積也今此羡除之廣即壍堵之袤也按此本是三廣不等即與鼈臑連者别而言之中央壍堵廣六尺高三尺袤七尺末廣之兩旁各一小鼈臑皆與壍堵等令小鼈臑居裏大鼈臑居表則大鼈臑皆出隨方錐下廣二尺袤六尺高七尺分取其半則爲袤三尺以高廣乘之三而一即半錐之積也邪解半錐得此兩大鼈臑求其積亦當六而一合於常率矣按陽馬之棊兩邪棊底方當其方也不問旁角而割之相半可知也推此上連無成不方故方錐與陽馬同實角而割之者相半之勢此大小鼈臑可知更相表裏但體有背正也今有芻甍下廣三丈袤四丈上袤二丈無廣高一丈問積幾何荅曰五千尺術曰倍下袤上袤從之以廣乘之又以高乘之六而一推明義理者舊説云凡積芻有上下廣曰童甍謂其屋蓋之茨也是故甍之下廣袤與童之上廣袤等正斬方亭兩邊合之即芻甍之形也假令下廣二尺袤三尺上袤一尺無廣高一尺其用棊也中央壍堵二兩端陽馬各二倍下袤上袤從之爲七尺以廣乘之得冪十四尺陽馬之冪各居二壍堵之冪各居三以高乘之得積十四尺其於本棊也皆一而爲六故六而一即得亦可令上下袤差乘廣以高乘之三而一即四陽馬也下廣乘之上袤而半之高乘之即二壍堵并之以爲甍積也芻童曲池盤池冥谷皆同術術曰倍上袤下袤從之亦倍下袤上袤從之各以其廣乘之并以高若深乘之皆六而一按此術假令芻童上廣一尺袤二尺下廣三尺袤四尺高一尺其用棊也中央立方二四面壍堵六四角陽馬四倍下袤爲八上袤從之爲十以高廣乘之得積三十尺是爲得中央立方各三兩端壍堵各四兩旁壍堵各六四角陽馬亦各六復倍上袤下袤從之爲八以高廣乘之得積八尺是爲得中央立方亦各三兩端壍堵各二并兩旁三品棊皆一而爲六故六而一即得爲術又可令上下廣袤差相乘以高乘之三而一亦四陽馬上下廣袤互相乘并而半之以高乘之即四面六壍堵與二立方并之爲芻童積又可令上下廣袤互相乘而半之上下廣袤又各自乘并以高乘之三而一即得也其曲池者并上中外周而半之以爲上袤亦并下中外周而半之以爲下袤此池環而不通匝形如盤虵而曲之亦云周者謂如委穀依垣之周耳引而伸之周爲袤求袤之意環田也今有芻童下廣二丈袤三丈上廣三丈袤四丈高三丈問積幾何荅曰二萬六千五百尺今有曲池上中周二丈外周四丈廣一丈下中周一丈四尺外周二丈四尺廣五尺深一丈問積幾何荅曰一千八百八十三尺三寸少半寸今有盤池上廣六丈袤八丈下廣四丈袤六丈深二丈問積幾何荅曰七萬六百六十六尺太半尺負土往來七十步其二十步上下棚除棚除二當平道五踟蹰之間十加一載輸之間三十步定一返一百四十步土籠積一尺六寸秋程人功行五十九里半問人到積尺及用徒各幾何荅曰人到二百四尺用徒三百四十六人一百五十三分人之六十二術曰以一籠積尺乘程行步數爲實往來上下棚除二當平道五棚閣除邪道有上下之難故使二當五也置定往來步數十加一及載輸之間三十步以爲法除之所得即一人所到尺按此術棚閣除邪道有上下之難故使二當五置定往來步數十加一及載輸之間三十步是爲往來一返凡用一百四十步於今有術爲所有行率籠積一尺六寸爲所求到土率程行五十九里半爲所有數而今有之即人到尺數以所到約積尺即用徒人數者此一人之積除其衆積尺故得用徒人數爲術又可令往來一返所用之步約程行爲返數乘籠積爲一人所到以此術與今有術相返覆則乘除之或先後意各有所在而同歸耳以所到約積尺即用徒人數今有冥谷上廣二丈袤七丈下廣八尺袤四丈深六丈五尺問積幾何荅曰五萬二千尺載土往來二百步載輸之間一里程行五十八里六人共車車載三十四尺七寸問人到積尺及用徒各幾何荅曰人到二百一尺五十分尺之十三用徒二百五十八人一萬六十三分人之三千七百四十六術曰以一車積尺乘程行步數爲實置今往來步數加載輸之間一里以車六人乘之爲法除之所得即一人所到尺按此術今有之義以載輸及往來并得五百步爲所有行率車載三十四尺七寸爲所求到土率程行五十八里通之爲步爲所有數而今有之所得則一車所到欲得人到者當以六人除之即得術有分故亦更令乘法而并除者亦用以車尺數以爲一人到土率六人乘五百步爲行率也又亦可五百步爲行率令六人約車積尺數爲一人到土率以負土術入之入之者亦可求返數也要取其會通而已術恐有分故令乘法而并除以所到約積尺即用徒人數者以一人所到積尺除其衆積故得用徒人數也以所到約積尺即用徒人數今有委粟平地下周一十二丈高二丈問積及爲粟幾何荅曰積八千尺於徽術當積七千六百四十三尺一百五十七分尺之四十九臣淳風等謹依密率爲積七千六百三十六尺十一分尺之四爲粟二千九百六十二斛二十七分斛之二十六於徽術當粟二千八百三十斛一千四百一十三分斛之一千二百一十臣淳風等謹依密率爲粟二千八百二十八斛九十九分斛之二十八今有委菽依垣下周三丈高七尺問積及爲菽各幾何荅曰積三百五十尺依徽術當積三百三十四尺四百七十一分尺之一百八十六也臣淳風等謹依密率爲積三百三十四尺十一分尺之一爲菽一百四十四斛二百四十三分斛之八依徽術當菽一百三十七斛一萬二千七百一十七分斛之七千七百七十一臣淳風等謹依密率爲菽一百三十七斛八百九十一分斛之四百三十三今有委米依垣内角下周八尺高五尺問積及爲米各幾何荅曰積三十五尺九分尺之五於徽術當積三十三尺四百七十一分尺之四百五十七臣淳風等謹依密率當積三十三尺三十三分尺之三十一爲米二十一斛七百二十九分斛之六百九十一於徽術當米二十斛三萬八千一百五十一分斛之三萬六千九百八十臣淳風等謹依密率爲米二十斛二千六百七十三分斛之二千五百四十委粟術曰下周自乘以高乘之三十六而一此猶圓錐也於徽術亦當下周自乘以高乘之又以二十五乘之九百四十二而一也其依垣者居圓錐之半也十八而一於徽術當令此下周自乘以高乘之又以二十五乘之四百七十一而一依垣之周半於全周其自乘之冪居全周自乘之冪四分之一故半全周之法以爲法也其依垣内角者角隅也居圓錐四分之一也九而一於徽術當令此下周自乘而倍之以高乘之又以二十五乘之四百七十一而一依隅之周半於依垣其自乘之冪居依垣自乘之冪四分之一當半依垣之法以爲法法不可半故倍其實又此術亦用周三徑一之率假令以三除周得徑若不盡通分内子即爲徑之積分令自乘以高乘之爲三方錐之積分母自相乘得九爲法又當三而一約方錐之積從方錐中求圆錐之積亦猶方冪求圓冪乃當三乘之四而一得圓錐之積前求方錐積乃合三而一今求圓錐之積復合三乘之二母既同故相準折惟以四乘分
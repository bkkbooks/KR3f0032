次六十六分升之三十九術曰以下三節分四升爲下率以上四節分三升爲上率此二率者各其平率也上下率以少減多餘爲實按此上下節各分所容爲率者各其平率上下以少減多者餘爲中間五節半之凡差故以爲實也置四節三節各半之以減九節餘爲法實如法得一升即衰相去也按此術上下節所容已定之節中間相去節數也實者中間五節半之凡差也故實如法而一則每節之差也下率一升少半升者下第二節容也一升少半升者下三節通分四升之平率平率即爲中分節之容也今有鳧起南海七日至北海雁起北海九日至南海今鳧雁俱起問何日相逢荅曰三日十六分日之十五術曰并日數爲法日數相乘爲實實如法得一日按此術置鳧七日一至雁九日一至齊其至同其日定六十三日鳧九至雁七至今鳧雁俱起而問相逢者是爲共至并齊以除同即得相逢日故并日數爲法者并齊之意日數相乘爲實者猶以同爲實也一曰鳧飛日行七分至之一雁飛日行九分至之一齊而同之鳧飛定日行六十三分至之九雁飛定日行六十三分至之七是爲南北海相去六十三分鳧日行九分雁日行七分也并鳧雁一日所行以除南北相去而得相逢日也今有甲發長安五日至齊乙發齊七日至長安今乙發已先二日甲乃發長安問幾何日相逢荅曰二日十二分日之一術曰并五日七日以爲法按此術并五日七日爲法者猶并齊爲法置甲五日一至乙七日一至齊而同之定三十五日甲七至乙五至并之爲十二至者用三十五日也謂甲乙與發之率耳然則日化爲至當除日故以爲法也以乙先發二日減七日減七日者言甲乙俱發今以發爲始發之端於本道里則餘分也餘以乘甲日數爲實七者長安去齊之率也五者後發相去之率也今問後發故舍七用五以乘甲五日爲二十五日言甲七至乙五至更相去用此二十五日也實如法得一日一日甲行五分至之一乙行七分至之一齊而同之甲定日行三十五分至之七乙定日行三十五分至之五是爲齊去長安三十五分甲日行七分乙日行五分也今乙先行發二日已行十分餘相去二十五分故減乙二日餘令相乘爲二十五分今有一人一日爲牝瓦三十八枚一人一日爲牡瓦七十六枚今令一人一日作瓦牝牡相半問成瓦幾何荅曰二十五枚少半枚術曰并牝牡爲法牝牡相乘爲實實如法得一枚此意猶與鳧雁同術牝牡瓦相并猶如鳧雁日飛相并也按此術并牝牡爲法者并齊之意牝牡相乘爲實者猶以同爲實也故實如法即得也今有一人一日矯矢五十一人一日羽矢三十一人一日筈矢十五今令一人一日自矯羽筈問成矢幾何荅曰八矢少半矢術曰矯矢五十用徒一人羽矢五十用徒一人太半人筈矢五十用徒三人少半人并之得六人以爲法以五十矢爲實實如法得一矢按此術言成矢五十用徒六人一日工也此同工共作猶鳧雁共至之類亦以同爲實并齊爲法可令矢互乘一人爲齊矢相乘爲同今先令同於五十矢矢同則徒齊其歸一也以此術爲鳧雁者當雁飛九日而一至鳧飛九日而一至七分至之二并之得二至七分至之二以爲法以九日爲實實如法而一得一人日成矢之數也今有假田初假之歲三畝一錢明年四畝一錢後年五畝一錢凡三歲得一百問田幾何荅曰一頃二十七畝四十七分畝之三十一術曰置畝數及錢數令畝數互乘錢數并以爲法畝數相乘又以百錢乘之爲實實如法得一畝按此術令畝互乘錢者齊其錢畝數相乘者同其畝同於六十則初假之歲得錢二十明年得錢十五後年得錢十二也凡三歲得錢一百爲所有數同畝爲所求率四十七錢爲所有率今有之即得也齊其錢同其母亦如鳧雁術也於今有術百錢爲所有數同畝爲所求率并齊爲所有率臣淳風等按假田六十畝初歲得錢二十明年得錢十五後年得錢十二并之得錢四十七是爲得田六十畝三歲所假於今有術百錢爲所有數六十畝爲所求率四十七爲所有率而今有之即合問也今有程耕一人一日發七畝一人一日耕三畝一人一日耰種五畝今令一人一日自發耕耰種之問治田幾何荅曰一畝一百一十四步七十一分步之六十六術曰置發耕耰畝數令互乘人數并以爲法畝數相乘爲實實如法得一畝此猶鳧雁術也臣淳風等謹按此術亦發耕耰種畝數互乘人者齊其人畝數相乘者同其畝故并齊爲法以同爲實計田一百五畝發用十五人耕用三十五人種用二十一人并之得七十一工治得一百五畝故以爲實而一人一日所治故以人數爲法除之即得也今有池五渠注之其一渠開之少半日一滿次一日一滿次二日半一滿次三日一滿次五日一滿今皆决之問幾何日滿池荅曰七十四分日之十五術曰各置渠一日滿池之數并以爲法按此術其一渠少半日滿者是一日三滿也次一日一滿次二日半滿者是一日五分滿之二也次三日滿者是一日三分滿之一也次五日滿者是一日五分滿之一也并之得四滿十五分滿之十四也以一日爲實實如法得一日此猶矯矢之術也先令同於一日日同則滿齊自鳧雁至此其爲同齊有二術焉可隨率宜也其一術各置日數及滿數令日互相乘滿并以爲法日數相乘爲實實如法得一日亦如鳧雁術也按此其一渠少半日滿池者是一日三滿池也次一日一滿次二日半滿者是五日再滿次三日一滿次五日一滿此謂列置日數於右行及滿數於左行以日互乘滿者齊其滿日數相乘者同其日滿齊而日同故并齊以除同即得也今有人持米出三關外關三而取一中關五而取一内關七而取一餘米五斗問本持米幾何荅曰十斗九升八分升之三術曰置米五斗以所税者三之五之七之爲實以餘不税者二四六相互乘爲法實如法得一斗此亦重今有也所税者謂今所當税之定三五七皆爲所求率二四六皆爲所有率置今有餘米五斗以七乘之六而一即内關未税之本米也又以五乘之四而一即中關未税之本米也又以三乘之二而一即外關未税之本米也今從末求本不問中間故令中率轉相乘而同之亦如絡絲術又一術外關三而取一則其餘本米三分之二也求外關所税之餘則當置一二分乘之三而一欲知中關以四乘之五而一欲知内關以六乘之, krp: ''}

body:
  text: 九章算術九章算術南宋本永樂大典本作九章算經今依東漢光和大司農斛銘文及戴震校本下同卷第一魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋方田以御田疇界域今有田廣十五步從十六步問為田幾何答曰一畝又有田廣十二步從十四步問為田幾何答曰一百六十八步圖從十四廣十二方田術曰廣從步數相乘得積步此積謂田冪凡廣從相乘謂之冪臣淳風等謹按經云廣從相乘得積步注云廣從相乘謂之冪觀斯注意積冪義同以理推之固當不爾何則冪是方面單布之名積乃衆數聚居之稱循名責實二者全殊雖欲同之竊恐不可今以凡言冪者據廣從之一方其言積者舉衆步之都數經云相乘得積步即是都數之明文注云謂之為冪全乖積步之本意此注前云積為田冪於理得通復云謂之為冪繁而不當今者注釋存善去非略為料簡遺諸後學以畝法二百四十步除之即畝數百畝為一頃臣淳風等謹按此為篇端故特舉頃畝二法餘術不復言者從此可知按一畝之田廣十五步從而疏之令為十五行即每行廣一步而從十六步又橫而截之令為十六行即每行廣一步而從十五步此即從疏橫截之步各自為方凡有二百四十步為一畝之地步數正同以此言之即廣從相乘得積步驗矣二百四十步者畝法也百畝者頃法也故以除之即得今有田廣一里從一里問為田幾何答曰三頃七十五畝又有田廣二里從三里問為田幾何答曰二十二頃五十畝里田術曰廣從里數相乘得積里以三百七十五乘之即畝數按此術廣從里數相乘得積里方里之中有三頃七十五畝故以乘之即得畝數也今有十八分之十二問約之得幾何答曰三分之二又有九十一分之四十九問約之得幾何答曰十三分之七約分按約分者物之數量不可悉全必以分言之分之為數繁則難用設有四分之二者繁而言之亦可為八分之四約而言之則二分之一也雖則異辭至於為數亦同歸爾法實相推動有參差故為術者先治諸分術曰可半者半之不可半者副置分母子之數以少減多更相減損求其等也以等數約之等數約之即除也其所以相減者皆等數之重疊故以等數約之今有三分之一五分之二問合之得幾何答曰十五分之十一又有三分之二七分之四九分之五問合之得幾何答曰得一六十三分之五十又有二分之一三分之二四分之三五分之四問合之得幾何答曰得二六十分之四十三合分臣淳風等謹按合分知數非一端分無定準諸分子雜互羣母參差粗細既殊理難從一故齊其衆分同其羣母令可相並故曰合分術曰母互乘子並以為實母相乘為法母互乘子約而言之者其分粗繁而言之者其分細雖則粗細有殊然其實一也衆分錯雜非細不會乘而散之所以通之通之則可并也凡母互乘子謂之齊羣母相乘謂之同同者相與通同共一母也齊者子與母齊勢不可失本數也方以類聚物以羣分數同類者無遠數異類者無近遠而通體知雖異位而相從也近而殊形知雖同列而相違也然則齊同之術要矣錯綜度數動之斯諧其猶佩觿解結無往而不理焉乘以散之約以聚之齊同以通之此其算之綱紀乎其一術者可令母除為率率乘子為齊實如法而一不滿法者以法命之今欲求其實故齊其子又同其母令如母而一其餘以等數約之即得知所謂同法為母實餘為子皆從此例其母同者直相從之今有九分之八減其五分之一問餘幾何答曰四十五分之三十一又有四分之三減其三分之一問餘幾何答曰十二分之五減分臣淳風等謹按諸分子母數各不同以少減多欲知餘幾減餘為實故曰減分術曰母互乘子以少減多餘為實母相乘為法實如法而一母互乘子知以齊其子也以少減多知齊故可相減也母相乘為法者同其母也母同子齊故如母而一即得今有八分之五二十五分之十六問孰多多幾何答曰二十五分之十六多多二百分之三又有九分之八七分之六問孰多多幾何答曰九分之八多多六十三分之二又有二十一分之八五十分之十七問孰多多幾何答曰二十一分之八多多一千五十分之四十三課分臣淳風等謹按分各異名理不齊一校其相多之數故曰課分也術曰母互乘子以少減多餘為實母相乘為法實如法而一即相多也臣淳風等謹按此術母互乘子以少分減多分與減分義同唯相多之數意與減分有異減分知求其餘數有幾課分知以其餘數相多也今有三分之一三分之二四分之三問減多益少各幾何而平答曰減四分之三者二三分之二者一并以益三分之一而各平於十二分之七又有二分之一三分之二四分之三問減多益少各幾何而平答曰減三分之二者一四分之三者四并以益二分之一而各平於三十六分之二十三平分臣淳風等謹按平分知諸分參差欲令齊等減彼之多增此之少故曰平分也術曰母互乘子齊其子也副并為平實臣淳風等謹按母互乘子副并為平實知定此平實主限衆子所當損益知限為平母相乘為法母相乘為法知亦齊其子又同其母以列數乘未并者各自為列實亦以列數乘法此當副置列數除平實若然則重有分故反以列數乘同齊臣淳風等謹按問云所平之分多少不定或三或二列位無常平三知置位三重平二知置位二重凡此之例一準平分不可預定多少故直云列數而已以平實減列實餘約之為所減并所減以益於少以法命平實各得其平今有七人分八錢三分錢之一問人得幾何答曰人得一錢二十一分錢之四又有三人三分人之一分六錢三分錢之一四分錢之三問人得幾何答曰人得二錢八分錢之一經分臣淳風等謹按經分者自合分已下皆與諸分相齊此乃直求一人之分以人數分所分故曰經分也術曰以人數為法錢數為實實如法而一有分者通之母互乘子知齊其子母相乘者同其母以母通之者分母乘全內子乘散全則為積分積分則與分子相通故可令相從凡數相與者謂之率率知自相與通有分則可散分重疊則約也等除法實相與率也故散分者必令兩分母相乘法實也重有分者同而通之又以法分母乘實實分母乘法此謂法實俱有分故令分母各乘全分內子又令分母互乘上下今有田廣七分步之四從五分步之三問為田幾何答曰三十五分步之十二又有田廣九分步之七從十一分步之九問為田幾何答曰十一分步之七又有田廣五分步之四從九分步之五問為田幾何答曰九分步之四乘分臣淳風等謹按乘分者分母相乘為法子相乘為實故曰乘分術曰母相乘為法子相乘為實實如法而一凡實不滿法者而有母子之名若有分以乘其實而長之則亦滿法乃為全耳又以子有所乘故母當報除報除者實如法而一也今子相乘則母各當報除因令分母相乘而連除也此田有廣從難以廣諭設有問者曰馬二十匹直金十二斤今賣馬二十匹三十五人分之人得幾何答曰三十五分斤之十二其為之也當如經分術以十二斤金為實三十五人為法設更言馬五匹直金三斤今賣四匹七人分之人得幾何答曰人得三十五分斤之十二其為之也當齊其金人之數皆合初問入於經分矣然則分子相乘為實者猶齊其金也母相乘為法者猶齊其人也同其母為二十馬無事於同但欲求齊而已又馬五匹直金三斤完全之率分而言之則為一匹直金五分斤之三七人賣四馬一人賣七分馬之四金與人交互相生所從言之異而計數則三術同歸也今有田廣三步三分步之一從五步五分步之二問為田幾何答曰十八步又有田廣七步四分步之三從十五步九分步之五問為田幾何答曰一百二十步九分步之五又有田廣十八步七分步之五從二十三步十一分步之六問為田幾何答曰一畝二百步十一分步之七大廣田臣淳風等謹按大廣田知初術直有全步而無餘分次術空有餘分而無全步此術先見全步復有餘分可以廣兼三術故曰大廣術曰分母各乘其全分子從之分母各乘其全分子從之者通全步內分子如此則母子皆為實矣相乘為實分母相乘為法猶乘分也實如法而一今為術廣從俱有分當各自通其分命母入者還須出之故令分母相乘為法而連除之今有圭田廣十二步正從二十一步問為田幾何答曰一百二十六步又有圭田廣五步二分步之一從八步三分步之二問為田幾何答曰二十三步六分步之五術曰半廣以乘正從半廣知以盈補虛為直田也亦可半正從以乘廣按半廣乘從以取中平之數故廣從相乘為積步畝法除之即得也今有邪田一頭廣三十步一頭廣四十二步正從六十四步問為田幾何答曰九畝一百四十四步又有邪田正廣六十五步一畔從一百步一畔從七十二步問為田幾何答曰二十三畝七十步術曰并兩邪而半之以乘正從若廣又可半正從若廣以乘并畝法而一并而半之者以盈補虛也今有箕田舌廣二十步踵廣五步正從三十步問為田幾何答曰一畝一百三十五步又有箕田舌廣一百一十七步踵廣五十步正從一百三十五步問為田幾何答曰四十六畝二百三十二步半術曰并踵舌而半之以乘正從畝法而一中分箕田則為兩邪田故其術相似又可并踵舌半正從以乘之今有圓田周三十步徑十步臣淳風等謹按術意以周三徑一為率周三十步合徑十步今依密率合徑九步十一分步之六問為田幾何答曰七十五步此於徽術當為田七十一步一百五十七分步之一百三臣淳風等謹依密率為田七十一步二十二分步之一十三又有圓田周一百八十一步徑六十步三分步之一臣淳風等謹按周三徑一周一百八十一步徑六十步三分步之一依密率徑五十七步二十二分步之十三問為田幾何答曰十一畝九十步十二分步之一此於徽術當為田十畝二百八步三百一十四分步之一百一十三臣淳風等謹依密率為田十畝二百五步八十八分步之八十七術曰半周半徑相乘得積步按半周為從半徑為廣故廣從相乘為積步也假令圓徑二尺圓中容六觚之一面與圓徑之半其數均等合徑率一而弧周率三也又按為圖以六觚之一面乘一弧半徑因而三之得十二觚之冪若又割之次以十二觚之一面乘一弧之半徑因而六之則得二十四觚之冪割之彌細所失彌少割之又割以至於不可割則與圓周合體而無所失矣觚面之外猶有餘徑以面乘餘徑則冪出弧表若夫觚之細者與圓合體則表無餘徑表無餘徑則冪不外出矣以一面乘半徑觚而裁之每輒自倍故以半周乘半徑而為圓冪此以周徑謂至然之數非周三徑一之率也周三者從其六觚之環耳以推圓規多少之覺乃弓之與弦也然世傳此法莫肯精核學者踵古習其謬失不有明據辨之斯難凡物類形象不圓則方方圓之率誠著於近則雖遠可知也由此言之其用博矣謹按圖驗更造密率恐空設法數昧而難譬故置諸檢括謹詳其記注焉割六觚以為十二觚術曰置圓徑二尺半之為一尺即圓裏觚之面也令半徑一尺為弦半面五寸為句為之求股以句冪二十五寸減弦冪餘七十五寸開方除之下至秒忽又一退法求其微數微數無名知以為分子以十為分母約作五分忽之二故得股八寸六分六釐二秒五忽五分忽之二以減半徑餘一寸三分三釐九毫七秒四忽五分忽之三謂之小句觚之半面而又謂之小股為之求弦其冪二千六百七十九億四千九百一十九萬三千四百四十五忽餘分棄之開方除之即十二觚之一面也割十二觚以為二十四觚術曰亦令半徑為弦半面為句為之求股置上小弦冪四而一得六百六十九億八千七百二十九萬八千三百六十一忽餘分棄之即句冪也以減弦冪其餘開方除之得股九寸六分五釐九毫二秒五忽五分忽之四以減半徑餘三分四釐七秒四忽五分忽之一謂之小句觚之半面又謂之小股為之求小弦其冪六百八十一億四千八百三十四萬九千四百六十六忽餘分棄之開方除之即二十四觚之一面也割二十四觚以為四十八觚術曰亦令半徑為弦半面為句為之求股置上小弦冪四而一得一百七十億三千七百八萬七千三百六十六忽餘分棄之即句冪也以減弦冪其餘開方除之得股九寸九分一釐四毫四秒四忽五分忽之四以減半徑餘八釐五毫五秒五忽五分忽之一謂之小句觚之半面又謂之小股為之求小弦其冪一百七十一億一千二十七萬八千八百一十三忽餘分棄之開方除之得小弦一寸三分八毫六忽餘分棄之即四十八觚之一面以半徑一尺乘之又以二十四乘之得冪三萬一千三百九十三億四千四百萬忽以百億除之得冪三百一十三寸六百二十五分寸之五百八十四即九十六觚之冪也割四十八觚以為九十六觚術曰亦令半徑為弦半面為句為之求股置次上弦冪四而一得四十二億七千七百五十六萬九千七百三忽餘分棄之則句冪也以減弦冪其餘開方除之得股九寸九分七釐八毫五秒八忽十分忽之九以減半徑餘二釐一毫四秒一忽十分忽之一謂之小句觚之半面又謂之小股為之求小弦其冪四十二億八千二百一十五萬四千一十二忽餘分棄之開方除之得小弦六分五釐四毫三秒八忽餘分棄之即九十六觚之一面以半徑一尺乘之又以四十八乘之得冪三萬一千四百一十億二千四百萬忽以百億除之得冪三百一十四寸六百二十五分寸之六十四即一百九十二觚之冪也以九十六觚之冪減之餘六百二十五分寸之一百五謂之差冪倍之為分寸之二百一十即九十六觚之外觚田九十六所謂以弦乘矢之凡冪也加此冪於九十六觚之冪得三百一十四寸六百二十五分寸之一百六十九則出於圓之表矣故還就一百九十二觚之全冪三百一十四寸以為圓冪之定率而棄其餘分以半徑一尺除圓冪倍之得六尺二寸八分即周數令徑自乘為方冪四百寸與圓冪相折圓冪得一百五十七為率方冪得二百為率方冪二百其中容圓冪一百五十七也圓率猶為微少按弧田圖令方中容圓圓中容方內方合外方之半然則圓冪一百五十七其中容方冪一百也又令徑二尺與周六尺二寸八分相約周得一百五十七徑得五十則其相與之率也周率猶為微少也晉武庫中漢時王莽作銅斛其銘曰律嘉量斛內方尺而圓其外庣旁九釐五毫冪一百六十二寸深一尺積一千六百二十寸容十斗以此術求之得冪一百六十一寸有奇其數相近矣此術微少而觚差冪六百二十五分寸之一百五以一百九十二觚之冪為率消息當取此分寸之三十六以增於一百九十二觚之冪以為圓冪三百一十四寸二十五分寸之四置徑自乘之方冪四百寸令與圓冪通相約圓冪三千九百二十七方冪得五千是為率方冪五千中容圓冪三千九百二十七圓冪三千九百二十七中容方冪二千五百也以半徑一尺除圓冪三百一十四寸二十五分寸之四倍之得六尺二寸八分二十五分分之八即周數也全徑二尺與周數通相約徑得一千二百五十周得三千九百二十七即其相與之率若此者蓋盡其纖微矣舉而用之上法為約耳當求一千五百三十六觚之一面得三千七十二觚之冪而裁其微分數亦宜然重其驗耳臣淳風等謹按舊術求圓皆以周三徑一為率若用之求圓周之數則周少徑多用之求其六觚之田乃與此率合會耳何則假令六觚之田觚間各一尺為面自然從角至角其徑二尺可知此則周六徑二與周三徑一已合恐此猶為難曉今更引物為喻設令刻物作圭形者六枚枚别三面皆長一尺攢此六物悉使鋭頭向裏則成六觚之周角徑亦皆一尺更從觚角外畔圍繞為規則六觚之徑盡逹規矣當面徑短不至外規若以徑言之則為規六尺徑二尺面徑皆一尺面徑股不至外畔定無二尺可知故周三徑一之率於圓周乃是徑多周少徑一周三理非精密蓋術從簡要舉大綱略而言之劉徽特以為疏遂乃改張其率但周徑相乘數難契合徽雖出斯二法終不能究其纖毫也祖沖之以其不精就中更推其數今者修撰攈托諸家考其是非沖之為密故顯之於徽術之下冀學者之所裁焉又術曰周徑相乘四而一此周與上弧同耳周徑相乘各當以半而今周徑兩全故兩母相乘為四以報除之於徽術以五十乘周一百五十七而一即徑也以一百五十七乘徑五十而一即周也新術徑率猶當微少據周以求徑則失之長據徑以求周則失之短諸據見徑以求冪者皆失之於微少據周以求冪者皆失之於微多臣淳風等按依密率以七乘周二十二而一即徑以二十二乘徑七而一即周依術求之即得又術曰徑自相乘三之四而一按圓徑自乘為外方三之四而一者是為圓居外方四分之三分也若令六觚之一面乘半徑其冪即外方四分之一也因而三之即亦居外方四分之三也是為圓裏十二觚之冪耳取以為圓失之於微少於徽新術當徑自乘又以一百五十七乘之二百而一臣淳風等謹按密率令徑自乘以十一乘之十四而一即圓冪也又術曰周自相乘十二而一六觚之周其於圓徑三與一也故六觚之周自相乘為冪若圓徑自乘者九方九方凡為十二觚者十有二故曰十二而一即十二觚之冪也今此令周自乘非但若為圓徑自乘者九方而已然則十二而一所得又非十二觚之類也若欲以為圓冪失之於多矣以六觚之周十二而一可也於徽新術直令圓周自乘又以二十五乘之三百一十四而一得圓冪其率二十五者圓冪也三百一十四者周自乘之冪也置周數六尺二寸八分令自乘得冪三十九萬四千三百八十四分又置圓冪三萬一千四百分皆以一千二百五十六約之得此率臣淳風等謹按方面自乘即得其積圓周求其冪假率乃通但此術所求用三一為率圓田正法半周及半徑以相乘今乃用全周自乘故須以十二為母何者據全周而求半周則須以二為法就全周而求半徑復假六以除之是二六相乘除周自乘之數依密率以七乘之八十八而一今有宛田下周三十步徑十六步問為田幾何答曰一百二十步又有宛田下周九十九步徑五十一步問為田幾何答曰五畝六十二步四分步之一術曰以徑乘周四而一此術不驗故推方錐以見其形假令方錐下方六尺高四尺四尺為股下方之半三尺為句正面邪為弦弦五尺也令句弦相乘四因之得六十尺即方錐四面見者之冪若令其中容圓錐圓錐見冪與方錐見冪其率猶方冪之與圓冪也按方錐下六尺則方周二十四尺以五尺乘而半之則亦方錐之見冪故求圓錐之數折徑以乘下周之半即圓錐之冪也今宛田上徑圓穹而與圓錐同術則冪失之於少矣然其術難用故略舉大較施之大廣田也求圓錐之冪猶求圓田之冪也今用兩全相乘故以四為法除之亦如圓田矣開立圓術說圓方諸率甚備可以驗此今有弧田弦三十步矢十五步問為田幾何答曰一畝九十七步半又有弧田弦七十八步二分步之一矢十三步九分步之七問為田幾何答曰二畝一百五十五步八十一分步之五十六術曰以弦乘矢矢又自乘并之二而一方中之圓圓裏十二觚之冪合外方之冪四分之三也中方合外方之半則朱青合外方四分之一也弧田半圓之冪也故依半圓之體而為之術以弦乘矢而半之則為黃冪矢自乘而半之為二青冪青黃相連為弧體弧體法當應規今觚面不至外畔失之於少矣圓田舊術以周三徑一為率俱得十二觚之冪亦失之於少也與此相似指驗半圓之弧耳若不滿半圓者益復疏闊宜依句股鋸圓材之術以弧弦為鋸道長以矢為鋸深而求其徑既知圓徑則弧可割分也割之者半弧田之弦以為股其矢為句為之求弦即小弧之弦也以半小弧之弦為句半圓徑為弦為之求股以減半徑其餘即小弦之矢也割之又割使至極細但舉弦矢相乘之數則必近密率矣然於算數差繁必欲有所尋究也若但度田取其大數舊術為約耳今有環田中周九十二步外周一百二十二步徑五步此欲令與周三徑一之率相應故言徑五步也據中外周以徽術言之當徑四步一百五十七分步之一百二十二也臣淳風等謹按依密率合徑四步二十二分步之十七問為田幾何答曰二畝五十五步於徽術當為田二畝三十一步一百五十七分步之二十三臣淳風等依密率為田二畝三十步二十二分步之十五又有環田中周六十二步四分步之三外周一百一十三步二分步之一徑十二步三分步之二此田環而不通匝故徑十二步三分步之二若據上周求徑者此徑失之於多過周三徑一之率蓋為疏矣於徽術當徑八步六百二十八分步之五十一臣淳風等謹按依周三徑一考之合徑八步二十四分步之一十一依密率合徑八步一百七十六分步之一十三問為田幾何答曰四畝一百五十六步四分步之一於徽術當為田二畝二百三十二步五千二十四分步之七百八十七也依周三徑一為田三畝二十五步六十四分步之二十五臣淳風等謹按密率為田二畝二百三十一步一千四百八分步之七百一十七也術曰并中外周而半之以徑乘之為積步此田截而中之周則為長并而半之知亦以盈補虛也此可令中外周各自為圓田以中圓減外圓餘則環實也密率術曰置中外周步數分母子各居其下母互乘子通全步內分子以中周減外周餘半之以益中周徑亦通分內子以乘周為密實分母相乘為法除之為積步餘積步之分以畝法除之即畝數也按此術并中外周步數於上分母子於下母互乘子者為中外周俱有分故以互乘齊其子母相乘同其母子齊母同故通全步內分子半之知以盈補虛得中平之周周則為從徑則為廣故廣從相乘而得其積既合分母還須分母出之故令周徑分母相乘而連除之即得積步不盡以等數除之而命分以畝法除積步得畝數也九章算術卷第二魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋粟米以御交質變易粟米之法凡此諸率相與大通其特相求各如本率可約者約之别術然也粟率五十糲米三十稗米二十七糳米二十四御米二十一小䵂十三半大䵂五十四糲飯七十五稗飯五十四糳飯四十八御飯四十二菽答麻麥各四十五稻六十豉六十三飧九十熟菽一百三半糵一百七十五今有此都術也凡九數以為篇名可以廣施諸率所謂告往而知來舉一隅而三隅反者也誠能分詭數之紛雜通彼此之否塞因物成率審辨名分平其偏頗齊其參差則終無不歸於此術也術曰以所有數乘所求率為實以所有率為法少者多之始一者數之母故為率者必等之於一據粟率五糲率三是粟五而為一糲米三而為一也欲化粟為米者粟當先本是一一者謂以五約之令五而為一也訖乃以三乘之令一而為三如是則率至於一以五為三矣然先除後乘或有餘分故術反之又完言之知粟五升為糲米三升分言之知粟一斗為糲米五分斗之三以五為母三為子以粟求糲米者以子乘其母報除也然則所求之率常為母也臣淳風等謹按宜云所求之率常為子所有之率常為母今乃云所求之率常為母知脫錯也實如法而一今有粟一斗欲為糲米問得幾何答曰為糲米六升術曰以粟求糲米三之五而一臣淳風等謹按都術以所求率乘所有數以所有率為法此術以粟求米故粟為所有數三是米率故三為所求率五為粟率故五為所有率粟率五十米率三十退位求之故唯云三五也今有粟二斗一升欲為稗米問得幾何答曰為稗米一斗一升五十分升之十七術曰以粟求稗米二十七之五十而一臣淳風等謹按稗米之率二十有七故直以二十七之五十而一也今有粟四斗五升欲為糳米問得幾何答曰為糳米二斗一升五分升之三術曰以粟求糳米十二之二十五而一臣淳風等謹按糳米之率二十有四以為率太繁故因而半之故半所求之率以乘所有之數所求之率既減半所有之率亦減半是故十二乘之二十五而一也今有粟七斗九升欲為御米問得幾何答曰為御米三斗三升五十分升之九術曰以粟求御米二十一之五十而一今有粟一斗欲為小䵂問得幾何答曰為小䵂二升一十分升之七術曰以粟求小䵂二十七之百而一臣淳風等謹按小䵂之率十三有半半者二為母以二通之得二十七為所求率又以母二通其粟率得一百為所有率凡本率有分者須即乘除也他皆放此今有粟九斗八升欲為大䵂問得幾何答曰為大䵂一十斗五升二十五分升之二十一術曰以粟求大䵂二十七之二十五而一臣淳風等謹按大䵂之率五十有四其可半故二十七之亦如粟求糳米半其二率今有粟二斗三升欲為糲飯問得幾何答曰為糲飯三斗四升半術曰以粟求糲飯三之二而一臣淳風等謹按糲飯之率七十有五粟求糲飯合以此數乘之今以等數二十有五約其二率所求之率得三所有之率得二故以三乘二除今有粟三斗六升欲為稗飯問得幾何答曰為稗飯三斗八升二十五分升之二十二術曰以粟求稗飯二十七之二十五而一臣淳風等謹按此術與大䵂多同今有粟八斗六升欲為糳飯問得幾何答曰為糳飯八斗二升二十五分升之一十四術曰以粟求糳飯二十四之二十五而一臣淳風等謹按糳飯率四十八此亦半二率而乘除今有粟九斗八升欲為御飯問得幾何答曰為御飯八斗二升二十五分升之八術曰以粟求御飯二十一之二十五而一臣淳風等謹按此術半率亦與糳飯多同今有粟三斗少半升欲為菽問得幾何答曰為菽二斗七升一十分升之三今有粟四斗一升太半升欲為答問得幾何答曰為答三斗七升半今有粟五斗太半升欲為麻問得幾何答曰為麻四斗五升五分升之三今有粟一十斗八升五分升之二欲為麥問得幾何答曰為麥九斗七升二十五分升之一十四術曰以粟求菽答麻麥皆九之十而一臣淳風等謹按四術率並四十五皆是為粟所求俱合以此率乘其本粟術欲從省先以等數五約之所求之率得九所有之率得十故九乘十除義由於此今有粟七斗五升七分升之四欲為稻問得幾何答曰為稻九斗三十五分升之二十四術曰以粟求稻六之五而一臣淳風等謹按稻率六十亦約二率而乘除今有粟七斗八升欲為豉問得幾何答曰為豉九斗八升二十五分升之七術曰以粟求豉六十三之五十而一今有粟五斗五升欲為飧問得幾何答曰為飧九斗九升術曰以粟求飧九之五而一臣淳風等謹按飧率九十退位與求稻多同今有粟四斗欲為熟菽問得幾何答曰為熟菽八斗二升五分升之四術曰以粟求熟菽二百七之百而一臣淳風等謹按熟菽之率一百三半半者其母二故以母二通之所求之率既被二乘所有之率隨而俱長故以二百七之百而一今有粟二斗欲為糵問得幾何答曰為糵七斗術曰以粟求糵七之二而一臣淳風等謹按糵率一百七十有五合以此數乘其本粟術欲從省先以等數二十五約之所求之率得七所有之率得二故七乘二除今有糲米十五斗五升五分升之二欲為粟問得幾何答曰為粟二十五斗九升術曰以糲米求粟五之三而一臣淳風等謹按上術以粟求米故粟為所有數三為所求率五為所有率今此以米求粟故米為所有數五為所求率三為所有率準都術求之各合其數以下所有反求多同皆準此今有稗米二斗欲為粟問得幾何答曰為粟三斗七升二十七分升之一術曰以稗米求粟五十之二十七而一今有糳米三斗少半升欲為粟問得幾何答曰為粟六斗三升三十六分升之七術曰以糳米求粟二十五之十二而一今有御米十四斗欲為粟問得幾何答曰為粟三十三斗三升少半升術曰以御米求粟五十之二十一而一今有稻一十二斗六升一十五分升之一十四欲為粟問得幾何答曰為粟一十斗五升九分升之七術曰以稻求粟五之六而一今有糲米一十九斗二升七分升之一欲為稗米問得幾何答曰為稗米一十七斗二升一十四分升之一十三術曰以糲米求稗米九之十而一臣淳風等謹按稗率二十七合以此數乘糲米術欲從省先以等數三約之所求之率得九所有之率得十故九乘而十除今有糲米六斗四升五分升之三欲為糲飯問得幾何答曰為糲飯一十六斗一升半術曰以糲米求糲飯五之二而一臣淳風等謹按糲飯之率七十有五宜以本糲米乘此率數術欲從省先以等數十五約之所求之率得五所有之率得二故五乘二除義由於此今有糲飯七斗六升七分升之四欲為飧問得幾何答曰為飧九斗一升三十五分升之三十一術曰以糲飯求飧六之五而一臣淳風等謹按飧率九十為糲飯所求宜以糲飯乘此率術欲從省先以等數十五約之所求之率得六所有之率得五以此故六乘五除也今有菽一斗欲為熟菽問得幾何答曰為熟菽二斗三升術曰以菽求熟菽二十三之十而一臣淳風等謹按熟菽之率一百三半因其有半各以母二通之宜以菽數乘此率術欲從省先以等數九約之所求之率得一十一半所有之率得五也今有菽二斗欲為豉問得幾何答曰為豉二斗八升術曰以菽求豉七之五而一臣淳風等謹按豉率六十三為菽所求宜以菽乘此率術欲從省先以等數九約之所求之率得七而所有之率得五也今有麥八斗六升七分升之三欲為小䵂問得幾何答曰為小䵂二斗五升一十四分升之一十三術曰以麥求小䵂三之十而一臣淳風等謹按小䵂之率十三半宜以母二通之以乘本麥之數術欲從省先以等數九約之所求之率得三所有之率得十也今有麥一斗欲為大䵂問得幾何答曰為大䵂一斗二升術曰以麥求大䵂六之五而一臣淳風等謹按大䵂之率五十有四合以麥數乘此率術欲從省先以等數九約之所求之率得六所有之率得五也今有出錢一百六十買瓴甓十八枚瓴甓甎也問枚幾何答曰一枚八錢九分錢之八今有出錢一萬三千五百買竹二千三百五十箇問箇幾何答曰一箇五錢四十七分錢之三十五經率臣淳風等謹按今有之義以所求率乘所有數合以瓴甓一枚乘錢一百六十為實但以一乘不長故不復乘是以徑將所買之率與所出之錢為法實也又按此今有之義出錢為所有數一枚為所求率所買為所有率而今有之即得所求數一乘不長故不復乘是以徑將所買之率為法以所出之錢為實故實如法得一枚錢不盡者等數而命分術曰以所買率為法所出錢數為實實如法得一錢今有出錢五千七百八十五買漆一斛六斗七升太半升欲斗率之問斗幾何答曰一斗三百四十五錢五百三分錢之一十五今有出錢七百二十買縑一匹二丈一尺欲丈率之問丈幾何答曰一丈一百一十八錢六十一分錢之二今有出錢二千三百七十買布九匹二丈七尺欲匹率之問匹幾何答曰一匹二百四十四錢一百二十九分錢之一百二十四今有出錢一萬三千六百七十買絲一石二鈞一十七斤欲石率之問石幾何答曰一石八千三百二十六錢一百九十七分錢之百七十八經率此術猶經分臣淳風等謹按今有之義錢為所求率物為所有數故以乘錢又以分母乘之為實有分者通之所買通分內子為所有率故以為法實如法而一得錢數不盡而命分者因法為母實餘為子實見不滿故以命之術曰以所求率乘錢數為實以所買率為法實如法得一今有出錢五百七十六買竹七十八箇欲其大小率之問各幾何答曰其四十八箇箇七錢其三十箇箇八錢今有出錢一千一百二十買絲一石二鈞十八斤欲其貴賤斤率之問各幾何答曰其二鈞八斤斤五錢其一石一十斤斤六錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤石率之問各幾何答曰其一鈞九兩一十二銖石八千五十一錢其一石一鈞二十七斤九兩一十七銖石八千五十五二錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤鈞率之問各幾何答曰其七斤一十兩九銖鈞二千一十二錢其一石二鈞二十斤八兩二十銖鈞二千一十三錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤斤率之問各幾何答曰其一石二鈞七斤十兩四銖斤六十七錢其二十斤九兩一銖斤六十八錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤兩率之問各幾何答曰其一石一鈞一十七斤一十四兩一銖兩四錢其一鈞一十斤五兩四銖兩五錢其率其率知欲令無分術曰各置所買石鈞斤兩以為法以所率乘錢數為實實如法而一不滿法者反以實減法法賤實貴其求石鈞斤兩以積銖各除法實各得其積數餘各為銖按出錢五百七十六買竹七十八箇以除錢得七實餘三十是為三十箇復可增一錢然則實餘之數則是貴者之數故曰實貴也本以七十八箇為法今以貴者減之則其餘悉是賤者之數故曰法賤也其求石鈞斤兩以積銖各除法實各得其積數餘各為銖者謂石鈞斤兩積銖除實又以石鈞斤兩積銖除法餘各為銖即合所問今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤銖率之問各幾何答曰其一鈞二十斤六兩十一銖五銖一錢其一石一鈞七斤一十二兩一十八銖六銖一錢今有出錢六百二十買羽二千一百翭翭羽本也數羽稱其本猶數草木稱其根株欲其貴賤率之問各幾何答曰其一千一百四十翭三翭一錢其九百六十翭四翭一錢今有出錢九百八十買矢簳五千八百二十枚欲其貴賤率之問各幾何答曰其三百枚五枚一錢其五千五百二十枚六枚一錢反其率臣淳風等謹按其率者錢多物少反其率知錢少物多多少相反故曰反其率也術曰以錢數為法所率為實實如法而一不滿法者反以實減法法少實多二物各以所得多少之數乘法實即物數按其率出錢六百二十買羽二千一百翭反之當二百四十錢一錢四翭其三百八十錢一錢三翭是錢有二價物有貴賤故以羽乘錢反其率也臣淳風等謹按其率者以物數為法錢數為實反之者以錢數為法物數為實不滿法者實餘也當以餘物化為錢矣法為凡錢而今以化錢減之故曰反以實減法也法少者經分之所得故曰法少實多者餘分之所益故曰實多乘實宜以多乘法宜以少故曰各以所得多少之數乘法實即物數也九章算術卷第三魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋衰分以御貴賤稟稅衰分衰分差也術曰各置列衰列衰相與率也重疊則可約副并為法以所分乘未并者各自為實法集而衰别數本一也今以所分乘上别以下集除之一乘一除適足相消故所分猶存且各應率而别也於今有術列衰各為所求率副并為所有率所分為所有數又以經分言之假令甲家三人乙家二人丙家一人并六人共分十二為人得二也欲復作逐家者則當列置人數以一人所得乘之今此術先乘而後除也實如法而一不滿法者以法命之今有大夫不更簪裊上造公士凡五人共獵得五鹿欲以爵次分之問各得幾何答曰大夫得一鹿三分鹿之二不更得一鹿三分鹿之一簪裊得一鹿上造得三分鹿之二公士得三分鹿之一術曰列置爵數各自為衰爵數者謂大夫五不更四簪裊三上造二公士一也墨子號令篇以爵級為賜然則戰國之初有此名也今有術列衰各為所求率副并為所有率今有鹿數為所有數而今有之即得副并為法以五鹿乘未并者各自為實實如法得一鹿今有牛馬羊食人苖苖主責之粟五斗羊主曰我羊食半馬馬主曰我馬食半牛今欲衰償之問各出幾何答曰牛主出二斗八升七分升之四馬主出一斗四升七分升之二羊主出七升七分升之一術曰置牛四馬二羊一各自為列衰副并為法以五斗乘未并者各自為實實如法得一斗臣淳風等謹按此術問意羊食半馬馬食半牛是謂四羊當一牛二羊當一馬今術置羊一馬二牛四者通其率以為列衰今有甲持錢五百六十乙持錢三百五十丙持錢一百八十凡三人俱出關關稅百錢欲以錢數多少衰出之問各幾何答曰甲出五十一錢一百九分錢之四十一乙出三十二錢一百九分錢之一十二丙出一十六錢一百九分錢之五十六術曰各置錢數為列衰副并為法以百錢乘未并者各自為實實如法得一錢臣淳風等謹按此術甲乙丙持錢數以為列衰副并為所有率未并者各為所求率百錢為所有數而今有之即得今有女子善織日自倍五日織五尺問日織幾何答曰初日織一寸三十一分寸之十九次日織三寸三十一分寸之七次日織六寸三十一分寸之十四次日織一尺二寸三十一分寸之二十八次日織二尺五寸三十一分寸之二十五術曰置一二四八十六為列衰副并為法以五尺乘未并者各自為實實如法得一尺今有北鄉算八千七百五十八西鄉算七千二百三十六南鄉算八千三百五十六凡三鄉發徭三百七十八人欲以算數多少衰出之問各幾何答曰北鄉遣一百三十五人一萬二千一百七十五分人之一萬一千六百三十七西鄉遣一百一十二人一萬二千一百七十五分人之四千四南鄉遣一百二十九人一萬二千一百七十五分人之八千七百九術曰各置算數為列衰臣淳風等謹按三鄉算數約可半者為列衰副并為法以所發徭人數乘未并者各自為實實如法得一人按此術今有之義也今有稟粟大夫不更簪裊上造公士凡五人一十五斗今有大夫一人後來亦當稟五斗倉無粟欲以衰出之問各幾何答曰大夫出一斗四分斗之一不更出一斗簪裊出四分斗之三上造出四分斗之二公士出四分斗之一術曰各置所稟粟斛斗數爵次均之以為列衰副并而加後來大夫亦五斗得二十以為法以五斗乘未并者各自為實實如法得一斗稟前五人十五斗者大夫得五斗不更得四斗簪裊得三斗上造得二斗公士得一斗欲令五人各依所得粟多少減與後來大夫即與前來大夫同據前來大夫已得五斗故言亦也各以所得斗數為衰并得十五而加後來大夫亦五斗凡二十為法也是為六人共出五斗後來大夫亦俱損折今有術副并為所有率未并者各為所求率五斗為所有數而今有之即得今有稟粟五斛五人分之欲令三人得三二人得二問各幾何答曰三人人得一斛一斗五升十三分升之五二人人得七斗六升十三分升之十二術曰置三人人三二人人二為列衰副并為法以五斛乘未并者各自為實實如法得一斛返衰以爵次言之大夫五不更四欲令高爵得多者當使大夫一人受五分不更一人受四分人數為母分數為子母同則子齊齊即衰也故上衰分宜以五四為列焉今此令高爵出少則當使大夫五人共出一人分不更四人共出一人分故謂之返衰人數不同則分數不齊當令母互乘子母互乘子則動者為不動者衰也亦可先同其母各以分母約其子為返衰副并為法以所分乘未并者各自為實實如法而一術曰列置衰而令相乘動者為不動者衰今有大夫不更簪裊上造公士凡五人共出百錢欲令高爵出少以次漸多問各幾何答曰大夫出八錢一百三十七分錢之一百四不更出一十錢一百三十七分錢之一百三十簪裊出一十四錢一百三十七分錢之八十二上造出二十一錢一百三十七分錢之一百二十三公士出四十三錢一百三十七分錢之一百九術曰置爵數各自為衰而返衰之副并為法以百錢乘未并者各自為實實如法得一錢今有甲持粟三升乙持糲米三升丙持糲飯三升欲令合而分之問各幾何答曰甲二升一十分升之七乙四升一十分升之五丙一升一十分升之八術曰以粟率五十糲米率三十糲飯率七十五為衰而返衰之副并為法以九升乘未并者各自為實實如法得一升按此術三人所持升數雖等論其本率精粗不同米率雖少令最得多飯率雖多返使得少故令返之使精得多而粗得少於今有術副并為所有率未并者各為所求率九升為所有數而今有之即得今有絲一斤價直二百四十今有錢一千三百二十八問得絲幾何答曰五斤八兩一十二銖五分銖之四術曰以一斤價數為法以一斤乘今有錢數為實實如法得絲數臣淳風等謹按此術今有之義以一斤價為所有率一斤為所求率今有錢為所有數而今有之即得今有絲一斤價直三百四十五今有絲七兩一十二銖問得錢幾何答曰一百六十一錢三十二分錢之二十三術曰以一斤銖數為法以一斤價數乘七兩一十二銖為實實如法得錢數臣淳風等謹按此術亦今有之義以絲一斤銖數為所有率價錢為所求率今有絲為所有數而今有之即得今有縑一丈價直一百二十八今有縑一匹九尺五寸問得錢幾何答曰六百三十三錢五分錢之三術曰以一丈寸數為法以價錢數乘今有縑寸數為實實如法得錢數臣淳風等謹按此術亦今有之義以縑一丈寸數為所有率價錢為所求率今有縑寸數為所有數而今有之即得今有布一匹價直一百二十五今有布二丈七尺問得錢幾何答曰八十四錢八分錢之三術曰以一匹尺數為法今有布尺數乘價錢為實實如法得錢數臣淳風等謹按此術亦今有之義以一匹尺數為所有率價錢為所求率今有布為所有數今有之即得今有素一匹一丈價直六百二十五今有錢五百問得素幾何答曰得素一匹術曰以價直為法以一匹一丈尺數乘今有錢數為實實如法得素數臣淳風等謹按此術亦今有之義以價錢為所有率五丈尺數為所求率今有錢為所有數今有之即得今有與人絲一十四斤約得縑一十斤今與人絲四十五斤八兩問得縑幾何答曰三十二斤八兩術曰以一十四斤兩數為法以一十斤乘今有絲兩數為實實如法得縑數臣淳風等謹按此術亦今有之義以一十四斤兩數為所有率一十斤為所求率今有絲為所有數今有之即得今有絲一斤耗七兩今有絲二十三斤五兩問耗幾何答曰一百六十三兩四銖半術曰以一斤展十六兩為法以七兩乘今有絲兩數為實實如法得耗數臣淳風等謹按此術亦今有之義以一斤為十六兩為所有率七兩為所求率今有絲為所有數而今有之即得今有生絲三十斤乾之耗三斤十二兩今有乾絲一十二斤問生絲幾何答曰一十三斤一十一兩十銖七分銖之二術曰置生絲兩數除耗數餘以為法餘四百二十兩即乾絲率三十斤乘乾絲兩數為實實如法得生絲數凡所得率知細則俱細粗則俱粗兩數相抱而已故品物不同如上縑絲之比相與率焉三十斤凡四百八十兩令生絲率四百八十兩令乾絲率四百二十兩則其數相通可俱為銖可俱為兩可俱為斤無所歸滯也若然宜以所有乾絲斤數乘生絲兩數為實今以斤兩錯互而亦同歸者使乾絲以兩數為率生絲以斤數為率譬之異類亦各有一定之勢臣淳風等謹按此術置生絲兩數除耗數餘即乾絲之率於今有術為所有率三十斤為所求率乾絲兩數為所有數凡所謂率者細則俱細粗則俱粗今以斤乘兩知乾絲即以兩數為率生絲即以斤數為率譬之異物各有一定之率也今有田一畝收粟六升太半升今有田一頃二十六畝一百五十九步問收粟幾何答曰八斛四斗四升一十二分升之五術曰以畝二百四十步為法以六升太半升乘今有田積步為實實如法得粟數臣淳風等謹按此術亦今有之義以一畝步數為所有率六升太半升為所求率今有田積步為所有數而今有之即得今有取保一歲價錢二千五百今先取一千二百問當作日幾何答曰一百六十九日二十五分日之二十三術曰以價錢為法以一歲三百五十四日乘先取錢數為實實如法得日數臣淳風等謹按此術亦今有之義以價為所有率一歲日數為所求率取錢為所有數而今有之即得今有貸人千錢月息三十今有貸人七百五十錢九日歸之問息幾何答曰六錢四分錢之三術曰以月三十日乘千錢為法以三十日乘千錢為法者得三萬是為貸人錢三萬一日息三十也以息三十乘今所貸錢數又以九日乘之為實實如法得一錢以九日乘今所貸錢為今一日所有錢於今有術為所有數息三十為所求率三萬錢為所有率此又可以一月三十日約息三十錢為十分一日以乘今一日所有錢為實千錢為法為率者當等之於一也故三十日或可乘本或可約息皆所以等之也九章算術卷第四魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋少廣以御積冪方圓少廣臣淳風等謹按一畝之田廣一步長二百四十步今欲截取其從少以益其廣故曰少廣術曰置全步及分母子以最下分母遍乘諸分子及全步臣淳風等謹按以分母乘全步者通其分也以母乘子者齊其子也各以其母除其子置之於左命通分者又以分母遍乘諸分子及已通者皆通而同之并之為法臣淳風等謹按諸子悉通故可并之為法亦宜用合分術列數尤多若用乘則算數至繁故别制此術從省約置所求步數以全步積分乘之為實此以田廣為法一畝積步為實法有分者當同其母齊其子以同乘法實而并齊於法今以分母乘全步及子子如母而一竝以并全法則法實俱長意亦等也故如法而一得從步數實如法而一得從步今有田廣一步半求田一畝問從幾何答曰一百六十步術曰下有半是二分之一以一為二半為一并之得三為法置田二百四十步亦以一為二乘之為實實如法得從步今有田廣一步半三分步之一求田一畝問從幾何答曰一百三十步一十一分步之一十術曰下有三分以一為六半為三三分之一為二并之得一十一以為法置田二百四十步亦以一為六乘之為實實如法得從步今有田廣一步半三分步之一四分步之一求田一畝問從幾何答曰一百一十五步五分步之一術曰下有四分以一為一十二半為六三分之一為四四分之一為三并之得二十五以為法置田二百四十步亦以一為一十二乘之為實實如法而一得從步今有田廣一步半三分步之一四分步之一五分步之一求田一畝問從幾何答曰一百五步一百三十七分步之一十五術曰下有五分以一為六十半為三十三分之一為二十四分之一為一十五五分之一為一十二并之得一百三十七以為法置田二百四十步亦以一為六十乘之為實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一求田一畝問從幾何答曰九十七步四十九分步之四十七術曰下有六分以一為一百二十半為六十三分之一為四十四分之一為三十五分之一為二十四六分之一為二十并之得二百九十四以為法置田二百四十步亦以一為一百二十乘之為實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一求田一畝問從幾何答曰九十二步一百二十一分步之六十八術曰下